    // ── Geofence panel ───────────────────────────────────────────────────────
    function showGeofencePanel() {
        panel.innerHTML = `
            <h3>🗺️ Geofence — Safety Zone</h3>
            <p style="color:#666;font-size:13px;margin-bottom:16px;">Set a zone on the map. You'll get an alert when the device exits the boundary.</p>
            <div id="geofenceMap" style="width:100%;height:320px;border-radius:10px;margin-bottom:14px;"></div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <div>
                    <label style="font-size:12px;color:#999;">Latitude</label>
                    <input id="gfLat" type="number" step="0.000001" style="display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:140px;" placeholder="e.g. 20.2961">
                </div>
                <div>
                    <label style="font-size:12px;color:#999;">Longitude</label>
                    <input id="gfLon" type="number" step="0.000001" style="display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:140px;" placeholder="e.g. 85.8245">
                </div>
                <div>
                    <label style="font-size:12px;color:#999;">Radius (m)</label>
                    <input id="gfRadius" type="number" value="500" style="display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:100px;">
                </div>
                <div style="align-self:flex-end;display:flex;gap:8px;">
                    <button onclick="setGeofence()" style="padding:8px 18px;background:#4caf50;color:#fff;border:none;border-radius:8px;cursor:pointer;">Set Fence</button>
                    <button onclick="sendCommand('CLEAR_GEOFENCE')" style="padding:8px 18px;background:#d32f2f;color:#fff;border:none;border-radius:8px;cursor:pointer;">Clear</button>
                    <button onclick="sendCommand('GET_GEOFENCE')" style="padding:8px 18px;background:#1976ff;color:#fff;border:none;border-radius:8px;cursor:pointer;">Status</button>
                </div>
            </div>`;

        // Init small Leaflet map for picking location
        setTimeout(() => {
            try {
                const mapEl = document.getElementById('geofenceMap');
                if (!mapEl) return;
                const m = L.map('geofenceMap').setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                let marker, circle;
                m.on('click', e => {
                    const { lat, lng } = e.latlng;
                    document.getElementById('gfLat').value = lat.toFixed(6);
                    document.getElementById('gfLon').value = lng.toFixed(6);
                    if (marker) m.removeLayer(marker);
                    if (circle) m.removeLayer(circle);
                    marker = L.marker([lat, lng]).addTo(m);
                    const r = parseFloat(document.getElementById('gfRadius').value) || 500;
                    circle = L.circle([lat, lng], { radius: r, color: '#1976ff', fillOpacity: 0.15 }).addTo(m);
                });
            } catch(e) { console.warn('Leaflet not loaded:', e); }
        }, 200);
    }

    // ── Live GPS tracking ────────────────────────────────────────────────────
    let liveGpsActive = false;

    function toggleLiveGps() {
        if (!liveGpsActive) {
            sendCommand('START_GPS_UPDATES');
            liveGpsActive = true;
            const btn = document.getElementById('liveGpsBtn');
            if (btn) {
                btn.querySelector('span:last-child').textContent = 'Stop GPS Track';
                btn.style.background = '#d32f2f';
                btn.style.color = '#fff';
            }
            showNotification('🛰️ Live GPS tracking started');
            logActivity('Live GPS tracking started');
        } else {
            sendCommand('STOP_GPS_UPDATES');
            liveGpsActive = false;
            const btn = document.getElementById('liveGpsBtn');
            if (btn) {
                btn.querySelector('span:last-child').textContent = 'Live GPS Track';
                btn.style.background = '';
                btn.style.color = '';
            }
            showNotification('GPS tracking stopped');
            logActivity('Live GPS tracking stopped');
        }
    }

    function setGeofence() {
        const lat = parseFloat(document.getElementById('gfLat').value);
        const lon = parseFloat(document.getElementById('gfLon').value);
        const radius = parseFloat(document.getElementById('gfRadius').value) || 500;
        if (isNaN(lat) || isNaN(lon)) { showNotification('Enter valid coordinates'); return; }
        sendCommand('SET_GEOFENCE', { lat, lon, radius });
    }

    function useLocationAsGeofence(lat, lon) {
        sendCommand('SET_GEOFENCE', { lat, lon, radius: 500 });

    // ── Utility: filter table rows ────────────────────────────────────────────
    function filterTable(inputId, tbodyId) {
        const query = document.getElementById(inputId).value.toLowerCase();
        const rows = document.getElementById(tbodyId).querySelectorAll('tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
        });
    }
